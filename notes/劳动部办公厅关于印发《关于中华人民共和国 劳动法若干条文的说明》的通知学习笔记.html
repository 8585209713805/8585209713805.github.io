<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>法规学习笔记（可编辑）</title>
<style>
:root{
  --bg:#eef1f5; --card:#ffffff; --ink:#1f2329; --muted:#7a8290;
  --primary:#1f4e79; --primary-soft:#e8f0f7; --accent:#c0392b;
  --mark:#e6a23c; --note-bg:#fffdf3; --note-bd:#e8d9a8;
  --border:#e1e5ea; --line:#d8dde4; --shadow:0 1px 3px rgba(0,0,0,.06);
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  margin:0; background:var(--bg); color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Segoe UI",sans-serif;
  line-height:1.8; font-size:15px;
}
/* ===== 顶部栏 ===== */
header{
  position:sticky; top:0; z-index:50; background:var(--primary); color:#fff;
  box-shadow:0 2px 8px rgba(0,0,0,.15);
}
.head-inner{max-width:1180px; margin:0 auto; padding:10px 18px; display:flex; align-items:center; gap:14px; flex-wrap:wrap;}
.field-badge{display:inline-block; margin-left:4px; padding:2px 11px; font-size:12px; font-weight:600; color:#fff; background:var(--primary); border-radius:20px; vertical-align:middle; letter-spacing:.5px;}
.head-inner h1{font-size:16px; margin:0; font-weight:600; letter-spacing:.5px; flex:1 1 260px;}
.head-inner h1 small{display:block; font-size:11.5px; font-weight:400; opacity:.8; margin-top:2px;}
.toolbar{display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
.toolbar input[type=search]{
  padding:6px 10px; border:1px solid rgba(255,255,255,.35); border-radius:6px;
  background:rgba(255,255,255,.12); color:#fff; font-size:13px; width:160px; outline:none;
}
.toolbar input[type=search]::placeholder{color:rgba(255,255,255,.7);}
.toolbar button{
  padding:6px 12px; border:1px solid rgba(255,255,255,.4); border-radius:6px;
  background:rgba(255,255,255,.12); color:#fff; font-size:13px; cursor:pointer; white-space:nowrap;
}
.toolbar button:hover{background:rgba(255,255,255,.25);}
.toolbar button.active{background:var(--mark); border-color:var(--mark); color:#fff;}
.status{font-size:12px; opacity:.85; min-width:80px;}

/* ===== 布局 ===== */
.layout{max-width:1180px; margin:18px auto; padding:0 18px; display:flex; gap:20px; align-items:flex-start;}
nav.toc{
  position:sticky; top:78px; width:200px; flex:0 0 200px;
  background:var(--card); border:1px solid var(--border); border-radius:10px;
  padding:12px 10px; box-shadow:var(--shadow); max-height:calc(100vh - 100px); overflow:auto;
}
nav.toc .toc-title{font-size:12px; color:var(--muted); padding:0 8px 8px; border-bottom:1px solid var(--line); margin-bottom:6px;}
nav.toc a{
  display:block; padding:7px 8px; border-radius:6px; color:var(--ink); text-decoration:none;
  font-size:13.5px; cursor:pointer;
}
nav.toc a:hover{background:var(--primary-soft);}
nav.toc a.active{background:var(--primary); color:#fff; font-weight:500;}
nav.toc a .cnt{float:right; color:var(--muted); font-size:11px;}
nav.toc a.active .cnt{color:rgba(255,255,255,.85);}

main{flex:1; min-width:0;}
.chapter{margin-bottom:26px;}
.chapter > h2{
  font-size:18px; color:var(--primary); border-left:4px solid var(--primary);
  padding-left:12px; margin:0 0 14px; font-weight:700;
}
.article{
  background:var(--card); border:1px solid var(--border); border-radius:10px;
  padding:14px 16px; margin-bottom:12px; box-shadow:var(--shadow); position:relative;
  border-left:3px solid var(--line);
}
.article.marked{border-left-color:var(--mark); background:#fffdf6;}
.art-head{display:flex; align-items:center; gap:10px; margin-bottom:6px;}
.art-no{
  font-weight:700; color:var(--primary); font-size:14.5px; background:var(--primary-soft);
  padding:2px 10px; border-radius:5px;
}
.mark-btn{
  margin-left:auto; border:none; background:none; cursor:pointer; font-size:18px; line-height:1;
  color:var(--mark); padding:0 4px;
}
.mark-btn:hover{transform:scale(1.15);}
.art-text{font-size:15px; color:#2b2f36; text-align:justify; white-space:pre-wrap;}

/* 解读区 */
.explain-label{font-size:12px; color:var(--primary); font-weight:600; margin:11px 0 4px; display:flex; align-items:center; gap:5px;}
.explain{
  font-size:13.5px; color:#3a4250; background:#f6f9fc; border-left:3px solid var(--primary);
  border-radius:0 6px 6px 0; padding:8px 11px; white-space:pre-wrap; outline:none;
}
.explain:focus{background:#eef3fa; box-shadow:0 0 0 3px rgba(31,78,121,.12);}

/* 关联案例 */
.case-label{font-size:12px; color:#9a5b1e; font-weight:600; margin:12px 0 5px; display:flex; align-items:center; gap:5px;}
.case{background:#fbf6ee; border:1px solid #ecdcc0; border-radius:8px; padding:9px 11px; margin-bottom:8px;}
.case-title{font-weight:600; font-size:13.5px; color:#6b4423;}
.case-desc{font-size:13px; color:#5a4a3a; margin-top:3px; white-space:pre-wrap;}
.case-src{font-size:11.5px; color:#a98b5e; margin-top:4px;}

/* 关联法条 */
.rel-label{font-size:12px; color:#1f6fb2; font-weight:600; margin:12px 0 5px; display:flex; align-items:center; gap:5px;}
.rel{background:#eef4fb; border:1px solid #cfe0ef; border-radius:8px; padding:9px 11px; margin-bottom:8px;}
.rel-src{font-weight:600; font-size:13.5px; color:#14507e;}
.rel-text{font-size:13px; color:#34404d; margin-top:4px; white-space:pre-wrap;}

/* 检索按钮 */
.tool-row{margin:10px 0 2px;}
.search-btn{border:1px solid var(--border); background:#f3f7fb; color:var(--primary); border-radius:6px; padding:5px 10px; font-size:12.5px; cursor:pointer;}
.search-btn:hover{background:#e3edf6;}

/* 笔记区 */
.note-label{font-size:12px; color:var(--muted); margin:11px 0 4px; display:flex; align-items:center; gap:5px;}

/* 速查卡 */
.quick{background:linear-gradient(135deg,#f0f6fc,#e8f0f7); border:1px solid #cfe0ef; border-radius:10px; margin-bottom:18px; box-shadow:var(--shadow); overflow:hidden;}
.quick-head{font-weight:700; color:var(--primary); padding:11px 14px; cursor:pointer; user-select:none; font-size:14.5px;}
.quick-body{padding:2px 14px 12px;}
.qg{font-size:13px; color:#34404d; padding:7px 0; border-top:1px dashed #d4e2ee; white-space:pre-wrap;}
.qg:first-child{border-top:none;}
.qg b{color:var(--primary);}

/* 法规简介（发布信息） */
.law-intro{background:linear-gradient(135deg,#f0f6fc,#eef4fb); border:1px solid #cfe0ef; border-radius:10px; margin-bottom:18px; box-shadow:var(--shadow); overflow:hidden;}
.law-intro-head{font-weight:700; color:var(--primary); padding:11px 14px; font-size:14.5px;}
.law-intro-body{padding:2px 14px 12px;}
.law-intro-desc{font-size:13.5px; color:#34404d; line-height:1.8; margin:2px 0 10px;}
.meta-grid{display:grid; grid-template-columns:auto 1fr; gap:6px 14px; align-items:baseline;}
.meta-grid .mk{font-size:13px; color:var(--muted); white-space:nowrap;}
.meta-grid .mv{font-size:13px; color:#2b2f36;}
.meta-grid .mv.ok{color:#1a9e57; font-weight:600;}
.meta-grid .mv.no{color:#c0392b; font-weight:600;}

/* 条文互链 */
.lawlink{color:#1f6fb2; text-decoration:underline; cursor:pointer;}
.lawlink:hover{color:#0d4f86;}

/* 批注分层 */
.notes-wrap{margin-top:2px;}
.note-block{margin-bottom:8px;}
.note-tag{display:inline-block; font-size:11px; font-weight:600; padding:1px 8px; border-radius:4px; margin-bottom:3px;}
.tag-q{background:#fde8e8; color:#c0392b;}      /* 疑问 */
.tag-c{background:#e6f4ea; color:#1e7a46;}      /* 我的案例 */
.tag-s{background:#fef3e0; color:#b9770e;}      /* 要点总结 */
.tag-t{background:#efe7fb; color:#6b3fa0;}      /* 待办 */
.note.sub{background:var(--note-bg); border:1px dashed var(--note-bd); border-radius:7px; padding:7px 10px; min-height:32px; font-size:13.5px; color:#5a4a1a; white-space:pre-wrap; outline:none;}
.note.sub:focus{border-style:solid; border-color:var(--mark); background:#fffce8; box-shadow:0 0 0 3px rgba(230,162,60,.15);}
.note.sub:empty:before{content:attr(data-ph); color:#b9a86a;}

/* 自测模式 */
.reveal-btn{display:none; margin:10px 0 2px; border:1px solid var(--primary); background:var(--primary-soft); color:var(--primary); border-radius:6px; padding:5px 12px; font-size:12.5px; cursor:pointer;}
.reveal-btn:hover{background:#d8e6f5;}
body.self-test .reveal-btn{display:inline-block;}
body.self-test .explain-label,
body.self-test .explain,
body.self-test .case-label,
body.self-test .case,
body.self-test .rel-label,
body.self-test .rel,
body.self-test .tool-row,
body.self-test .note-label,
body.self-test .notes-wrap{display:none;}
.article.revealed .explain-label,
.article.revealed .explain,
.article.revealed .case-label,
.article.revealed .case,
.article.revealed .rel-label,
.article.revealed .rel,
.article.revealed .tool-row,
.article.revealed .note-label,
.article.revealed .notes-wrap{display:block;}
body.self-test .article{opacity:.97;}
body.self-test .article.revealed{border-left-color:var(--primary); background:#fff;}

footer{max-width:1180px; margin:0 auto 30px; padding:14px 18px; color:var(--muted); font-size:12.5px; text-align:center;}

@media (max-width:860px){
  .layout{flex-direction:column;}
  nav.toc{position:static; width:100%; flex:none; max-height:none;}
  .toolbar input[type=search]{width:120px;}
}
@media print{
  header, nav.toc, footer, .tool-row, .quick-head{display:none !important;}
  body{background:#fff;}
  .layout{display:block; margin:0; padding:0;}
  .article{break-inside:avoid; box-shadow:none; border:1px solid #ccc;}
  .explain{background:#f4f6f9;}
  .case{background:#fbf6ee;}
  .mark-btn{display:none;}
  .quick{box-shadow:none; border:1px solid #ccc;}
  body.self-test .reveal-btn{display:none !important;}
  body.self-test .explain, body.self-test .explain-label,
  body.self-test .case, body.self-test .case-label,
  body.self-test .rel, body.self-test .rel-label,
  body.self-test .tool-row, body.self-test .note-label, body.self-test .notes-wrap{display:block !important;}
}

/* ===== 法条编辑模式（每条常驻工具条） ===== */
.art-text.editable{outline:none; border-radius:5px; transition:box-shadow .15s;}
body.edit-mode .art-text.editable{cursor:text;}
.art-text.editable:focus{box-shadow:0 0 0 3px rgba(31,78,121,.16); background:#fefefe; padding:3px 4px;}
.art-editbar{display:none; align-items:center; gap:6px; margin:2px 0 10px; padding:6px 9px; background:#f4f6f8; border:1px solid #e1e6ec; border-radius:8px; flex-wrap:wrap;}
body.edit-mode .article .art-editbar{display:flex;}
.art-editbar .elbl{font-size:11px; color:#7a828c; margin-right:1px;}
.art-editbar .fcolor{width:20px;height:20px;border-radius:5px;border:1.5px solid rgba(0,0,0,.15);cursor:pointer;padding:0;flex:none;}
.art-editbar .fcolor:hover{transform:scale(1.15); border-color:#333;}
.art-editbar .fsep{width:1px;height:16px;background:#cfd4da; margin:0 3px;}
.art-editbar .fclear{padding:3px 9px;border:1px solid #c7ccd2;border-radius:5px;background:#fff;color:#444;cursor:pointer;font-size:11px;white-space:nowrap;}
.art-editbar .fclear:hover{background:#eef1f4;}
.art-editbar .ehint{font-size:11px;color:#9aa1a9;margin-left:auto;}
body:not(.edit-mode) .art-text.editable{-webkit-user-modify:read-only; user-modify:read-only;}
</style>
</head>
<body>
<header>
  <div class="head-inner">
    <h1><span id="lawTitle"></span><small id="lawSub"></small> <span id="lawField" class="field-badge"></span></h1>
    <div class="toolbar">
      <input type="search" id="search" placeholder="搜索条文…" aria-label="搜索">
      <span class="status" id="status">已就绪</span>
      <button id="btnEdit" title="编辑模式：选中任意法条文字即可改字体色 / 高亮标注" style="padding:6px 13px; border:1px solid rgba(255,255,255,.45); border-radius:7px; background:#e6a23c; color:#fff; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; box-shadow:0 2px 6px rgba(230,162,60,.4);">✎ 编辑条文</button>
      <button id="btnTest" title="自测记忆模式：隐藏解读，点条文下方“显示解读”对照，用于抽背">自测模式</button>
      <button id="btnExport" title="导出为独立HTML文件（含所有笔记、解读与案例）。导出后告诉我“发布批注”即可同步到网站">导出</button>
      <button id="btnPrint" title="打印 / 存为PDF">打印</button>
      <button id="btnClear" title="清空本浏览器内全部笔记与标记">清空</button>
    </div>
  </div>
</header>

<div class="layout">
  <nav class="toc" id="toc">
    <div class="toc-title">目录</div>
  </nav>
  <main id="content"></main>
</div>

<footer>
  本笔记为个人学习用途，条文以官方公布文本为准。案例来源于司法部/最高法等公开发布的典型/指导案例。笔记与解读自动保存在本浏览器，导出可脱离浏览器长期留存。
</footer>

<script>
/* ============ 用户定制区（调用技能时替换为目标法规） ============ */
const LAW_TITLE = "劳动部办公厅关于印发《关于<中华人民共和国 劳动法>若干条文的说明》的通知";
const LAW_SUB   = "《劳动法规汇编（江西）》· 共108条";
const LAW_KEY   = "jx7";
const LAW_FIELD = "劳动关系";

/* 法规简介 */
const LAW_INTRO = "收录于《劳动法规汇编（江西）》，属「劳动关系」板块，共108个条文块。";
const LAW_META = {"issuer":"—","published":"—","effective":"—","valid":"有效","level":"规范性文件"};

/* 重点速查卡 */
const QUICK = [];

/* 案例库 */
const CASES = {};

/* 关联法条库 */
const REL = {};

/* 法条数据 */
const DATA = [{"ch":"全文","items":[{"no":"","t":"劳办发〔1994〕289号 1994年9月5日\n各省、自治区、直辖市及计划单列市劳动（劳动人事）厅（局）:\n《劳动法》颁布后，各级劳动部门在学习《劳动法》的过程中，就《劳动法》中的一些 条款的含义，多次向劳动部询问。为了帮助地方劳动部门学习、理解、贯彻《劳动法》，我 们编写了“《劳动法》若干条文说明”，现印发给你们，仅供内部参考。\n关于《中华人民共和国劳动法》若干条文的说明","ex":""},{"no":"第一条","t":"第一条 为了保护劳动者的合法权益，调整劳动关系，建立和维护适应社会主义市场经 济的劳动制度，促进经济发展和社会进步，根据宪法，制定本法。\n本条中的“劳动制度”，此处作广义理解，不仅仅指用人制度，还包括就业、工资分配、 社会保险、职业培训、劳动安全卫生等制度。","ex":""},{"no":"第二条","t":"第二条 在中华人民共和国境内的企业、个体经济组织（以下统称用人单位）和与之形  成劳动关系的劳动者，适用本法。国家机关、事业组织、社会团体和与之建立劳动合同关系 的劳动者，依照本法执行。\n本条第一款中的“企业”是指从事产品生产、流通或服务性活动等实行独立经济核算的 经济单位，包括各种所有制类型的企业，如工厂、农场、公司等。\n本条第二款所指劳动法对劳动者的适用范围，包括三个方面：\n①国家机关、事业组织、社会团体的工勤人员；\n②实行企业化管理的事业组织的非工勤人员；\n③其他通过劳动合同（包括聘用合同）与国家机关、事业单位、社会团体建立劳动关系\n的劳动者。\n本法的适用范围除了公务员和比照实行公务员制度的事业组织和社会团体的工作人员， 以及农业劳动者、现役军人和家庭保姆等。","ex":""},{"no":"第三条","t":"第三条 劳动者享有平等就业和选择职业的权利、取得劳动报酬的权利、休息休假的权 利、获得劳动安全卫生保护的权利、接受职业技能培训的权利、享受社会保险和福利的权利、 提请劳动争议处理的权利以及法律规定的其他劳动权利。\n劳动者应当完成劳动任务，提高职业技能，执行劳动安全卫生规程，遵守劳动纪律和职 业道德。\n本条中的“劳动报酬”是指，劳动者从用人单位得到的全部工资收入。\n本条中“法律规定的其他劳动权利”是指劳动者依法享有参加和组织工会的权利，参加 职工民主管理权利，参加社会义务劳动的权利，参加劳动竞赛的权利，提出合理化建议的权 利，从事科学研究、技术革新、发明创造的权利，依法解除劳动者合同的权利，对用人单位管理人员违章指挥、强令冒险作业有拒绝执行的权利，对危害生命安全和身体健康的行为有 权得出批评、检举和控告的权利，对违反劳动法的行为进行监督的权利等。","ex":""},{"no":"第四条","t":"第四条 用人单位应当依法建立和完善规章制度，保障劳动者享有劳动权利和履行劳动 义务。\n本条中“依法”应当作广义理解，指所有的法律、法规和规章。包括：宪法、法律、行 政法规、地方法规，民族自治地方，还要依据该地方的自治条例和单行条例，以及关于劳动 方面的行政规章。","ex":""},{"no":"第五条","t":"第五条 国家采取各种措施，促进劳动就业，发展职业教育，制定劳动标准，调节社会 收入，完善社会保险，协调劳动关系，逐步提高劳动者的生活水平。\n本条中的“调节社会收入”是指国家通过宏观调控措施调节全社会收入的总量以及不同 地区、不同部门、不同单位、不同人员之间的收入关系，其目的是使全社会个人收入总量在 国民收入中保持合理的比重，保证社会公平，促进社会进行。","ex":""},{"no":"第六条","t":"第六条 国家提倡劳动者参加社会义务劳动，开展劳动竞赛和合理化建议活动，鼓励和 保护劳动者进行科学研究、技术革新和发明创造，表彰和奖励劳动模范和先进工作者。","ex":""},{"no":"第七条","t":"第七条 劳动者有权依法参加和组织工会。\n本条中的“依法”具体指我国宪法和《中华人民共和国工会法》等。","ex":""},{"no":"第八条","t":"第八条 本条中的“依照该法律规定”法律指：《中华人民共和国外资企业法》《中华 人民共和国中外合资企业法》《中华人民共和务中外合作企业法》《中华人民共和国全民所 有制工业企业法》等。其中“通过大会、职工代表大会”、“参与民主管理”，主要适用于 国有企业：“其他形式”指通过工会或推举代表；“与用人单位进行平等协商”，主要适用 于非国有企业。","ex":""},{"no":"第九条","t":"第九条 国务院劳动行政部门主管全国劳动工作。\n县级以上地方人民政府劳动行政部门主管本行政区域内的劳动工作。\n本条第一款，以法律形式明确了国务院劳动行政部门的地位和职责。第二款明确了县级 以上各级地方领导的地位和职责。\n本条中的“劳动工作”包括劳动就业、劳动合同和集体合同、工时和休息休假、工资、 劳动安全卫生、女职工和未成年工特殊保护、职业培训、社会保险和福利、劳动议处理、劳 动监督检查以及依照法律责任追究违法后果等，与国务院批准的劳动部“三定”方案是一致 的。","ex":""},{"no":"第十条","t":"第十条 国家通过促进经济和社会发展，创造就业条件，扩大就业机会。国家鼓励企业、 事业组织、社会团体在法律、行政法规规定的范围内兴办产业或者拓展经营，增加就业。\n国家支持劳动者自愿组织起来就业和从事个体经营实现就业。\n本条中的“就业”是指具有劳动能力的公民在法定劳动年龄内，依法从事某种有报酬或 劳动收入的社会活动。\n本条第二款指的法律、行政法规有《劳动就业服务企业管理规定》《全民所有近制工业  企业转换经营机制条例》《城镇集体所有制企业条例》《个体商房管理条例》以及中共中央、 国务院《关于广开门路、搞活经济解决城镇就业问题的若干决定》等。\n本条第三款规定中的“组织就业”是指通过兴办各种类型的经济组织实现就业。国家对 这类经济组织实行在资金、货源、场地、原辅材料、税收等方面给予支持和照顾的政策。","ex":""},{"no":"第十一条","t":"第十一条 地方各级人民政府应当采取措施，发展多种类型的职业介绍机构，提供就业 服务。\n本条中的“多种类型的职业介绍机构”指：劳动部门、非劳动部门和个人开办的职业介 绍机构，各级劳动就业服务机构开办的职业介绍机构，各级劳动就业服务机构开办的职业介 绍机构，非劳动部门针对不同的求职对象开办的职业介绍机构等。各种类型的职业介绍机构 其业务范围不同。\n本条中的“就业服务”主要包括：\n①为劳动力供求双方相互选择，实现就业而提供的各类职业介绍服务；\n②为提高劳动者职业技术和就业能力的层次、多形式的就业训练和转业训练服务；\n③多保障失业者基本生活和帮助其再就业的失业保险服务；\n④组织劳动者开展生产自救和创业的劳动就业服务企业。就业服务的四项工作应做到有 机结合，发挥整体作用，为劳动就业提供全面、高效、便捷的服务。","ex":""},{"no":"第十二条","t":"第十二条 劳动者就业，不因民族、种族、性别、宗教信仰不同而受歧视。","ex":""},{"no":"第十三条","t":"第十三条 妇女享有与男子平等的就业权利。在录用职工时，除国家规定的不适合妇女 的工种或者岗位外，不得以性别为由拒绝录用妇女或者提高对妇女的录用标准。\n本条中的“平等的就业权利”是指劳动者的就业地位、就业机会和就业条件是平等。\n本条中的“国家规定不适合妇女的工种或者岗位”具体规定在劳动部颁布的《女职工禁 忌劳动范围的规定》（劳安字〔1990〕2号）中。","ex":""},{"no":"第十四条","t":"第十四条 残疾人、少数民族人员、退出现役的军人的就业，法律、法规有特别规定的， 从其规定。\n本条中的“法律、法规”指：《中华人民共和国残疾人保障法》《中国人民解放军志愿 兵退出现役安置暂行办法》《退伍义务兵安置条例》以及《工族区域自治法》等。","ex":""},{"no":"第十五条","t":"第十五条 禁止用人单位招用未满十六周岁的未成年人。\n文艺、体育和特种工艺单位招用未满十六周岁的未成年人，必须依照国家有关规定，履 行审批手续，并保障其接受义务教育的权利。\n本条第一款的具体规定在国务院第81号令《禁止使用童工规定》中。\n本条中“依照国家有关规定”主要指《关于界定文艺工作者、运动员、艺徒概念的通知》 《关于禁止使用童工的罚款标准》等。","ex":""},{"no":"第十六条","t":"第十六条 劳动合同是劳动者与用人单位确立劳动关系、明确双方权利和义务的协议。\n建立劳动关系应当订立劳动合同。\n此条明确：建立劳动关系的所有劳动者，不论是管理人员、技术人员还是原来所称的固 定工，都必须订立劳动合同。“应当”在这里是“必须”的含义。","ex":""},{"no":"第十七条","t":"第十七条 订立和变更劳动合同，应当遵循平等自愿、协商一致的原则，不得违反法律、 行政法规的规定。\n劳动合同依法订立即具有法律约束力，当事人必须履行劳动合同规定的义务。\n本条第一款中的“法律、行政法规”既包括现行的法律、行政法规，也包括以后颁布实 行的法律、行政法规，既包括劳动法律、法规、也包括民事、经济方面的法律、法规。\n本条第二款中的“依法”是指订立劳动合同时所依据的现行法律和法规。\n劳动合同依法订立即具有法律约束力，任何第三方不得非法干预劳动合同的履行。","ex":""},{"no":"第十八条","t":"第十八条 下列劳动合同无效：\n（一）违反法律、行政法规的劳动合同；\n（二）采取欺诈、威胁等手段订立的劳动合同。\n无效的劳动合同，从订立的时候起，就没有法律约束力。确认劳动合同部分无效的，如 果不影响其余部分的效力，其余部分仍然有效。\n劳动合同的无效，由劳动争议仲裁委员会或者人民法院确认。\n本条第一款第（一）项中“法律、行政法规”与本法第十七条解释相同。第（二）项 中，“欺诈”是指： 一方当事人故意告知对方当事人虚假的情况，或者故意隐瞒真实的情 况，诱使对方当事人作出错误意思表示的行为：  “威胁”是指以公民及其亲友的生命、健 康、荣誉、名誉、财产等造成损害为要挟、迫使对方作出违背真实的意思表示的行为。（期 诈、威胁的解释依据《最高人民法院关于执行〈中华人民共和国民法通则〉若干问题的意见 （ 试 行 ） 》 ） 。\n劳动合同的无效，经仲裁未引起诉讼的，由劳动争议仲裁委员会认定；经仲裁引起诉讼 的，由人民法院认定。","ex":""},{"no":"第十九条","t":"第十九条 劳动合同应当以书面形式订立，并具备以下条款：\n（一）劳动合同期限；\n（二）工作内容；\n（三）劳动保护和劳动条件；\n（四）劳动报酬；\n（五）劳动纪律；\n（六）劳动合同终止的条件；\n（七）违反劳动合同的责任。\n劳动合同除前款规定的必备条款外，当事人可以协商约定其他内容。\n劳动合同的必备条款中没有规定社会保险一项，原因在于：社会保险在全社会范围内依 法执行，并不是订立合同的双方当事人所能协商解决的。\n“协商约定其他内容”是指劳动合同中的约定条款，即劳动合同双方当事人除依据本法 就劳动合同的必备条款达成一致外，如果认为某些方面与劳动合同有关的内容仍需协调，便 可将协商一致的内容写进合同，这些内容是合同当事人自愿协商确定的，而不是法定的。","ex":""},{"no":"第二十条","t":"第二十条 劳动合同的期限分为有固定期限、无固定期限和以完成一定的工作为期限。\n劳动者在同一用人单位连续工作满十年以上，当事人双方同意续延劳动合同的，如果劳 动者提出订立无固定期限的劳动合同，应当订立无固定期限的劳动合同。\n本条中的“当事人双方同意续延劳动合同的”，是指已有劳动合同到期，双方同意延续 的。并非指原固定工同意而一律订立无固定期限的劳动合同。","ex":""},{"no":"第二十一条","t":"第二十一条 劳动合同可以约定试用期。试用期最长不得超过六个月。\n本条中规定的“试用期”适用于初次就业或再次就业时改变劳动岗位或工种劳动者。","ex":""},{"no":"第二十二条","t":"第二十二条 劳动合同当事人可以在劳动合同中约定保守用人单位商业秘密的有关事项。\n根据《反不正当竞争法》第十条规定，商业秘密指不为公众所知悉，能为用人单位带来 经济利益，具有实用性并经用人单位采取保密措施的技术信息和经营信息。","ex":""},{"no":"第二十三条","t":"第二十三条  劳动合同期满或者当事人约定的劳动合同终止条件出现，劳动合同即行终 止。","ex":""},{"no":"第二十四条","t":"第二十四条  经劳动合同当事人协商一致，劳动合同可以解除。","ex":""},{"no":"第二十五条","t":"第二十五条 劳动者有下列情形之一的，用人单位可以解除劳动合同：\n（一）在试用期间被证明不符合录用条件的；\n（二）严重违反劳动纪律或者用人单位规章制度的；\n（三）严重失职，营私舞弊，对用人单位利益造成重大损害的；\n（四）被依法追究刑事责任的。\n本条中“严重违反劳动纪律”的行为，可根据《企业职工奖惩条例》和《国营企业辞退 违纪职工暂行规定》等有关法规认定。\n本条中的“重大损害”由企业内部规章来规定。因为企业类型各有不同，对重大损害的 界定也千差万别，故不便于对重大损害作统一的解释。若由此发生劳动争议，可以通过劳动 争议仲裁委员会对其规章规定的重大损害进行认定。\n本条中“被依法追究刑事责任”，具体指出：①被人民检察院免予起诉的；②被人民法 院判处刑罚（刑罚包括：主刑：管制、拘役、有期徒刑、无期徒刑、死刑；附加刑：罚金、 剥夺政治权利、没收财产）的；③被人民法院依据刑法第32条免予刑事处分的。","ex":""},{"no":"第二十六条","t":"第二十六条 有下列情形之一的，用人单位可以解除劳动合同，但是应当提前三十日以 书面形式通知劳动者本人：\n（一）劳动者患病或者非因工负伤，医疗期满后，不能从事原工作也不能从事由用人单 位另行安排的工作的；\n（二）劳动者不能胜任工作，经过培训或者调整工作岗位，仍不能胜任工作的；\n（三）劳动合同订立时所依据的客观情况发生重大变化，致使原劳动合同无法履行，经 当事人协商不能就变更劳动合同达成协议的。\n本条第（一）项指劳动者医疗期满后，不能从事原工作的，由原用人单位另行安排适当 的工作之后，仍不能从事另行安排的工作的，可以解除劳动合同。\n本条第（二）项中的“不能胜任工作”，是指不能按要求完成劳动合同中约定的任务或 者同工种、同岗位人员的工作量。用人单位不得故意提高定额标准，使劳动者无法完成。\n本条中的“客观情况”指：发生不可抗力或出现致使劳动合同全部或部分条款无法履行 的其他情况，如企业迁移、被兼并、企业资产转移等，并且排除本法第二十七条所列的客观 情况。","ex":""},{"no":"第二十七条","t":"第二十七条 用人单位濒临破产进行法定整顿期间或者生产经营状况发生严重困难，确 需裁减人员的，应当提前三十日向工会或者全体职工说明情况，听取工会或者职工的意见，经向劳动行政部门报告后，可以裁减人员。\n用人单位依据本条规定裁减人员，在六个月内录用人员的，应当优先录用被裁减的人员。\n本条中的“法定整顿期间”指依据《中华人民共和国破产法》和《民事诉讼法》的破产 程序进行的整顿期间。“生产经营状况发生严重困难”可以根据地方政府规定的困难企业标 准来界定。“报告”仅指说明情况，无批准含义。“优先录用”指同等条件下优先录用。","ex":""},{"no":"第二十八条","t":"第二十八条  用人单位依据本法第二十四条、第二十六条、第二十七条的规定解除劳动 合同的，应当依照国家有关规定给予经济补偿。\n本条中的“依据国家有关规定”是指国家法律、法规和劳动部制定的规章及其他规范性 文件。\n目前除《国营企业实行劳动合同制暂行规定》对新招工人解除合同给予经济补偿，《中 华人民共和国中外合资经营企业劳动管理规定》第四条规定，企业应对被解雇的职工予以经 济补偿外，其他劳动法律、法规、规章尚无此规定，需制定新的经济补偿办法。《履行和解 除劳动合同的经济补偿办法》在制定中，将于明年（1995年）一月一日有颁布。","ex":""},{"no":"第二十九条","t":"第二十九条  用人单位依据本法第二十四条、第二十六条、第二十七条的规定解除劳动 合同的，应当依照国家有关规定给予经济补偿。\n本条第（一）项、第（二）项、第（三）项之所以法律的形式规定不得解除劳动合同，\n是为了保证劳动者在特殊情况下的权益不受侵害。在第（二）项、第（三）项规定的情形下 劳动合同到期的，应延续劳动合同到医疗期满或女职工“三期”届满为止。\n本条第（四）项中的“法律、法规规定的其他情形”，这类规定是立法时经常采用的技术 性手段，其立法用意是：①在该条款列举情况时，为避免遗漏现行法律、法规规定的其他情 况，采用此种办法使该法与其他法相衔接。②便于与以后颁布的法律相衔接，即与新法相衔 接。本法第四十二条规定第（三）项的解释与此相同。","ex":""},{"no":"第三十条","t":"第三十条  用人单位解除劳动合同，工会认为不适当的，有权提出意见。如果用人单位 违反法律、法规或者劳动合同，工会有权要求重新处理；劳动者申请仲裁或者提起诉讼的， 工会应当依法给予支持和帮助。\n本条中的“法律、法规”是指与解除劳动合同有关的现行法律、法规。","ex":""},{"no":"第三十一条","t":"第三十一条  劳动者解除劳动合同，应当提前三十日以书面形式通知用人单位。\n本条规定了劳动者的辞职权，除此条规定的程序外，对劳动者行使辞职权不附加任何条 件。但违反劳动合同约定者要依法承担责任。","ex":""},{"no":"第三十二条","t":"第三十二条 有下列情形之一的，劳动者可以随时通知用人单位解除劳动合同：\n（一）在试用期内的；\n（二）用人单位以暴力、威胁或者非法限制人身自由的手段强迫劳动的；\n（三）用人单位未按照劳动合同约定支付劳动报酬或者提供劳动条件的。\n本条中的“非法限制人身自由”是指采用拘留、禁闭或其他强制方法非法剥夺或限制他 人按照自己的意志支配自己的身体活动的自由的行为。","ex":""},{"no":"第三十三条","t":"第三十三条 企业职工一方与企业可以就劳动报酬、工作时间、休息休假、劳动安全卫 生、保险福利等事项，签订集体合同。集体合同草案应当提交职工代表大会或者全体职工讨论通过。\n本条中的“企业职工一方”是指企业工会或者职工推举的代表（没有建立工会的企业）。\n本条中的“保险福利”主要是指国家基本社会保险之外的企业补充保险和职工福利。国 家基本社会保险依照法律、法规规定执行。","ex":""},{"no":"第三十四条","t":"第三十四条 集体合同签订后应当报送劳动行政部门；劳动行政部门自收到集体合同文 本之日起十五日内未提出异议的，集体合同即行生效。","ex":""},{"no":"第三十五条","t":"第三十五条 依法签订的集体合同对企业和企业全体职工具有约束力。 职工个人与企业 订立的劳动合同中劳动条件和劳动报酬等标准不得低于集体合同的规定。\n集体合同中劳动条件和劳动报酬的规定不得违背国家法律、法规的规定；企业与职工签 订的劳动合同在此方面不得低于集体合同的规定。即集体合同的法律效力高于劳动合同，劳 动法律、法规的法律效力高于集体合同。","ex":""},{"no":"第三十六条","t":"第三十六条 国家实行劳动者每日工作时间不超过八小时，平均每周工作时间不超过四 十四小时的工时制度。\n根据《国务院关于职工工作时间的规定》，目前，职工的标准工作时间为每日工作八小 时，平均每周工作四十四小时。但企业可要根据实际情况，在标准工作时间范围内合理安排 生产和劳动时间。但每日不能超过八小时，平均每周不能超过四十四小时。","ex":""},{"no":"第三十七条","t":"第三十七条 对实行计件工作的劳动者，用人单位应当根据本法第三十六条规定的工时 制度合理确定其劳动定额和计件报酬标准。\n本条应理解为：\n（一）对于实行计件工资的用人单位，在实行新的工时制度下，应既能保证劳动者享受 缩短工时的待遇，又尽量保证劳动者的计件工资收入不减少。\n（二）如果适当调整劳动定额，在保证劳动者计件工资收入不降低的前提下，计件单价 可以不作调整；如果调整劳动定额有困难，就应该考虑适当调整劳动计件单价，以保证收入 不减少。","ex":""},{"no":"第三十八条","t":"第三十八条 用人单位应当保证劳动者每周至少休息一日。\n本条应理解为：用人单位必须保证劳动者每周至少有一次24小时不间断的休息。","ex":""},{"no":"第三十九条","t":"第三十九条 企业因生产特点不能实行本法第三十六条、第三十八条规定的，经劳动行 政部门批准，可以实行其他工作和休息办法。\n劳动部、人事部颁发的《国务院关于职工工作时间的规定的实施办法》中规定：“由于 工作性质和职责的限制，不宜实行定时工作制的职工，由国务院行业系统主管部门提出意  见，报国务院劳动、人事行政主管部门批准，可以实行不定时工作制”。如：出租车驾驶员、 森林巡视员等。","ex":""},{"no":"第四十条","t":"第四十条 用人单位在下列节日期间应当依法安排劳动者休假：\n（一）元旦；\n（二）春节；\n（三）国际劳动节；\n（四）国庆节；\n（五）法律、法规规定的其他休假节日。\n根据1949年政务院发布的《全国年节及纪念日放假办法》之规定，元旦，放假一天，一 月一日；春节，放假三天，农历正月初一日、初二日、初三；国际劳动节，放假一日，五月 一日；国庆节，放假二日，十月一日、十月二日。\n本条第（五）项具体指：妇女节，放假半天；少数民族习惯的假日，由少数民族集居地  区的地区人民政府，规定放假日期。其他纪念日、不放假。属于全国人民的假日，如适逢星期 日，应在次日补假；凡属于部分人民的假日，如适逢星期日不补假。休假节日不包括职工的 带薪年休假。","ex":""},{"no":"第四十一条","t":"第四十一条 用人单位由于生产经营需要，经与工会和劳动者协商后可以延长工作时间， 一般每日不得超过一小时；因特殊原因需要延长工作时间的，在保障劳动者身体健康的条件 下延长工作时间每日不得超过三小时，但是每月不得超过三十六小时。\n本条中的“延长工作时间”是指在企业执行的工作时间制度的基础上的加班加点。本条 中的“生产经营需要”是指来料加工、商业企业在旺季完成收购、运输、加工农副产品紧急 任务等情况。","ex":""},{"no":"第四十二条","t":"第四十二条  有下列情形之一的，延长工作时间不受本法第四十一条规定的限制：\n（一）发生自然灾害、事故或者因其他原因，威胁劳动者生命健康和财产安全，需要紧 急处理的；\n（二）生产设备、交通运输线路、公共设施发生故障，影响生产和公众利益，必须及时 抢修的；\n（三）法律、行政法规规定的其他情形。\n本条第（三）项中的“法律、行政法规”，既包括现行的，也包括以后颁布实行的，当 前主要指国务院《关于职工工作时间的规定的实施办法》规定的四种其他情形：\n（一）在法定节日和公休假日内工作不能间断，必须连续生产、运输或者营业的；\n（二）必须利用法定节日或公休假日的停产期间进行设备检修、保养的；\n（三）为完成国防紧急任务的；\n（四）为完成国家下达的其他紧急生产任务的。","ex":""},{"no":"第四十三条","t":"第四十三条  用人单位不得违反本法规定延长劳动者的工作时间。","ex":""},{"no":"第四十四条","t":"第四十四条 有下列情形之一的，用人单位应当按照下列标准支付高于劳动者正常工作 时间工资的工资报酬：\n（一）安排劳动者延长工作时间的，支付不低于工资的百分之一百五十的工资报酬；\n（二）休息日安排劳动者工作又不能安排补休的，支付不低于工资的百分之二百的工资 报酬；\n（三）法定休假日安排劳动者工作的，支付不低于工资的百分之三百的工资报酬。\n本条的“工资”，实行计时工资的用人单位，指的是用人单位规定的其本人的基本工资， 其计算方法是：用月基本工资除以月法定工作无数即得日工资，用日工资除以日工作时间即 得小时工资；实行计件工资的用人单位，指的是劳动者在加班加点的工作时间内应得的计件 工资。","ex":""},{"no":"第四十五条","t":"第四十五条  国家实行带薪年休假制度。\n劳动者连续工作一年以上的，享受带薪年休假。具体办法由国务院规定。","ex":""},{"no":"第四十六条","t":"第四十六条 工资分配应当遵循按劳分配原则，实行同工同酬。\n工资水平在经济发展的基础上逐步提高。国家对工资总量实行宏观调控。\n本条中的“同工同酬”是指用人单位对于从事相同工作，付出等量劳动且取得相同劳绩 的劳动者，应支付同等的劳动报酬。\n本条中的“工资水平”是指一定区域一定时期内平均工资的高低程度。\n本条中的“工资总量”是指一定时期内国民生产总值用于工资分配的总数量。\n本条中的“宏观调控”的具体办法，可执行《关于加强企业工资总额宏观调控的实施意 见》（劳部发〔1993〕299号）","ex":""},{"no":"第四十七条","t":"第四十七条 用人单位根据本单位的生产经营特点和经济效益，依法自主确定本单位的 工资分配方式和工资水平。\n本条中的“经济效益”包含了劳动生产率和就业状况两个重要的因素。\n本条中的“依法”，指依照法律和法规。目前主要指《全民所有制工业企业转换经营机 制条例》等。\n本条中的“工资分配方式”是指单位内部的工资制度，包括工资构成、工资标准、工资 形式、工资增长机制等。“工资水平”是指本单位在一定时期内的职工平均工资。","ex":""},{"no":"第四十八条","t":"第四十八条 国家实行最低工资保障制度。最低工资的具体标准由省、自治区、直辖市 人民政府规定，报国务院备案。\n用人单位支付劳动者的工资不得低于当地最低工资标准。\n本条中的“最低工资”是指劳动者在法定工作时间内履行了正常劳动义务的前提下，由 其所在单位支付的最低劳动报酬，最低工资包括基本工资和奖金、津贴、补贴，但不包括加 班加点工资、特殊劳动条件下的津贴，国家规定的社会保险和福利待遇排除在外。最低工资 的具体规定见《企业最低工资规定》（劳部发〔1993〕333号）。","ex":""},{"no":"第四十九条","t":"第四十九条  确定和调整最低工资标准应当综合参考下列因素：\n（一）劳动者本人及平均赡养人口的最低生活费用；\n（二）社会平均工资水平；\n（三）劳动生产率；\n（四）就业状况；\n（五）地区之间经济发展水平的差异。\n本条中的“最低生活费用”，应为劳动者本人及其赡养人口为维持最低生活需要而必须 支付的费用，包括吃、穿、住、行等方面。 一般可采取参照国家统计部门家计调查中对调查 户数的10%最低收入户的人均生活费用支出额乘以赡养人口系数来计算最低工资额，再根据 其他因素作适当调整并确定。具体计算办法可参考《企业最低工资规定》附件。","ex":""},{"no":"第五十条","t":"第五十条 工资应当以货币形式按月支付给劳动者本人。不得克扣或者无故拖欠劳动者 的工资。\n本条中的“货币形式”排除发放实物、发放有价证券等形式。“按月支付”应理解为每月至少发放一次工资，实行月薪制的单位，工资必须每月发放，超过企业与职工约定或劳动 合同规定的每月支付工资的时间发放工资即为不按月支付。实行小时工资制、日工资制、周 工资制的单位工资也可以按日或按周发放，并且要足额发放。“克扣”是指用人单位对履行 了劳动合同规定的义务和责任，保质保量完成生产工作任务的劳动者，不支付或未足额支付 其工资。“无故拖欠”应理解为，用人单位无正当理由在规定时间内故意不支付劳动者工资。","ex":""},{"no":"第五十一条","t":"第五十一条 劳动者在法定休假日和婚丧假期间以及依法参加社会活动期间，用人单位 应当依法支付工资。\n法定休假日，是指法律、法规规定的劳动者休假的时间，包括法定节日（即元旦、春 节、国际劳动节、国庆节及其他节假日）以及法定带薪年休假。\n婚丧假，是指劳动者本人结婚以及其直系亲属死亡时依法享受的假期。\n依法参加社会活动是指：行使选举权；当选代表，出席政府、党派、工会、青年团、妇 女联合会等组织召开的会议；担任人民法庭的人民陪审员、证明人、辩护人；出席劳动模范、 先进工作者大会；《工会法》规定的不脱产工会基层委员会委员因工会活动占用的生产时间 等。","ex":""},{"no":"第五十二条","t":"第五十二条 用人单位必须建立、健全劳动安全卫生制度，严格执行国家劳动安全卫生 规程和标准，对劳动者进行劳动安全卫生教育，防止劳动过程中的事故，减少职业危害。\n本条中的“劳动安全卫生制度”，主要指：安全生产责任制、安全教育制度、安全检查 制度、伤亡事故和职业病调查处理制度。\n本条中的“劳动安全卫生规程和标准”，是指关于消除、限制或预防劳动过程中的危险 和有害因素，保护职工安全与健康，保障设备、生产正常运行而制定的统一规定。劳动安全 卫生标准分三级，即国家标准、行业标准和地方标准。","ex":""},{"no":"第五十三条","t":"第五十三条 劳动安全卫生设施必须符合国家规定的标准。\n新建、改建、扩建工程的劳动安全卫生设施必须与主体工程同时设计、同时施工、同时 投入生产和使用。\n本条中的“劳动安全卫生设施”，主要指安全技术方面的设施、劳动卫生方面的设施、生 产性辅助设施（如：女工卫生室、更衣室、饮水设施等）。\n本条中的“国家规定的标准”主要指劳动部门和各行业主管部门制定的一系列技术标准。\n本条第（二）款被称为“三同时”，《矿山安全法》《尘肺病防治条例》、1984年国务 院《关于加强防尘防毒工作的决定》和1988年劳动部颁发的《关于生产性建设工程项目职业 安全卫生监察的规定》和1992年颁发的《建设项目（工程）职业安全卫生设施和技术措施验 收办法》，对“三同时”制度作了具体规定。","ex":""},{"no":"第五十四条","t":"第五十四条 用人单位必须为劳动者提供符合国家规定的劳动安全卫生条件和必要的劳 动防护用品，对从事有职业危害作业的劳动者应当定期进行健康检查。\n本条中的国家规定、主要指：《工厂安全卫生规程》《建筑安装工程安全技术规程》《工 业企业设计卫生标准》及一些国家标准，如：《工业企业厂内运输安全规程》《生产过程安 全卫生要求总则》等。\n本条要求企止提供的劳动安全卫生条件，主要包括工作场所和生产设备，工作场所的光线应当充足，噪声、有毒有害气体和粉尘浓度不得超过国家规定的标准，建筑施工、易燃易  爆和有毒有害等危险作业场所应当设置相应的防护设施、报警装置、通讯装置、安全标志等。 对危险性大的生产设备设施，如锅炉、压力容器、起重机械、电梯、企业内机动车辆、客运  架空索道等，必须经过安全评价认可，取得劳动部门颁发的安全使用许可证后，方可投入运  行。企业提供的劳动防护用品、必须是经过政府劳动部门安全认证合格的劳动防护用品。","ex":""},{"no":"第五十五条","t":"第五十五条 从事特种作业的劳动者必须经过专门培训并取得特种作业资格。\n本条中的“特种作业”指对操作者本人及他人和周围设施的安全有重大危害因素的作业。 特种作业的范围有十类：\n（1）电工作业；\n（2）锅炉司炉；\n（3）压力容器操作；\n（4）起重机械作业；\n（5）爆破作业；\n（6）金属焊接（气割）作业；\n（7）煤矿井下瓦斯检验；\n（8）机动车辆驾驶；\n（9）机动船舶驾驶、轮机操作；\n（10）建筑登高架设作业。\n国家标准《特种作业人员安全技术考核管理规则》（ GB5306-85）   和劳动部颁发的《特种 作业人员安全技术培训考核管理规定》（劳安字〔1991〕31号），对特种作业的范围和特种 作业人员条件、培训、考核、发证等都作了明确规定。\n“特种作业资格”是指特种作业人员在独立上岗之前，必须进行安全技术培训，并经过 安全技术理论考试和实际操作技能考核，考核成绩合格者由劳动部门和有关部门发给、特种 作业人员操作证》，它是国家职业资格证书的一种。","ex":""},{"no":"第五十六条","t":"第五十六条 劳动者在劳动过程中必须严格遵守安全操作规程。\n劳动者对用人单位管理人员违章指挥、强令冒险作业，有权拒绝执行；对危害生命安全 和身体健康的行为，有权提出批评、检举和控告。","ex":""},{"no":"第五十七条","t":"第五十七条 国家建立伤亡事故和职业病统计报告和处理制度。县级以上各级人民政府 劳动行政部门、有关部门和用人单位应当依法对劳动者在劳动过程中发生的伤亡事故和劳动 者的职业病状况，进行统计、报告和处理。\n本条中的“依法”，主要指《矿山安全法》、《企业职工伤亡事故报告和处理规定》、《特 别重大事故调查程序暂行规定》，以及劳动部发布的《企业职工伤亡事故报告和处理规定的 有关问题的解释》、《特别重大事故调查程序暂行规定的有关条文的解释》、《企业职工伤 亡事故统计报表制度》、《职业病报告办法》等。","ex":""},{"no":"第五十八条","t":"第五十八条 国家对女职工和未成年工实行特殊劳动保护。\n未成年工是指年满十六周岁未满十八周岁的劳动者。","ex":""},{"no":"第五十九条","t":"第五十九条 禁止安排女职工从事矿山井下、国家规定的第四级体力劳动强度的劳动和其他禁忌从事的劳动。\n本条中的“第四级体力劳动强度”和“禁忌从事的劳动”，可以按照《女职工禁忌劳动 范围的规定》（劳安字[1990]2号）和国家标准《体力劳动强度分级》 （ GB3869-83）    等规定 执行。","ex":""},{"no":"第六十条","t":"第六十条 不得安排女职工在经期从事高处、低温、冷水作业和国家规定的第三级体力 劳动强度的劳动。\n本条中的“高处作业”是指二级高处作业，即凡在坠落高度基准面5米以上（含5米）有 可能坠落的高处进行的作业。“低温作业”是指在劳动生产过程中，其工作地点平均气温等 于或低于5℃的作业。“冷水作业”是指在劳动生产过程中，操作人员接触冷水温度等于或小 于12℃的作业。","ex":""},{"no":"第六十一条","t":"第六十一条 不得安排女职工在怀孕期间从事国家规定的第三级体力劳动强度的劳动和 孕期禁忌从事的劳动。对怀孕七个月以上的女职工，不得安排其延长工作时间和夜班劳动。","ex":""},{"no":"第六十二条","t":"第六十二条  女职工生育享受不少于九十天的产假。","ex":""},{"no":"第六十三条","t":"第六十三条 不得安排女职工在哺乳未满一周岁的婴儿期间从事国家规定的第三级体力 劳动强度的劳动和哺乳期禁忌从事的其他劳动，不得安排其延长工作时间和夜班劳动。","ex":""},{"no":"第六十四条","t":"第六十四条 不得安排未成年工从事矿山井下、有毒有害、国家规定的第四级体力劳动 强度的劳动和其他禁忌从事的劳动。\n本条中的“其他禁忌从事的劳动”是指：\n（一）森林业伐木、归甥及流放作业；\n（二）凡在坠落高度基准面5米以上（含5米）有可能坠落的高处进行的作业。即二级高 处作业；\n（三）作业场所放射性物质超过《放射防护规定》中规定剂量的作业；\n（四）其他对未成年工的发育成长有影响的作业。","ex":""},{"no":"第六十五条","t":"第六十五条 用人单位应当对未成年工定期进行健康检查。","ex":""},{"no":"第六十六条","t":"第六十六条 国家通过各种途径，采取各种措施，发展职业培训事业，开发劳动者的职 业技能，提高劳动者素质，增强劳动者的就业能力和工作能力。","ex":""},{"no":"第六十七条","t":"第六十七条 各级人民政府应当把发展职业培训纳入社会经济发展的规划，鼓励和支持 有条件的企业、事业组织、社会团体和个人进行各种形式的职业培训。","ex":""},{"no":"第六十八条","t":"第六十八条 用人单位应当建立职业培训制度，按照国家规定提取和使用职业培训经费， 根据本单位实际，有计划地对劳动者进行职业培训。\n从事技术工种的劳动者，上岗前必须经过培训。","ex":""},{"no":"第六十九条","t":"第六十九条 国家确定职业分类，对规定的职业制定职业技能标准，实行职业资格证书 制度，由经过政府批准的考核鉴定机构负责对劳动者实施职业技能考核鉴定。","ex":""},{"no":"第七十条","t":"第七十条 国家发展社会保险事业，建立社会保险制度，设立社会保险基金，使劳动者 在年老、患病、工伤、失业、生育等情况下获得帮助和补偿。","ex":""},{"no":"第七十一条","t":"第七十一条 社会保险水平应当与社会经济发展水平和社会承受能力相适应。 本条中的“社会保险水平”是指社会保险待遇的给付标准及费率水平。","ex":""},{"no":"第七十二条","t":"第七十二条 社会保险基金按照保险类型确定资金来源，逐步实行社会统筹。用人单位 和劳动者必须依法参加社会保险，缴纳社会保险费。\n本条中的“社会保险类型”是指需建立基金的养老、医疗、工伤、失业、生育五种社会 保险。","ex":""},{"no":"第七十三条","t":"第七十三条 劳动者在下列情形下，依法享受社会保险待遇：\n（一）退休；\n（二）患病、负伤；\n（三）因工伤残或者患职业病；\n（四）失业；\n（五）生育。\n劳动者死亡后，其遗属依法享受遗属津贴。\n劳动者享受社会保险待遇的条件和标准由法律、法规规定。\n劳动者享受的社会保险金必须按时足额支付。\n本条中的“依法”是指法律、法规。目前主要依照《劳动保险条例》、国务院《关于企 业职工养老保险制度本革的决定》和地方性法规等。在没有法律规定的情况下，可继续依照 有效的劳动规章及一些规范性文件执行。\n本条中的“社会保险待遇”是指养老、疾病、医疗、工伤、失业、生育和死亡等保险待 遇。\n本条中的“法律、法规”主要指正在制定中的《社会保险法》和5个保险条例。","ex":""},{"no":"第七十四条","t":"第七十四条 社会保险基金经办机构依照法律规定收支、管理和运营社会保险基金，并 负有使社会保险基金保值增值的责任。\n社会保险基金监督机构依照法律规定，对社会保险基金的收支、管理和运营实施监督。 社会保险基金经办机构和社会保险基金监督机构的设立和职能由法律规定。\n任何组织和个人不得挪用社会保险基金。\n对此条的理解：《劳动法》已对社会保险基金经办机构及其职责作了规定，即该机构及 其职责都是有法律依据的。该机构的设立和具体职能将在《社会保险法》中加以规定。在该 法未出台之前，依现行劳动规章和其他规范性文件执行。本条中的“依照法律规定”是指正 在制定中的《社会保险法》。","ex":""},{"no":"第七十五条","t":"第七十五条 国家鼓励用人单位根据本单位实际情况为劳动者建立补充保险。 国家提倡劳动者个人进行储蓄性保险。","ex":""},{"no":"第七十六条","t":"第七十六条  国家发展社会福利事业，兴建公共福利设施，为劳动者休息、休养和疗养 提供条件。\n用人单位应当创造条件，改善集体福利，提高劳动者的福利待遇。","ex":""},{"no":"第七十七条","t":"第七十七条 用人单位与劳动者发生劳动争议，当事人可以依法申请调解、仲裁、提起 诉讼，也可以协商解决。\n调解原则适用于仲裁和诉讼程序。","ex":""},{"no":"第七十八条","t":"第七十八条 解决劳动争议，应当根据合法、公正、及时处理的原则，依法维护劳动争议当事人的合法权益。","ex":""},{"no":"第七十九条","t":"第七十九条 劳动争议发生后，当事人可以向本单位劳动争议调解委员会申请调解；调解 不成，当事人一方要求仲裁的，可以向劳动争议仲裁委员会申请仲裁。当事人一方也可以直 接向劳动争议仲裁委员会申请仲裁。对仲裁裁决不服的，可以向人民法院提起诉讼。","ex":""},{"no":"第八十条","t":"第八十条 在用人单位内，可以设立劳动争议调解委员会。劳动争议调解委员会由职工 代表、用人单位代表和工会代表组成。劳动争议调解委员会主任由工会代表担任。\n劳动争议调解达成协议的，当事人应当履行。","ex":""},{"no":"第八十一条","t":"第八十一条  劳动争议仲裁委员会由劳动行政部门代表、同级工会代表、用人单位方面 的代表组成。劳动争议仲裁委员会主任由劳动行政部门代表担任。\n本条中的“用人单位方面的代表”，是指政府指定的经济综合管理部门或者有关社会团 体的代表。","ex":""},{"no":"第八十二条","t":"第八十二条 提出仲裁要求的一方应当自劳动争议发生之日起六十日内向劳动争议仲裁 委员会提出书面申请。仲裁裁决一般应在收到仲裁申请的六十日内作出。对仲裁裁决无异议 的，当事人必须履行。\n本条中的“劳动争议发生之日”指当事人知道或者应当知道其权利被侵害之日。","ex":""},{"no":"第八十三条","t":"第八十三条  劳动争议当事人对仲裁裁决不服的，可以自收到仲裁裁决书之日起十五日 内向人民法院提起诉讼。 一方当事人在法定期限内不起诉又不履行仲裁裁决的，另一方当事 人可以申请人民法院强制执行。","ex":""},{"no":"第八十四条","t":"第八十四条 因签订集体合同发生争议，当事人协商解决不成的，当地人民政府劳动行 政部门可以组织有关各方协调处理。\n因履行集体合同发生争议，当事人协商解决不成的，可以向劳动争议仲裁委员会申请仲 裁；对仲裁裁决不服的，可以自收到仲裁裁决书之日起十五日内向人民法院提起诉讼。","ex":""},{"no":"第八十五条","t":"第八十五条  县级以上各级人民政府劳动行政部门依法对用人单位遵守劳动法律、法规 的情况进行监督检查，对违反劳动法律、法规的行为有权制止，并责令改正。\n本条中的“依法”和：“劳动法律、法规”均指现行的劳动法律、行政法规和地方法规。\n对本条的理解：劳动部门依据《劳动法》行使监督检查权。依据《劳动法》、《矿山安 全法》以及其他劳动法规、规章和地方性法规，对用人单位的执法情况进行检查，并处理违 法行为。","ex":""},{"no":"第八十六条","t":"第八十六条 县级以上各级人民政府劳动行政部门监督检查人员执行公务，有权进入用 人单位了解执行劳动法律、法规的情况，查阅必要的资料，并对劳动场所进行检查。\n县级以上各级人民政府劳动行政部门监督检查人员执行公务，必须出示证件，秉公执法 并遵守有关规定。","ex":""},{"no":"第八十七条","t":"第八十七条  县级以上各级人民政府有关部门在各自职责范围内，对用人单位遵守劳动 法律、法规的情况进行监督。","ex":""},{"no":"第八十八条","t":"第八十八条 各级工会依法维护劳动者的合法权益，对用人单位遵守劳动法律、法规的 情况进行监督。\n任何组织和个人对于违反劳动法律、法规的行为有权检举和控告。","ex":""},{"no":"第八十九条","t":"第八十九条  用人单位制定的劳动规章制度违反法律、法规规定的，由劳动行政部门给 予警告，责令改正；对劳动者造成损害的，应当承担赔偿责任。\n本条中的“法律、法规”主要是指劳动法律、行政法规、地方法规和国家技术标准等。","ex":""},{"no":"第九十条","t":"第九十条 用人单位违反本法规定，延长劳动者工作时间的，由劳动行政部门给予警告， 责令改正，并可以处以罚款。","ex":""},{"no":"第九十一条","t":"第九十一条  用人单位有下列侵害劳动者合法权益情形之一的，由劳动行政部门责令支 付劳动者的工资报酬、经济补偿，并可以责令支付赔偿金：\n（一）克扣或者无故拖欠劳动者工资的；\n（二）拒不支付劳动者延长工作时间工资报酬的；\n（三）低于当地最低工资标准支付劳动者工资的；\n（四）解除劳动合同后，未依照本法规定给予劳动者经济补偿的。\n本条中的“无故”同第五十条的说明相同。“工资报酬”可以理解为延长工作时间所依 法应得的劳动报酬。","ex":""},{"no":"第九十二条","t":"第九十二条  用人单位的劳动安全设施和劳动卫生条件不符合国家规定或者未向劳动 者提供必要的劳动防护用品和劳动保护设施的，由劳动行政部门或者有关部门责令改正， 可以处以罚款；情节严重的，提请县级以上人民政府决定责令停产整顿；对事故隐患不采取 措施，致使发生重大事故，造成劳动者生命和财产损失的，对责任人员比照刑法第一百八 十七条的规定追究刑事责任。\n根据本条规定，劳动部门和有关部门在进行行政处罚时，其分工在于看其监督检查的范 围是否属于劳动工作，凡属劳动工作，依本法第九条、第八十五条，由劳动部门行使监督检 查权，进行处罚。反之，则应由其他部门在自己的职责范围内依法行使监督权。\n刑法第一百八十七条“国家工作人员由于玩忽职守，致使公共财产、国家和人民利益遭 受重大损失的，处五年以下有期徒刑或者拘役。”","ex":""},{"no":"第九十三条","t":"第九十三条  用人单位强令劳动者违章冒险作业，发生重大伤亡事故，造成严重后果的， 对责任人员依法追究刑事责任。\n本条中的“对责任人员追究刑事责任”，可根据刑法第一百一十四条处理，即“工厂、 矿山、林场、建筑企业或者其他企业、事业单位的职工，由于不服管理、违反规章制度，或 强令工人违章冒险作业，因而发生重大事故，造成严重后果的，处以三年以下有期徒刑或者 拘役；情节特别恶劣的，处以三年以上七年以下有期徒刑。”","ex":""},{"no":"第九十四条","t":"第九十四条  用人单位非法招用未满十六周岁的未成年人的，由劳动行政部门责令改正， 处以罚款；情节严重的，由工商行政管理部门吊销营业执照。","ex":""},{"no":"第九十五条","t":"第九十五条  用人单位违反本法对女职工和未成年工的保护规定，侵害其合法权益的， 由劳动行政部门责令改正，处以罚款；对女职工或者未成年工造成损害的，应当承担赔偿责 任。","ex":""},{"no":"第九十六条","t":"第九十六条  用人单位有下列行为之一，由公安机关对责任人员处以十五日以下拘留、 罚款或者警告；构成犯罪的，对责任人员依法追究刑事责任：\n（一）以暴力、威胁或者非法限制人身自由的手段强迫劳动的；\n（二）侮辱、体罚、殴打、非法搜查和拘禁劳动者的。\n对劳动者实施了本条所禁止的行为，公安机关将根据本法和《治安管理处罚条例》第 二十二条等、人民法院将根据《刑法》第一百三十四条、第一百四十三条、第一百四十四 条等追究当事人的法律责任。","ex":""},{"no":"第九十七条","t":"第九十七条  由于用人单位的原因订立的无效合同，对劳动者造成损害的，应当承担 赔偿责任。","ex":""},{"no":"第九十八条","t":"第九十八条  用人单位违反本法规定的条件解除劳动合同或者故意拖延不订立劳动合 同的，由劳动行政部门责令改正；对劳动者造成损害的，应当承担赔偿责任。","ex":""},{"no":"第九十九条","t":"第九十九条  用人单位招用尚未解除劳动合同的劳动者，对原用人单位造成经济损失 的，该用人单位应当依法承担连带赔偿责任。\n本条中的“依法”是指《中华人民共和国民法通则》等。","ex":""},{"no":"第一百条","t":"第一百条  用人单位无故不缴纳社会保险费的，由劳动行政部门责令其限期缴纳；逾 期不缴的，可以加收滞纳金。","ex":""},{"no":"第一百零一条","t":"第一百零一条  用人单位无理阻挠劳动行政部门、有关部门及其工作人员行使监督检 查权，打击报复举报人员的，由劳动行政部门或者有关部门处以罚款；构成犯罪的，对责 任人员依法追究刑事责任。\n本条中的“依法”是指人民法院依据《中华人民共和国刑法》第一百四十六条、第一 百五十七条的规定，追究责任人员的刑事责任。","ex":""},{"no":"第一百零二条","t":"第一百零二条  劳动者违反本法规定的条件解除劳动合同或者违反劳动合同约定的保 密事项，对用人单位造成经济损失的，应当依法承担赔偿责任。","ex":""},{"no":"第一百零三条","t":"第一百零三条  劳动行政部门或者有关部门的工作人员滥用职权、玩忽职守、徇私舞 弊，构成犯罪的，依法追究刑事责任；不构成犯罪的，给予行政处分。","ex":""},{"no":"第一百零四条","t":"第一百零四条 国家工作人员和社会保险基金经办机构的工作人员挪用社会保险基 金，构成犯罪的，依法追究刑事责任。\n本条中的“依法”是指《中华人民共和国刑法》和《惩治贪污贿赂罪的补充规定》 等。","ex":""},{"no":"第一百零五条","t":"第一百零五条   违反本法规定侵害劳动者合法权益，其他法律、行政法规已规定处罚 的，依照法律、行政法规的规定处罚。","ex":""},{"no":"第一百零六条","t":"第一百零六条  省、自治区、直辖市人民政府根据本法和本地区的实际情况，规定劳 动合同制度的实施步骤，报国务院备案。","ex":""},{"no":"第一百零七条","t":"第一百零七条  本法自1995年1月1日起施行。","ex":""}]}]
;

/* ===== 存储（自动保存 + 导出烘焙）===== */
const KEY = 'statute_note_' + LAW_KEY;
let store = (function(){
  try{ const s = localStorage.getItem(KEY); if(s) return JSON.parse(s); }catch(e){}
  try{ if(typeof INITIAL_STORE !== 'undefined' && INITIAL_STORE) return JSON.parse(JSON.stringify(INITIAL_STORE)); }catch(e){}
  return {notes:{}, marks:{}, explain:{}};
})();
store.notes = store.notes || {};
store.marks = store.marks || {};
store.explain = store.explain || {};
// 迁移旧版字符串笔记 -> 分层结构 {summary}
Object.keys(store.notes).forEach(function(k){
  if(typeof store.notes[k] === 'string'){
    const s = store.notes[k];
    store.notes[k] = s ? {s:s} : {};
  }
});

let saveTimer = null;
function save(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(function(){
    try{ localStorage.setItem(KEY, JSON.stringify(store)); }catch(e){}
    const n = Object.keys(store.notes).reduce(function(acc,k){
      const v = store.notes[k];
      if(typeof v === 'string') return acc + (v ? 1 : 0);
      if(v) return acc + Object.keys(v).filter(function(c){return v[c];}).length;
      return acc;
    }, 0);
    const m = Object.keys(store.marks).filter(function(k){return store.marks[k];}).length;
    const x = Object.keys(store.explain).filter(function(k){return store.explain[k];}).length;
    showStatus('已保存 ' + new Date().toLocaleTimeString() + ' · 笔记'+n+' 标记'+m+' 解读'+x);
  }, 400);
}
function showStatus(s){ document.getElementById('status').textContent = s; }

/* ===== 条文索引（用于互链）===== */
let lawMap = {};
function buildLawMap(){
  lawMap = {}; let g = 0;
  DATA.forEach(function(chap, ci){
    chap.items.forEach(function(art, ai){ g++; lawMap[g] = 'a'+ci+'_'+ai; });
  });
}
function linkLaws(text){
  return text.replace(/第(\d+)条/g, function(m, num){
    const id = lawMap[parseInt(num,10)];
    return id ? '<a href="#'+id+'" class="lawlink">'+m+'</a>' : m;
  });
}
function escapeHtml(s){
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
/* 分层批注区块：疑问/我的案例/要点总结/待办 */
function noteBlock(id, cat, tag, label, ph){
  let val = '';
  if(store.notes[id] && typeof store.notes[id] === 'object') val = store.notes[id][cat] || '';
  return '<div class="note-block"><span class="note-tag '+tag+'">'+label+'</span>' +
    '<div class="note sub" contenteditable="true" data-id="'+id+'" data-cat="'+cat+'" ' +
    'data-ph="'+ph+'">'+escapeHtml(val)+'</div></div>';
}

/* ===== 速查卡（由 QUICK 生成）===== */
function quickHtml(){
  let q = '<div class="quick" id="quick">' +
    '<div class="quick-head" onclick="toggleQuick()">📌 重点速查（点击展开/收起）</div>' +
    '<div class="quick-body" id="quickBody">';
  QUICK.forEach(function(item){
    q += '<div class="qg"><b>'+escapeHtml(item.b)+'</b>：'+escapeHtml(item.t)+'</div>';
  });
  q += '</div></div>';
  return linkLaws(q);
}
function toggleQuick(){
  const b = document.getElementById('quickBody');
  if(b) b.style.display = (b.style.display === 'none') ? '' : 'none';
}

/* ===== 法规简介（发布信息）===== */
function metaHtml(){
  const m = (typeof LAW_META !== 'undefined' && LAW_META) ? LAW_META : null;
  if(!m) return '';
  const intro = (typeof LAW_INTRO !== 'undefined' && LAW_INTRO) ? '<div class="law-intro-desc">'+escapeHtml(LAW_INTRO)+'</div>' : '';
  let validTxt = m.valid; let validCls = 'mv';
  if(m.valid === true){ validTxt = '有效'; validCls = 'mv ok'; }
  else if(m.valid === false){ validTxt = '失效'; validCls = 'mv no'; }
  else if(typeof m.valid === 'string'){ validCls = (m.valid.indexOf('有效') !== -1) ? 'mv ok' : 'mv no'; }
  return '<div class="law-intro" id="lawIntro">' +
    '<div class="law-intro-head">📖 法规简介</div>' +
    '<div class="law-intro-body">' + intro +
      '<div class="meta-grid">' +
        '<span class="mk">发布主体</span><span class="mv">'+escapeHtml(m.issuer||'—')+'</span>' +
        '<span class="mk">发布时间</span><span class="mv">'+escapeHtml(m.published||'—')+'</span>' +
        '<span class="mk">生效时间</span><span class="mv">'+escapeHtml(m.effective||'—')+'</span>' +
        (m.revised ? '<span class="mk">修正时间</span><span class="mv">'+escapeHtml(m.revised)+'</span>' : '') +
        '<span class="mk">是否有效</span><span class="'+validCls+'">'+escapeHtml(validTxt||'—')+'</span>' +
        '<span class="mk">效力等级</span><span class="mv">'+escapeHtml(m.level||'—')+'</span>' +
      '</div>' +
    '</div>' +
  '</div>';
}

/* ===== 渲染 ===== */
function render(){
  buildLawMap();
  const main = document.getElementById('content');
  const toc = document.getElementById('toc');
  let html = metaHtml() + quickHtml();
  let tocHtml = '';
  DATA.forEach(function(chap, ci){
    const cid = 'chap' + ci;
    tocHtml += '<a href="#' + cid + '" data-target="' + cid + '">' + chap.ch +
               '<span class="cnt">' + chap.items.length + '条</span></a>';
    html += '<section class="chapter" id="' + cid + '"><h2>' + chap.ch + '</h2>';
    chap.items.forEach(function(art, ai){
      const id = 'a' + ci + '_' + ai;
      const mk = store.marks[id];
      const exBase = store.explain[id] || art.ex || '';
      const exHtml = linkLaws(escapeHtml(exBase));
      // 关联案例
      let casesHtml = '';
      if(art.cases){
        casesHtml += '<div class="case-label">⚖️ 关联案例</div>';
        art.cases.forEach(function(cidKey){
          const c = CASES[cidKey]; if(!c) return;
          casesHtml += '<div class="case">' +
            '<div class="case-title">'+escapeHtml(c.t)+'</div>' +
            '<div class="case-desc">'+escapeHtml(c.d)+'</div>' +
            '<div class="case-src">来源：'+escapeHtml(c.s)+'</div>' +
          '</div>';
        });
      }
      // 关联法条
      let relHtml = '';
      if(art.rel){
        relHtml += '<div class="rel-label">🔗 关联法条</div>';
        art.rel.forEach(function(rkey){
          const r = (typeof REL !== 'undefined') ? REL[rkey] : null; if(!r) return;
          relHtml += '<div class="rel">' +
            '<div class="rel-src">'+escapeHtml(r.src)+' '+escapeHtml(r.art)+'</div>' +
            '<div class="rel-text">'+escapeHtml(r.t)+'</div>' +
          '</div>';
        });
      }
      html += '<article class="article' + (mk ? ' marked' : '') + '" id="' + id + '">' +
                '<div class="art-head">' +
                  '<span class="art-no">' + art.no + '</span>' +
                  '<button class="mark-btn" data-id="' + id + '" title="标记重点">' + (mk ? '★' : '☆') + '</button>' +
                '</div>' +
  // 法条原文（可编辑）
  'barHTML(id) + <div class="art-text editable" contenteditable="true" data-art="' + id + '">' + escapeHtml(art.t) + '</div>' +
                '<div class="explain-label">💡 条文解读（可补充）</div>' +
                '<div class="explain" contenteditable="true" data-ex="' + id + '">' + exHtml + '</div>' +
                casesHtml +
                relHtml +
                '<div class="tool-row"><button class="search-btn" data-kw="'+escapeHtml(LAW_TITLE+' '+art.no)+'">🔍 在北大法宝检索本条相关案例</button></div>' +
                '<div class="note-label">📝 学习笔记（可分层批注）</div>' +
                '<div class="notes-wrap">' +
                  noteBlock(id,'q','tag-q','疑问','想不通／存疑之处…') +
                  noteBlock(id,'c','tag-c','我的案例','自己办过的或想到的类案…') +
                  noteBlock(id,'s','tag-s','要点总结','提炼核心规则、记忆口诀…') +
                  noteBlock(id,'t','tag-t','待办','待查 / 待办事项…') +
                '</div>' +
                '<button class="reveal-btn" data-rev="' + id + '">显示解读</button>' +
              '</article>';
    });
    html += '</section>';
  });
  main.innerHTML = html;
  toc.insertAdjacentHTML('beforeend', tocHtml);  restoreArtEdits();
}

/* ===== 事件 ===== */
document.addEventListener('input', function(e){
  if(e.target.classList.contains('note')){
    const id = e.target.dataset.id;
    const cat = e.target.dataset.cat;
    store.notes[id] = (store.notes[id] && typeof store.notes[id] === 'object') ? store.notes[id] : {};
    store.notes[id][cat] = e.target.innerText;
    save();
  } else if(e.target.classList.contains('explain')){
    const id = e.target.dataset.ex;
    store.explain[id] = e.target.innerText;
    save();
  }
});
document.addEventListener('click', function(e){
  if(e.target.classList.contains('reveal-btn')){
    const art = e.target.closest('.article');
    const rev = art.classList.toggle('revealed');
    e.target.textContent = rev ? '隐藏解读' : '显示解读';
    return;
  }
  if(e.target.classList.contains('mark-btn')){
    const id = e.target.dataset.id;
    const on = !store.marks[id];
    store.marks[id] = on;
    e.target.closest('.article').classList.toggle('marked', on);
    e.target.textContent = on ? '★' : '☆';
    save();
  } else if(e.target.classList.contains('search-btn')){
    const kw = e.target.dataset.kw;
    window.open('https://www.pkulaw.com/search?keyword=' + encodeURIComponent(kw), '_blank');
  }
});

/* 自测记忆模式：隐藏解读/笔记/案例，点“显示解读”对照 */
let selfTest = false;
document.getElementById('btnTest').addEventListener('click', function(){
  selfTest = !selfTest;
  document.body.classList.toggle('self-test', selfTest);
  this.classList.toggle('active', selfTest);
  this.textContent = selfTest ? '退出自测' : '自测模式';
  showStatus(selfTest ? '自测模式：点条文下方“显示解读”对照记忆' : '已退出自测');
});

/* 目录滚动高亮 */
const tocLinks = function(){ return document.querySelectorAll('nav.toc a'); };
const observer = new IntersectionObserver(function(entries){
  entries.forEach(function(en){
    if(en.isIntersecting){
      tocLinks().forEach(function(a){
        a.classList.toggle('active', a.dataset.target === en.target.id);
      });
    }
  });
}, {rootMargin:'-20% 0px -70% 0px'});

/* 搜索过滤 */
document.getElementById('search').addEventListener('input', function(){
  const q = this.value.trim();
  document.querySelectorAll('.article').forEach(function(a){
    a.style.display = (!q || a.textContent.indexOf(q) !== -1) ? '' : 'none';
  });
});

/* 导出：序列化当前页面并把笔记与解读烘焙进 INITIAL_STORE */
document.getElementById('btnExport').addEventListener('click', function(){
  let html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
  html = html.replace(/const INITIAL_STORE = [^;]*;/,
                      'const INITIAL_STORE = ' + JSON.stringify(store) + ';');
  const d = new Date();
  const pad = function(n){return (n<10?'0':'')+n;};
  const fname = LAW_TITLE + '学习笔记_' + d.getFullYear() + pad(d.getMonth()+1) + pad(d.getDate()) + '.html';
  const blob = new Blob([html], {type:'text/html;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = fname; a.click();
  URL.revokeObjectURL(url);
  showStatus('已导出 ' + fname + '（在下载文件夹；想同步到网站，告诉我“发布批注”即可）');
});

document.getElementById('btnPrint').addEventListener('click', function(){ window.print(); });

document.getElementById('btnClear').addEventListener('click', function(){
  if(confirm('确定清空本浏览器内全部学习笔记和标记吗？\n（解读为预置内容、案例为内置数据，不会清空；此操作不可撤销，建议先点“导出”备份）')){
    store = {notes:{}, marks:{}, explain:{}};
    try{ localStorage.removeItem(KEY); }catch(e){}
    render();
    showStatus('已清空');
  }
});


/* ===== 编辑模式切换（浮动工具条） ===== */
let editMode = false;
const btnEdit = document.getElementById('btnEdit');
btnEdit.addEventListener('click', function(){
  editMode = !editMode;
  document.body.classList.toggle('edit-mode', editMode);
  this.classList.toggle('active', editMode);
  this.textContent = editMode ? '✓ 退出编辑' : '✎ 编辑条文';
  if(editMode){ this.style.background='#27ae60'; this.style.boxShadow='0 2px 6px rgba(39,174,96,.4)'; }
  else { this.style.background=''; this.style.boxShadow=''; }
  showStatus(editMode ? '编辑模式：每条法条上方有颜色工具条，选中改局部或整条改色' : '已退出编辑');
});

/* 常驻工具条：每条法条上方由 render 注入 .art-editbar，点击即改色 */
const FONT = ['#1f2329','#c0392b','#2980b9','#27ae60','#8e44ad'];
const BG = ['#fff3cd','#d4edda','#cce5ff','#f8d7da','#e2d5f1'];
function barHTML(id){
  let h = '<span class="elbl">字体</span>';
  FONT.forEach(function(c){ h += '<button class="fcolor" style="background:'+c+'" data-c="'+c+'" data-hl="0" title="字体色"></button>'; });
  h += '<span class="fsep"></span><span class="elbl">高亮</span>';
  BG.forEach(function(c){ h += '<button class="fcolor" style="background:'+c+'" data-c="'+c+'" data-hl="1" title="高亮"></button>'; });
  h += '<span class="fsep"></span><button class="fclear" data-clear="1">清除</button>';
  h += '<span class="ehint">选中文字改局部 · 直接点改整条</span>';
  return '<div class="art-editbar" data-bar="'+id+'">' + h + '</div>';
}

// 防止点击工具条导致法条失焦、选区丢失
document.addEventListener('mousedown', function(e){ if(e.target.closest('.art-editbar')) e.preventDefault(); });

function applyColor(artId, c, hl){
  const el = document.querySelector('.art-text[data-art="'+artId+'"]');
  if(!el) return;
  const sel = window.getSelection();
  const inThis = sel && sel.anchorNode && (sel.anchorNode.nodeType===3 ? sel.anchorNode.parentElement : sel.anchorNode).closest('.art-text[data-art="'+artId+'"]');
  if(sel && !sel.isCollapsed && inThis){
    document.execCommand(hl ? 'hiliteColor' : 'foreColor', false, c);
  } else {
    el.focus();
    const range = document.createRange();
    range.selectNodeContents(el);
    sel.removeAllRanges(); sel.addRange(range);
    document.execCommand(hl ? 'hiliteColor' : 'foreColor', false, c);
    sel.removeAllRanges();
  }
  saveArtText(artId, el.innerHTML);
}
function clearColor(artId){
  const el = document.querySelector('.art-text[data-art="'+artId+'"]');
  if(!el) return;
  const sel = window.getSelection();
  const inThis = sel && sel.anchorNode && (sel.anchorNode.nodeType===3 ? sel.anchorNode.parentElement : sel.anchorNode).closest('.art-text[data-art="'+artId+'"]');
  if(sel && !sel.isCollapsed && inThis){
    document.execCommand('removeFormat', false, null);
  } else {
    const artData = getArtData(artId);
    el.innerHTML = artData ? escapeHtml(artData.t) : el.textContent;
  }
  saveArtText(artId, el.innerHTML);
}

document.addEventListener('click', function(e){
  if(!editMode) return;
  const bar = e.target.closest('.art-editbar');
  if(!bar) return;
  const artId = bar.getAttribute('data-bar') || '';
  const clearBtn = e.target.closest('[data-clear]');
  if(clearBtn){ clearColor(artId); showStatus('已清除格式'); return; }
  const btn = e.target.closest('[data-c]');
  if(!btn) return;
  applyColor(artId, btn.dataset.c, btn.dataset.hl === '1');
  showStatus(btn.dataset.hl === '1' ? '已高亮标注' : '已改字体色');
});

/* 保存法条编辑后的HTML */
function saveArtText(id, html){
  if(!store.artEdit) store.artEdit = {};
  store.artEdit[id] = html;
  save();
}

/* 恢复已保存的法条编辑 */
function restoreArtEdits(){
  if(!store.artEdit) return;
  Object.keys(store.artEdit).forEach(function(id){
    const el = document.querySelector('.art-text[data-art="'+id+'"]');
    if(el && store.artEdit[id]){
      el.innerHTML = store.artEdit[id];
    }
  });
}

/* 获取法条原始数据（用于重置） */
function getArtData(id){
  for(let ci=0;ci<DATA.length;ci++){
    for(let ai=0;ai<DATA[ci].items.length;ai++){
      if('a'+ci+'_'+ai === id) return DATA[ci].items[ai];
    }
  }
  return null;
}


/* ===== 启动 ===== */
document.title = '《' + LAW_TITLE + '》学习笔记（可编辑）';
document.getElementById('lawTitle').textContent = '《' + LAW_TITLE + '》学习笔记';
document.getElementById('lawSub').textContent = LAW_SUB;
document.getElementById('lawField').textContent = LAW_FIELD || '';
render();
DATA.forEach(function(_, ci){ observer.observe(document.getElementById('chap'+ci)); });
showStatus('已就绪');
</script>
