<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>法规学习笔记（可编辑）</title>
<style>
:root{
  --bg:#eef1f5; --card:#ffffff; --ink:#1f2329; --muted:#7a8290;
  --primary:#1f4e79; --primary-soft:#e8f0f7; --accent:#c0392b;
  --mark:#e6a23c; --note-bg:#fffdf3; --note-bd:#e8d9a8;
  --border:#e1e5ea; --line:#d8dde4; --shadow:0 1px 3px rgba(0,0,0,.06);
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  margin:0; background:var(--bg); color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Segoe UI",sans-serif;
  line-height:1.8; font-size:15px;
}
/* ===== 顶部栏 ===== */
header{
  position:sticky; top:0; z-index:50; background:var(--primary); color:#fff;
  box-shadow:0 2px 8px rgba(0,0,0,.15);
}
.head-inner{max-width:1180px; margin:0 auto; padding:10px 18px; display:flex; align-items:center; gap:14px; flex-wrap:wrap;}
.field-badge{display:inline-block; margin-left:4px; padding:2px 11px; font-size:12px; font-weight:600; color:#fff; background:var(--primary); border-radius:20px; vertical-align:middle; letter-spacing:.5px;}
.head-inner h1{font-size:16px; margin:0; font-weight:600; letter-spacing:.5px; flex:1 1 260px;}
.head-inner h1 small{display:block; font-size:11.5px; font-weight:400; opacity:.8; margin-top:2px;}
.toolbar{display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
.toolbar input[type=search]{
  padding:6px 10px; border:1px solid rgba(255,255,255,.35); border-radius:6px;
  background:rgba(255,255,255,.12); color:#fff; font-size:13px; width:160px; outline:none;
}
.toolbar input[type=search]::placeholder{color:rgba(255,255,255,.7);}
.toolbar button{
  padding:6px 12px; border:1px solid rgba(255,255,255,.4); border-radius:6px;
  background:rgba(255,255,255,.12); color:#fff; font-size:13px; cursor:pointer; white-space:nowrap;
}
.toolbar button:hover{background:rgba(255,255,255,.25);}
.toolbar button.active{background:var(--mark); border-color:var(--mark); color:#fff;}
.status{font-size:12px; opacity:.85; min-width:80px;}

/* ===== 布局 ===== */
.layout{max-width:1180px; margin:18px auto; padding:0 18px; display:flex; gap:20px; align-items:flex-start;}
nav.toc{
  position:sticky; top:78px; width:200px; flex:0 0 200px;
  background:var(--card); border:1px solid var(--border); border-radius:10px;
  padding:12px 10px; box-shadow:var(--shadow); max-height:calc(100vh - 100px); overflow:auto;
}
nav.toc .toc-title{font-size:12px; color:var(--muted); padding:0 8px 8px; border-bottom:1px solid var(--line); margin-bottom:6px;}
nav.toc a{
  display:block; padding:7px 8px; border-radius:6px; color:var(--ink); text-decoration:none;
  font-size:13.5px; cursor:pointer;
}
nav.toc a:hover{background:var(--primary-soft);}
nav.toc a.active{background:var(--primary); color:#fff; font-weight:500;}
nav.toc a .cnt{float:right; color:var(--muted); font-size:11px;}
nav.toc a.active .cnt{color:rgba(255,255,255,.85);}

main{flex:1; min-width:0;}
.chapter{margin-bottom:26px;}
.chapter > h2{
  font-size:18px; color:var(--primary); border-left:4px solid var(--primary);
  padding-left:12px; margin:0 0 14px; font-weight:700;
}
.article{
  background:var(--card); border:1px solid var(--border); border-radius:10px;
  padding:14px 16px; margin-bottom:12px; box-shadow:var(--shadow); position:relative;
  border-left:3px solid var(--line);
}
.article.marked{border-left-color:var(--mark); background:#fffdf6;}
.art-head{display:flex; align-items:center; gap:10px; margin-bottom:6px;}
.art-no{
  font-weight:700; color:var(--primary); font-size:14.5px; background:var(--primary-soft);
  padding:2px 10px; border-radius:5px;
}
.mark-btn{
  margin-left:auto; border:none; background:none; cursor:pointer; font-size:18px; line-height:1;
  color:var(--mark); padding:0 4px;
}
.mark-btn:hover{transform:scale(1.15);}
.art-text{font-size:15px; color:#2b2f36; text-align:justify; white-space:pre-wrap;}

/* 解读区 */
.explain-label{font-size:12px; color:var(--primary); font-weight:600; margin:11px 0 4px; display:flex; align-items:center; gap:5px;}
.explain{
  font-size:13.5px; color:#3a4250; background:#f6f9fc; border-left:3px solid var(--primary);
  border-radius:0 6px 6px 0; padding:8px 11px; white-space:pre-wrap; outline:none;
}
.explain:focus{background:#eef3fa; box-shadow:0 0 0 3px rgba(31,78,121,.12);}

/* 关联案例 */
.case-label{font-size:12px; color:#9a5b1e; font-weight:600; margin:12px 0 5px; display:flex; align-items:center; gap:5px;}
.case{background:#fbf6ee; border:1px solid #ecdcc0; border-radius:8px; padding:9px 11px; margin-bottom:8px;}
.case-title{font-weight:600; font-size:13.5px; color:#6b4423;}
.case-desc{font-size:13px; color:#5a4a3a; margin-top:3px; white-space:pre-wrap;}
.case-src{font-size:11.5px; color:#a98b5e; margin-top:4px;}

/* 关联法条 */
.rel-label{font-size:12px; color:#1f6fb2; font-weight:600; margin:12px 0 5px; display:flex; align-items:center; gap:5px;}
.rel{background:#eef4fb; border:1px solid #cfe0ef; border-radius:8px; padding:9px 11px; margin-bottom:8px;}
.rel-src{font-weight:600; font-size:13.5px; color:#14507e;}
.rel-text{font-size:13px; color:#34404d; margin-top:4px; white-space:pre-wrap;}

/* 检索按钮 */
.tool-row{margin:10px 0 2px;}
.search-btn{border:1px solid var(--border); background:#f3f7fb; color:var(--primary); border-radius:6px; padding:5px 10px; font-size:12.5px; cursor:pointer;}
.search-btn:hover{background:#e3edf6;}

/* 笔记区 */
.note-label{font-size:12px; color:var(--muted); margin:11px 0 4px; display:flex; align-items:center; gap:5px;}

/* 速查卡 */
.quick{background:linear-gradient(135deg,#f0f6fc,#e8f0f7); border:1px solid #cfe0ef; border-radius:10px; margin-bottom:18px; box-shadow:var(--shadow); overflow:hidden;}
.quick-head{font-weight:700; color:var(--primary); padding:11px 14px; cursor:pointer; user-select:none; font-size:14.5px;}
.quick-body{padding:2px 14px 12px;}
.qg{font-size:13px; color:#34404d; padding:7px 0; border-top:1px dashed #d4e2ee; white-space:pre-wrap;}
.qg:first-child{border-top:none;}
.qg b{color:var(--primary);}

/* 法规简介（发布信息） */
.law-intro{background:linear-gradient(135deg,#f0f6fc,#eef4fb); border:1px solid #cfe0ef; border-radius:10px; margin-bottom:18px; box-shadow:var(--shadow); overflow:hidden;}
.law-intro-head{font-weight:700; color:var(--primary); padding:11px 14px; font-size:14.5px;}
.law-intro-body{padding:2px 14px 12px;}
.law-intro-desc{font-size:13.5px; color:#34404d; line-height:1.8; margin:2px 0 10px;}
.meta-grid{display:grid; grid-template-columns:auto 1fr; gap:6px 14px; align-items:baseline;}
.meta-grid .mk{font-size:13px; color:var(--muted); white-space:nowrap;}
.meta-grid .mv{font-size:13px; color:#2b2f36;}
.meta-grid .mv.ok{color:#1a9e57; font-weight:600;}
.meta-grid .mv.no{color:#c0392b; font-weight:600;}

/* 条文互链 */
.lawlink{color:#1f6fb2; text-decoration:underline; cursor:pointer;}
.lawlink:hover{color:#0d4f86;}

/* 批注分层 */
.notes-wrap{margin-top:2px;}
.note-block{margin-bottom:8px;}
.note-tag{display:inline-block; font-size:11px; font-weight:600; padding:1px 8px; border-radius:4px; margin-bottom:3px;}
.tag-q{background:#fde8e8; color:#c0392b;}      /* 疑问 */
.tag-c{background:#e6f4ea; color:#1e7a46;}      /* 我的案例 */
.tag-s{background:#fef3e0; color:#b9770e;}      /* 要点总结 */
.tag-t{background:#efe7fb; color:#6b3fa0;}      /* 待办 */
.note.sub{background:var(--note-bg); border:1px dashed var(--note-bd); border-radius:7px; padding:7px 10px; min-height:32px; font-size:13.5px; color:#5a4a1a; white-space:pre-wrap; outline:none;}
.note.sub:focus{border-style:solid; border-color:var(--mark); background:#fffce8; box-shadow:0 0 0 3px rgba(230,162,60,.15);}
.note.sub:empty:before{content:attr(data-ph); color:#b9a86a;}

/* 自测模式 */
.reveal-btn{display:none; margin:10px 0 2px; border:1px solid var(--primary); background:var(--primary-soft); color:var(--primary); border-radius:6px; padding:5px 12px; font-size:12.5px; cursor:pointer;}
.reveal-btn:hover{background:#d8e6f5;}
body.self-test .reveal-btn{display:inline-block;}
body.self-test .explain-label,
body.self-test .explain,
body.self-test .case-label,
body.self-test .case,
body.self-test .rel-label,
body.self-test .rel,
body.self-test .tool-row,
body.self-test .note-label,
body.self-test .notes-wrap{display:none;}
.article.revealed .explain-label,
.article.revealed .explain,
.article.revealed .case-label,
.article.revealed .case,
.article.revealed .rel-label,
.article.revealed .rel,
.article.revealed .tool-row,
.article.revealed .note-label,
.article.revealed .notes-wrap{display:block;}
body.self-test .article{opacity:.97;}
body.self-test .article.revealed{border-left-color:var(--primary); background:#fff;}

footer{max-width:1180px; margin:0 auto 30px; padding:14px 18px; color:var(--muted); font-size:12.5px; text-align:center;}

@media (max-width:860px){
  .layout{flex-direction:column;}
  nav.toc{position:static; width:100%; flex:none; max-height:none;}
  .toolbar input[type=search]{width:120px;}
}
@media print{
  header, nav.toc, footer, .tool-row, .quick-head{display:none !important;}
  body{background:#fff;}
  .layout{display:block; margin:0; padding:0;}
  .article{break-inside:avoid; box-shadow:none; border:1px solid #ccc;}
  .explain{background:#f4f6f9;}
  .case{background:#fbf6ee;}
  .mark-btn{display:none;}
  .quick{box-shadow:none; border:1px solid #ccc;}
  body.self-test .reveal-btn{display:none !important;}
  body.self-test .explain, body.self-test .explain-label,
  body.self-test .case, body.self-test .case-label,
  body.self-test .rel, body.self-test .rel-label,
  body.self-test .tool-row, body.self-test .note-label, body.self-test .notes-wrap{display:block !important;}
}
</style>
</head>
<body>
<header>
  <div class="head-inner">
    <h1><span id="lawTitle"></span><small id="lawSub"></small> <span id="lawField" class="field-badge"></span></h1>

      <input type="search" id="search" placeholder="搜索条文…" aria-label="搜索">
      <span class="status" id="status">已就绪</span>

      <button id="btnPrint" title="打印 / 存为PDF">打印</button>

  </div>
</header>

<div class="layout">
  <nav class="toc" id="toc">
    <div class="toc-title">目录</div>
  </nav>
  <main id="content"></main>
</div>

<footer>

</footer>

const REL = {};
const DATA = [{"ch": "全文", "items": [{"no": "", "t": "安监总安健〔2012〕89号2012年6月29日\n各省、自治区、直辖市及新疆生产建设兵团安全生产监督管理局、卫生厅（局）、人力资 源社会保障厅（局）、总工会，各省级煤矿安全监察局：\n近年来，由于夏季高温天气导致从事户外作业的劳动者中暑甚至死亡的事件时有发 生，给劳动者身体健康和生命安全造成了严重损害，成为社会各界共同关注的重要问题。 为了加强高温作业、高温天气作业劳动保护工作，维护劳动者健康及其相关权益，国家安 全监管总局、卫生部、人力资源社会保障部、全国总工会对《防暑降温措施暂行办法》 （<60〉卫防钱字第207号）进行了修订，制定了《防暑降温措施管理办法》，现印发你 们，请认真遵照执行。\n防暑降温措施管理办法", "ex": ""}, {"no": "第一条", "t": "第一条  为了加强高温作业、高温天气作业劳动保护工作，维护劳动者健康及其相关 权益，根据《中华人民共和国职业病防治法》《中华人民共和国安全生产法》《中华人民 共和国劳动法》《中华人民共和国工会法》等有关法律、行政法规的规定，制定本办法。", "ex": ""}, {"no": "第二条", "t": "第二条  本办法适用于存在高温作业及在高温天气期间安排劳动者作业的企业、事业 单位和个体经济组织等用人单位。", "ex": ""}, {"no": "第三条", "t": "第三条  高温作业是指有高气温、 或有强烈的热辐射、或伴有高气湿（相对湿度≥ 80% RH）  相结合的异常作业条件、湿球黑球温度指数（ WBGT指数）超过规定限值的作 业。\n高温天气是指地市级以上气象主管部门所属气象台站向公众发布的日最高气温35℃以 上的天气。\n高温天气作业是指用人单位在高温天气期间安排劳动者在高温自然气象环境下进行的 作业。\n工作场所高温作业WBGT指数测量依照《工作场所物理因素测量第7部分：高温》 （GBZ/T189.7）   执行；高温作业职业接触限值依照《工作场所有害因素职业接触限值第 2部分：物理因素》（ GBZ2.2）  执行；高温作业分级依照《工作场所职业病危害作业分级\n第3部分：高温》（ GBZ/T229.3） 执行。", "ex": ""}, {"no": "第四条", "t": "第四条 国务院安全生产监督管理部门、 卫生行政部门、人力资源社会保障行政部门 依照相关法律、行政法规和国务院确定的职责，负责全国高温作业、高温天气作业劳动保 护的监督管理工作。\n县级以上地方人民政府安全生产监督管理部门、卫生行政部门、人力资源社会保障行 政部门依据法律、行政法规和各自职责，负责本行政区域内高温作业、高温天气作业劳动 保护的监督管理工作。", "ex": ""}, {"no": "第五条", "t": "第五条  用人单位应当建立、健全防暑降温工作制度，采取有效措施，加强高温作 业、高温天气作业劳动保护工作，确保劳动者身体健康和生命安全。\n用人单位的主要负责人对本单位的防暑降温工作全面负责。", "ex": ""}, {"no": "第六条", "t": "第六条  用人单位应当根据国家有关规定，合理布局生产现场，改进生产工艺和操作 流程，采用良好的隔热、通风、降温措施，保证工作场所符合国家职业卫生标准要求。", "ex": ""}, {"no": "第七条", "t": "第七条  用人单位应当落实以下高温作业劳动保护措施：\n（一）优先采用有利于控制高温的新技术、新工艺、新材料、新设备，从源头上降低 或者消除高温危害。对于生产过程中不能完全消除的高温危害，应当采取综合控制措施， 使其符合国家职业卫生标准要求。\n（二）存在高温职业病危害的建设项目，应当保证其设计符合国家职业卫生相关标准 和卫生要求，高温防护设施应当与主体工程同时设计，同时施工，同时投入生产和使用。\n（三）存在高温职业病危害的用人单位，应当实施由专人负责的高温日常监测，并按 照有关规定进行职业病危害因素检测、评价。\n（四）用人单位应当依照有关规定对从事接触高温危害作业劳动者组织上岗前、在岗 期间和离岗时的职业健康检查，将检查结果存入职业健康监护档案并书面告知劳动者。职 业健康检查费用由用人单位承担。\n（五）用人单位不得安排怀孕女职工和未成年工从事《工作场所职业病危害作业分级 第3部分：高温》 （ GBZ/T229.3）   中第三级以上的高温工作场所作业。", "ex": ""}, {"no": "第八条", "t": "第八条  在高温天气期间，用人单位应当按照下列规定，根据生产特点和具体条件， 采取合理安排工作时间、轮换作业、适当增加高温工作环境下劳动者的休息时间和减轻劳 动强度、减少高温时段室外作业等措施：\n（一）用人单位应当根据地市级以上气象主管部门所属气象台当日发布的预报气温， 调整作业时间，但因人身财产安全和公众利益需要紧急处理的除外：\n1.日最高气温达到40℃以上，应当停止当日室外露天作业；\n2. 日最高气温达到37℃以上、40℃以下时，用人单位全天安排劳动者室外露天作业时 间累计不得超过6小时，连续作业时间不得超过国家规定，且在气温最高时段3小时内不得 安排室外露天作业；\n3. 日最高气温达到35℃以上、37℃以下时，用人单位应当采取换班轮休等方式，缩短 劳动者连续作业时间，并且不得安排室外露天作业劳动者加班。\n（二）在高温天气来临之前，用人单位应当对高温天气作业的劳动者进行健康检查， 对患有心、肺、脑血管性疾病、肺结核、中枢神经系统疾病及其他身体状况不适合高温作 业环境的劳动者，应当调整作业岗位。职业健康检查费用由用人单位承担。\n（三）用人单位不得安排怀孕女职工和未成年工在35℃以上的高温天气期间从事室外 露天作业及温度在33℃以上的工作场所作业。\n（四）因高温天气停止工作、缩短工作时间的，用人单位不得扣除或降低劳动者工 资。", "ex": ""}, {"no": "第九条", "t": "第九条  用人单位应当向劳动者提供符合要求的个人防护用品，并督促和指导劳动者 正确使用。", "ex": ""}, {"no": "第十条", "t": "第十条  用人单位应当对劳动者进行上岗前职业卫生培训和在岗期间的定期职业卫生 培训，普及高温防护、中暑急救等职业卫生知识。", "ex": ""}, {"no": "第十一条", "t": "第十一条 用人单位应当为高温作业、高温天气作业的劳动者供给足够的、符合卫生 标准的防暑降温饮料及必需的药品。\n不得以发放钱物替代提供防暑降温饮料。防暑降温饮料不得充抵高温津贴。", "ex": ""}, {"no": "第十二条", "t": "第十二条  用人单位应当在高温工作环境设立休息场所。休息场所应当设有座椅，保 持通风良好或者配有空调等防暑降温设施。", "ex": ""}, {"no": "第十三条", "t": "第十三条  用人单位应当制定高温中暑应急预案，定期进行应急救援的演习，并根据 从事高温作业和高温天气作业的劳动者数量及作业条件等情况，配备应急救援人员和足量 的急救药品。", "ex": ""}, {"no": "第十四条", "t": "第十四条  劳动者出现中暑症状时，用人单位应当立即采取救助措施，使其迅速脱离 高温环境，到通风阴凉处休息，供给防暑降温饮料，并采取必要的对症处理措施；病情严 重者，用人单位应当及时送医疗卫生机构治疗。", "ex": ""}, {"no": "第十五条", "t": "第十五条  劳动者应当服从用人单位合理调整高温天气作息时间或者对有关工作地 点、工作岗位的调整安排。", "ex": ""}, {"no": "第十六条", "t": "第十六条  工会组织代表劳动者就高温作业和高温天气劳动保护事项与用人单位进行 平等协商，签订集体合同或者高温作业和高温天气劳动保护专项集体合同。", "ex": ""}, {"no": "第十七条", "t": "第十七条  劳动者从事高温作业的，依法享受岗位津贴。\n用人单位安排劳动者在35℃以上高温天气从事室外露天作业以及不能采取有效措施将 工作场所温度降低到33℃以下的，应当向劳动者发放高温津贴，并纳入工资总额。高温津 贴标准由省级人力资源社会保障行政部门会同有关部门制定，并根据社会经济发展状况适 时调整。", "ex": ""}, {"no": "第十八条", "t": "第十八条  承担职业性中暑诊断的医疗卫生机构，应当经省级人民政府卫生行政部门批准。", "ex": ""}, {"no": "第十九条", "t": "第十九条  劳动者因高温作业或者高温天气作业引起中暑，经诊断为职业病的，享受 工伤保险待遇。", "ex": ""}, {"no": "第二十条", "t": "第二十条  工会组织依法对用人单位的高温作业、高温天气劳动保护措施实行监督。 发现违法行为，工会组织有权向用人单位提出，用人单位应当及时改正。用人单位拒不改 正的，工会组织应当提请有关部门依法处理，并对处理结果进行监督。", "ex": ""}, {"no": "第二十一条", "t": "第二十一条  用人单位违反职业病防治与安全生产法律、行政法规，危害劳动者身体 健康的，由县级以上人民政府相关部门依据各自职责责令用人单位整改或者停止作业；情 节严重的，按照国家有关法律法规追究用人单位及其负责人的相应责任；构成犯罪的，依 法追究刑事责任。\n用人单位违反国家劳动保障法律、行政法规有关工作时间、工资津贴规定，侵害劳动 者劳动保障权益的，由县级以上人力资源社会保障行政部门依法责令改正。", "ex": ""}, {"no": "第二十二条", "t": "第二十二条  各省级人民政府安全生产监督管理部门、卫生行政部门、人力资源社会 保障行政部门和工会组织可以根据本办法，制定实施细则。", "ex": ""}, {"no": "第二十三条", "t": "第二十三条  本办法由国家安全生产监督管理总局会同卫生部、人力资源和社会保障 部、全国总工会负责解释。", "ex": ""}, {"no": "第二十四条", "t": "第二十四条  本办法所称“以上”摄氏度（℃）含本数，“以下”摄氏度（℃）不含 本数。", "ex": ""}, {"no": "第二十五条", "t": "第二十五条  本办法自发布之日起施行。1960年7月1日卫生部、劳动部、全国总工会 联合公布的《防暑降温措施暂行办法》同时废止。", "ex": ""}]}];

/* ===== 存储（自动保存 + 导出烘焙）===== */
const KEY = 'statute_note_' + LAW_KEY;
let store = (function(){
  try{ const s = localStorage.getItem(KEY); if(s) return JSON.parse(s); }catch(e){}
  try{ if(typeof INITIAL_STORE !== 'undefined' && INITIAL_STORE) return JSON.parse(JSON.stringify(INITIAL_STORE)); }catch(e){}
  return {notes:{}, marks:{}, explain:{}};
})();
store.notes = store.notes || {};
store.marks = store.marks || {};
store.explain = store.explain || {};
// 迁移旧版字符串笔记 -> 分层结构 {summary}
Object.keys(store.notes).forEach(function(k){
  if(typeof store.notes[k] === 'string'){
    const s = store.notes[k];
    store.notes[k] = s ? {s:s} : {};
  }
});

let saveTimer = null;
function save(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(function(){
    try{ localStorage.setItem(KEY, JSON.stringify(store)); }catch(e){}
    const n = Object.keys(store.notes).reduce(function(acc,k){
      const v = store.notes[k];
      if(typeof v === 'string') return acc + (v ? 1 : 0);
      if(v) return acc + Object.keys(v).filter(function(c){return v[c];}).length;
      return acc;
    }, 0);
    const m = Object.keys(store.marks).filter(function(k){return store.marks[k];}).length;
    const x = Object.keys(store.explain).filter(function(k){return store.explain[k];}).length;
    showStatus('已保存 ' + new Date().toLocaleTimeString() + ' · 笔记'+n+' 标记'+m+' 解读'+x);
  }, 400);
}
function showStatus(s){ document.getElementById('status').textContent = s; }

/* ===== 条文索引（用于互链）===== */
let lawMap = {};
function buildLawMap(){
  lawMap = {}; let g = 0;
  DATA.forEach(function(chap, ci){
    chap.items.forEach(function(art, ai){ g++; lawMap[g] = 'a'+ci+'_'+ai; });
  });
}
function linkLaws(text){
  return text.replace(/第(\d+)条/g, function(m, num){
    const id = lawMap[parseInt(num,10)];
    return id ? '<a href="#'+id+'" class="lawlink">'+m+'</a>' : m;
  });
}
function escapeHtml(s){
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
/* 分层批注区块：疑问/我的案例/要点总结/待办 */
function noteBlock(id, cat, tag, label, ph){
  let val = '';
  if(store.notes[id] && typeof store.notes[id] === 'object') val = store.notes[id][cat] || '';
  return '<div class="note-block"><span class="note-tag '+tag+'">'+label+'</span>' +
    '<div class="note sub" contenteditable="true" data-id="'+id+'" data-cat="'+cat+'" ' +
    'data-ph="'+ph+'">'+escapeHtml(val)+'</div></div>';
}

/* ===== 速查卡（由 QUICK 生成）===== */
function quickHtml(){
  let q = '<div class="quick" id="quick">' +
    '<div class="quick-head" onclick="toggleQuick()">📌 重点速查（点击展开/收起）</div>' +
    '<div class="quick-body" id="quickBody">';
  QUICK.forEach(function(item){
    q += '<div class="qg"><b>'+escapeHtml(item.b)+'</b>：'+escapeHtml(item.t)+'</div>';
  });
  q += '</div></div>';
  return linkLaws(q);
}
function toggleQuick(){
  const b = document.getElementById('quickBody');
  if(b) b.style.display = (b.style.display === 'none') ? '' : 'none';
}

/* ===== 法规简介（发布信息）===== */
function metaHtml(){
  const m = (typeof LAW_META !== 'undefined' && LAW_META) ? LAW_META : null;
  if(!m) return '';
  const intro = (typeof LAW_INTRO !== 'undefined' && LAW_INTRO) ? '<div class="law-intro-desc">'+escapeHtml(LAW_INTRO)+'</div>' : '';
  let validTxt = m.valid; let validCls = 'mv';
  if(m.valid === true){ validTxt = '有效'; validCls = 'mv ok'; }
  else if(m.valid === false){ validTxt = '失效'; validCls = 'mv no'; }
  else if(typeof m.valid === 'string'){ validCls = (m.valid.indexOf('有效') !== -1) ? 'mv ok' : 'mv no'; }
  return '<div class="law-intro" id="lawIntro">' +
    '<div class="law-intro-head">📖 法规简介</div>' +
    '<div class="law-intro-body">' + intro +
      '<div class="meta-grid">' +
        '<span class="mk">发布主体</span><span class="mv">'+escapeHtml(m.issuer||'—')+'</span>' +
        '<span class="mk">发布时间</span><span class="mv">'+escapeHtml(m.published||'—')+'</span>' +
        '<span class="mk">生效时间</span><span class="mv">'+escapeHtml(m.effective||'—')+'</span>' +
        '<span class="mk">是否有效</span><span class="'+validCls+'">'+escapeHtml(validTxt||'—')+'</span>' +
        '<span class="mk">效力等级</span><span class="mv">'+escapeHtml(m.level||'—')+'</span>' +
      '</div>' +
    '</div>' +
  '</div>';
}

/* ===== 渲染 ===== */
function render(){
  buildLawMap();
  const main = document.getElementById('content');
  const toc = document.getElementById('toc');
  let html = metaHtml() + quickHtml();
  let tocHtml = '';
  DATA.forEach(function(chap, ci){
    const cid = 'chap' + ci;
    tocHtml += '<a href="#' + cid + '" data-target="' + cid + '">' + chap.ch +
               '<span class="cnt">' + chap.items.length + '条</span></a>';
    html += '<section class="chapter" id="' + cid + '"><h2>' + chap.ch + '</h2>';
    chap.items.forEach(function(art, ai){
      const id = 'a' + ci + '_' + ai;
      const mk = store.marks[id];
      const exBase = store.explain[id] || art.ex || '';
      const exHtml = linkLaws(escapeHtml(exBase));
      // 关联案例
      let casesHtml = '';
      if(art.cases){
        casesHtml += '<div class="case-label">⚖️ 关联案例</div>';
        art.cases.forEach(function(cidKey){
          const c = CASES[cidKey]; if(!c) return;
          casesHtml += '<div class="case">' +
            '<div class="case-title">'+escapeHtml(c.t)+'</div>' +
            '<div class="case-desc">'+escapeHtml(c.d)+'</div>' +
            '<div class="case-src">来源：'+escapeHtml(c.s)+'</div>' +
          '</div>';
        });
      }
      // 关联法条
      let relHtml = '';
      if(art.rel){
        relHtml += '<div class="rel-label">🔗 关联法条</div>';
        art.rel.forEach(function(rkey){
          const r = (typeof REL !== 'undefined') ? REL[rkey] : null; if(!r) return;
          relHtml += '<div class="rel">' +
            '<div class="rel-src">'+escapeHtml(r.src)+' '+escapeHtml(r.art)+'</div>' +
            '<div class="rel-text">'+escapeHtml(r.t)+'</div>' +
          '</div>';
        });
      }
      html += '<article class="article' + (mk ? ' marked' : '') + '" id="' + id + '">' +
                '<div class="art-head">' +
                  '<span class="art-no">' + art.no + '</span>' +
                  '<button class="mark-btn" data-id="' + id + '" title="标记重点">' + (mk ? '★' : '☆') + '</button>' +
                '</div>' +
                '<div class="art-text">' + escapeHtml(art.t) + '</div>' +
                '<div class="explain-label">💡 条文解读（可补充）</div>' +
                '<div class="explain" contenteditable="true" data-ex="' + id + '">' + exHtml + '</div>' +
                casesHtml +
                relHtml +
                '<div class="tool-row"><button class="search-btn" data-kw="'+escapeHtml(LAW_TITLE+' '+art.no)+'">🔍 在北大法宝检索本条相关案例</button></div>' +
                '<div class="note-label">📝 学习笔记（可分层批注）</div>' +
                '<div class="notes-wrap">' +
                  noteBlock(id,'q','tag-q','疑问','想不通／存疑之处…') +
                  noteBlock(id,'c','tag-c','我的案例','自己办过的或想到的类案…') +
                  noteBlock(id,'s','tag-s','要点总结','提炼核心规则、记忆口诀…') +
                  noteBlock(id,'t','tag-t','待办','待查 / 待办事项…') +
                '</div>' +
                '<button class="reveal-btn" data-rev="' + id + '">显示解读</button>' +
              '</article>';
    });
    html += '</section>';
  });
  main.innerHTML = html;
  toc.insertAdjacentHTML('beforeend', tocHtml);
}

/* ===== 事件 ===== */
document.addEventListener('input', function(e){
  if(e.target.classList.contains('note')){
    const id = e.target.dataset.id;
    const cat = e.target.dataset.cat;
    store.notes[id] = (store.notes[id] && typeof store.notes[id] === 'object') ? store.notes[id] : {};
    store.notes[id][cat] = e.target.innerText;
    save();
  } else if(e.target.classList.contains('explain')){
    const id = e.target.dataset.ex;
    store.explain[id] = e.target.innerText;
    save();
  }
});
document.addEventListener('click', function(e){
  if(e.target.classList.contains('reveal-btn')){
    const art = e.target.closest('.article');
    const rev = art.classList.toggle('revealed');
    e.target.textContent = rev ? '隐藏解读' : '显示解读';
    return;
  }
  if(e.target.classList.contains('mark-btn')){
    const id = e.target.dataset.id;
    const on = !store.marks[id];
    store.marks[id] = on;
    e.target.closest('.article').classList.toggle('marked', on);
    e.target.textContent = on ? '★' : '☆';
    save();
  } else if(e.target.classList.contains('search-btn')){
    const kw = e.target.dataset.kw;
    window.open('https://www.pkulaw.com/search?keyword=' + encodeURIComponent(kw), '_blank');
  }
});

/* 自测记忆模式：隐藏解读/笔记/案例，点“显示解读”对照 */
let selfTest = false;
document.getElementById('btnTest').addEventListener('click', function(){
  selfTest = !selfTest;
  document.body.classList.toggle('self-test', selfTest);
  this.classList.toggle('active', selfTest);
  this.textContent = selfTest ? '退出自测' : '自测模式';
  showStatus(selfTest ? '自测模式：点条文下方“显示解读”对照记忆' : '已退出自测');
});

/* 目录滚动高亮 */
const tocLinks = function(){ return document.querySelectorAll('nav.toc a'); };
const observer = new IntersectionObserver(function(entries){
  entries.forEach(function(en){
    if(en.isIntersecting){
      tocLinks().forEach(function(a){
        a.classList.toggle('active', a.dataset.target === en.target.id);
      });
    }
  });
}, {rootMargin:'-20% 0px -70% 0px'});

/* 搜索过滤 */
document.getElementById('search').addEventListener('input', function(){
  const q = this.value.trim();
  document.querySelectorAll('.article').forEach(function(a){
    a.style.display = (!q || a.textContent.indexOf(q) !== -1) ? '' : 'none';
  });
});

/* 导出：序列化当前页面并把笔记与解读烘焙进 INITIAL_STORE */
document.getElementById('btnExport').addEventListener('click', function(){
  let html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
  html = html.replace(/const INITIAL_STORE = [^;]*;/,
                      'const INITIAL_STORE = ' + JSON.stringify(store) + ';');
  const d = new Date();
  const pad = function(n){return (n<10?'0':'')+n;};
  const fname = LAW_TITLE + '学习笔记_' + d.getFullYear() + pad(d.getMonth()+1) + pad(d.getDate()) + '.html';
  const blob = new Blob([html], {type:'text/html;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = fname; a.click();
  URL.revokeObjectURL(url);
  showStatus('已导出 ' + fname + '（在下载文件夹；想同步到网站，告诉我“发布批注”即可）');
});

document.getElementById('btnPrint').addEventListener('click', function(){ window.print(); });

document.getElementById('btnClear').addEventListener('click', function(){
  if(confirm('确定清空本浏览器内全部学习笔记和标记吗？\n（解读为预置内容、案例为内置数据，不会清空；此操作不可撤销，建议先点“导出”备份）')){
    store = {notes:{}, marks:{}, explain:{}};
    try{ localStorage.removeItem(KEY); }catch(e){}
    render();
    showStatus('已清空');
  }
});

/* ===== 启动 ===== */
document.title = '《' + LAW_TITLE + '》学习笔记（可编辑）';
document.getElementById('lawTitle').textContent = '《' + LAW_TITLE + '》学习笔记';
document.getElementById('lawSub').textContent = LAW_SUB;
document.getElementById('lawField').textContent = LAW_FIELD || '';
render();
DATA.forEach(function(_, ci){ observer.observe(document.getElementById('chap'+ci)); });
showStatus('已就绪');
</script>
