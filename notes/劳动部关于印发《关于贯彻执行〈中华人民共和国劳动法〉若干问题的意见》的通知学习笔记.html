<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>法规学习笔记（可编辑）</title>
<style>
:root{
  --bg:#eef1f5; --card:#ffffff; --ink:#1f2329; --muted:#7a8290;
  --primary:#1f4e79; --primary-soft:#e8f0f7; --accent:#c0392b;
  --mark:#e6a23c; --note-bg:#fffdf3; --note-bd:#e8d9a8;
  --border:#e1e5ea; --line:#d8dde4; --shadow:0 1px 3px rgba(0,0,0,.06);
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  margin:0; background:var(--bg); color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Segoe UI",sans-serif;
  line-height:1.8; font-size:15px;
}
/* ===== 顶部栏 ===== */
header{
  position:sticky; top:0; z-index:50; background:var(--primary); color:#fff;
  box-shadow:0 2px 8px rgba(0,0,0,.15);
}
.head-inner{max-width:1180px; margin:0 auto; padding:10px 18px; display:flex; align-items:center; gap:14px; flex-wrap:wrap;}
.field-badge{display:inline-block; margin-left:4px; padding:2px 11px; font-size:12px; font-weight:600; color:#fff; background:var(--primary); border-radius:20px; vertical-align:middle; letter-spacing:.5px;}
.head-inner h1{font-size:16px; margin:0; font-weight:600; letter-spacing:.5px; flex:1 1 260px;}
.head-inner h1 small{display:block; font-size:11.5px; font-weight:400; opacity:.8; margin-top:2px;}
.toolbar{display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
.toolbar input[type=search]{
  padding:6px 10px; border:1px solid rgba(255,255,255,.35); border-radius:6px;
  background:rgba(255,255,255,.12); color:#fff; font-size:13px; width:160px; outline:none;
}
.toolbar input[type=search]::placeholder{color:rgba(255,255,255,.7);}
.toolbar button{
  padding:6px 12px; border:1px solid rgba(255,255,255,.4); border-radius:6px;
  background:rgba(255,255,255,.12); color:#fff; font-size:13px; cursor:pointer; white-space:nowrap;
}
.toolbar button:hover{background:rgba(255,255,255,.25);}
.toolbar button.active{background:var(--mark); border-color:var(--mark); color:#fff;}
.status{font-size:12px; opacity:.85; min-width:80px;}

/* ===== 布局 ===== */
.layout{max-width:1180px; margin:18px auto; padding:0 18px; display:flex; gap:20px; align-items:flex-start;}
nav.toc{
  position:sticky; top:78px; width:200px; flex:0 0 200px;
  background:var(--card); border:1px solid var(--border); border-radius:10px;
  padding:12px 10px; box-shadow:var(--shadow); max-height:calc(100vh - 100px); overflow:auto;
}
nav.toc .toc-title{font-size:12px; color:var(--muted); padding:0 8px 8px; border-bottom:1px solid var(--line); margin-bottom:6px;}
nav.toc a{
  display:block; padding:7px 8px; border-radius:6px; color:var(--ink); text-decoration:none;
  font-size:13.5px; cursor:pointer;
}
nav.toc a:hover{background:var(--primary-soft);}
nav.toc a.active{background:var(--primary); color:#fff; font-weight:500;}
nav.toc a .cnt{float:right; color:var(--muted); font-size:11px;}
nav.toc a.active .cnt{color:rgba(255,255,255,.85);}

main{flex:1; min-width:0;}
.chapter{margin-bottom:26px;}
.chapter > h2{
  font-size:18px; color:var(--primary); border-left:4px solid var(--primary);
  padding-left:12px; margin:0 0 14px; font-weight:700;
}
.article{
  background:var(--card); border:1px solid var(--border); border-radius:10px;
  padding:14px 16px; margin-bottom:12px; box-shadow:var(--shadow); position:relative;
  border-left:3px solid var(--line);
}
.article.marked{border-left-color:var(--mark); background:#fffdf6;}
.art-head{display:flex; align-items:center; gap:10px; margin-bottom:6px;}
.art-no{
  font-weight:700; color:var(--primary); font-size:14.5px; background:var(--primary-soft);
  padding:2px 10px; border-radius:5px;
}
.mark-btn{
  margin-left:auto; border:none; background:none; cursor:pointer; font-size:18px; line-height:1;
  color:var(--mark); padding:0 4px;
}
.mark-btn:hover{transform:scale(1.15);}
.art-text{font-size:15px; color:#2b2f36; text-align:justify; white-space:pre-wrap;}

/* 解读区 */
.explain-label{font-size:12px; color:var(--primary); font-weight:600; margin:11px 0 4px; display:flex; align-items:center; gap:5px;}
.explain{
  font-size:13.5px; color:#3a4250; background:#f6f9fc; border-left:3px solid var(--primary);
  border-radius:0 6px 6px 0; padding:8px 11px; white-space:pre-wrap; outline:none;
}
.explain:focus{background:#eef3fa; box-shadow:0 0 0 3px rgba(31,78,121,.12);}

/* 关联案例 */
.case-label{font-size:12px; color:#9a5b1e; font-weight:600; margin:12px 0 5px; display:flex; align-items:center; gap:5px;}
.case{background:#fbf6ee; border:1px solid #ecdcc0; border-radius:8px; padding:9px 11px; margin-bottom:8px;}
.case-title{font-weight:600; font-size:13.5px; color:#6b4423;}
.case-desc{font-size:13px; color:#5a4a3a; margin-top:3px; white-space:pre-wrap;}
.case-src{font-size:11.5px; color:#a98b5e; margin-top:4px;}

/* 关联法条 */
.rel-label{font-size:12px; color:#1f6fb2; font-weight:600; margin:12px 0 5px; display:flex; align-items:center; gap:5px;}
.rel{background:#eef4fb; border:1px solid #cfe0ef; border-radius:8px; padding:9px 11px; margin-bottom:8px;}
.rel-src{font-weight:600; font-size:13.5px; color:#14507e;}
.rel-text{font-size:13px; color:#34404d; margin-top:4px; white-space:pre-wrap;}

/* 检索按钮 */
.tool-row{margin:10px 0 2px;}
.search-btn{border:1px solid var(--border); background:#f3f7fb; color:var(--primary); border-radius:6px; padding:5px 10px; font-size:12.5px; cursor:pointer;}
.search-btn:hover{background:#e3edf6;}

/* 笔记区 */
.note-label{font-size:12px; color:var(--muted); margin:11px 0 4px; display:flex; align-items:center; gap:5px;}

/* 速查卡 */
.quick{background:linear-gradient(135deg,#f0f6fc,#e8f0f7); border:1px solid #cfe0ef; border-radius:10px; margin-bottom:18px; box-shadow:var(--shadow); overflow:hidden;}
.quick-head{font-weight:700; color:var(--primary); padding:11px 14px; cursor:pointer; user-select:none; font-size:14.5px;}
.quick-body{padding:2px 14px 12px;}
.qg{font-size:13px; color:#34404d; padding:7px 0; border-top:1px dashed #d4e2ee; white-space:pre-wrap;}
.qg:first-child{border-top:none;}
.qg b{color:var(--primary);}

/* 法规简介（发布信息） */
.law-intro{background:linear-gradient(135deg,#f0f6fc,#eef4fb); border:1px solid #cfe0ef; border-radius:10px; margin-bottom:18px; box-shadow:var(--shadow); overflow:hidden;}
.law-intro-head{font-weight:700; color:var(--primary); padding:11px 14px; font-size:14.5px;}
.law-intro-body{padding:2px 14px 12px;}
.law-intro-desc{font-size:13.5px; color:#34404d; line-height:1.8; margin:2px 0 10px;}
.meta-grid{display:grid; grid-template-columns:auto 1fr; gap:6px 14px; align-items:baseline;}
.meta-grid .mk{font-size:13px; color:var(--muted); white-space:nowrap;}
.meta-grid .mv{font-size:13px; color:#2b2f36;}
.meta-grid .mv.ok{color:#1a9e57; font-weight:600;}
.meta-grid .mv.no{color:#c0392b; font-weight:600;}

/* 条文互链 */
.lawlink{color:#1f6fb2; text-decoration:underline; cursor:pointer;}
.lawlink:hover{color:#0d4f86;}

/* 批注分层 */
.notes-wrap{margin-top:2px;}
.note-block{margin-bottom:8px;}
.note-tag{display:inline-block; font-size:11px; font-weight:600; padding:1px 8px; border-radius:4px; margin-bottom:3px;}
.tag-q{background:#fde8e8; color:#c0392b;}      /* 疑问 */
.tag-c{background:#e6f4ea; color:#1e7a46;}      /* 我的案例 */
.tag-s{background:#fef3e0; color:#b9770e;}      /* 要点总结 */
.tag-t{background:#efe7fb; color:#6b3fa0;}      /* 待办 */
.note.sub{background:var(--note-bg); border:1px dashed var(--note-bd); border-radius:7px; padding:7px 10px; min-height:32px; font-size:13.5px; color:#5a4a1a; white-space:pre-wrap; outline:none;}
.note.sub:focus{border-style:solid; border-color:var(--mark); background:#fffce8; box-shadow:0 0 0 3px rgba(230,162,60,.15);}
.note.sub:empty:before{content:attr(data-ph); color:#b9a86a;}

/* 自测模式 */
.reveal-btn{display:none; margin:10px 0 2px; border:1px solid var(--primary); background:var(--primary-soft); color:var(--primary); border-radius:6px; padding:5px 12px; font-size:12.5px; cursor:pointer;}
.reveal-btn:hover{background:#d8e6f5;}
body.self-test .reveal-btn{display:inline-block;}
body.self-test .explain-label,
body.self-test .explain,
body.self-test .case-label,
body.self-test .case,
body.self-test .rel-label,
body.self-test .rel,
body.self-test .tool-row,
body.self-test .note-label,
body.self-test .notes-wrap{display:none;}
.article.revealed .explain-label,
.article.revealed .explain,
.article.revealed .case-label,
.article.revealed .case,
.article.revealed .rel-label,
.article.revealed .rel,
.article.revealed .tool-row,
.article.revealed .note-label,
.article.revealed .notes-wrap{display:block;}
body.self-test .article{opacity:.97;}
body.self-test .article.revealed{border-left-color:var(--primary); background:#fff;}

footer{max-width:1180px; margin:0 auto 30px; padding:14px 18px; color:var(--muted); font-size:12.5px; text-align:center;}

@media (max-width:860px){
  .layout{flex-direction:column;}
  nav.toc{position:static; width:100%; flex:none; max-height:none;}
  .toolbar input[type=search]{width:120px;}
}
@media print{
  header, nav.toc, footer, .tool-row, .quick-head{display:none !important;}
  body{background:#fff;}
  .layout{display:block; margin:0; padding:0;}
  .article{break-inside:avoid; box-shadow:none; border:1px solid #ccc;}
  .explain{background:#f4f6f9;}
  .case{background:#fbf6ee;}
  .mark-btn{display:none;}
  .quick{box-shadow:none; border:1px solid #ccc;}
  body.self-test .reveal-btn{display:none !important;}
  body.self-test .explain, body.self-test .explain-label,
  body.self-test .case, body.self-test .case-label,
  body.self-test .rel, body.self-test .rel-label,
  body.self-test .tool-row, body.self-test .note-label, body.self-test .notes-wrap{display:block !important;}
}

/* ===== 法条编辑模式（浮动工具条） ===== */
/* ===== 法条编辑模式（每条常驻工具条） ===== */
.art-text.editable{outline:none; border-radius:5px; transition:box-shadow .15s;}
body.edit-mode .art-text.editable{cursor:text;}
.art-text.editable:focus{box-shadow:0 0 0 3px rgba(31,78,121,.16); background:#fefefe; padding:3px 4px;}
.art-editbar{display:none; align-items:center; gap:6px; margin:2px 0 10px; padding:6px 9px; background:#f4f6f8; border:1px solid #e1e6ec; border-radius:8px; flex-wrap:wrap;}
body.edit-mode .article .art-editbar{display:flex;}
.art-editbar .elbl{font-size:11px; color:#7a828c; margin-right:1px;}
.art-editbar .fcolor{width:20px;height:20px;border-radius:5px;border:1.5px solid rgba(0,0,0,.15);cursor:pointer;padding:0;flex:none;}
.art-editbar .fcolor:hover{transform:scale(1.15); border-color:#333;}
.art-editbar .fsep{width:1px;height:16px;background:#cfd4da; margin:0 3px;}
.art-editbar .fclear{padding:3px 9px;border:1px solid #c7ccd2;border-radius:5px;background:#fff;color:#444;cursor:pointer;font-size:11px;white-space:nowrap;}
.art-editbar .fclear:hover{background:#eef1f4;}
.art-editbar .ehint{font-size:11px;color:#9aa1a9;margin-left:auto;}
body:not(.edit-mode) .art-text.editable{-webkit-user-modify:read-only; user-modify:read-only;}

</style>
</head>
<body>
<header>
  <div class="head-inner">
    <h1><span id="lawTitle"></span><small id="lawSub"></small> <span id="lawField" class="field-badge"></span></h1>
    <div class="toolbar">
      <input type="search" id="search" placeholder="搜索条文…" aria-label="搜索">
      <span class="status" id="status">已就绪</span>
      <button id="btnTest" title="自测记忆模式：隐藏解读，点条文下方“显示解读”对照，用于抽背">自测模式</button>
      <button id="btnExport" title="导出为独立HTML文件（含所有笔记、解读与案例）。导出后告诉我“发布批注”即可同步到网站">导出</button>
      <button id="btnPrint" title="打印 / 存为PDF">打印</button>
      <button id="btnClear" title="清空本浏览器内全部笔记与标记">清空</button>
    </div>
  </div>
</header>

<div class="layout">
  <nav class="toc" id="toc">
    <div class="toc-title">目录</div>
  </nav>
  <main id="content"></main>
</div>

<footer>

</footer>

/* 法条数据 */
const DATA = [{"ch":"全文","items":[{"no":"","t":"劳部发〔1995〕309号  1995年8月4日\n各省、自治区、直辖市及计划单列市劳动（劳动人事）厅（局）、国务院有关部门、解放军 总后勤部生产管理部：\n现将《关于贯彻执行〈中华人民共和国劳动法〉若干问题的意见》印发给你们，请遵照 执行。\n关于贯彻执行《中华人民共和国劳动法》若干问题的意见\n《中华人民共和国劳动法》（以下简称劳动法）已于一九九五年一月一日起施行，现就 劳动法在贯彻执行中遇到的若干问题提出以下意见。","ex":""},{"no":"一、","t":"一、适用范围","ex":""},{"no":"1.","t":"1.劳动法第二条中的“个体经济组织”是指一般雇工在七人以下的个体工商户。","ex":""},{"no":"2.","t":"2.中国境内的企业、个体经济组织与劳动者之间，只要形成劳动关系，即劳动者事实上 已成为企业、个体经济组织的成员，并为其提供有偿劳动，适用劳动法。","ex":""},{"no":"3.","t":"3.国家机关、事业组织、社会团体实行劳动合同制度的以及按规定应实行劳动合同制度 的工勤人员；实行企业化管理的事业组织的人员；其他通过劳动合同与国家机关、事业组 织、社会团体建立劳动关系的劳动者，适用劳动法。","ex":""},{"no":"4.","t":"4.公务员和比照实行公务员制度的事业组织和社会团体的工作人员，以及农村劳动者 （乡镇企业职工和进城务工、经商的农民除外）、现役军人和家庭保姆等不适用劳动法。","ex":""},{"no":"5.","t":"5.中国境内的企业、个体经济组织在劳动法中被称为用人单位。国家机关、事业组织、 社会团体和与之建立劳动合同关系的劳动者依照劳动法执行。根据劳动法的这一规定，国家 机关、事业组织、社会团体应当视为用人单位。\n二 、劳动合同和集体合同","ex":""},{"no":"（一）","t":"（一）劳动合同的订立","ex":""},{"no":"6.","t":"6.用人单位应与其富余人员、放长假的职工，签订劳动合同，但其劳动合同与在岗职工 的劳动合同在内容上可以有所区别。用人单位与劳动者经协商一致可以在劳动合同中就不在 岗期间的有关事项作出规定。","ex":""},{"no":"7.","t":"7.用人单位应与其长期被外单位借用的人员、带薪上学人员、以及其他非在岗但仍保持 劳动关系的人员签订劳动合同，但在外借和上学期间，劳动合同中的某些相关条款经双方协 商可以变更。","ex":""},{"no":"8.","t":"8.请长病假的职工，在病假期间与原单位保持着劳动关系，用人单位应与其签订劳动合 同。","ex":""},{"no":"9.","t":"9.原固定工中经批准的停薪留职人员，愿意回原单位继续工作的，原单位应与其签订劳 动合同；不愿回原单位继续工作的，原单位可以与其解除劳动关系。","ex":""},{"no":"10.","t":"10.根据劳动部《实施〈劳动法〉中有关劳动合同问题的解答》（劳部发〔1995〕202 号）的规定，党委书记、工会主席等党群专职人员也是职工的一员，依照劳动法的规定，与 用人单位签订劳动合同。对于有特殊规定的，可以按有关规定办理。","ex":""},{"no":"11.","t":"11.根据劳动部《实施〈劳动法〉中有关劳动合同问题的解答》（劳部发〔1995〕202 号）的规定，经理由其上级部门聘任（委任）的，应与聘任（委任）部门签订劳动合同。实 行公司制的经理和有关经营管理人员，应依据《中华人民共和国公司法》的规定与董事会签 订劳动合同。","ex":""},{"no":"12.","t":"12.在校生利用业余时间勤工助学，不视为就业，未建立劳动关系，可以不签订劳动合 同。","ex":""},{"no":"13.","t":"13.用人单位发生分立或合并后，分立或合并后的用人单位可依据其实际情况与原用人单 位的劳动者遵循平等自愿、协商一致的原则变更原劳动合同。","ex":""},{"no":"14.","t":"14.派出到合资、参股单位的职工如果与原单位仍保持着劳动关系，应当与原单位签订劳 动合同，原单位可就劳动合同的有关内容在与合资、参股单位订立的劳务合同时，明确职工 的工资、保险、福利、休假等有关待遇。","ex":""},{"no":"15.","t":"15. 租赁经营（生产）、承包经营（生产）的企业，所有权并没有发生改变，法人名称未 变，在与职工订立劳动合同时，该企业仍为用人单位一方。依据租赁合同或承包合同，租赁 人、承包人如果作为该企业的法定代表人或者该法定代表人的授权委托人时，可代表该企业 （用人单位）与劳动者订立劳动合同。","ex":""},{"no":"16.","t":"16.用人单位与劳动者签订劳动合同时，劳动合同可以由用人单位拟定，也可以由双方当 事人共同拟定，但劳动合同必须经双方当事人协商一致后才能签订，职工被迫签订的劳动合 同或未经协商一致签订的劳动合同为无效劳动合同。","ex":""},{"no":"17.","t":"17.用人单位与劳动者之间形成了事实劳动关系，而用人单位故意拖延不订立劳动合同， 劳动行政部门应予以纠正。用人单位因此给劳动者造成损害的，应按劳动部《违反〈劳动 法〉有关劳动合同规定的赔偿办法》（劳部发〔1995〕223号）的规定进行赔偿。","ex":""},{"no":"（二）","t":"（二）劳动合同的内容","ex":""},{"no":"18.","t":"18.劳动者被用人单位录用后，双方可以在劳动合同中约定试用期，试用期应包括在劳动 合同期限内。","ex":""},{"no":"19.","t":"19.试用期是用人单位和劳动者为相互了解、选择而约定的不超过六个月的考察期。 一般 对初次就业或再次就业的职工可以约定。在原固定工进行劳动合同制度的转制过程中，用人 单位与原固定工签订劳动合同时，可以不再约定试用期。","ex":""},{"no":"20.","t":"20.无固定期限的劳动合同是指不约定终止日期的劳动合同。按照平等自愿、协商一致的 原则，用人单位和劳动者只要达成一致，无论初次就业的，还是由固定工转制的，都可以签 订无固定期限的劳动合同。\n无固定期限的劳动合同不得将法定解除条件约定为终止条件，以规避解除劳动合同时用 人单位应承担支付给劳动者经济补偿的义务。","ex":""},{"no":"21.","t":"21.用人单位经批准招用农民工，其劳动合同期限可以由用人单位和劳动者协商确定。\n从事矿山井下以及在其他有害身体健康的工种、岗位工作的农民工，实行定期轮换制 度，合同期限最长不超过八年。","ex":""},{"no":"22.","t":"22.劳动法第二十条中的“在同一用人单位连续工作满十年以上”是指劳动者与同一用人 单位签订的劳动合同的期限不间断达到十年，劳动合同期满双方同意续订劳动合同时，只要 劳动者提出签订无固定期限劳动合同的，用人单位应当与其签订无固定期限的劳动合同。在 固定工转制中各地如有特殊规定的，从其规定。","ex":""},{"no":"23.","t":"23.用人单位用于劳动者职业技能培训费用的支付和劳动者违约时培训费的赔偿可以在劳 动合同中约定，但约定劳动者违约时负担的培训费和赔偿金的标准不得违反劳动部《违反 〈劳动法〉有关劳动合同规定的赔偿办法》（劳部发〔1995〕223号）等有关规定。","ex":""},{"no":"24.","t":"24.用人单位在与劳动者订立劳动合同时，不得以任何形式向劳动者收取定金、保证金 （物）或抵押金（物）。对违反以上规定的，应按照劳动部、公安部、全国总工会《关于加 强外商投资企业和私营企业劳动管理切实保障职工合法权益的通知》（劳部发 〔1994〕118号）和劳动部办公厅《对“关于国有企业和集体所有制企业能否参照执行劳部 发〔1994〕118号文件中的有关规定的请示”的复函》（劳办发〔1994〕256号）的规定，由 公安部门和劳动行政部门责令用人单位立即退还给劳动者本人。","ex":""},{"no":"（三）","t":"（三）经济性裁员","ex":""},{"no":"25.","t":"25.依据劳动法第二十七条和劳动部《企业经济性裁减人员规定》（劳部发〔1994〕447 号）第四条的规定，用人单位确需裁减人员，应按下列程序进行：\n（1）提前三十日向工会或全体职工说明情况，并提供有关生产经营状况的资料；\n（2）提出裁减人员方案，内容包括：被裁减人员名单、裁减时间及实施步骤，符合法 律、法规规定和集体合同约定的被裁减人员的经济补偿办法；\n（3）将裁减人员方案征求工会或者全体职工的意见，并对方案进行修改和完善；\n（4）向当地劳动行政部门报告裁减人员方案以及工会或者全体职工的意见，并听取劳 动行政部门的意见；\n（5）由用人单位正式公布裁减人员方案，与被裁减人员办理解除劳动合同手续，按照 有关规定向被裁减人员本人支付经济补偿金，并出具裁减人员证明书。","ex":""},{"no":"（四）","t":"（四）劳动合同的解除和无效劳动合同","ex":""},{"no":"26.","t":"26.劳动合同的解除是指劳动合同订立后，尚未全部履行以前，由于某种原因导致劳动合 同一方或双方当事人提前消灭劳动关系的法律行为。劳动合同的解除分为法定解除和约定解 除两种。根据劳动法的规定，劳动合同既可以由单方依法解除，也可以双方协商解除。劳动 合同的解除，只对未履行的部分发生效力，不涉及已履行的部分。","ex":""},{"no":"27.","t":"27.无效劳动合同是指所订立的劳动合同不符合法定条件，不能发生当事人预期的法律后 果的劳动合同。劳动合同的无效由人民法院或劳动争议仲裁委员会确认，不能由合同双方当 事人决定。","ex":""},{"no":"28.","t":"28.劳动者涉嫌违法犯罪被有关机关收容审查、拘留或逮捕的，用人单位在劳动者被限制 人身自由期间，可与其暂时停止劳动合同的履行。\n暂时停止履行劳动合同期间，用人单位不承担劳动合同规定的相应义务。劳动者经证明 被错误限制人身自由的，暂时停止履行劳动合同期间劳动者的损失，可由其依据《国家赔偿 法》要求有关部门赔偿。","ex":""},{"no":"29.","t":"29.劳动者被依法追究刑事责任的，用人单位可依据劳动法第二十五条解除劳动合同。\n“被依法追究刑事责任”是指：被人民检察院免予起诉的、被人民法院判处刑罚的、被 人民法院依据刑法第三十二条免予刑事处分的。\n劳动者被人民法院判处拘役、三年以下有期徒刑缓刑的，用人单位可以解除劳动合同。","ex":""},{"no":"30.","t":"30.劳动法第二十五条为用人单位可以解除劳动合同的条款，即使存在第二十九条规定的 情况，只要劳动者同时存在第二十五条规定的四种情形之一，用人单位也可以根据第二十五 条的规定解除劳动合同。","ex":""},{"no":"31.","t":"31.劳动者被劳动教养的，用人单位可以依据被劳教的事实解除与该劳动者的劳动合同。","ex":""},{"no":"32.","t":"32.按照劳动法第三十一条的规定，劳动者解除劳动合同，应当提前三十日以书面形式通 知用人单位。超过三十日，劳动者可以向用人单位提出办理解除劳动合同手续，用人单位予 以办理。如果劳动者违法解除劳动合同给原用人单位造成经济损失，应当承担赔偿责任。","ex":""},{"no":"33.","t":"33.劳动者违反劳动法规定或劳动合同的约定解除劳动合同（如擅自离职），给用人单位 造成经济损失的，应当根据劳动法第一百零二条和劳动部《违反〈劳动法〉有关劳动合同规 定的赔偿办法》（劳部发〔1995〕223号）的规定，承担赔偿责任。","ex":""},{"no":"34.","t":"34.除劳动法第二十五条规定的情形外，劳动者在医疗期、孕期、产期和哺乳期内，劳动 合同期限届满时，用人单位不得终止劳动合同。劳动合同的期限应自动延续至医疗期、孕 期、产期和哺乳期期满为止。","ex":""},{"no":"35.","t":"35.请长病假的职工在医疗期满后，能从事原工作的，可以继续履行劳动合同；医疗期满 后仍不能从事原工作也不能从事由单位另行安排的工作的，由劳动鉴定委员会参照工伤与职 业病致残程度鉴定标准进行劳动能力鉴定。被鉴定为一至四级的，应当退出劳动岗位，解除 劳动关系，办理因病或非因工负伤退休退职手续，享受相应的退休退职待遇；被鉴定为五至 十级的，用人单位可以解除劳动合同，并按规定支付经济补偿金和医疗补助费。","ex":""},{"no":"（五）","t":"（五）解除劳动合同的经济补偿","ex":""},{"no":"36.","t":"36.用人单位依据劳动法第二十四条、第二十六条、第二十七条的规定解除劳动合同，应 当按照劳动法和劳动部《违反和解除劳动合同的经济补偿办法》（劳部发〔1994〕481号） 支付劳动者经济补偿金。","ex":""},{"no":"37.","t":"37.根据《民法通则》第四十四条第二款“企业法人分立、合并，它的权利和义务由变更 后的法人享有和承担”的规定，用人单位发生分立或合并后，分立或合并后的用人单位可依 据其实际情况与原用人单位的劳动者遵循平等自愿、协商一致的原则变更、解除或重新签订 劳动合同。\n在此种情况下的重新签订劳动合同视为原劳动合同的变更，用人单位变更劳动合同，劳 动者不能依据劳动法第二十八条要求经济补偿。","ex":""},{"no":"38.","t":"38.劳动合同期满或者当事人约定的劳动合同终止条件出现，劳动合同即行终止，用人单 位可以不支付劳动者经济补偿金。国家另有规定的，可以从其规定。","ex":""},{"no":"39.","t":"39.用人单位依据劳动法第二十五条解除劳动合同，可以不支付劳动者经济补偿金。","ex":""},{"no":"40.","t":"40.劳动者依据劳动法第三十二条第（一）项解除劳动合同，用人单位可以不支付经济补 偿金，但应按照劳动者的实际工作天数支付工资。","ex":""},{"no":"41.","t":"41.在原固定工实行劳动合同制度的过程中，企业富余职工辞职，经企业同意可以不与企 业签订劳动合同的，企业应根据《国有企业富余职工安置规定》（国务院令第111号， 1993年公布）发给劳动者一次性生活补助费。","ex":""},{"no":"42.","t":"42.职工在接近退休年龄（按有关规定一般为五年以内）时因劳动合同到期终止劳动合同 的，如果符合退休、退职条件，可以办理退休、退职手续；不符合退休、退职条件的，在终 止劳动合同后按规定领取失业救济金。享受失业救济金的期限届满后仍未就业，符合社会救 济条件的，可以按规定领取社会救济金，达到退休年龄时办理退休手续，领取养老保险金。","ex":""},{"no":"43.","t":"43. 劳动合同解除后，用人单位对符合规定的劳动者应支付经济补偿金。不能因劳动者领 取了失业救济金而拒付或克扣经济补偿金，失业保险机构也不得以劳动者领取了经济补偿金 为由，停发或减发失业救济金。","ex":""},{"no":"（六）","t":"（六）体制改革过程中实行劳动合同制度的有关政策","ex":""},{"no":"44.","t":"44.困难企业签订劳动合同，应区分不同情况，有些亏损企业属政策性亏损，生产仍在进 行，还能发出工资，应该按照劳动法的规定签订劳动合同。已经停产半停产的企业，要根据 具体情况签订劳动合同，保证这些企业职工的基本生活。","ex":""},{"no":"45.","t":"45.在国有企业固定工转制过程中，劳动者无正当理由不得单方面与用人单位解除劳动关 系；用人单位也不得以实行劳动合同制度为由，借机辞退部分职工。","ex":""},{"no":"46.","t":"46.关于在企业内录干、聘干问题，劳动法规定用人单位内的全体职工统称为劳动者，在 同一用人单位内，各种不同的身份界限随之打破。应该按照劳动法的规定，通过签订劳动合 同来明确劳动者的工作内容、岗位等。用人单位根据工作需要，调整劳动者的工作岗位时， 可以与劳动者协商一致，变更劳动合同的相关内容。","ex":""},{"no":"47.","t":"47.由于各用人单位千差万别，对工作内容、劳动报酬的规定也就差异很大，因此，国家 不宜制定统一的劳动合同标准文本。目前，各地、各行业制定并向企业推荐的劳动合同文 本，对于用人单位和劳动者双方有一定的指导意义，但这些劳动合同文本只能供用人单位和 劳动者参考。","ex":""},{"no":"48.","t":"48. 按照劳动部办公厅《对全面实行劳动合同制若干问题的请示的复函》（劳办发 〔1995〕19号）的规定，各地企业在与原固定工签订劳动合同时，应注意保护老弱病残职工 的合法权益。对工作时间较长，年龄较大的职工，各地可以根据劳动法第一百零六条制定一 次性的过渡政策，具体办法由各省、自治区、直辖市确定。","ex":""},{"no":"49.","t":"49.在企业全面建立劳动合同制度以后，原合同制工人与本企业内的原固定工应享受同等 待遇。是否发给15%的工资性补贴，可以由各省、自治区、直辖市人民政府根据劳动法第一 百零六条在制定劳动合同制度的实施步骤时加以规定。","ex":""},{"no":"50.","t":"50.在目前工伤保险和残疾人康复就业制度尚未建立和完善的情况下，对因工部分丧失劳 动能力的职工，劳动合同期满也不能终止劳动合同，仍由原单位按照国家有关规定提供医疗 等待遇。","ex":""},{"no":"（七）","t":"（七）集体合同","ex":""},{"no":"51.","t":"51.当前签订集体合同的重点应在非国有企业和现代企业制度试点的企业进行，积累经 验，逐步扩大范围。","ex":""},{"no":"52.","t":"52.关于国有企业在承包制条件下签订的“共保合同”，凡内容符合劳动法和有关法律、 法规和规章关于集体合同规定的，应按照有关规定办理集体合同送审、备案手续；凡不符合 劳动法和有关法律、法规和规章规定的，应积极创造条件逐步向规范的集体合同过渡。\n三 、工资","ex":""},{"no":"（一）","t":"（一）最低工资","ex":""},{"no":"53.","t":"53.劳动法中的“工资”是指用人单位依据国家有关规定或劳动合同的约定，以货币形式直接支付给本单位劳动者的劳动报酬， 一般包括计时工资、计件工资、奖金、津贴和补贴、 延长工作时间的工资报酬以及特殊情况下支付的工资等。“工资”是劳动者劳动收入的主要组成部分。\n劳动者的以下劳动收入不属于工资范围：\n（1）单位支付给劳动者个人的社会保险福利费用，如丧葬抚恤救济费、生活困难补助费、计划生育补贴等；\n（2）劳动保护方面的费用，如用人单位支付给劳动者的工作服、解毒剂、清凉饮料费用等；\n（3）按规定未列入工资总额的各种劳动报酬及其他劳动收入，如根据国家规定发放的创造发明奖、国家星火奖、自然科学奖、科学技术进步奖、合理化建议和技术改进奖、中华技能大奖等，以及稿费、讲课费、翻译费等。","ex":""},{"no":"54.","t":"54.劳动法第四十八条中的“最低工资”是指劳动者在法定工作时间内履行了正常劳动义务的前提下，由其所在单位支付的最低劳动报酬。最低工资不包括延长工作时间的工资报 酬，以货币形式支付的住房和用人单位支付的伙食补贴，中班、夜班、高温、低温、井下、 有毒、有害等特殊工作环境和劳动条件下的津贴，国家法律、法规、规章规定的社会保险福 利待遇。","ex":""},{"no":"55.","t":"55.劳动法第四十四条中的“劳动者正常工作时间工资”是指劳动合同规定的劳动者本人 所在工作岗位（职位）相对应的工资。鉴于当前劳动合同制度尚处于推进过程中，按上述规 定执行确有困难的用人单位，地方或行业劳动部门可在不违反劳动部《关于工资〈支付暂行 规定〉有关问题的补充规定》（劳部发〔1995〕226号）文件所确定的总的原则的基础上， 制定过渡办法。","ex":""},{"no":"56.","t":"56.在劳动合同中，双方当事人约定的劳动者在未完成劳动定额或承包任务的情况下，用 人单位可低于最低工资标准支付劳动者工资的条款不具有法律效力。","ex":""},{"no":"57.","t":"57.劳动者与用人单位形成或建立劳动关系后，试用、熟练、见习期间，在法定工作时间 内提供了正常劳动，其所在的用人单位应当支付其不低于最低工资标准的工资。","ex":""},{"no":"58.","t":"58.企业下岗待工人员，由企业依据当地政府的有关规定支付其生活费，生活费可以低于 最低工资标准，下岗待工人员中重新就业的，企业应停发其生活费。女职工因生育、哺乳请 长假而下岗的，在其享受法定产假期间，依法领取生育津贴；没有参加生育保险的企业，由企业照发原工资。","ex":""},{"no":"59.","t":"59.职工患病或非因工负伤治疗期间，在规定的医疗期间内由企业按有关规定支付其病假 工资或疾病救济费，病假工资或疾病救济费可以低于当地最低工资标准支付，但不能低于最 低工资标准的80%。","ex":""},{"no":"（二）","t":"（二）延长工作时间的工资报酬","ex":""},{"no":"60.","t":"60.实行每天不超过8小时，每周不超过44小时或40小时标准工作时间制度的企业，以及 经批准实行综合计算工时工作制的企业，应当按照劳动法的规定支付劳动者延长工作时间的 工资报酬。全体职工已实行劳动合同制度的企业， 一般管理人员（实行不定时工作制人员除 外）经批准延长工作时间的，可以支付延长工作时间的工资报酬。","ex":""},{"no":"61.","t":"61.实行计时工资制的劳动者的日工资，按其本人月工资标准除以平均每月法定工作天数 （实行每周40小时工作制的为21.16天，实行每周44小时工作制的为23.33天）进行计算。","ex":""},{"no":"62.","t":"62.实行综合计算工时工作制的企业职工，工作日正好是周休息日的，属于正常工作；工 作日正好是法定节假日时，要依照劳动法第四十四条第（三）项的规定支付职工的工资报 酬。","ex":""},{"no":"（三）","t":"（三）有关企业工资支付的政策","ex":""},{"no":"63.","t":"63.企业克扣或无故拖欠劳动者工资的，劳动监察部门应根据劳动法第九十一条、劳动部 《违反和解除劳动合同的经济补偿办法》第三条、《违反〈中华人民共和国劳动法〉行政处 罚办法》第六条予以处理。","ex":""},{"no":"64.","t":"64. 经济困难的企业执行劳动部《工资支付暂行规定》（劳部发〔1994〕489号）确有困 难，应根据以下规定执行：\n（1）《关于做好国有企业职工和离退休人员基本生活保障工作的通知》（国发 〔1993〕76号）的规定，“企业发放工资确有困难时，应发给职工基本生活费，具体标准由 各地区、各部门根据实际情况确定”;\n（2）《关于国有企业流动资金贷款的紧急通知》（银传〔1994〕34号）的规定，“地 方政府通过财政补贴，企业主管部门有可能也要拿出一部分资金，银行要拿出一部分贷款， 共同保证职工基本生活和社会的稳定”;\n（3）《国有企业富余职工安置规定》（国务院令第111号，1993年发布）的规定： “企 业可以对职工实行有限期的放假。职工放假期间，由企业发给生活费”。\n四 、工作时间和休假","ex":""},{"no":"（一）","t":"（一）综合计算工作时间","ex":""},{"no":"65.","t":"65.经批准实行综合计算工作时间的用人单位，分别以周、月、季、年等为周期综合计算 工作时间，但其平均日工作时间和平均周工作时间应与法定标准工作时间基本相同。","ex":""},{"no":"66.","t":"66.对于那些在市场竞争中，由于外界因素的影响，生产任务不均衡的企业的部分职工， 经劳动行政部门严格审批后，可以参照综合计算工时工作制的办法实施，但用人单位应采取 适当方式确保职工的休息休假权利和生产、工作任务的完成。","ex":""},{"no":"67.","t":"67.经批准实行不定时工作制的职工，不受劳动法第四十一条规定的日延长工作时间标准 和月延长工作时间标准的限制，但用人单位应采用弹性工作时间等适当的工作和休息方式，\n确保职工的休息休假权利和生产、工作任务的完成。","ex":""},{"no":"68.","t":"68.实行标准工时制度的企业，延长工作时间应严格按劳动法第四十一条的规定执行，不 能按季、年综合计算延长工作时间。","ex":""},{"no":"69.","t":"69.中央直属企业、企业化管理的事业单位实行不定时工作制和综合计算工时工作制等其 他工作和休息办法的，须经国务院行业主管部门审核，报国务院劳动行政部门批准。地方企 业实行不定时工作制和综合计算工时工作制等其他工作和休息办法的审批办法，由省、自治 区、直辖市人民政府劳动行政部门制定，报国务院劳动行政部门备案。","ex":""},{"no":"（二）","t":"（二）延长工作时间","ex":""},{"no":"70.","t":"70.休息日安排劳动者工作的，应先按同等时间安排其补休，不能安排补休的应按劳动法 第四十四条第（二）项的规定支付劳动者延长工作时间的工资报酬。法定节假日（元旦、春 节、劳动节、国庆节）安排劳动者工作的，应按劳动法第四十四条第（三）项支付劳动者延 长工作时间的工资报酬。","ex":""},{"no":"71.","t":"71.协商是企业决定延长工作时间的程序（劳动法第四十二条和《劳动部贯彻〈国务院关 于职工工作时间的规定〉的实施办法》第七条规定除外），企业确因生产经营需要，必须延 长工作时间时，应与工会和劳动者协商。协商后，企业可以在劳动法限定的延长工作时数内 决定延长工作时间，对企业违反法律、法规强迫劳动者延长工作时间的，劳动者有权拒绝。 若由此发生劳动争议，可以提请劳动争议处理机构予以处理。","ex":""},{"no":"（三）","t":"（三）休假","ex":""},{"no":"72.","t":"72.实行新工时制度后，企业职工原有的年休假制度仍然实行。在国务院尚未作出新的规 定之前，企业可以按照1991年6月5日《中共中央国务院关于职工休假问题的通知》，安排职 工休假。","ex":""},{"no":"五、","t":"五、社会保险","ex":""},{"no":"73.","t":"73.企业实施破产时，按照国家有关企业破产的规定，从其财产清产和土地转让所得中按 实际需要划拨出社会保险费用和职工再就业的安置费。其划拨的养老保险费和失业保险费由 当地社会保险基金经办机构和劳动部门就业服务机构接收，并负责支付离退休人员的养老保 险费用和支付失业人员应享受的失业保险待遇。","ex":""},{"no":"74.","t":"74.企业富余职工、请长假人员、请长病假人员、外借人员和带薪上学人员，其社会保险 费仍按规定由原单位和个人继续缴纳，缴纳保险费期间计算为缴费年限。","ex":""},{"no":"75.","t":"75.用人单位全部职工实行劳动合同制度后，职工在用人单位内由转制前的原工人岗位转 为原干部（技术）岗位或由原干部（技术）岗位转为原工人岗位，其退休年龄和条件，按现 岗位国家规定执行。","ex":""},{"no":"76.","t":"76.依据劳动部《企业职工患病或非因工负伤医疗期的规定》（劳部发〔1994〕479号） 和劳动部《关于贯彻〈企业职工患病或非因工负伤医疗期的规定〉的通知》（劳部发 〔1995〕236号），职工患病或非因工负伤，根据本人实际参加工作的年限和本企业工作年 限长短，享受3-24个月的医疗期。对于某些患特殊疾病（如癌症、精神病、瘫痪等）的职 工，在24个月内尚不能痊愈的，经企业和当地劳动部门批准，可以适当延长医疗期。","ex":""},{"no":"77.","t":"77.劳动者的工伤待遇在国家尚未颁布新的工伤保险法律、行政法规之前，各类企业仍要\n执行《劳动保险条例》及相关的政策规定，如果当地政府已实行工伤保险制度改革的，应执 行当地的新规定；个体经济组织的劳动者的工伤保险参照企业职工的规定执行；国家机关、 事业组织、社会团体的劳动者的工伤保险，如果包括在地方人民政府的工伤改革规定范围内 的，按地方政府的规定执行。","ex":""},{"no":"78.","t":"78.劳动者患职业病按照1987年由卫生部等部门发布的《职业病范围和职业病患者处理办 法的规定》和所附的“职业病名单”（〔87〕卫防第60号）处理，经职业病诊断机构确诊并 发给《职业病诊断证明书》，劳动行政部门据此确认工伤，并通知用人单位或者社会保险基 金经办机构发给有关工伤保险待遇；劳动者因工负伤的，劳动行政部门根据企业的工伤事故 报告和工伤者本人的申请，作出工伤认定，由社会保险基金经办机构或用人单位，发给有关 工伤保险待遇。患职业病或工伤致残的，由当地劳动鉴定委员会按照劳动部《职工工伤和职 业病致残程度鉴定标准》（劳险字〔1992〕6号）评定伤残等级和护理依赖程度。劳动鉴定 委员会的伤残等级和护理依赖程度的结论，以医学检查、诊断结果为技术依据。","ex":""},{"no":"79.","t":"79.劳动者因工负伤或患职业病，用人单位应按国家和地方政府的规定进行工伤事故报 告，或者经职业病诊断机构确诊进行职业病报告。用人单位和劳动者有权按规定向当地劳动 行政部门报告。如果用人单位瞒报、漏报工作或职业病，工会、劳动者可以向劳动行政部门 报告。经劳动行政部门确认后，用人单位或社会保险基金经办机构应补发工伤保险待遇。","ex":""},{"no":"80.","t":"80. 劳动者对劳动行政部门作出的工伤或职业病的确认意见不服，可依法提起行政复议或 行政诉讼。","ex":""},{"no":"81.","t":"81. 劳动者被认定患职业病或因工负伤后，对劳动鉴定委员会作出的伤残等级和护理依赖 程度鉴定结论不服，可依法提起行政复议或行政诉讼。对劳动能力鉴定结论所依据的医学检 查、诊断结果有异议的，可以要求复查诊断，复查诊断按各省、自治区和直辖市劳动鉴定委 员会规定的程序进行。\n六 、劳动争议","ex":""},{"no":"82.","t":"82.用人单位与劳动者发生劳动争议不论是否订立劳动合同，只要存在事实劳动关系，并 符合劳动法的适用范围和《中华人民共和国企业劳动争议处理条例》的受案范围，劳动争议 仲裁委员会均应受理。","ex":""},{"no":"83.","t":"83.劳动合同鉴证是劳动行政部门审查、证明劳动合同的真实性、合法性的一项行政监督 措施，尤其在劳动合同制度全面实施的初期有其必要性。劳动行政部门鼓励并提倡用人单位 和劳动者进行劳动合同鉴证。劳动争议仲裁委员会不能以劳动合同未经鉴证为由不受理相关 的劳动争议案件。","ex":""},{"no":"84.","t":"84.国家机关、事业组织、社会团体与本单位工人以及其他与之建立劳动合同关系的劳动 者之间，个体工商户与帮工、学徒之间，以及军队、武警部队的事业组织和企业与其无军籍 的职工之间发生的劳动争议，只要符合劳动争议的受案范围，劳动争议仲裁委员会应予受 理。","ex":""},{"no":"85.","t":"85. “劳动争议发生之日”是指当事人知道或者应当知道其权利被侵害之日。","ex":""},{"no":"86.","t":"86.根据《中华人民共和国商业银行法》的规定，商业银行为企业法人。商业银行与其职 工适用《劳动法》、《中华人民共和国企业劳动争议处理条例》等劳动法律、法规和规章。\n商业银行与其职工发生的争议属于劳动争议的受案范围的，劳动争议仲裁委员会应予受理。","ex":""},{"no":"87.","t":"87.劳动法第二十五条第（三）项中的“重大损害”，应由企业内部规章来规定，不便于 在全国对其作统一解释。若用人单位以此为由解除劳动合同，与劳动者发生劳动争议，当事 人向劳动争议仲裁委员会申请仲裁的，由劳动争议仲裁委员会根据企业类型、规模和损害程 度等情况，对企业规章中规定的“重大损害”进行认定。","ex":""},{"no":"88.","t":"88. 劳动监察是劳动法授予劳动行政部门的职责，劳动争议仲裁是劳动法授予各级劳动争 议仲裁委员会的职能。用人单位或行业部门不能设立劳动监察机构和劳动争议仲裁委员会， 也不能设立劳动行政部门劳动监察机构的派出机构和劳动争议仲裁委员会的派出机构。","ex":""},{"no":"89.","t":"89. 劳动争议当事人向企业劳动争议调解委员会申请调解，从当事人提出申请之日起，仲 裁申诉时效中止，企业劳动争议调解委员会应当在三十日内结束调解，即中止期间最长不得 超过三十日。结束调解之日起，当事人的申诉时效继续计算。调解超过三十日的，申诉时效 从三十日之后的第一天继续计算。","ex":""},{"no":"90.","t":"90.劳动争议仲裁委员会的办事机构对未予受理的仲裁申请，应逐件向仲裁委员会报告并 说明情况，仲裁委员会认为应当受理的，应及时通知当事人。当事人从申请至受理的期间应 视为时效中止。","ex":""},{"no":"七、","t":"七、法律责任","ex":""},{"no":"91.","t":"91.劳动法第九十一条的含义是，如果用人单位实施了本条规定的前三项侵权行为之一 的，劳动行政部门应责令用人单位支付劳动者的工资报酬和经济补偿，并可以责令支付赔偿 金。如果用人单位实施了本条规定的第四项侵权行为，即解除劳动合同后未依法给予劳动者 经济补偿的，因不存在支付工资报酬的问题，故劳动行政部门只责令用人单位支付劳动者经 济补偿，还可以支付赔偿金。","ex":""},{"no":"92.","t":"92.用人单位实施下列行为之一的，应认定为劳动法第一百零一条中的“无理阻挠”行 为：\n（1）阻止劳动监督检查人员进入用人单位内（包括进入劳动现场）进行监督检查的；\n（2）隐瞒事实真象，出具伪证，或者隐匿、毁灭证据的；\n（3）拒绝提供有关资料的；\n（4）拒绝在规定的时间和地点就劳动行政部门所提问题作出解释和说明的；\n（5）法律、法规和规章规定的其他情况。","ex":""},{"no":"八、","t":"八、适用法律","ex":""},{"no":"93.","t":"93.劳动部、外经贸部《外商投资企业劳动管理规定》（劳部发〔1994〕246号）与劳动 部《违反和解除劳动合同的经济补偿办法》（劳部发〔1994〕481号）中关于解除劳动合同 的经济补偿规定是一致的，246号文中的“生活补助费”是劳动法第二十八条所指经济补偿 的具体化，与481号文中的“经济补偿金”可视为同一概念。","ex":""},{"no":"94.","t":"94.劳动部、外经贸部《外商投资企业劳动管理规定》（劳部发〔1994〕246号）与劳动 部《违反〈中华人民共和国劳动法〉行政处罚办法》（劳部发〔1994〕532号）在企业低于 当地最低工资标准支付职工工资应付赔偿金的标准，延长工作时间的罚款标准，阻止劳动监 察人员行使监督检查权的罚款标准等方面规定不一致，按照同等效力的法律规范新法优于旧\n法执行的原则，应执行劳动部劳部发〔1994〕532号规章。","ex":""},{"no":"95.","t":"95.劳动部《企业最低工资规定》（劳部发〔1993〕333号）与劳动部《违反〈中华人民 共和国劳动法〉行政处罚办法》（劳部发〔1994〕532号）在拖欠或低于国家最低工资标准 支付工资的赔偿金标准方面规定不一致，应按劳动部劳部发〔1994〕532号规章执行。","ex":""},{"no":"96.","t":"96.劳动部《违反〈中华人民共和国劳动法〉行政处罚办法》（劳部发〔1994〕532号） 对行政处罚行为、处罚标准未作规定，而其他劳动行政规章和地方政府规章作了规定的，按 有关规定执行。","ex":""},{"no":"97.","t":"97.对违反劳动法的用人单位，劳动行政部门有权依据劳动法律、法规和规章的规定予以 处理，用人单位对劳动行政部门作出的行政处罚决定不服，在法定期限内不提起诉讼或不申 请复议又不执行行政处罚决定的，劳动行政部门可以根据行政诉讼法第六十六条申请人民法 院强制执行。劳动行政部门依法申请人民法院强制执行时，应当提交申请执行书，据以执行 的法律文书和其他必须提交的材料。","ex":""},{"no":"98.","t":"98.适用法律、法规、规章及其他规范性文件遵循下列原则：\n（1）法律的效力高于行政法规与地方性法规；行政法规与地方性法规效力高于部门规 章和地方政府规章；部门规章和地方政府规章效力高于其他规范性文件。\n（2）在适用同一效力层次的文件时，新法律优于旧法律；新法规优于旧法规；新规章 优于旧规章；新规范性文件优于旧规范性文件。","ex":""},{"no":"99.","t":"99.依据《法规规章备案规定》（国务院令第48号，1990年发布）“地方人民政府规章同 国务院部门规章之间或者国务院部门规章相互之间有矛盾的，由国务院法制局进行协调；经 协调不能取得一致意见的，由国务院法制局提出意见，报国务院决定。”地方劳动行政部门 在发现劳动部规章与国务院其他部门规章或地方政府规章相矛盾时，可将情况报劳动部，由 劳动部报国务院法制局进行协调或决定。","ex":""},{"no":"100.","t":"100.地方或行业劳动部门发现劳动部的规章之间、其他规范性文件之间或规章与其他规 范性文件之间相矛盾， 一般适用“新文件优于旧文件”的原则，同时可向劳动部请示。","ex":""}]}];

    try{ showStatus(editMode ? '编辑模式已开启：点法条上方的颜色按钮即可改色 / 高亮' : '已退出编辑'); }catch(e){}

    h += '<span class="fsep"></span><button class="fclear" data-clear="1">清除</button>';
    h += '<span class="ehint">选中文字改局部 · 直接点改整条</span>';
    return h;
  }

  function makeEditable(){
    document.querySelectorAll('.article').forEach(function(art){
      if(art.dataset.editInjected) return;
      art.dataset.editInjected = '1';
      var textEl = art.querySelector('.art-text');
      if(textEl){
        textEl.classList.add('editable');
        textEl.setAttribute('contenteditable','true');
        textEl.setAttribute('data-art', art.id || '');
      }
      var bar = document.createElement('div');
      bar.className = 'art-editbar';
      bar.setAttribute('data-bar', art.id || '');
      bar.innerHTML = barHTML();
      if(textEl && textEl.parentNode){ textEl.parentNode.insertBefore(bar, textEl); }
    });
  }

  // 防止点击工具条导致法条失焦、选区丢失
  document.addEventListener('mousedown', function(e){ if(e.target.closest('.art-editbar')) e.preventDefault(); });

  function applyColor(artId, c, hl){
    var el = document.querySelector('.art-text[data-art="'+artId+'"]');
    if(!el) return;
    var sel = window.getSelection();
    var inThis = sel && sel.anchorNode && (sel.anchorNode.nodeType===3 ? sel.anchorNode.parentElement : sel.anchorNode).closest('.art-text[data-art="'+artId+'"]');
    if(sel && !sel.isCollapsed && inThis){
      document.execCommand(hl ? 'hiliteColor' : 'foreColor', false, c);   // 局部选区
    } else {
      el.focus();
      var range = document.createRange();
      range.selectNodeContents(el);
      sel.removeAllRanges(); sel.addRange(range);
      document.execCommand(hl ? 'hiliteColor' : 'foreColor', false, c);   // 整条
      sel.removeAllRanges();
    }
    saveArt(artId);
  }
  function clearColor(artId){
    var el = document.querySelector('.art-text[data-art="'+artId+'"]');
    if(!el) return;
    var sel = window.getSelection();
    var inThis = sel && sel.anchorNode && (sel.anchorNode.nodeType===3 ? sel.anchorNode.parentElement : sel.anchorNode).closest('.art-text[data-art="'+artId+'"]');
    if(sel && !sel.isCollapsed && inThis){
      document.execCommand('removeFormat', false, null);
    } else {
      el.focus();
      var range = document.createRange();
      range.selectNodeContents(el);
      sel.removeAllRanges(); sel.addRange(range);
      document.execCommand('removeFormat', false, null);
      sel.removeAllRanges();
    }
    saveArt(artId);
  }

  document.addEventListener('click', function(e){
    if(!editMode) return;
    var bar = e.target.closest('.art-editbar');
    if(!bar) return;
    var artId = bar.getAttribute('data-bar') || '';
    var clearBtn = e.target.closest('[data-clear]');
    if(clearBtn){ clearColor(artId); return; }
    var btn = e.target.closest('[data-c]');
    if(!btn) return;
    applyColor(artId, btn.dataset.c, btn.dataset.hl === '1');
  });

  function saveArt(id){
    var el = document.querySelector('.art-text[data-art="'+id+'"]');
    if(!el) return;
    try{ var s = localStorage.getItem(KEY); var store = s ? JSON.parse(s) : {}; if(!store.artEdit) store.artEdit = {}; store.artEdit[id] = el.innerHTML; localStorage.setItem(KEY, JSON.stringify(store)); }catch(err){}
  }
  function restoreEdits(){
    try{ var s = localStorage.getItem(KEY); if(!s) return; var store = JSON.parse(s); if(!store.artEdit) return;
      Object.keys(store.artEdit).forEach(function(id){ var el = document.querySelector('.art-text[data-art="'+id+'"]'); if(el && store.artEdit[id]) el.innerHTML = store.artEdit[id]; });
    }catch(e){}
  }

  var _ro = new MutationObserver(function(){
    var content = document.getElementById('content');
    if(content && content.children.length > 0){ makeEditable(); restoreEdits(); }
  });
  var mainEl = document.getElementById('content');
  if(mainEl) _ro.observe(mainEl, {childList:true});
  setTimeout(function(){ makeEditable(); restoreEdits(); }, 500);
})();
