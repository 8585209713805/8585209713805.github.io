<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>法规学习笔记（可编辑）</title>
<style>
:root{
  --bg:#eef1f5; --card:#ffffff; --ink:#1f2329; --muted:#7a8290;
  --primary:#1f4e79; --primary-soft:#e8f0f7; --accent:#c0392b;
  --mark:#e6a23c; --note-bg:#fffdf3; --note-bd:#e8d9a8;
  --border:#e1e5ea; --line:#d8dde4; --shadow:0 1px 3px rgba(0,0,0,.06);
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  margin:0; background:var(--bg); color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Segoe UI",sans-serif;
  line-height:1.8; font-size:15px;
}
/* ===== 顶部栏 ===== */
header{
  position:sticky; top:0; z-index:50; background:var(--primary); color:#fff;
  box-shadow:0 2px 8px rgba(0,0,0,.15);
}
.head-inner{max-width:1180px; margin:0 auto; padding:10px 18px; display:flex; align-items:center; gap:14px; flex-wrap:wrap;}
.field-badge{display:inline-block; margin-left:4px; padding:2px 11px; font-size:12px; font-weight:600; color:#fff; background:var(--primary); border-radius:20px; vertical-align:middle; letter-spacing:.5px;}
.head-inner h1{font-size:16px; margin:0; font-weight:600; letter-spacing:.5px; flex:1 1 260px;}
.head-inner h1 small{display:block; font-size:11.5px; font-weight:400; opacity:.8; margin-top:2px;}
.toolbar{display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
.toolbar input[type=search]{
  padding:6px 10px; border:1px solid rgba(255,255,255,.35); border-radius:6px;
  background:rgba(255,255,255,.12); color:#fff; font-size:13px; width:160px; outline:none;
}
.toolbar input[type=search]::placeholder{color:rgba(255,255,255,.7);}
.toolbar button{
  padding:6px 12px; border:1px solid rgba(255,255,255,.4); border-radius:6px;
  background:rgba(255,255,255,.12); color:#fff; font-size:13px; cursor:pointer; white-space:nowrap;
}
.toolbar button:hover{background:rgba(255,255,255,.25);}
.toolbar button.active{background:var(--mark); border-color:var(--mark); color:#fff;}
.status{font-size:12px; opacity:.85; min-width:80px;}

/* ===== 布局 ===== */
.layout{max-width:1180px; margin:18px auto; padding:0 18px; display:flex; gap:20px; align-items:flex-start;}
nav.toc{
  position:sticky; top:78px; width:200px; flex:0 0 200px;
  background:var(--card); border:1px solid var(--border); border-radius:10px;
  padding:12px 10px; box-shadow:var(--shadow); max-height:calc(100vh - 100px); overflow:auto;
}
nav.toc .toc-title{font-size:12px; color:var(--muted); padding:0 8px 8px; border-bottom:1px solid var(--line); margin-bottom:6px;}
nav.toc a{
  display:block; padding:7px 8px; border-radius:6px; color:var(--ink); text-decoration:none;
  font-size:13.5px; cursor:pointer;
}
nav.toc a:hover{background:var(--primary-soft);}
nav.toc a.active{background:var(--primary); color:#fff; font-weight:500;}
nav.toc a .cnt{float:right; color:var(--muted); font-size:11px;}
nav.toc a.active .cnt{color:rgba(255,255,255,.85);}

main{flex:1; min-width:0;}
.chapter{margin-bottom:26px;}
.chapter > h2{
  font-size:18px; color:var(--primary); border-left:4px solid var(--primary);
  padding-left:12px; margin:0 0 14px; font-weight:700;
}
.article{
  background:var(--card); border:1px solid var(--border); border-radius:10px;
  padding:14px 16px; margin-bottom:12px; box-shadow:var(--shadow); position:relative;
  border-left:3px solid var(--line);
}
.article.marked{border-left-color:var(--mark); background:#fffdf6;}
.art-head{display:flex; align-items:center; gap:10px; margin-bottom:6px;}
.art-no{
  font-weight:700; color:var(--primary); font-size:14.5px; background:var(--primary-soft);
  padding:2px 10px; border-radius:5px;
}
.mark-btn{
  margin-left:auto; border:none; background:none; cursor:pointer; font-size:18px; line-height:1;
  color:var(--mark); padding:0 4px;
}
.mark-btn:hover{transform:scale(1.15);}
.art-text{font-size:15px; color:#2b2f36; text-align:justify; white-space:pre-wrap;}

/* 解读区 */
.explain-label{font-size:12px; color:var(--primary); font-weight:600; margin:11px 0 4px; display:flex; align-items:center; gap:5px;}
.explain{
  font-size:13.5px; color:#3a4250; background:#f6f9fc; border-left:3px solid var(--primary);
  border-radius:0 6px 6px 0; padding:8px 11px; white-space:pre-wrap; outline:none;
}
.explain:focus{background:#eef3fa; box-shadow:0 0 0 3px rgba(31,78,121,.12);}

/* 关联案例 */
.case-label{font-size:12px; color:#9a5b1e; font-weight:600; margin:12px 0 5px; display:flex; align-items:center; gap:5px;}
.case{background:#fbf6ee; border:1px solid #ecdcc0; border-radius:8px; padding:9px 11px; margin-bottom:8px;}
.case-title{font-weight:600; font-size:13.5px; color:#6b4423;}
.case-desc{font-size:13px; color:#5a4a3a; margin-top:3px; white-space:pre-wrap;}
.case-src{font-size:11.5px; color:#a98b5e; margin-top:4px;}

/* 关联法条 */
.rel-label{font-size:12px; color:#1f6fb2; font-weight:600; margin:12px 0 5px; display:flex; align-items:center; gap:5px;}
.rel{background:#eef4fb; border:1px solid #cfe0ef; border-radius:8px; padding:9px 11px; margin-bottom:8px;}
.rel-src{font-weight:600; font-size:13.5px; color:#14507e;}
.rel-text{font-size:13px; color:#34404d; margin-top:4px; white-space:pre-wrap;}

/* 检索按钮 */
.tool-row{margin:10px 0 2px;}
.search-btn{border:1px solid var(--border); background:#f3f7fb; color:var(--primary); border-radius:6px; padding:5px 10px; font-size:12.5px; cursor:pointer;}
.search-btn:hover{background:#e3edf6;}

/* 笔记区 */
.note-label{font-size:12px; color:var(--muted); margin:11px 0 4px; display:flex; align-items:center; gap:5px;}

/* 速查卡 */
.quick{background:linear-gradient(135deg,#f0f6fc,#e8f0f7); border:1px solid #cfe0ef; border-radius:10px; margin-bottom:18px; box-shadow:var(--shadow); overflow:hidden;}
.quick-head{font-weight:700; color:var(--primary); padding:11px 14px; cursor:pointer; user-select:none; font-size:14.5px;}
.quick-body{padding:2px 14px 12px;}
.qg{font-size:13px; color:#34404d; padding:7px 0; border-top:1px dashed #d4e2ee; white-space:pre-wrap;}
.qg:first-child{border-top:none;}
.qg b{color:var(--primary);}

/* 法规简介（发布信息） */
.law-intro{background:linear-gradient(135deg,#f0f6fc,#eef4fb); border:1px solid #cfe0ef; border-radius:10px; margin-bottom:18px; box-shadow:var(--shadow); overflow:hidden;}
.law-intro-head{font-weight:700; color:var(--primary); padding:11px 14px; font-size:14.5px;}
.law-intro-body{padding:2px 14px 12px;}
.law-intro-desc{font-size:13.5px; color:#34404d; line-height:1.8; margin:2px 0 10px;}
.meta-grid{display:grid; grid-template-columns:auto 1fr; gap:6px 14px; align-items:baseline;}
.meta-grid .mk{font-size:13px; color:var(--muted); white-space:nowrap;}
.meta-grid .mv{font-size:13px; color:#2b2f36;}
.meta-grid .mv.ok{color:#1a9e57; font-weight:600;}
.meta-grid .mv.no{color:#c0392b; font-weight:600;}

/* 条文互链 */
.lawlink{color:#1f6fb2; text-decoration:underline; cursor:pointer;}
.lawlink:hover{color:#0d4f86;}

/* 批注分层 */
.notes-wrap{margin-top:2px;}
.note-block{margin-bottom:8px;}
.note-tag{display:inline-block; font-size:11px; font-weight:600; padding:1px 8px; border-radius:4px; margin-bottom:3px;}
.tag-q{background:#fde8e8; color:#c0392b;}      /* 疑问 */
.tag-c{background:#e6f4ea; color:#1e7a46;}      /* 我的案例 */
.tag-s{background:#fef3e0; color:#b9770e;}      /* 要点总结 */
.tag-t{background:#efe7fb; color:#6b3fa0;}      /* 待办 */
.note.sub{background:var(--note-bg); border:1px dashed var(--note-bd); border-radius:7px; padding:7px 10px; min-height:32px; font-size:13.5px; color:#5a4a1a; white-space:pre-wrap; outline:none;}
.note.sub:focus{border-style:solid; border-color:var(--mark); background:#fffce8; box-shadow:0 0 0 3px rgba(230,162,60,.15);}
.note.sub:empty:before{content:attr(data-ph); color:#b9a86a;}

/* 自测模式 */
.reveal-btn{display:none; margin:10px 0 2px; border:1px solid var(--primary); background:var(--primary-soft); color:var(--primary); border-radius:6px; padding:5px 12px; font-size:12.5px; cursor:pointer;}
.reveal-btn:hover{background:#d8e6f5;}
body.self-test .reveal-btn{display:inline-block;}
body.self-test .explain-label,
body.self-test .explain,
body.self-test .case-label,
body.self-test .case,
body.self-test .rel-label,
body.self-test .rel,
body.self-test .tool-row,
body.self-test .note-label,
body.self-test .notes-wrap{display:none;}
.article.revealed .explain-label,
.article.revealed .explain,
.article.revealed .case-label,
.article.revealed .case,
.article.revealed .rel-label,
.article.revealed .rel,
.article.revealed .tool-row,
.article.revealed .note-label,
.article.revealed .notes-wrap{display:block;}
body.self-test .article{opacity:.97;}
body.self-test .article.revealed{border-left-color:var(--primary); background:#fff;}

footer{max-width:1180px; margin:0 auto 30px; padding:14px 18px; color:var(--muted); font-size:12.5px; text-align:center;}

@media (max-width:860px){
  .layout{flex-direction:column;}
  nav.toc{position:static; width:100%; flex:none; max-height:none;}
  .toolbar input[type=search]{width:120px;}
}
@media print{
  header, nav.toc, footer, .tool-row, .quick-head{display:none !important;}
  body{background:#fff;}
  .layout{display:block; margin:0; padding:0;}
  .article{break-inside:avoid; box-shadow:none; border:1px solid #ccc;}
  .explain{background:#f4f6f9;}
  .case{background:#fbf6ee;}
  .mark-btn{display:none;}
  .quick{box-shadow:none; border:1px solid #ccc;}
  body.self-test .reveal-btn{display:none !important;}
  body.self-test .explain, body.self-test .explain-label,
  body.self-test .case, body.self-test .case-label,
  body.self-test .rel, body.self-test .rel-label,
  body.self-test .tool-row, body.self-test .note-label, body.self-test .notes-wrap{display:block !important;}
}
</style>
</head>
<body>
<header>
  <div class="head-inner">
    <h1><span id="lawTitle"></span><small id="lawSub"></small> <span id="lawField" class="field-badge"></span></h1>
    <div class="toolbar">
      <input type="search" id="search" placeholder="搜索条文…" aria-label="搜索">
      <span class="status" id="status">已就绪</span>
      <button id="btnTest" title="自测记忆模式：隐藏解读，点条文下方“显示解读”对照，用于抽背">自测模式</button>
      <button id="btnExport" title="导出为独立HTML文件（含所有笔记、解读与案例）。导出后告诉我“发布批注”即可同步到网站">导出</button>
      <button id="btnPrint" title="打印 / 存为PDF">打印</button>
      <button id="btnClear" title="清空本浏览器内全部笔记与标记">清空</button>
    </div>
  </div>
</header>

<div class="layout">
  <nav class="toc" id="toc">
    <div class="toc-title">目录</div>
  </nav>
  <main id="content"></main>
</div>

<footer>
  本笔记为个人学习用途，条文以官方公布文本为准。案例来源于司法部/最高法等公开发布的典型/指导案例。笔记与解读自动保存在本浏览器，导出可脱离浏览器长期留存。
</footer>

<script>
/* ============ 用户定制区（调用技能时替换为目标法规） ============ */
const LAW_TITLE = "工伤保险条例";
const LAW_SUB   = "2003.4.27 公布 · 2010.12.20 修订 · 2011.1.1 修订后施行 · 速查/解读/分层笔记/案例/互链/自测";
const LAW_KEY   = "jx63";
const LAW_FIELD = "社会保障";

/* 法规简介 */
const LAW_INTRO = "规范工伤认定、劳动能力鉴定、工伤保险待遇与监督管理的行政法规，是工伤职工获得医疗救治、经济补偿和职业康复的核心依据。";
const LAW_META = {"issuer":"国务院","published":"2003年4月27日","effective":"2004年1月1日（修订后2011年1月1日施行）","revised":"2010年12月20日修订","valid":"有效","level":"行政法规"};

/* 重点速查卡 */
const QUICK = [{"b":"第十四条 认定工伤七情形","t":"工作时间+场所+原因受伤；前后从事预备/收尾性工作受伤；履职受暴力等意外伤害；患职业病；因工外出受伤或下落不明；上下班途中非本人主要责任交通/轨道/轮渡/火车事故；其他法定情形。"},{"b":"第十五条 视同工伤三情形","t":"工作岗位突发疾病48小时内死亡；抢险救灾等维护国家利益、公共利益受伤；退役军人旧伤复发（享除一次性伤残补助金外待遇）。注意48小时起算点为突发疾病之时。"},{"b":"第十六条 不得认定排除项","t":"即便符合前两条，若存在故意犯罪、醉酒或者吸毒、自残或者自杀，一律不得认定或视同工伤。单位主张排除须承担相应证据。"},{"b":"第十七条 申请时限与主体","t":"单位应自事故/确诊职业病之日起30日内申请；单位不申请的，职工、近亲属或工会可在1年内直接申请。单位逾期申请期间待遇费用由单位负担。"},{"b":"第二十二条 伤残等级划分","t":"劳动功能障碍分十级（一级最重、十级最轻）；生活自理障碍分三级（完全/大部分/部分不能自理）。系确定伤残待遇档次的依据。"},{"b":"第三十条 工伤医疗待遇","t":"在协议医疗机构就医，目录内费用由基金支付；住院伙食补助、统筹区外就医交通食宿费由基金支付；非工伤疾病按基本医疗保险处理；康复费合规由基金支付。"},{"b":"第三十三条 停工留薪期","t":"暂停工作接受工伤医疗期间原工资福利待遇不变，由单位按月支付；一般不超12个月，可延长不超12个月；生活不能自理者护理由单位负责。"},{"b":"第三十五至三十七条 伤残待遇","t":"一至四级保留关系退出岗位（一次性补助金+按月津贴，单位不得解除）；五至六级保留关系，难安排则单位发津贴，职工本人可提解除领『两金』；七至十级合同终止/解除领『两金』。"},{"b":"第三十九条 工亡三笔待遇","t":"丧葬补助金（6个月统筹区月均工资）；供养亲属抚恤金（配偶40%/其他30%，孤寡老人或孤儿加10%，总额不超死者生前工资）；一次性工亡补助金（上年度全国城镇居民人均可支配收入20倍）。"},{"b":"第六十四条 本人工资与封顶保底","t":"本人工资指伤前12个月平均月缴费工资；高于统筹区平均工资300%按300%算，低于60%按60%算。一次性伤残补助金、伤残津贴等以此封顶保底计。"},{"b":"第六十二条 未参保单位全赔","t":"应参保未参保单位职工工伤，由单位按条例待遇项目和标准支付费用；欠缴自欠缴日起按日加收万分之五滞纳金，逾期未缴处欠缴额1至3倍罚款。"},{"b":"第三十一条 复议诉讼不停止支付","t":"认定决定后发生行政复议、行政诉讼的，期间不停止支付工伤职工治疗工伤的医疗费用，保障职工及时救治，单位不得借复议诉讼暂缓支付。"}];

/* 案例库 */
const CASES = {"c1":{"t":"张海超『开胸验肺』职业病维权案","d":"张海超为河南新密市振东耐磨材料有限公司破碎工，2007年起出现尘肺症状。多家医院怀疑尘肺，但唯一定点诊断机构起初未予确诊，公司亦不配合。2009年6月，张海超以开胸验肺的极端方式自证患病，经媒体曝光引发全国关注。后经国家级专家组诊断为尘肺病Ⅲ期，被认定为职业病及工伤并获得赔偿。该案直接推动了职业病诊断与鉴定制度的改进。","s":"新华社、中央电视台等媒体报道（2009）；《职业病防治法》2011年修订强化劳动者诊断权利的典型背景案例。"},"c2":{"t":"孙立兴诉天津新技术产业园区劳动局工伤认定行政案（最高人民法院指导案例40号）","d":"孙立兴系天津某公司销售部员工。2003年6月，公司派其赴北京机场接人，返回天津途中经单位允许回宿舍取私人衣物，在楼下被车撞伤。天津园区劳动局以非上下班必经路线为由不予认定工伤。孙立兴诉至法院，天津一中院判决撤销该决定。裁判要点：因工外出期间包括受单位指派外出办事；上下班途中指职工在合理时间内往返于工作地与住所地、经常居住地、单位宿舍及配偶、父母、子女居住地之间的合理路线。本案拓宽了工作原因与上下班途中的合理认定。","s":"最高人民法院指导案例40号（2014年12月25日发布）。"},"c3":{"t":"建筑违法转包、分包担责案（用工单位承担工伤保险责任）","d":"某建筑公司将工程违法分包、转包给不具备用工主体资格的自然人（包工头），包工头雇用的农民工在工地施工中受伤。包工头无力赔偿，受伤农民工申请工伤认定。根据相关规定，用工单位违反法律、法规将承包业务转包给不具备用工主体资格的组织或自然人，该组织、自然人聘用的职工从事承包业务时因工伤亡的，由具备用工主体资格的用工单位承担工伤保险责任（不以存在劳动关系为前提）。法院判令总包单位承担工伤赔偿责任。","s":"最高人民法院《关于审理工伤保险行政案件若干问题的规定》（法释〔2014〕9号）第三条及相关典型案例。"},"c4":{"t":"非自身原因超期申请仍予受理案","d":"职工发生工伤后，因用人单位拖延、不签劳动合同、隐瞒事故，或遇疫情封控、人身自由受限、对劳动关系申请仲裁或提起民事诉讼等客观原因，超过1年申请时限。根据规定，不属于职工或者其近亲属自身原因耽误的时间，不计算在工伤认定申请期限内。法院支持社保行政部门对因此超期的申请仍予受理并作出认定，保障劳动者救济权利。","s":"最高人民法院《关于审理工伤保险行政案件若干问题的规定》（法释〔2014〕9号）第七条。"}};

const REL = {"r1":{"src":"《中华人民共和国社会保险法》","art":"第三十六条","t":"职工因工作原因受到事故伤害或者患职业病，且经工伤认定的，享受工伤保险待遇；其中，经劳动能力鉴定丧失劳动能力的，享受伤残待遇。"},"r2":{"src":"《中华人民共和国社会保险法》","art":"第四十一条","t":"职工所在用人单位未依法缴纳工伤保险费，发生工伤事故的，由用人单位支付工伤保险待遇。用人单位不支付的，从工伤保险基金中先行支付。从工伤保险基金中先行支付的工伤保险待遇应当由用人单位偿还。用人单位不偿还的，社会保险经办机构可以依照本法第六十三条的规定追偿。"},"r3":{"src":"《中华人民共和国社会保险法》","art":"第四十二条","t":"由于第三人的原因造成工伤，第三人不支付工伤医疗费用或者无法确定第三人的，由工伤保险基金先行支付。工伤保险基金先行支付后，有权向第三人追偿。"},"r4":{"src":"《中华人民共和国社会保险法》","art":"第三十三条","t":"职工应当参加工伤保险，由用人单位缴纳工伤保险费，职工不缴纳工伤保险费。"},"r5":{"src":"《工伤认定办法》","art":"第四条、第五条","t":"第四条 职工发生事故伤害或者按照职业病防治法规定被诊断、鉴定为职业病，所在单位应当自事故伤害发生之日或者被诊断、鉴定为职业病之日起30日内，向统筹地区社会保险行政部门提出工伤认定申请。遇有特殊情况，经报社会保险行政部门同意，申请时限可以适当延长。\n第五条 用人单位未在规定的时限内提出工伤认定申请的，受伤害职工或者其近亲属、工会组织在事故伤害发生之日或者被诊断、鉴定为职业病之日起1年内，可以直接按照本办法第四条规定提出工伤认定申请。"},"r6":{"src":"《中华人民共和国劳动法》","art":"第七十三条","t":"劳动者在下列情形下，依法享受社会保险待遇：（一）退休；（二）患病、负伤；（三）因工伤残或者患职业病；（四）失业；（五）生育。劳动者死亡后，其遗属依法享受遗属津贴。劳动者享受社会保险待遇的条件和标准由法律、法规规定。劳动者享受的社会保险金必须按时足额支付。"},"r7":{"src":"《中华人民共和国社会保险法》","art":"第三十八条","t":"因工伤发生的下列费用，按照国家规定从工伤保险基金中支付：（一）治疗工伤的医疗费用和康复费用；（二）住院伙食补助费；（三）到统筹地区以外就医的交通食宿费；（四）安装配置伤残辅助器具所需费用；（五）生活不能自理的，经劳动能力鉴定委员会确认的生活护理费；（六）一次性伤残补助金和一至四级伤残职工按月领取的伤残津贴；（七）终止或者解除劳动合同时，应当享受的一次性医疗补助金；（八）因工死亡的，其遗属领取的丧葬补助金、供养亲属抚恤金和因工死亡补助金；（九）劳动能力鉴定费。"},"r8":{"src":"《中华人民共和国社会保险法》","art":"第三十九条","t":"因工伤发生的下列费用，按照国家规定由用人单位支付：（一）治疗工伤期间的工资福利；（二）五级、六级伤残职工按月领取的伤残津贴；（三）终止或者解除劳动合同时，应当享受的一次性伤残就业补助金。"},"r9":{"src":"《中华人民共和国社会保险法》","art":"第四十三条","t":"工伤职工有下列情形之一的，停止享受工伤保险待遇：（一）丧失享受待遇条件的；（二）拒不接受劳动能力鉴定的；（三）拒绝治疗的。"},"r10":{"src":"《最高人民法院关于审理工伤保险行政案件若干问题的规定》","art":"第六条","t":"对社会保险行政部门认定下列情形为上下班途中的，人民法院应予支持：（一）在合理时间内往返于工作地与住所地、经常居住地、单位宿舍的合理路线的上下班途中；（二）在合理时间内往返于工作地与配偶、父母、子女居住地的合理路线的上下班途中；（三）从事属于日常工作生活所需要的活动，且在合理时间和合理路线的上下班途中；（四）在合理时间内其他合理路线的上下班途中。"}};

const DATA = [{"ch":"全文","items":[{"no":"","t":"中华人民共和国国务院令第586号\n《国务院关于修改〈工伤保险条例〉的决定》已经2010年12月8日国务院第136次常务会议通过，现予公布，自2011年1月1日起施行。\n国务院总理  温家宝\n2010年12月20日","ex":"这是《工伤保险条例》经2010年12月8日国务院第136次常务会议修改后，由国务院总理温家宝签署公布的施行令（国务院令第586号），自2011年1月1日起施行。本条仅为公布信息，说明该条例的生效时间与法律效力来源，本身不规定具体权利义务。实务上，处理2011年1月1日之后的工伤事项，应适用本修订后的条例。"}]},{"ch":"第一章 总 则","items":[{"no":"第一条","t":"第一条 为了保障因工作遭受事故伤害或者患职业病的职工获得医疗救治和经济补偿， 促进工伤预防和职业康复，分散用人单位的工伤风险，制定本条例。","ex":"本条阐明立法目的：保障因工作受伤或患职业病的职工获得医疗救治与经济补偿，促进工伤预防和职业康复，并分散用人单位的工伤风险。对劳动者而言，这意味着受伤后有权依法获得救治与补偿；对用人单位而言，参加工伤保险是把工伤赔偿风险转由社会共济分担，而非由企业独自承担。注意，条例保护的是『因工作』受伤或患职业病，与 work 无关的伤病不在此列。"},{"no":"第二条","t":"第二条 中华人民共和国境内的企业、事业单位、社会团体、民办非企业单位、基金会、律师事务所、会计师事务所等组织和有雇工的个体工商户（以下称用人单位）应当依照本条例规定参加工伤保险，为本单位全部职工或者雇工（以下称职工）缴纳工伤保险费。\n中华人民共和国境内的企业、事业单位、社会团体、民办非企业单位、基金会、律师事务所、会计师事务所等组织的职工和个体工商户的雇工，均有依照本条例的规定享受工伤保险待遇的权利。","ex":"本条明确参保义务和享受待遇的权利。用人单位范围很广：境内的企业、事业单位、社会团体、民办非企业单位、基金会、律所、会计师事务所等组织，以及有雇工的个体工商户，都必须为本单位全部职工或雇工缴纳工伤保险费。反过来，这些单位的职工和个体工商户的雇工，都有权享受工伤保险待遇。实务提示：实习生、兼职人员等只要存在劳动关系（含事实劳动关系），原则上都应在保障范围内；HR 应做到『应保尽保』，避免漏保产生自行赔付风险。"},{"no":"第三条","t":"第三条  工伤保险费的征缴按照《社会保险费征缴暂行条例》关于基本养老保险费、 基本医疗保险费、失业保险费的征缴规定执行。","ex":"工伤保险费的征缴，参照《社会保险费征缴暂行条例》中关于养老、医疗、失业保险费的征缴规定执行。也就是说，工伤保险费的申报、核定、征收、追缴等程序，与基本养老保险等保费征缴适用同一套规则，由社保征缴机构统一实施。用人单位应按征缴程序如实申报缴费基数和人数。"},{"no":"第四条","t":"第四条 用人单位应当将参加工伤保险的有关情况在本单位内公示。\n用人单位和职工应当遵守有关安全生产和职业病防治的法律法规，执行安全卫生规程和标准，预防工伤事故发生，避免和减少职业病危害。\n职工发生工伤时，用人单位应当采取措施使工伤职工得到及时救治。","ex":"本条对用人单位和职工各设义务。用人单位须：将参保情况在单位内公示（保障职工知情权）；遵守安全生产和职业病防治法规、执行安全规程，预防事故和职业病危害；职工发生工伤时，立即采取措施使职工得到及时救治。对劳动者而言，单位不公示、不急救都是违规；对 HR 而言，落实『公示』和『先救治』是法定责任，延误救治可能扩大单位责任。"},{"no":"第五条","t":"第五条  国务院社会保险行政部门负责全国的工伤保险工作。\n县级以上地方各级人民政府社会保险行政部门负责本行政区域内的工伤保险工作。\n社会保险行政部门按照国务院有关规定设立的社会保险经办机构（以下称经办机构）具体承办工伤保险事务。","ex":"本条划分工伤保险的主管部门与经办机构。全国层面由国务院社会保险行政部门（现人社部）负责；县级以上地方由同级社会保险行政部门（现人社局）负责；具体承办事务由社保行政部门设立的『经办机构』（即社保经办机构）负责。劳动者申请工伤认定、待遇核定，找的是属地人社行政部门及经办机构，而非用人单位自行决定。"},{"no":"第六条","t":"第六条 社会保险行政部门等部门制定工伤保险的政策、标准，应当征求工会组织、用人单位代表的意见。","ex":"制定工伤保险政策和标准时，社保行政部门等应当征求工会组织、用人单位代表的意见。这是程序性要求，体现多方协商。对劳动者和工会而言，这意味着在政策形成阶段有参与和监督渠道；对用人单位而言，政策标准并非单方决定，可借代表渠道反映实际困难。"}]},{"ch":"第二章 工伤保险基金","items":[{"no":"第七条","t":"第七条 工伤保险基金由用人单位缴纳的工伤保险费、工伤保险基金的利息和依法纳入工伤保险基金的其他资金构成。","ex":"工伤保险基金由三部分构成：用人单位缴纳的工伤保险费、基金利息，以及依法纳入的其他资金。简单说，基金主要来自单位缴费，职工个人不掏钱（见第十条）。基金的『盘子』决定了待遇支付能力，因此费率与征缴是否充分直接影响职工待遇落实。"},{"no":"第八条","t":"第八条  工伤保险费根据以支定收、收支平衡的原则，确定费率。\n国家根据不同行业的工伤风险程度确定行业的差别费率，并根据工伤保险费使用、工伤发生率等情况在每个行业内确定若干费率档次。行业差别费率及行业内费率档次由国务院社会保险行政部门制定，报国务院批准后公布施行。\n统筹地区经办机构根据用人单位工伤保险费使用、工伤发生率等情况，适用所属行业内相应的费率档次确定单位缴费费率。","ex":"工伤保险费率实行『以支定收、收支平衡』原则，并实行行业差别费率与行业内费率档次。国家按行业工伤风险程度定差别费率，再在行业内分若干档次；具体由国务院社保行政部门制定报国务院批准公布。统筹地区经办机构则根据用人单位的工伤费使用、工伤发生率等情况，在其所属行业费率档次内确定该单位的实际缴费费率。实务提示：工伤少的单位费率可下浮，工伤多的单位费率上浮，这就是『浮动费率』的激励约束机制，倒逼企业做好安全生产。"},{"no":"第九条","t":"第九条  国务院社会保险行政部门应当定期了解全国各统筹地区工伤保险基金收支情况，及时提出调整行业差别费率及行业内费率档次的方案，报国务院批准后公布施行。","ex":"国务院社保行政部门应定期了解全国各统筹地区基金收支情况，及时提出调整行业差别费率及行业内费率档次的方案，报国务院批准后公布。这是对第八条费率制度的动态维护机制，使费率随风险变化及时调整，保证基金可持续。"},{"no":"第十条","t":"第十条 用人单位应当按时缴纳工伤保险费。职工个人不缴纳工伤保险费。\n用人单位缴纳工伤保险费的数额为本单位职工工资总额乘以单位缴费费率之积。\n对难以按照工资总额缴纳工伤保险费的行业，其缴纳工伤保险费的具体方式，由国务院社会保险行政部门规定。","ex":"用人单位须按时缴纳工伤保险费，职工个人不缴费。缴费数额＝本单位职工工资总额×单位缴费费率。对难以按工资总额缴费的行业（如建筑、餐饮等流动性大的行业），具体缴费方式由国务院社保行政部门另行规定（实践中常按项目、定额等方式参保）。HR 注意：按时、足额缴费是法定义务；逾期欠缴会产生滞纳金（见第六十二条）。"},{"no":"第十一条","t":"第十一条 工伤保险基金逐步实行省级统筹。\n跨地区、生产流动性较大的行业，可以采取相对集中的方式异地参加统筹地区的工伤保险。具体办法由国务院社会保险行政部门会同有关行业的主管部门制定。","ex":"工伤保险基金逐步实行省级统筹，提升共济能力。对跨地区、生产流动性较大的行业（如铁路、建筑等），可采取相对集中的方式异地参加统筹地区工伤保险，具体办法由人社部会同行业主管部门制定。实务上，建筑企业常按工程项目在属地参保，即源于此条精神。"},{"no":"第十二条","t":"第十二条 工伤保险基金存入社会保障基金财政专户，用于本条例规定的工伤保险待 遇，劳动能力鉴定，工伤预防的宣传、培训等费用，以及法律、法规规定的用于工伤保险的其他费用的支付。\n工伤预防费用的提取比例、使用和管理的具体办法，由国务院社会保险行政部门会同 国务院财政、卫生行政、安全生产监督管理等部门规定。\n任何单位或者个人不得将工伤保险基金用于投资运营、兴建或者改建办公场所、发放奖金，或者挪作其他用途。","ex":"工伤保险基金须存入社会保障基金财政专户，专款专用，仅用于：工伤保险待遇、劳动能力鉴定、工伤预防宣传与培训等法定费用。工伤预防费用的提取比例和使用办法由人社部会同财政、卫生、安监等部门规定。严禁将基金用于投资运营、兴建或改建办公场所、发放奖金或挪作他用。任何挪用都属违法（见第五十六条追责）。对职工而言，这是基金安全的制度保障。"},{"no":"第十三条","t":"第十三条 工伤保险基金应当留有一定比例的储备金，用于统筹地区重大事故的工伤保险待遇支付；储备金不足支付的，由统筹地区的人民政府垫付。储备金占基金总额的具 体比例和储备金的使用办法，由省、自治区、直辖市人民政府规定。","ex":"基金应留有一定比例的储备金，用于统筹地区重大事故的待遇支付；储备金不足的，由统筹地区政府垫付。储备金的具体比例和使用办法由省级政府规定。这一条是应对重大工伤事故（如群体性伤亡）的兜底机制，确保极端情形下待遇仍能支付。"}]},{"ch":"第三章  工伤认定","items":[{"no":"第十四条","t":"第十四条 职工有下列情形之一的，应当认定为工伤：\n（一）在工作时间和工作场所内，因工作原因受到事故伤害的；\n（二）工作时间前后在工作场所内，从事与工作有关的预备性或者收尾性工作受到事故伤害的；\n（三）在工作时间和工作场所内，因履行工作职责受到暴力等意外伤害的；\n（四）患职业病的；\n（五）因工外出期间，由于工作原因受到伤害或者发生事故下落不明的；\n（六）在上下班途中，受到非本人主要责任的交通事故或者城市轨道交通、客运轮渡、 火车事故伤害的；\n（七）法律、行政法规规定应当认定为工伤的其他情形。","ex":"本条是工伤认定的核心——『应当认定为工伤』的七种情形。重点掌握：（一）三要素『工作时间＋工作场所＋工作原因』，最典型；（二）工作前后在场所内做预备性或收尾性工作受伤，也算；（三）在工作时间场所内因履行职责受暴力等意外伤害；（四）患职业病；（五）因工外出期间因工作受伤或下落不明；（六）上下班途中受非本人主要责任的交通事故或轨道、轮渡、火车事故伤害——注意必须是『非本人主要责任』且有『上下班途中』合理路线；（七）法律法规规定的其他情形。实务提示：保存好事故证据、路线证据、责任认定，是认定成功的关键。","cases":["c1","c2"],"rel":["r1","r7","r10"]},{"no":"第十五条","t":"第十五条 职工有下列情形之一的，视同工伤：\n（一）在工作时间和工作岗位，突发疾病死亡或者在48小时之内经抢救无效死亡的；\n（二）在抢险救灾等维护国家利益、公共利益活动中受到伤害的；\n（三）职工原在军队服役，因战、因公负伤致残，已取得革命伤残军人证，到用人单位后旧伤复发的。\n职工有前款第（一）项、第（二）项情形的，按照本条例的有关规定享受工伤保险待遇；职工有前款第（三）项情形的，按照本条例的有关规定享受除一次性伤残补助金以外的工伤保险待遇。","ex":"本条是『视同工伤』，即虽不完全符合第十四条，但依法按工伤对待的三种情形：（一）工作时间和岗位突发疾病死亡，或在48小时之内经抢救无效死亡（俗称『过劳死』条款，注意48小时起算点为『突发疾病』之时）；（二）抢险救灾等维护国家利益、公共利益活动中受伤；（三）原在军队因战因公致残、已取得革命伤残军人证，到单位后旧伤复发。其中第（一）（二）项按工伤享受待遇；第（三）项享受除一次性伤残补助金以外的待遇。常见误区：突发疾病超过48小时死亡的，一般不能认定视同工伤。","rel":["r1"]},{"no":"第十六条","t":"第十六条  职工符合本条例第十四条、 第十五条的规定，但是有下列情形之一的，不得认定为工伤或者视同工伤：\n（一）故意犯罪的；\n（二）醉酒或者吸毒的；\n（三）自残或者自杀的。","ex":"本条是工伤认定的『排除情形』。即使符合第十四、十五条，只要存在以下情形之一，就不得认定或视同工伤：（一）故意犯罪；（二）醉酒或者吸毒；（三）自残或者自杀。实务提示：单位若主张排除，需承担相应证据。职工因正常工作争执未达故意犯罪程度的，一般不影响认定。"},{"no":"第十七条","t":"第十七条  职工发生事故伤害或者按照职业病防治法规定被诊断、鉴定为职业病，所在单位应当自事故伤害发生之日或者被诊断、鉴定为职业病之日起30日内，向统筹地区社会保险行政部门提出工伤认定申请。遇有特殊情况，经报社会保险行政部门同意，申请时限可以适当延长。\n用人单位未按前款规定提出工伤认定申请的，工伤职工或者其近亲属、工会组织在事故伤害发生之日或者被诊断、鉴定为职业病之日起1年内，可以直接向用人单位所在地统筹地区社会保险行政部门提出工伤认定申请。\n按照本条第一款规定应当由省级社会保险行政部门进行工伤认定的事项，根据属地原则由用人单位所在地的设区的市级社会保险行政部门办理。\n用人单位未在本条第一款规定的时限内提交工伤认定申请，在此期间发生符合本条例规定的工伤待遇等有关费用由该用人单位负担。","ex":"本条是申请工伤认定的时限与主体，极为关键。单位申请：自事故伤害发生或被诊断、鉴定为职业病之日起30日内，向统筹地区社保行政部门提出申请；特殊情况经同意可延长。单位未申请的，工伤职工、近亲属或工会组织可在1年内直接申请。注意：单位未在30日内提交申请期间发生的符合规定的工伤待遇等费用，由该单位自行负担——这是督促单位及时申报的『惩罚性』规定。省级部门认定事项按属地原则由设区的市级部门办理。实务提示：劳动者别死等单位的30日，临近期满即可自行申请，别错过1年大限。","cases":["c4"],"rel":["r5"]},{"no":"第十八条","t":"第十八条 提出工伤认定申请应当提交下列材料：\n（一）工伤认定申请表；\n（二）与用人单位存在劳动关系（包括事实劳动关系）的证明材料；\n（三）医疗诊断证明或者职业病诊断证明书（或者职业病诊断鉴书）。\n工伤认定申请表应当包括事故发生的时间、地点、原因以及职工伤害程度等基本情况。\n工伤认定申请人提供材料不完整的，社会保险行政部门应当一次性书面告知工伤认定申请人需要补正的全部材料。申请人按照书面告知要求补正材料后，社会保险行政部门应当受理。","ex":"申请工伤认定需提交三类材料：工伤认定申请表；与用人单位存在劳动关系（含事实劳动关系）的证明；医疗诊断证明或职业病诊断证明书（鉴定书）。申请表应包含事故发生时间、地点、原因及伤害程度等基本情况。材料不完整时，社保行政部门应一次性书面告知需补正全部材料；补正后应予受理。实务提示：劳动关系证明缺失（如没签合同）是常见卡点，可先凭工资条、考勤、工牌、同事证言等证明事实劳动关系。"},{"no":"第十九条","t":"第十九条  社会保险行政部门受理工伤认定申请后，根据审核需要可以对事故伤害进行调查核实，用人单位、职工、工会组织、医疗机构以及有关部门应当予以协助。职业病 诊断和诊断争议的鉴定，依照职业病防治法的有关规定执行。对依法取得职业病诊断证明 书或者职业病诊断鉴定书的，社会保险行政部门不再进行调查核实。\n职工或者其近亲属认为是工伤，用人单位不认为是工伤的，由用人单位承担举证责任。","ex":"社保行政部门受理后可调查核实事故伤害，相关单位和个人应予协助。职业病诊断和争议鉴定按《职业病防治法》执行；已取得职业病诊断证明书或鉴定书的，社保行政部门不再调查核实。关键规则：职工或近亲属认为是工伤、用人单位不认为是工伤的，由用人单位承担举证责任。这被称为『举证责任倒置』，对劳动者极为有利——单位若拿不出非工伤证据，往往要承担不利后果。"},{"no":"第二十条","t":"第二十条 社会保险行政部门应当自受理工伤认定申请之日起60日内作出工伤认定的决定，并书面通知申请工伤认定的职工或者其近亲属和该职工所在单位。\n社会保险行政部门对受理的事实清楚、权利义务明确的工伤认定申请，应当在15日内作出工伤认定的决定。\n作出工伤认定决定需要以司法机关或者有关行政主管部门的结论为依据的，在司法机关或者有关行政主管部门尚未作出结论期间，作出工伤认定决定的时限中止。\n社会保险行政部门工作人员与工伤认定申请人有利害关系的，应当回避。","ex":"工伤认定决定时限：一般自受理之日起60日内作出，书面通知申请人和单位；事实清楚、权利义务明确的，15日内作出。若需以司法或行政主管部门结论为依据，在结论作出前时限中止（不算超期）。工作人员与申请人有利害关系的应回避。实务提示：认定结论是后续享受待遇的前提，对结论不服可依法复议或诉讼（见第五十五条）。"}]},{"ch":"第四章 劳动能力鉴定","items":[{"no":"第二十一条","t":"第二十一条 职工发生工伤，经治疗伤情相对稳定后存在残疾、影响劳动能力的，应当进行劳动能力鉴定。","ex":"职工发生工伤，经治疗伤情相对稳定后仍存在残疾、影响劳动能力的，应当进行劳动能力鉴定。也就是说，鉴定针对的是『有残疾、影响劳动能力』的情形，不是所有工伤都要鉴定；伤情轻微不影响劳动能力的，可不鉴定而直接按医疗待遇处理。"},{"no":"第二十二条","t":"第二十二条 劳动能力鉴定是指劳动功能障碍程度和生活自理障碍程度的等级鉴定。 劳动功能障碍分为十个伤残等级，最重的为一级，最轻的为十级。\n生活自理障碍分为三个等级：生活完全不能自理、生活大部分不能自理和生活部分不能自理。\n劳动能力鉴定标准由国务院社会保险行政部门会同国务院卫生行政部门等部门制定。","ex":"劳动能力鉴定是对劳动功能障碍程度和生活自理障碍程度的等级鉴定。劳动功能障碍分十个伤残等级，一级最重、十级最轻；生活自理障碍分三级：完全不能自理、大部分不能自理、部分不能自理。鉴定标准由人社部会同卫生行政部门等制定（即国家统一标准）。这是确定伤残待遇档次的依据。"},{"no":"第二十三条","t":"第二十三条  劳动能力鉴定由用人单位、工伤职工或者其近亲属向设区的市级劳动能力鉴定委员会提出申请，并提供工伤认定决定和职工工伤医疗的有关资料。","ex":"劳动能力鉴定由谁申请、向谁申请：用人单位、工伤职工或其近亲属，向设区的市级劳动能力鉴定委员会提出申请，并提交工伤认定决定和工伤医疗有关资料。实务提示：职工个人也能单独申请，不必等单位同意。"},{"no":"第二十四条","t":"第二十四条 省、自治区、直辖市劳动能力鉴定委员会和设区的市级劳动能力鉴定委员会分别由省、自治区、直辖市和设区的市级社会保险行政部门、卫生行政部门、工会组织、经办机构代表以及用人单位代表组成。\n劳动能力鉴定委员会建立医疗卫生专家库。列入专家库的医疗卫生专业技术人员应当具备下列条件：\n（一）具有医疗卫生高级专业技术职务任职资格；\n（二）掌握劳动能力鉴定的相关知识；\n（三）具有良好的职业品德。","ex":"劳动能力鉴定委员会由社保行政部门、卫生行政部门、工会组织、经办机构代表和用人单位代表组成；并建立医疗卫生专家库。入库专家须具备：医疗卫生高级专业技术职务任职资格；掌握鉴定相关知识；良好职业品德。这体现鉴定的专业性与多方参与，减少单方操纵空间。"},{"no":"第二十五条","t":"第二十五条  设区的市级劳动能力鉴定委员会收到劳动能力鉴定申请后，应当从其建立的医疗卫生专家库中随机抽取3名或者5名相关专家组成专家组，由专家组提出鉴定意\n见。设区的市级劳动能力鉴定委员会根据专家组的鉴定意见作出工伤职工劳动能力鉴定结 论；必要时，可以委托具备资格的医疗机构协助进行有关的诊断。\n设区的市级劳动能力鉴定委员会应当自收到劳动能力鉴定申请之日起60日内作出劳动能力鉴定结论，必要时，作出劳动能力鉴定结论的期限可以延长30日。劳动能力鉴定结论 应当及时送达申请鉴定的单位和个人。","ex":"市级鉴定委员会从专家库随机抽取3名或5名专家组成专家组提出意见，再据此作出鉴定结论；必要时可委托有资质的医疗机构协助诊断。时限：自收到申请之日起60日内作出结论，必要时可延长30日。结论应及时送达申请单位和个人。实务提示：60+30日的时限与工伤认定类似，是职工可预期的节点。"},{"no":"第二十六条","t":"第二十六条 申请鉴定的单位或者个人对设区的市级劳动能力鉴定委员会作出的鉴定 结论不服的，可以在收到该鉴定结论之日起15日内向省、自治区、直辖市劳动能力鉴定委员会提出再次鉴定申请。省、自治区、直辖市劳动能力鉴定委员会作出的劳动能力鉴定结 论为最终结论。","ex":"对市级鉴定结论不服的，可在收到结论之日起15日内向省级鉴定委员会申请再次鉴定；省级结论为最终结论（即『一裁终局』性质，不能再申请更高鉴定）。实务提示：对初次结论不满意务必在15日内提再次鉴定，逾期将丧失救济机会。"},{"no":"第二十七条","t":"第二十七条  劳动能力鉴定工作应当客观、公正。劳动能力鉴定委员会组成人员或者参加鉴定的专家与当事人有利害关系的，应当回避。","ex":"劳动能力鉴定应客观、公正。鉴定委员会组成人员或参加鉴定的专家与当事人有利害关系的，应当回避。这是保证鉴定结论公信力的程序保障，当事人可申请回避。"},{"no":"第二十八条","t":"第二十八条  自劳动能力鉴定结论作出之日起1年后，工伤职工或者其近亲属、所在单位或者经办机构认为伤残情况发生变化的，可以申请劳动能力复查鉴定。","ex":"自鉴定结论作出之日起1年后，工伤职工、近亲属、所在单位或经办机构认为伤残情况发生变化的，可以申请劳动能力复查鉴定。实务提示：伤情恶化（如旧伤加重）可借此调高等级、提高待遇；这体现了动态保障。"},{"no":"第二十九条","t":"第二十九条  劳动能力鉴定委员会依照本条例第二十六条和第二十八条的规定进行再次鉴定和复查鉴定的期限，依照本条例第二十五条第二款的规定执行。","ex":"再次鉴定（第二十六条）和复查鉴定（第二十八条）的期限，均按第二十五条第二款执行，即自收到申请之日起60日内作出，必要时延长30日。本条规定了两类鉴定的时限准用规则。"}]},{"ch":"第五章 工伤保险待遇","items":[{"no":"第三十条","t":"第三十条 职工因工作遭受事故伤害或者患职业病进行治疗，享受工伤医疗待遇。\n职工治疗工伤应当在签订服务协议的医疗机构就医，情况紧急时可以先到就近的医疗机构急救。\n治疗工伤所需费用符合工伤保险诊疗项目目录、工伤保险药品目录、工伤保险住院服务标准的，从工伤保险基金支付。工伤保险诊疗项目目录、工伤保险药品目录、工伤保险 住院服务标准，由国务院社会保险行政部门会同国务院卫生行政部门、食品药品监督管理 部门等部门规定。\n职工住院治疗工伤的伙食补助费，以及经医疗机构出具证明，报经办机构同意，工伤职工到统筹地区以外就医所需的交通、食宿费用从工伤保险基金支付，基金支付的具体标准由统筹地区人民政府规定。\n工伤职工治疗非工伤引发的疾病，不享受工伤医疗待遇，按照基本医疗保险办法处理。\n工伤职工到签订服务协议的医疗机构进行工伤康复的费用，符合规定的，从工伤保险基金支付。","ex":"本条是工伤医疗待遇的总纲。工伤治疗享受工伤医疗待遇；应在签订服务协议的医疗机构就医，情况紧急可先就近急救。治疗费用符合工伤保险诊疗项目目录、药品目录、住院服务标准的，由基金支付（目录外费用一般自理或由单位承担，依地方规定）。住院伙食补助费，及经证明并报经办机构同意到统筹地区外就医的交通、食宿费，由基金支付，具体标准由统筹地区政府定。治疗非工伤引发的疾病不享工伤医疗待遇，按基本医疗保险处理。工伤康复费用符合规定的由基金支付。实务提示：目录内用药、协议医院就医，直接影响报销比例。","rel":["r7"]},{"no":"第三十一条","t":"第三十一条 社会保险行政部门作出认定为工伤的决定后发生行政复议、行政诉讼的，行政复议和行政诉讼期间不停止支付工伤职工治疗工伤的医疗费用。","ex":"社保行政部门作出工伤认定决定后，若发生行政复议、行政诉讼，复议和诉讼期间不停止支付工伤职工治疗工伤的医疗费用。这是为保障职工能及时得到救治，不因单位提起复议或诉讼而断药断医。对单位而言，提起复议诉讼不能成为暂缓支付医疗费的理由。"},{"no":"第三十二条","t":"第三十二条  工伤职工因日常生活或者就业需要，经劳动能力鉴定委员会确认，可以安装假肢、矫形器、假眼、假牙和配置轮椅等辅助器具，所需费用按照国家规定的标准从 工伤保险基金支付。","ex":"工伤职工因日常生活或就业需要，经劳动能力鉴定委员会确认，可安装假肢、矫形器、假眼、假牙和配置轮椅等辅助器具，费用按国家规定标准从基金支付。实务提示：须经鉴定委员会确认并到协议机构配置，否则可能自费。"},{"no":"第三十三条","t":"第三十三条  职工因工作遭受事故伤害或者患职业病需要暂停工作接受工伤医疗的， 在停工留薪期内，原工资福利待遇不变，由所在单位按月支付。\n停工留薪期一般不超过12个月。伤情严重或者情况特殊，经设区的市级劳动能力鉴定委员会确认，可以适当延长，但延长不得超过12个月。工伤职工评定伤残等级后，停发原待 遇，按照本章的有关规定享受伤残待遇。工伤职工在停工留薪期满后仍需治疗的，继续享 受工伤医疗待遇。\n生活不能自理的工伤职工在停工留薪期需要护理的，由所在单位负责。","ex":"停工留薪期：职工因工伤需暂停工作接受医疗的，在停工留薪期内原工资福利待遇不变，由单位按月支付。期限一般不超12个月；伤情严重或特殊，经市级鉴定委员会确认可延长，但延长不超12个月。评定伤残等级后停发原待遇，改享伤残待遇；期满仍需治疗的，继续享工伤医疗待遇。生活不能自理的工伤职工在停工留薪期需要护理的，由单位负责。实务提示：『原工资福利待遇不变』是劳动者核心权益，单位降低工资属违法；护理责任也由单位承担。","rel":["r8"]},{"no":"第三十四条","t":"第三十四条  工伤职工已经评定伤残等级并经劳动能力鉴定委员会确认需要生活护理的，从工伤保险基金按月支付生活护理费。\n生活护理费按照生活完全不能自理、生活大部分不能自理或者生活部分不能自理3个不同等级支付，其标准分别为统筹地区上年度职工月平均工资的50%、40%或者30%。","ex":"工伤职工已评定伤残等级且经确认需要生活护理的，从基金按月支付生活护理费。按三级分档：完全不能自理按统筹地区上年度职工月平均工资50%，大部分不能自理40%，部分不能自理30%。注意与停工留薪期护理区分：停工留薪期内护理由单位负责（第三十三条），评定伤残且确认需护理后改由基金按月支付护理费。"},{"no":"第三十五条","t":"第三十五条  职工因工致残被鉴定为一级至四级伤残的，保留劳动关系，退出工作岗位，享受以下待遇：\n（一）从工伤保险基金按伤残等级支付一次性伤残补助金，标准为： 一级伤残为27个月的本人工资，二级伤残为25个月的本人工资，三级伤残为23个月的本人工资，四级伤残为 21个月的本人工资；\n（二）从工伤保险基金按月支付伤残津贴，标准为： 一级伤残为本人工资的90%，二 级伤残为本人工资的85%，三级伤残为本人工资的80%，四级伤残为本人工资的75%。伤残津贴实际金额低于当地最低工资标准的，由工伤保险基金补足差额；\n（三）工伤职工达到退休年龄并办理退休手续后，停发伤残津贴，按照国家有关规定享受基本养老保险待遇。基本养老保险待遇低于伤残津贴的，由工伤保险基金补足差额。\n职工因工致残被鉴定为一级至四级伤残的，由用人单位和职工个人以伤残津贴为基数，缴纳基本医疗保险费。","ex":"一级至四级伤残（最重）待遇：保留劳动关系、退出工作岗位，享三项待遇——（一）一次性伤残补助金（基金支付）：一级27个月、二级25、三级23、四级21个月的本人工资；（二）按月伤残津贴（基金支付）：一级90%、二级85%、三级80%、四级75%本人工资，低于当地最低工资由基金补足差额；（三）达退休年龄办退休后，停发伤残津贴，改享基本养老保险待遇，若基本养老低于伤残津贴由基金补足差额。此外，一至四级职工的医保费以伤残津贴为基数，由单位和职工个人缴纳。实务提示：一到四级是『保留关系、退出岗位』，单位不得解除劳动关系。","rel":["r7","r8"]},{"no":"第三十六条","t":"第三十六条  职工因工致残被鉴定为五级、六级伤残的，享受以下待遇：\n（一）从工伤保险基金按伤残等级支付一次性伤残补助金，标准为：五级伤残为18个月的本人工资，六级伤残为16个月的本人工资；\n（二）保留与用人单位的劳动关系，由用人单位安排适当工作。难以安排工作的，由用人单位按月发给伤残津贴，标准为：五级伤残为本人工资的70%，六级伤残为本人工资 的60%，并由用人单位按照规定为其缴纳应缴纳的各项社会保险费。伤残津贴实际金额低 于当地最低工资标准的，由用人单位补足差额。\n经工伤职工本人提出，该职工可以与用人单位解除或者终止劳动关系，由工伤保险基金支付一次性工伤医疗补助金，由用人单位支付一次性伤残就业补助金。一次性工伤医疗补助金和一次性伤残就业补助金的具体标准由省、自治区、直辖市人民政府规定。","ex":"五级、六级伤残待遇：一次性伤残补助金（基金支付）：五级18个月、六级16个月本人工资。保留与单位劳动关系，由单位安排适当工作；难以安排工作的，由单位按月发伤残津贴：五级70%、六级60%本人工资，并由单位缴各项社保费，低于当地最低工资由单位补足差额。经工伤职工本人提出，可与单位解除或终止劳动关系，此时由基金支付一次性工伤医疗补助金、由单位支付一次性伤残就业补助金，具体标准由省级政府规定。实务提示：五、六级的解除主动权在职工本人，单位不能主动辞退；但职工选择解除后将拿一次性『两金』了结。"},{"no":"第三十七条","t":"第三十七条 职工因工致残被鉴定为七级至十级伤残的，享受以下待遇：\n（一）从工伤保险基金按伤残等级支付一次性伤残补助金，标准为；七级伤残为13个月的本人工资，八级伤残为11个月的本人工资，九级伤残为9个月的本人工资，十级伤残为7个月的本人工资；\n（二）劳动、聘用合同期满终止，或者职工本人提出解除劳动、聘用合同的，由工伤保险基金支付一次性工伤医疗补助金，由用人单位支付一次性伤残就业补助金。一次性工伤医疗补助金和一次性伤残就业补助金的具体标准由省、自治区、直辖市人民政府规定。","ex":"七级至十级伤残（较轻）待遇：一次性伤残补助金（基金支付）：七级13个月、八级11、九级9、十级7个月本人工资。劳动、聘用合同期满终止，或职工本人提出解除合同的，由基金支付一次性工伤医疗补助金、由单位支付一次性伤残就业补助金，具体标准由省级政府规定。实务提示：七至十级一般合同期满或职工提出解除才触发『两金』；合同正常到期单位不续签也会产生医疗和就业补助金，HR 要预算这笔成本。"},{"no":"第三十八条","t":"第三十八条  工伤职工工伤复发，确认需要治疗的，享受本条例第三十条、第三十二条和第三十三条规定的工伤待遇。","ex":"工伤复发、确认需要治疗的，享受第三十条（医疗待遇）、第三十二条（辅助器具）、第三十三条（停工留薪期）规定的待遇。也就是说，旧伤复发经确认后仍按工伤处理，不是『一次性了结』就不管了。"},{"no":"第三十九条","t":"第三十九条  职工因工死亡，其近亲属按照下列规定从工伤保险基金领取丧葬补助金、供养亲属抚恤金和一次性工亡补助金：\n（一）丧葬补助金为6个月的统筹地区上年度职工月平均工资；\n（二）供养亲属抚恤金按照职工本人工资的一定比例发给由因工死亡职工生前提供主 要生活来源、无劳动能力的亲属。标准为：配偶每月40%，其他亲属每人每月30%，孤寡老人或者孤儿每人每月在上述标准的基础上增加10%。核定的各供养亲属的抚恤金之和不 应高于因工死亡职工生前的工资。供养亲属的具体范围由国务院社会保险行政部门规定；\n（三）一次性工亡补助金标准为上一年度全国城镇居民人均可支配收入的20倍。\n伤残职工在停工留薪期内因工伤导致死亡的，其近亲属享受本条第一款规定的待遇。\n一级至四级伤残职工在停工留薪期满后死亡的，其近亲属可以享受本条第一款第 （ 一 ）项、第（二）项规定的待遇。","ex":"职工因工死亡，近亲属从基金领取三笔：（一）丧葬补助金＝6个月统筹地区上年度职工月平均工资；（二）供养亲属抚恤金：按本人工资比例发给由死者生前提供主要生活来源、无劳动能力的亲属——配偶每月40%，其他亲属每人每月30%，孤寡老人或孤儿在此基础上每月再加10%；各亲属抚恤金之和不应高于死者生前工资；亲属范围由人社部规定；（三）一次性工亡补助金＝上一年度全国城镇居民人均可支配收入的20倍（现行标准较高，是重要补偿）。特别规则：伤残职工在停工留薪期内因工伤死亡的，近亲属享全部三项待遇；一级至四级伤残职工在停工留薪期满后死亡的，近亲属仅享（一）丧葬补助金和（二）抚恤金，不享一次性工亡补助金。实务提示：工亡补助金的『全国城镇居民人均可支配收入20倍』是法定全国标准，逐年随统计数据提高。","rel":["r7"]},{"no":"第四十条","t":"第四十条 伤残津贴、供养亲属抚恤金、生活护理费由统筹地区社会保险行政部门根据职工平均工资和生活费用变化等情况适时调整。调整办法由省、自治区、直辖市人民政 府规定。","ex":"伤残津贴、供养亲属抚恤金、生活护理费，由统筹地区社保行政部门根据职工平均工资和生活费用变化等情况适时调整，调整办法由省级政府规定。这是对长期待遇的『动态增长』机制，避免多年不变的待遇被通胀侵蚀。"},{"no":"第四十一条","t":"第四十一条  职工因工外出期间发生事故或者在抢险救灾中下落不明的，从事故发生当月起3个月内照发工资，从第4个月起停发工资，由工伤保险基金向其供养亲属按月支付供 养亲属抚恤金。生活有困难的，可以预支一次性工亡补助金的50%。职工被人民法院宣告死 亡的，按照本条例第三十九条职工因工死亡的规定处理。","ex":"职工因工外出期间发生事故或抢险救灾中下落不明的：从事故发生当月起3个月内照发工资，第4个月起停发工资，由基金向供养亲属按月支付抚恤金；生活困难的，可预支一次性工亡补助金的50%。被法院宣告死亡的，按第三十九条工亡规定处理。实务提示：下落不明≠死亡，待遇是分阶段过渡的，宣告死亡后才完全按工亡执行。"},{"no":"第四十二条","t":"第四十二条  工伤职工有下列情形之一的，停止享受工伤保险待遇：\n（ 一 ）丧失享受待遇条件的；\n（二）拒不接受劳动能力鉴定的；\n（三）拒绝治疗的。","ex":"工伤职工有下列情形之一，停止享受工伤保险待遇：（一）丧失享受待遇条件的；（二）拒不接受劳动能力鉴定的；（三）拒绝治疗的。实务提示：这三条是待遇『暂停阀』，核心是防止骗保和消极治疗；但单位不得据此随意停发确有需要的待遇。"},{"no":"第四十三条","t":"第四十三条 用人单位分立、合并、转让的，承继单位应当承担原用人单位的工伤保险责任；原用人单位已经参加工伤保险的，承继单位应当到当地经办机构办理工伤保险变更登记。\n用人单位实行承包经营的，工伤保险责任由职工劳动关系所在单位承担。\n职工被借调期间受到工伤事故伤害的，由原用人单位承担工伤保险责任，但原用人单位与借调单位可以约定补偿办法。\n企业破产的，在破产清算时依法拨付应当由单位支付的工伤保险待遇费用。","ex":"单位变动时的责任承继：分立、合并、转让的，承继单位承担原单位工伤保险责任，并办理变更登记；承包经营的，由职工劳动关系所在单位担责；职工被借调期间受工伤的，由原单位担责（原单位与借调单位可约定补偿）；企业破产的，破产清算时依法拨付应由单位支付的工伤保险待遇费用。实务提示：单位换壳、承包、借调、破产都不能让职工『没人管』，法律明确了责任主体。"},{"no":"第四十四条","t":"第四十四条 职工被派遣出境工作，依据前往国家或者地区的法律应当参加当地工伤保险的，参加当地工伤保险，其国内工伤保险关系中止；不能参加当地工伤保险的，其国内工伤保险关系不中止。","ex":"职工被派遣出境工作：若前往国家或地区法律要求参加当地工伤保险的，参加当地保险，国内工伤保险关系中止；不能参加当地工伤保险的，国内关系不中止。实务提示：外派员工若当地无工伤保险，回国后仍可按国内条例主张权益，单位外派前应评估风险。"},{"no":"第四十五条","t":"第四十五条  职工再次发生工伤，根据规定应当享受伤残津贴的，按照新认定的伤残等级享受伤残津贴待遇。","ex":"职工再次发生工伤，按规定应享伤残津贴的，按新认定的伤残等级享受伤残津贴待遇。即再次工伤按新的等级重新计算，而非与旧伤简单叠加；若新伤构成津贴等级，则按新等级发津贴。"}]},{"ch":"第六章 监督管理","items":[{"no":"第四十六条","t":"第四十六条  经办机构具体承办工伤保险事务，履行下列职责：\n（一）根据省、自治区、直辖市人民政府规定，征收工伤保险费；\n（二）核查用人单位的工资总额和职工人数，办理工伤保险登记，并负责保存用人单位缴费和职工享受工伤保险待遇情况的记录；\n（三）进行工伤保险的调查、统计；\n（四）按照规定管理工伤保险基金的支出；\n（五）按照规定核定工伤保险待遇；\n（六）为工伤职工或者其近亲属免费提供咨询服务。","ex":"经办机构（社保经办机构）的具体职责：按省级政府规定征收工伤保险费；核查工资总额和职工人数、办理登记、保存缴费和待遇记录；调查统计；管理基金支出；核定工伤保险待遇；免费为工伤职工或近亲属提供咨询。实务提示：职工对待遇有疑问，可找经办机构咨询和申请核定，这是其法定服务义务。"},{"no":"第四十七条","t":"第四十七条 经办机构与医疗机构、 辅助器具配置机构在平等协商的基础上签订服务 协议，并公布签订服务协议的医疗机构、辅助器具配置机构的名单。具体办法由国务院社会保险行政部门分别会同国务院卫生行政部门、民政部门等部门制定。","ex":"经办机构与医疗机构、辅助器具配置机构平等协商签订服务协议，并公布协议机构名单。具体办法由人社部会同卫生、民政等部门制定。这就是『协议医疗机构』制度的来源，工伤就医通常须到协议机构（紧急可就近急救）。"},{"no":"第四十八条","t":"第四十八条  经办机构按照协议和国家有关目录、标准对工伤职工医疗费用、康复费用、辅助器具费用的使用情况进行核查，并按时足额结算费用。","ex":"经办机构按协议和国家目录、标准，对工伤职工的医疗、康复、辅助器具费用使用情况进行核查，并按时足额结算费用。实务提示：费用须符合目录标准，经办机构核查后会结算；不合理或目录外费用可能不予支付。"},{"no":"第四十九条","t":"第四十九条  经办机构应当定期公布工伤保险基金的收支情况，及时向社会保险行政部门提出调整费率的建议。","ex":"经办机构应定期公布基金收支情况，并及时向社保行政部门提出调整费率的建议。这是基金透明运行和费率动态调整的一环。"},{"no":"第五十条","t":"第五十条  社会保险行政部门、经办机构应当定期听取工伤职工、医疗机构、辅助器具配置机构以及社会各界对改进工伤保险工作的意见。","ex":"社保行政部门、经办机构应定期听取工伤职工、医疗机构、辅助器具配置机构及社会各界对改进工伤保险工作的意见。这是吸纳反馈、改进服务的制度渠道。"},{"no":"第五十一条","t":"第五十一条  社会保险行政部门依法对工伤保险费的征缴和工伤保险基金的支付情况进行监督检查。\n财政部门和审计机关依法对工伤保险基金的收支、管理情况进行监督。","ex":"监督检查分工：社保行政部门依法监督检查工伤保险费征缴和基金支付情况；财政部门和审计机关依法对基金收支、管理情况进行监督。多部门监督共同守护基金安全。"},{"no":"第五十二条","t":"第五十二条  任何组织和个人对有关工伤保险的违法行为，有权举报。社会保险行政部门对举报应当及时调查，按照规定处理，并为举报人保密。","ex":"任何组织和个人对工伤保险违法行为有权举报；社保行政部门应及时调查、按规定处理，并为举报人保密。实务提示：发现单位未参保、骗保、挪用基金等，职工和公众可举报，且举报人受保密保护。"},{"no":"第五十三条","t":"第五十三条  工会组织依法维护工伤职工的合法权益，对用人单位的工伤保险工作实行监督。","ex":"工会组织依法维护工伤职工合法权益，对用人单位的工伤保险工作实行监督。实务提示：职工在工伤认定、待遇争议中可寻求工会支持，工会是法定维权主体。"},{"no":"第五十四条","t":"第五十四条  职工与用人单位发生工伤待遇方面的争议，按照处理劳动争议的有关规定处理。","ex":"职工与用人单位发生工伤待遇方面的争议，按处理劳动争议的有关规定处理（即协商、调解、仲裁、诉讼的劳动争议程序）。实务提示：待遇争议先走劳动仲裁，对仲裁不服的再起诉；注意仲裁时效。"},{"no":"第五十五条","t":"第五十五条  有下列情形之一的，有关单位或者个人可以依法申请行政复议，也可以依法向人民法院提起行政诉讼：\n（一）申请工伤认定的职工或者其近亲属、该职工所在单位对工伤认定申请不予受理的决定不服的；\n（二）申请工伤认定的职工或者其近亲属、该职工所在单位对工伤认定结论不服的；\n（三）用人单位对经办机构确定的单位缴费费率不服的；\n（四）签订服务协议的医疗机构、辅助器具配置机构认为经办机构未履行有关协议或者规定的；\n（五）工伤职工或者其近亲属对经办机构核定的工伤保险待遇有异议的。","ex":"对下列情形，有关单位或个人可申请行政复议，也可提起行政诉讼：（一）对工伤认定申请不予受理决定不服；（二）对工伤认定结论不服；（三）用人单位对经办机构确定的单位缴费费率不服；（四）协议医疗机构、辅助器具配置机构认为经办机构未履约；（五）工伤职工或近亲属对经办机构核定的待遇有异议。实务提示：不服认定结论、待遇核定，要及时在法定期限内复议或诉讼，否则结论将生效。"}]},{"ch":"第七章 法律责任","items":[{"no":"第五十六条","t":"第五十六条  单位或者个人违反本条例第十二条规定挪用工伤保险基金，构成犯罪的，依法追究刑事责任；尚不构成犯罪的，依法给予处分或者纪律处分。被挪用的基金由 社会保险行政部门追回，并入工伤保险基金；没收的违法所得依法上缴国库。","ex":"单位或个人挪用工伤保险基金，构成犯罪的依法追究刑事责任；尚不构成犯罪的，依法给予处分或纪律处分；被挪用基金由社保行政部门追回并入基金，没收的违法所得上缴国库。本条对应第十二条专款专用的禁挪要求，是基金安全的刚性约束。"},{"no":"第五十七条","t":"第五十七条  社会保险行政部门工作人员有下列情形之一的，依法给予处分；情节严 重，构成犯罪的，依法追究刑事责任：\n（一）无正当理由不受理工伤认定申请，或者弄虚作假将不符合工伤条件的人员认定为工伤职工的；\n（二）未妥善保管申请工伤认定的证据材料，致使有关证据灭失的；\n（三）收受当事人财物的。","ex":"社保行政部门工作人员有下列情形，依法给予处分；情节严重构成犯罪的追刑责：（一）无正当理由不受理工伤认定申请，或弄虚作假把不符合条件者认定为工伤；（二）未妥善保管证据致其灭失；（三）收受当事人财物。实务提示：行政部门不作为或徇私，工作人员要担责，职工可举报或申诉。"},{"no":"第五十八条","t":"第五十八条 经办机构有下列行为之一的，由社会保险行政部门责令改正，对直接负责的主管人员和其他责任人员依法给予纪律处分；情节严重，构成犯罪的，依法追究刑事责任；造成当事人经济损失的，由经办机构依法承担赔偿责任：\n（一）未按规定保存用人单位缴费和职工享受工伤保险待遇情况记录的；\n（二）不按规定核定工伤保险待遇的；\n（三）收受当事人财物的。","ex":"经办机构有下列情形，由社保行政部门责令改正，对主管人员和其他直接责任人员给予纪律处分；情节严重构成犯罪的追刑责；造成当事人经济损失的，由经办机构依法赔偿：（一）未按规定保存缴费和待遇记录；（二）不按规定核定待遇；（三）收受当事人财物。注意本条明确经办机构过错致损失的，要承担赔偿责任。"},{"no":"第五十九条","t":"第五十九条  医疗机构、辅助器具配置机构不按服务协议提供服务的，经办机构可以解除服务协议。\n经办机构不按时足额结算费用的，由社会保险行政部门责令改正；医疗机构、辅助器具配置机构可以解除服务协议。","ex":"医疗机构、辅助器具配置机构不按服务协议提供服务的，经办机构可解除协议。经办机构不按时足额结算费用的，由社保行政部门责令改正；医疗机构、配置机构也可解除协议。本条规范协议双方的双向违约责任。"},{"no":"第六十条","t":"第六十条  用人单位、工伤职工或者其近亲属骗取工伤保险待遇，医疗机构、 辅助器具配置机构骗取工伤保险基金支出的，由社会保险行政部门责令退还，处骗取金额2倍以上5倍以下的罚款；情节严重，构成犯罪的，依法追究刑事责任。","ex":"用人单位、工伤职工或近亲属骗取工伤保险待遇，或医疗机构、配置机构骗取基金支出的，由社保行政部门责令退还，并处骗取金额2倍以上5倍以下罚款；情节严重构成犯罪的追刑责。实务提示：『挂床住院』『虚构工伤』『冒领待遇』都属骗保，风险极高，切勿触碰。"},{"no":"第六十一条","t":"第六十一条 从事劳动能力鉴定的组织或者个人有下列情形之一的，由社会保险行政部门责令改正，处2000元以上1万元以下的罚款；情节严重，构成犯罪的，依法追究刑事责任：\n（一）提供虚假鉴定意见的；\n（二）提供虚假诊断证明的；\n（三）收受当事人财物的。","ex":"从事劳动能力鉴定的组织或个人有下列情形，由社保行政部门责令改正，处2000元以上1万元以下罚款；情节严重构成犯罪的追刑责：（一）提供虚假鉴定意见；（二）提供虚假诊断证明；（三）收受当事人财物。实务提示：鉴定造假要受罚，当事人如遇鉴定不公可举报。"},{"no":"第六十二条","t":"第六十二条 用人单位依照本条例规定应当参加工伤保险而未参加的，由社会保险行政部门责令限期参加，补缴应当缴纳的工伤保险费，并自欠缴之日起，按日加收万分之五的滞纳金；逾期仍不缴纳的，处欠缴数额1倍以上3倍以下的罚款。\n依照本条例规定应当参加工伤保险而未参加工伤保险的用人单位职工发生工伤的，由该用人单位按照本条例规定的工伤保险待遇项目和标准支付费用。\n用人单位参加工伤保险并补缴应当缴纳的工伤保险费、滞纳金后，由工伤保险基金和用人单位依照本条例的规定支付新发生的费用。","ex":"本条是未参保单位的重责。应参保而未参保的，由社保行政部门责令限期参加、补缴保费，并自欠缴之日起按日加收万分之五滞纳金；逾期仍不缴的，处欠缴数额1倍以上3倍以下罚款。应参保而未参保单位职工发生工伤的，由该单位按条例规定的待遇项目和标准支付费用（即单位全赔）。单位参保并补缴保费、滞纳金后，由基金和单位按条例支付新发生的费用。实务提示：未参保不是『省了钱』，而是把全部工伤赔偿风险揽到自己身上；即便事后补缴，补缴前的工伤待遇仍由单位自掏。","cases":["c3"],"rel":["r2"]},{"no":"第六十三条","t":"第六十三条 用人单位违反本条例第十九条的规定，拒不协助社会保险行政部门对事故进行调查核实的，由社会保险行政部门责令改正，处2000元以上2万元以下的罚款。","ex":"用人单位违反第十九条，拒不协助社保行政部门调查核实事故的，由社保行政部门责令改正，处2000元以上2万元以下罚款。实务提示：职工认为是工伤、单位不认时，单位本就负举证责任（第十九条）；拒不协助调查还会另受罚款。"}]},{"ch":"第八章 附 则","items":[{"no":"第六十四条","t":"第六十四条 本条例所称工资总额，是指用人单位直接支付给本单位全部职工的劳动报酬总额。\n本条例所称本人工资，是指工伤职工因工作遭受事故伤害或者患职业病前12个月平均月缴费工资。本人工资高于统筹地区职工平均工资300%的，按照统筹地区职工平均工资的 300%计算；本人工资低于统筹地区职工平均工资60%的，按照统筹地区职工平均工资的60%计算。","ex":"术语解释。『工资总额』是单位直接支付给本单位全部职工的劳动报酬总额。『本人工资』是工伤职工受伤或患职业病前12个月平均月缴费工资；高于统筹地区职工平均工资300%的，按300%算；低于60%的，按60%算。实务提示：伤残补助金、津贴等均以『本人工资』为基数，且有上下限（即『封顶保底』），并非完全按实际工资无限制计算。"},{"no":"第六十五条","t":"第六十五条 公务员和参照公务员法管理的事业单位、社会团体的工作人员因工作遭受事故伤害或者患职业病的，由所在单位支付费用。具体办法由国务院社会保险行政部门会同国务院财政部门规定。","ex":"公务员和参照公务员法管理的事业单位、社会团体工作人员因工伤或患职业病的，由所在单位支付费用，具体办法由人社部会同财政部规定。也就是说，公务员不参加一般工伤保险基金，而是按专门办法由单位保障。"},{"no":"第六十六条","t":"第六十六条  无营业执照或者未经依法登记、备案的单位以及被依法吊销营业执照或者撤销登记、备案的单位的职工受到事故伤害或者患职业病的，由该单位向伤残职工或者死亡职工的近亲属给予一次性赔偿，赔偿标准不得低于本条例规定的工伤保险待遇；用人 单位不得使用童工，用人单位使用童工造成童工伤残、死亡的，由该单位向童工或者童工\n的近亲属给予一次性赔偿，赔偿标准不得低于本条例规定的工伤保险待遇。具体办法由国务院社会保险行政部门规定。\n前款规定的伤残职工或者死亡职工的近亲属就赔偿数额与单位发生争议的，以及前款规定的童工或者童工的近亲属就赔偿数额与单位发生争议的，按照处理劳动争议的有关规定处理。","ex":"非法用工单位的工伤保障。无营业执照或未经登记备案的单位，以及被吊销、撤销登记备案单位的职工受事故伤害或患职业病的，由该单位向伤残或死亡职工近亲属给予一次性赔偿，标准不低于本条例工伤保险待遇。严禁使用童工；使用童工造成童工伤残、死亡的，由单位向童工或其近亲属给予一次性赔偿，标准不低于本条例待遇。具体办法由人社部规定。前款赔偿数额争议，按劳动争议处理。实务提示：非法用工、用童工出事，单位须一次性赔偿且标准不低于工伤待遇，责任更重，绝非『没关系』。"},{"no":"第六十七条","t":"第六十七条  本条例自2004年1月1日起施行。本条例施行前已受到事故伤害或者患职业病的职工尚未完成工伤认定的，按照本条例的规定执行。","ex":"本条例自2004年1月1日起施行（2010年修订版自2011年1月1日施行，见全文令）。施行前已受事故伤害或患职业病、尚未完成工伤认定的，按本条例规定执行。实务提示：本条保证新旧法衔接，『老人老伤』在未认定完毕时适用新规，保障职工权益不因法改而落空。"}]}];

/* ===== 存储（自动保存 + 导出烘焙）===== */
const KEY = 'statute_note_' + LAW_KEY;
let store = (function(){
  try{ const s = localStorage.getItem(KEY); if(s) return JSON.parse(s); }catch(e){}
  try{ if(typeof INITIAL_STORE !== 'undefined' && INITIAL_STORE) return JSON.parse(JSON.stringify(INITIAL_STORE)); }catch(e){}
  return {notes:{}, marks:{}, explain:{}};
})();
store.notes = store.notes || {};
store.marks = store.marks || {};
store.explain = store.explain || {};
// 迁移旧版字符串笔记 -> 分层结构 {summary}
Object.keys(store.notes).forEach(function(k){
  if(typeof store.notes[k] === 'string'){
    const s = store.notes[k];
    store.notes[k] = s ? {s:s} : {};
  }
});

let saveTimer = null;
function save(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(function(){
    try{ localStorage.setItem(KEY, JSON.stringify(store)); }catch(e){}
    const n = Object.keys(store.notes).reduce(function(acc,k){
      const v = store.notes[k];
      if(typeof v === 'string') return acc + (v ? 1 : 0);
      if(v) return acc + Object.keys(v).filter(function(c){return v[c];}).length;
      return acc;
    }, 0);
    const m = Object.keys(store.marks).filter(function(k){return store.marks[k];}).length;
    const x = Object.keys(store.explain).filter(function(k){return store.explain[k];}).length;
    showStatus('已保存 ' + new Date().toLocaleTimeString() + ' · 笔记'+n+' 标记'+m+' 解读'+x);
  }, 400);
}
function showStatus(s){ document.getElementById('status').textContent = s; }

/* ===== 条文索引（用于互链）===== */
let lawMap = {};
function buildLawMap(){
  lawMap = {}; let g = 0;
  DATA.forEach(function(chap, ci){
    chap.items.forEach(function(art, ai){ g++; lawMap[g] = 'a'+ci+'_'+ai; });
  });
}
function linkLaws(text){
  return text.replace(/第(\d+)条/g, function(m, num){
    const id = lawMap[parseInt(num,10)];
    return id ? '<a href="#'+id+'" class="lawlink">'+m+'</a>' : m;
  });
}
function escapeHtml(s){
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
/* 分层批注区块：疑问/我的案例/要点总结/待办 */
function noteBlock(id, cat, tag, label, ph){
  let val = '';
  if(store.notes[id] && typeof store.notes[id] === 'object') val = store.notes[id][cat] || '';
  return '<div class="note-block"><span class="note-tag '+tag+'">'+label+'</span>' +
    '<div class="note sub" contenteditable="true" data-id="'+id+'" data-cat="'+cat+'" ' +
    'data-ph="'+ph+'">'+escapeHtml(val)+'</div></div>';
}

/* ===== 速查卡（由 QUICK 生成）===== */
function quickHtml(){
  let q = '<div class="quick" id="quick">' +
    '<div class="quick-head" onclick="toggleQuick()">📌 重点速查（点击展开/收起）</div>' +
    '<div class="quick-body" id="quickBody">';
  QUICK.forEach(function(item){
    q += '<div class="qg"><b>'+escapeHtml(item.b)+'</b>：'+escapeHtml(item.t)+'</div>';
  });
  q += '</div></div>';
  return linkLaws(q);
}
function toggleQuick(){
  const b = document.getElementById('quickBody');
  if(b) b.style.display = (b.style.display === 'none') ? '' : 'none';
}

/* ===== 法规简介（发布信息）===== */
function metaHtml(){
  const m = (typeof LAW_META !== 'undefined' && LAW_META) ? LAW_META : null;
  if(!m) return '';
  const intro = (typeof LAW_INTRO !== 'undefined' && LAW_INTRO) ? '<div class="law-intro-desc">'+escapeHtml(LAW_INTRO)+'</div>' : '';
  let validTxt = m.valid; let validCls = 'mv';
  if(m.valid === true){ validTxt = '有效'; validCls = 'mv ok'; }
  else if(m.valid === false){ validTxt = '失效'; validCls = 'mv no'; }
  else if(typeof m.valid === 'string'){ validCls = (m.valid.indexOf('有效') !== -1) ? 'mv ok' : 'mv no'; }
  return '<div class="law-intro" id="lawIntro">' +
    '<div class="law-intro-head">📖 法规简介</div>' +
    '<div class="law-intro-body">' + intro +
      '<div class="meta-grid">' +
        '<span class="mk">发布主体</span><span class="mv">'+escapeHtml(m.issuer||'—')+'</span>' +
        '<span class="mk">发布时间</span><span class="mv">'+escapeHtml(m.published||'—')+'</span>' +
        '<span class="mk">生效时间</span><span class="mv">'+escapeHtml(m.effective||'—')+'</span>' +
        (m.revised ? '<span class="mk">修正时间</span><span class="mv">'+escapeHtml(m.revised)+'</span>' : '') +
        '<span class="mk">是否有效</span><span class="'+validCls+'">'+escapeHtml(validTxt||'—')+'</span>' +
        '<span class="mk">效力等级</span><span class="mv">'+escapeHtml(m.level||'—')+'</span>' +
      '</div>' +
    '</div>' +
  '</div>';
}

/* ===== 渲染 ===== */
function render(){
  buildLawMap();
  const main = document.getElementById('content');
  const toc = document.getElementById('toc');
  let html = metaHtml() + quickHtml();
  let tocHtml = '';
  DATA.forEach(function(chap, ci){
    const cid = 'chap' + ci;
    tocHtml += '<a href="#' + cid + '" data-target="' + cid + '">' + chap.ch +
               '<span class="cnt">' + chap.items.length + '条</span></a>';
    html += '<section class="chapter" id="' + cid + '"><h2>' + chap.ch + '</h2>';
    chap.items.forEach(function(art, ai){
      const id = 'a' + ci + '_' + ai;
      const mk = store.marks[id];
      const exBase = store.explain[id] || art.ex || '';
      const exHtml = linkLaws(escapeHtml(exBase));
      // 关联案例
      let casesHtml = '';
      if(art.cases){
        casesHtml += '<div class="case-label">⚖️ 关联案例</div>';
        art.cases.forEach(function(cidKey){
          const c = CASES[cidKey]; if(!c) return;
          casesHtml += '<div class="case">' +
            '<div class="case-title">'+escapeHtml(c.t)+'</div>' +
            '<div class="case-desc">'+escapeHtml(c.d)+'</div>' +
            '<div class="case-src">来源：'+escapeHtml(c.s)+'</div>' +
          '</div>';
        });
      }
      // 关联法条
      let relHtml = '';
      if(art.rel){
        relHtml += '<div class="rel-label">🔗 关联法条</div>';
        art.rel.forEach(function(rkey){
          const r = (typeof REL !== 'undefined') ? REL[rkey] : null; if(!r) return;
          relHtml += '<div class="rel">' +
            '<div class="rel-src">'+escapeHtml(r.src)+' '+escapeHtml(r.art)+'</div>' +
            '<div class="rel-text">'+escapeHtml(r.t)+'</div>' +
          '</div>';
        });
      }
      html += '<article class="article' + (mk ? ' marked' : '') + '" id="' + id + '">' +
                '<div class="art-head">' +
                  '<span class="art-no">' + art.no + '</span>' +
                  '<button class="mark-btn" data-id="' + id + '" title="标记重点">' + (mk ? '★' : '☆') + '</button>' +
                '</div>' +
                '<div class="art-text">' + escapeHtml(art.t) + '</div>' +
                '<div class="explain-label">💡 条文解读（可补充）</div>' +
                '<div class="explain" contenteditable="true" data-ex="' + id + '">' + exHtml + '</div>' +
                casesHtml +
                relHtml +
                '<div class="tool-row"><button class="search-btn" data-kw="'+escapeHtml(LAW_TITLE+' '+art.no)+'">🔍 在北大法宝检索本条相关案例</button></div>' +
                '<div class="note-label">📝 学习笔记（可分层批注）</div>' +
                '<div class="notes-wrap">' +
                  noteBlock(id,'q','tag-q','疑问','想不通／存疑之处…') +
                  noteBlock(id,'c','tag-c','我的案例','自己办过的或想到的类案…') +
                  noteBlock(id,'s','tag-s','要点总结','提炼核心规则、记忆口诀…') +
                  noteBlock(id,'t','tag-t','待办','待查 / 待办事项…') +
                '</div>' +
                '<button class="reveal-btn" data-rev="' + id + '">显示解读</button>' +
              '</article>';
    });
    html += '</section>';
  });
  main.innerHTML = html;
  toc.insertAdjacentHTML('beforeend', tocHtml);
}

/* ===== 事件 ===== */
document.addEventListener('input', function(e){
  if(e.target.classList.contains('note')){
    const id = e.target.dataset.id;
    const cat = e.target.dataset.cat;
    store.notes[id] = (store.notes[id] && typeof store.notes[id] === 'object') ? store.notes[id] : {};
    store.notes[id][cat] = e.target.innerText;
    save();
  } else if(e.target.classList.contains('explain')){
    const id = e.target.dataset.ex;
    store.explain[id] = e.target.innerText;
    save();
  }
});
document.addEventListener('click', function(e){
  if(e.target.classList.contains('reveal-btn')){
    const art = e.target.closest('.article');
    const rev = art.classList.toggle('revealed');
    e.target.textContent = rev ? '隐藏解读' : '显示解读';
    return;
  }
  if(e.target.classList.contains('mark-btn')){
    const id = e.target.dataset.id;
    const on = !store.marks[id];
    store.marks[id] = on;
    e.target.closest('.article').classList.toggle('marked', on);
    e.target.textContent = on ? '★' : '☆';
    save();
  } else if(e.target.classList.contains('search-btn')){
    const kw = e.target.dataset.kw;
    window.open('https://www.pkulaw.com/search?keyword=' + encodeURIComponent(kw), '_blank');
  }
});

/* 自测记忆模式：隐藏解读/笔记/案例，点“显示解读”对照 */
let selfTest = false;
document.getElementById('btnTest').addEventListener('click', function(){
  selfTest = !selfTest;
  document.body.classList.toggle('self-test', selfTest);
  this.classList.toggle('active', selfTest);
  this.textContent = selfTest ? '退出自测' : '自测模式';
  showStatus(selfTest ? '自测模式：点条文下方“显示解读”对照记忆' : '已退出自测');
});

/* 目录滚动高亮 */
const tocLinks = function(){ return document.querySelectorAll('nav.toc a'); };
const observer = new IntersectionObserver(function(entries){
  entries.forEach(function(en){
    if(en.isIntersecting){
      tocLinks().forEach(function(a){
        a.classList.toggle('active', a.dataset.target === en.target.id);
      });
    }
  });
}, {rootMargin:'-20% 0px -70% 0px'});

/* 搜索过滤 */
document.getElementById('search').addEventListener('input', function(){
  const q = this.value.trim();
  document.querySelectorAll('.article').forEach(function(a){
    a.style.display = (!q || a.textContent.indexOf(q) !== -1) ? '' : 'none';
  });
});

/* 导出：序列化当前页面并把笔记与解读烘焙进 INITIAL_STORE */
document.getElementById('btnExport').addEventListener('click', function(){
  let html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
  html = html.replace(/const INITIAL_STORE = [^;]*;/,
                      'const INITIAL_STORE = ' + JSON.stringify(store) + ';');
  const d = new Date();
  const pad = function(n){return (n<10?'0':'')+n;};
  const fname = LAW_TITLE + '学习笔记_' + d.getFullYear() + pad(d.getMonth()+1) + pad(d.getDate()) + '.html';
  const blob = new Blob([html], {type:'text/html;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = fname; a.click();
  URL.revokeObjectURL(url);
  showStatus('已导出 ' + fname + '（在下载文件夹；想同步到网站，告诉我“发布批注”即可）');
});

document.getElementById('btnPrint').addEventListener('click', function(){ window.print(); });

document.getElementById('btnClear').addEventListener('click', function(){
  if(confirm('确定清空本浏览器内全部学习笔记和标记吗？\n（解读为预置内容、案例为内置数据，不会清空；此操作不可撤销，建议先点“导出”备份）')){
    store = {notes:{}, marks:{}, explain:{}};
    try{ localStorage.removeItem(KEY); }catch(e){}
    render();
    showStatus('已清空');
  }
});

/* ===== 启动 ===== */
document.title = '《' + LAW_TITLE + '》学习笔记（可编辑）';
document.getElementById('lawTitle').textContent = '《' + LAW_TITLE + '》学习笔记';
document.getElementById('lawSub').textContent = LAW_SUB;
document.getElementById('lawField').textContent = LAW_FIELD || '';
render();
DATA.forEach(function(_, ci){ observer.observe(document.getElementById('chap'+ci)); });
showStatus('已就绪');
</script>
