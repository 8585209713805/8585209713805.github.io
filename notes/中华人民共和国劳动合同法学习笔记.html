<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>法规学习笔记（可编辑）</title>
<style>
:root{
  --bg:#eef1f5; --card:#ffffff; --ink:#1f2329; --muted:#7a8290;
  --primary:#1f4e79; --primary-soft:#e8f0f7; --accent:#c0392b;
  --mark:#e6a23c; --note-bg:#fffdf3; --note-bd:#e8d9a8;
  --border:#e1e5ea; --line:#d8dde4; --shadow:0 1px 3px rgba(0,0,0,.06);
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  margin:0; background:var(--bg); color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Segoe UI",sans-serif;
  line-height:1.8; font-size:15px;
}
/* ===== 顶部栏 ===== */
header{
  position:sticky; top:0; z-index:50; background:var(--primary); color:#fff;
  box-shadow:0 2px 8px rgba(0,0,0,.15);
}
.head-inner{max-width:1180px; margin:0 auto; padding:10px 18px; display:flex; align-items:center; gap:14px; flex-wrap:wrap;}
.field-badge{display:inline-block; margin-left:4px; padding:2px 11px; font-size:12px; font-weight:600; color:#fff; background:var(--primary); border-radius:20px; vertical-align:middle; letter-spacing:.5px;}
.head-inner h1{font-size:16px; margin:0; font-weight:600; letter-spacing:.5px; flex:1 1 260px;}
.head-inner h1 small{display:block; font-size:11.5px; font-weight:400; opacity:.8; margin-top:2px;}
.toolbar{display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
.toolbar input[type=search]{
  padding:6px 10px; border:1px solid rgba(255,255,255,.35); border-radius:6px;
  background:rgba(255,255,255,.12); color:#fff; font-size:13px; width:160px; outline:none;
}
.toolbar input[type=search]::placeholder{color:rgba(255,255,255,.7);}
.toolbar button{
  padding:6px 12px; border:1px solid rgba(255,255,255,.4); border-radius:6px;
  background:rgba(255,255,255,.12); color:#fff; font-size:13px; cursor:pointer; white-space:nowrap;
}
.toolbar button:hover{background:rgba(255,255,255,.25);}
.toolbar button.active{background:var(--mark); border-color:var(--mark); color:#fff;}
.status{font-size:12px; opacity:.85; min-width:80px;}

/* ===== 布局 ===== */
.layout{max-width:1180px; margin:18px auto; padding:0 18px; display:flex; gap:20px; align-items:flex-start;}
nav.toc{
  position:sticky; top:78px; width:200px; flex:0 0 200px;
  background:var(--card); border:1px solid var(--border); border-radius:10px;
  padding:12px 10px; box-shadow:var(--shadow); max-height:calc(100vh - 100px); overflow:auto;
}
nav.toc .toc-title{font-size:12px; color:var(--muted); padding:0 8px 8px; border-bottom:1px solid var(--line); margin-bottom:6px;}
nav.toc a{
  display:block; padding:7px 8px; border-radius:6px; color:var(--ink); text-decoration:none;
  font-size:13.5px; cursor:pointer;
}
nav.toc a:hover{background:var(--primary-soft);}
nav.toc a.active{background:var(--primary); color:#fff; font-weight:500;}
nav.toc a .cnt{float:right; color:var(--muted); font-size:11px;}
nav.toc a.active .cnt{color:rgba(255,255,255,.85);}

main{flex:1; min-width:0;}
.chapter{margin-bottom:26px;}
.chapter > h2{
  font-size:18px; color:var(--primary); border-left:4px solid var(--primary);
  padding-left:12px; margin:0 0 14px; font-weight:700;
}
.article{
  background:var(--card); border:1px solid var(--border); border-radius:10px;
  padding:14px 16px; margin-bottom:12px; box-shadow:var(--shadow); position:relative;
  border-left:3px solid var(--line);
}
.article.marked{border-left-color:var(--mark); background:#fffdf6;}
.art-head{display:flex; align-items:center; gap:10px; margin-bottom:6px;}
.art-no{
  font-weight:700; color:var(--primary); font-size:14.5px; background:var(--primary-soft);
  padding:2px 10px; border-radius:5px;
}
.mark-btn{
  margin-left:auto; border:none; background:none; cursor:pointer; font-size:18px; line-height:1;
  color:var(--mark); padding:0 4px;
}
.mark-btn:hover{transform:scale(1.15);}
.art-text{font-size:15px; color:#2b2f36; text-align:justify; white-space:pre-wrap;}

/* 解读区 */
.explain-label{font-size:12px; color:var(--primary); font-weight:600; margin:11px 0 4px; display:flex; align-items:center; gap:5px;}
.explain{
  font-size:13.5px; color:#3a4250; background:#f6f9fc; border-left:3px solid var(--primary);
  border-radius:0 6px 6px 0; padding:8px 11px; white-space:pre-wrap; outline:none;
}
.explain:focus{background:#eef3fa; box-shadow:0 0 0 3px rgba(31,78,121,.12);}

/* 关联案例 */
.case-label{font-size:12px; color:#9a5b1e; font-weight:600; margin:12px 0 5px; display:flex; align-items:center; gap:5px;}
.case{background:#fbf6ee; border:1px solid #ecdcc0; border-radius:8px; padding:9px 11px; margin-bottom:8px;}
.case-title{font-weight:600; font-size:13.5px; color:#6b4423;}
.case-desc{font-size:13px; color:#5a4a3a; margin-top:3px; white-space:pre-wrap;}
.case-src{font-size:11.5px; color:#a98b5e; margin-top:4px;}

/* 关联法条 */
.rel-label{font-size:12px; color:#1f6fb2; font-weight:600; margin:12px 0 5px; display:flex; align-items:center; gap:5px;}
.rel{background:#eef4fb; border:1px solid #cfe0ef; border-radius:8px; padding:9px 11px; margin-bottom:8px;}
.rel-src{font-weight:600; font-size:13.5px; color:#14507e;}
.rel-text{font-size:13px; color:#34404d; margin-top:4px; white-space:pre-wrap;}

/* 检索按钮 */
.tool-row{margin:10px 0 2px;}
.search-btn{border:1px solid var(--border); background:#f3f7fb; color:var(--primary); border-radius:6px; padding:5px 10px; font-size:12.5px; cursor:pointer;}
.search-btn:hover{background:#e3edf6;}

/* 笔记区 */
.note-label{font-size:12px; color:var(--muted); margin:11px 0 4px; display:flex; align-items:center; gap:5px;}

/* 速查卡 */
.quick{background:linear-gradient(135deg,#f0f6fc,#e8f0f7); border:1px solid #cfe0ef; border-radius:10px; margin-bottom:18px; box-shadow:var(--shadow); overflow:hidden;}
.quick-head{font-weight:700; color:var(--primary); padding:11px 14px; cursor:pointer; user-select:none; font-size:14.5px;}
.quick-body{padding:2px 14px 12px;}
.qg{font-size:13px; color:#34404d; padding:7px 0; border-top:1px dashed #d4e2ee; white-space:pre-wrap;}
.qg:first-child{border-top:none;}
.qg b{color:var(--primary);}

/* 法规简介（发布信息） */
.law-intro{background:linear-gradient(135deg,#f0f6fc,#eef4fb); border:1px solid #cfe0ef; border-radius:10px; margin-bottom:18px; box-shadow:var(--shadow); overflow:hidden;}
.law-intro-head{font-weight:700; color:var(--primary); padding:11px 14px; font-size:14.5px;}
.law-intro-body{padding:2px 14px 12px;}
.law-intro-desc{font-size:13.5px; color:#34404d; line-height:1.8; margin:2px 0 10px;}
.meta-grid{display:grid; grid-template-columns:auto 1fr; gap:6px 14px; align-items:baseline;}
.meta-grid .mk{font-size:13px; color:var(--muted); white-space:nowrap;}
.meta-grid .mv{font-size:13px; color:#2b2f36;}
.meta-grid .mv.ok{color:#1a9e57; font-weight:600;}
.meta-grid .mv.no{color:#c0392b; font-weight:600;}

/* 条文互链 */
.lawlink{color:#1f6fb2; text-decoration:underline; cursor:pointer;}
.lawlink:hover{color:#0d4f86;}

/* 批注分层 */
.notes-wrap{margin-top:2px;}
.note-block{margin-bottom:8px;}
.note-tag{display:inline-block; font-size:11px; font-weight:600; padding:1px 8px; border-radius:4px; margin-bottom:3px;}
.tag-q{background:#fde8e8; color:#c0392b;}      /* 疑问 */
.tag-c{background:#e6f4ea; color:#1e7a46;}      /* 我的案例 */
.tag-s{background:#fef3e0; color:#b9770e;}      /* 要点总结 */
.tag-t{background:#efe7fb; color:#6b3fa0;}      /* 待办 */
.note.sub{background:var(--note-bg); border:1px dashed var(--note-bd); border-radius:7px; padding:7px 10px; min-height:32px; font-size:13.5px; color:#5a4a1a; white-space:pre-wrap; outline:none;}
.note.sub:focus{border-style:solid; border-color:var(--mark); background:#fffce8; box-shadow:0 0 0 3px rgba(230,162,60,.15);}
.note.sub:empty:before{content:attr(data-ph); color:#b9a86a;}

/* 自测模式 */
.reveal-btn{display:none; margin:10px 0 2px; border:1px solid var(--primary); background:var(--primary-soft); color:var(--primary); border-radius:6px; padding:5px 12px; font-size:12.5px; cursor:pointer;}
.reveal-btn:hover{background:#d8e6f5;}
body.self-test .reveal-btn{display:inline-block;}
body.self-test .explain-label,
body.self-test .explain,
body.self-test .case-label,
body.self-test .case,
body.self-test .rel-label,
body.self-test .rel,
body.self-test .tool-row,
body.self-test .note-label,
body.self-test .notes-wrap{display:none;}
.article.revealed .explain-label,
.article.revealed .explain,
.article.revealed .case-label,
.article.revealed .case,
.article.revealed .rel-label,
.article.revealed .rel,
.article.revealed .tool-row,
.article.revealed .note-label,
.article.revealed .notes-wrap{display:block;}
body.self-test .article{opacity:.97;}
body.self-test .article.revealed{border-left-color:var(--primary); background:#fff;}

footer{max-width:1180px; margin:0 auto 30px; padding:14px 18px; color:var(--muted); font-size:12.5px; text-align:center;}

@media (max-width:860px){
  .layout{flex-direction:column;}
  nav.toc{position:static; width:100%; flex:none; max-height:none;}
  .toolbar input[type=search]{width:120px;}
}
@media print{
  header, nav.toc, footer, .tool-row, .quick-head{display:none !important;}
  body{background:#fff;}
  .layout{display:block; margin:0; padding:0;}
  .article{break-inside:avoid; box-shadow:none; border:1px solid #ccc;}
  .explain{background:#f4f6f9;}
  .case{background:#fbf6ee;}
  .mark-btn{display:none;}
  .quick{box-shadow:none; border:1px solid #ccc;}
  body.self-test .reveal-btn{display:none !important;}
  body.self-test .explain, body.self-test .explain-label,
  body.self-test .case, body.self-test .case-label,
  body.self-test .rel, body.self-test .rel-label,
  body.self-test .tool-row, body.self-test .note-label, body.self-test .notes-wrap{display:block !important;}
}

/* ===== 法条编辑模式（每条常驻工具条） ===== */
.art-text.editable{outline:none; border-radius:5px; transition:box-shadow .15s;}
body.edit-mode .art-text.editable{cursor:text;}
.art-text.editable:focus{box-shadow:0 0 0 3px rgba(31,78,121,.16); background:#fefefe; padding:3px 4px;}
.art-editbar{display:none; align-items:center; gap:6px; margin:2px 0 10px; padding:6px 9px; background:#f4f6f8; border:1px solid #e1e6ec; border-radius:8px; flex-wrap:wrap;}
body.edit-mode .article .art-editbar{display:flex;}
.art-editbar .elbl{font-size:11px; color:#7a828c; margin-right:1px;}
.art-editbar .fcolor{width:20px;height:20px;border-radius:5px;border:1.5px solid rgba(0,0,0,.15);cursor:pointer;padding:0;flex:none;}
.art-editbar .fcolor:hover{transform:scale(1.15); border-color:#333;}
.art-editbar .fsep{width:1px;height:16px;background:#cfd4da; margin:0 3px;}
.art-editbar .fclear{padding:3px 9px;border:1px solid #c7ccd2;border-radius:5px;background:#fff;color:#444;cursor:pointer;font-size:11px;white-space:nowrap;}
.art-editbar .fclear:hover{background:#eef1f4;}
.art-editbar .ehint{font-size:11px;color:#9aa1a9;margin-left:auto;}
body:not(.edit-mode) .art-text.editable{-webkit-user-modify:read-only; user-modify:read-only;}
</style>
</head>
<body>
<header>
  <div class="head-inner">
    <h1><span id="lawTitle"></span><small id="lawSub"></small> <span id="lawField" class="field-badge"></span></h1>
    <div class="toolbar">
      <input type="search" id="search" placeholder="搜索条文…" aria-label="搜索">
      <span class="status" id="status">已就绪</span>
      <button id="btnEdit" title="编辑模式：选中任意法条文字即可改字体色 / 高亮标注" style="padding:6px 13px; border:1px solid rgba(255,255,255,.45); border-radius:7px; background:#e6a23c; color:#fff; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; box-shadow:0 2px 6px rgba(230,162,60,.4);">✎ 编辑条文</button>
      <button id="btnTest" title="自测记忆模式：隐藏解读，点条文下方“显示解读”对照，用于抽背">自测模式</button>
      <button id="btnExport" title="导出为独立HTML文件（含所有笔记、解读与案例）。导出后告诉我“发布批注”即可同步到网站">导出</button>
      <button id="btnPrint" title="打印 / 存为PDF">打印</button>
      <button id="btnClear" title="清空本浏览器内全部笔记与标记">清空</button>
    </div>
  </div>
</header>

<div class="layout">
  <nav class="toc" id="toc">
    <div class="toc-title">目录</div>
  </nav>
  <main id="content"></main>
</div>

<footer>
  本笔记为个人学习用途，条文以官方公布文本为准。案例来源于司法部/最高法等公开发布的典型/指导案例。笔记与解读自动保存在本浏览器，导出可脱离浏览器长期留存。
</footer>

<script>
/* ============ 用户定制区（调用技能时替换为目标法规） ============ */
const LAW_TITLE = "中华人民共和国劳动合同法";
const LAW_SUB   = "2007.6.29 通过 · 2008.1.1 施行 · 2012.12.28 修正 · 共8章98条 · 速查/解读/分层笔记/案例/互链/自测";
const LAW_KEY   = "jx2";
const LAW_FIELD = "劳动关系";

/* 法规简介 */
const LAW_INTRO = "规范用人单位与劳动者订立、履行、变更、解除和终止劳动合同的基本法律，确立书面合同、无固定期限、经济补偿、竞业限制等核心规则。";
const LAW_META = {"issuer":"全国人民代表大会常务委员会","published":"2007年6月29日","effective":"2008年1月1日","revised":"2012年12月28日修正","valid":"有效","level":"法律"};

/* 重点速查卡 */
const QUICK = [{"b":"书面合同必签（第10条）","t":"建立劳动关系应订书面合同；用工起一个月内补订不违法，超一个月不满一年未订触发第82条每月二倍工资，满一年不订视为已订无固定期限（第14条）。"},{"b":"试用期上限（第19条）","t":"合同期3月以上不满1年试用≤1月，1年以上不满3年≤2月，3年以上及无固定期限≤6月；同一单位同一劳动者只能约定一次；合同期不满3月或以完成任务为期限不得约定试用期。"},{"b":"无固定期限合同（第14条）","t":"连续工作满十年、连续订二次固定期限合同后续订（无过失情形）、用工满一年不订书面合同视为，三种情形除劳动者主动要固定期限外单位应当订立；不等于铁饭碗，仍可依过失性解除。"},{"b":"经济补偿 N（第46、47条）","t":"按本单位工作年限每满一年支付一个月工资；仅法定情形（单位过错解除、协商解除由单位提出、非过失解除、裁员、特定终止等）才支付；月工资高于当地上年职工月均工资三倍的，按三倍封顶且年限最高12年。"},{"b":"违法解除 2N（第48、87条）","t":"单位违法解除或终止，劳动者可选择继续履行，或不要求履行而主张赔偿金；赔偿金=经济补偿标准×2，与经济补偿不并用。"},{"b":"竞业限制（第23、24条）","t":"限于高管、高级技术人员和其他负有保密义务人员；解除或终止后期限不得超过二年；必须约定并实际按月支付经济补偿，否则条款可能无效；违反者按约支付违约金。"},{"b":"服务期（第22条）","t":"单位提供专项培训费用进行专业技术培训方可约定服务期；违约金不得超过培训费用，且按服务期尚未履行部分分摊，并非全额。"},{"b":"劳务派遣三性（第66条）","t":"派遣是补充形式，只能在临时性（存续≤6月）、辅助性、替代性岗位实施；被派遣劳动者享有与用工单位同类岗位同工同酬权利（第63条）。"},{"b":"非全日制用工（第68、72条）","t":"以小时计酬为主，日均≤4小时、周累计≤24小时；可口头协议、不得约定试用期；小时工资不得低于最低小时工资，报酬结算支付周期最长15日，终止无经济补偿。"},{"b":"维权路径（第77条）","t":"一般劳动争议先仲裁后诉讼；拖欠报酬可向法院申请支付令（第30条）；任何单位个人有权举报（第79条）；监察投诉覆盖欠薪、超时加班、不缴社保等。"}];

/* 案例库 */
const CASES = {"c1":{"t":"单晶晶与北京泛太物流有限公司劳动争议案","d":"劳动者主张未签书面劳动合同二倍工资。法院认为，双方签署的《入职登记表》已具备劳动合同核心条款且实际履行，可认定已订立书面劳动合同，故不支持二倍工资；反之，确未订书面合同且无合法豁免的，用人单位应依第82条支付二倍工资。","s":"最高人民法院公报2013年第5期（2012，北京）"},"c2":{"t":"中兴通讯（杭州）有限责任公司诉王鹏劳动合同纠纷案（指导性案例18号）","d":"劳动者绩效考核不达标，单位以其不能胜任工作解除。法院明确，认定不能胜任工作须经过培训或调整岗位后仍不能胜任的前置程序，单位未能举证该程序的，解除违法，应依第48、87条支付赔偿金。","s":"最高人民法院指导案例18号（2011/2013，浙江）"},"c3":{"t":"徐振华与腾讯科技（深圳）有限公司竞业限制纠纷案","d":"劳动者离职后违反竞业限制约定加入竞争性企业。法院判令其按协议支付违约金，终审判决赔偿腾讯公司1940万余元，明确竞业限制违约金依约处理且应实际支付经济补偿。","s":"上海市第一中级人民法院（2017，上海）"},"c4":{"t":"劳务派遣工同工同酬纠纷案（代表性裁判）","d":"被派遣劳动者主张与用工单位同类岗位正式工同工同酬。裁判要旨：用工单位应按同工同酬原则对同类岗位实行相同劳动报酬分配办法（第63条），违反同工同酬的，派遣工可主张报酬差额。","s":"中国裁判文书网公开文书（2015，北京/上海）"}};

const REL = {"r1":{"src":"《中华人民共和国劳动法》","art":"第十六条","t":"劳动合同是劳动者与用人单位确立劳动关系、明确双方权利和义务的协议。建立劳动关系应当订立劳动合同。"},"r2":{"src":"《中华人民共和国劳动法》","art":"第七十二条","t":"社会保险基金按照保险类型确定资金来源，逐步实行社会统筹。用人单位和劳动者必须依法参加社会保险，缴纳社会保险费。"},"r3":{"src":"《中华人民共和国劳动合同法实施条例》","art":"第五条","t":"自用工之日起一个月内，经用人单位书面通知后，劳动者不与用人单位订立书面劳动合同的，用人单位应当书面通知劳动者终止劳动关系，无需向劳动者支付经济补偿，但是应当依法向劳动者支付其实际工作时间的劳动报酬。"},"r4":{"src":"《中华人民共和国劳动合同法实施条例》","art":"第六条","t":"用人单位自用工之日起超过一个月不满一年未与劳动者订立书面劳动合同的，应当依照劳动合同法第八十二条的规定向劳动者每月支付两倍的工资，并与劳动者补订书面劳动合同；劳动者不与用人单位订立书面劳动合同的，用人单位应当书面通知劳动者终止劳动关系，并依照劳动合同法第四十七条的规定支付经济补偿。"},"r5":{"src":"《中华人民共和国劳动合同法实施条例》","art":"第二十七条","t":"劳动合同法第四十七条规定的经济补偿的月工资按照劳动者应得工资计算，包括计时工资或者计件工资以及奖金、津贴和补贴等货币性收入。劳动者在劳动合同解除或者终止前十二个月的平均工资低于当地最低工资标准的，按照当地最低工资标准计算。"},"r6":{"src":"《中华人民共和国劳动争议调解仲裁法》","art":"第六条","t":"发生劳动争议，当事人对自己提出的主张，有责任提供证据。与争议事项有关的证据属于用人单位掌握管理的，用人单位应当提供；用人单位不提供的，应当承担不利后果。"},"r7":{"src":"《中华人民共和国劳动争议调解仲裁法》","art":"第二十七条","t":"劳动争议申请仲裁的时效期间为一年。仲裁时效期间从当事人知道或者应当知道其权利被侵害之日起计算。前款规定的仲裁时效，因当事人一方向对方当事人主张权利，或者向有关部门请求权利救济，或者对方当事人同意履行义务而中断。从中断时起，仲裁时效期间重新计算。劳动关系存续期间因拖欠劳动报酬发生争议的，劳动者申请仲裁不受本条第一款规定的仲裁时效期间的限制；但是，劳动关系终止的，应当自劳动关系终止之日起一年内提出。"},"r8":{"src":"《中华人民共和国社会保险法》","art":"第五十八条","t":"用人单位应当自用工之日起三十日内为其职工向社会保险经办机构申请办理社会保险登记。未办理社会保险登记的，由社会保险经办机构核定其应当缴纳的社会保险费。自愿参加社会保险的无雇工的个体工商户、未在用人单位参加社会保险的非全日制从业人员以及其他灵活就业人员，应当向社会保险经办机构申请办理社会保险登记。国家建立全国统一的个人社会保障号码。个人社会保障号码为公民身份号码。"},"r9":{"src":"《中华人民共和国劳动合同法实施条例》","art":"第十条","t":"劳动者非因本人原因从原用人单位被安排到新用人单位工作的，劳动者在原用人单位的工作年限合并计算为新用人单位的工作年限。原用人单位已经向劳动者支付经济补偿的，新用人单位在依法解除、终止劳动合同计算支付经济补偿的工作年限时，不再计算劳动者在原用人单位的工作年限。"}};

const DATA = [{"ch":"全文","items":[{"no":"","t":"中华人民共和国主席令第65号\n《中华人民共和国劳动合同法》已由中华人民共和国第十届全国人民代表大会常务委员会 第二十八次会议于2007年6月29日通过，现予公布，自2008年1月1日起施行。\n中华人民共和国主席  胡锦涛\n（2007年6月29日第十届全国人民代表大会常务委员会第二十八次会议通过根据2012年 12月28日《全国人民代表大会常务委员会关于修改〈中华人民共和国劳动合同法〉的决定》 修订）\n目    录","ex":"本件为《劳动合同法》的公布文件（主席令第65号）及目录。该法于2007年6月29日通过、自2008年1月1日起施行，并于2012年12月28日修正；目录罗列了总则、合同订立、履行和变更、解除和终止、特别规定、监督检查、法律责任、附则共八章结构，供查阅条文时定位使用。"}]},{"ch":"第一章  总  则","items":[{"no":"","t":"第 一 条 为了完善劳动合同制度，明确劳动合同双方当事人的权利和义务，保护劳动者 的合法权益，构建和发展和谐稳定的劳动关系，制定本法。","ex":"立法目的条款。明确本法的宗旨是完善劳动合同制度、明确双方权利义务、保护劳动者合法权益、构建和发展和谐稳定的劳动关系。\n实务要点：本条款是整部法律的立法宗旨，条文理解出现争议时，应朝「保护劳动者合法权益、维护劳动关系稳定」的方向解释，但不能直接作为判案依据，仅起指导作用。"},{"no":"第二条","t":"第二条  中华人民共和国境内的企业、个体经济组织、民办非企业单位等组织（以下称 用人单位）与劳动者建立劳动关系，订立、履行、变更、解除或者终止劳动合同，适用本法。\n国家机关、事业单位、社会团体和与其建立劳动关系的劳动者，订立、履行、变更、解 除或者终止劳动合同，依照本法执行。","ex":"适用范围条款。中华人民共和国境内的企业、个体经济组织、民办非企业单位等组织（用人单位）与劳动者建立劳动关系，订立、履行、变更、解除或终止劳动合同，适用本法；国家机关、事业单位、社会团体和与之建立劳动关系的劳动者，也依照本法执行。\n常见误区：判断是否适用本法，核心看双方是否建立「劳动关系」，而非主体名称。个人之间的家庭雇佣、在校学生勤工助学、退休返聘等一般不属本法调整，而受民法等其他法律调整。"},{"no":"第三条","t":"第三条 订立劳动合同，应当遵循合法、公平、平等自愿、协商一致、诚实信用的原则。依法订立的劳动合同具有约束力，用人单位与劳动者应当履行劳动合同约定的义务。","ex":"订立劳动合同的基本原则。应遵循合法、公平、平等自愿、协商一致、诚实信用的原则；依法订立的劳动合同具有约束力，用人单位与劳动者都应履行约定的义务。\n实务要点：这些原则在合同解释、效力认定中作依据；但本法第十条要求建立劳动关系应订书面合同，仅有原则性口头约定仍可能触发未签书面合同的法律后果。"},{"no":"第四条","t":"第四条 用人单位应当依法建立和完善劳动规章制度，保障劳动者享有劳动权利、履行 劳动义务。\n用人单位在制定、修改或者决定有关劳动报酬、工作时间、休息休假、劳动安全卫生、保 险福利、职工培训、劳动纪律以及劳动定额管理等直接涉及劳动者切身利益的规章制度或者 重大事项时，应当经职工代表大会或者全体职工讨论，提出方案和意见，与工会或者职工代 表平等协商确定。\n在规章制度和重大事项决定实施过程中，工会或者职工认为不适当的，有权向用人单位 提出，通过协商予以修改完善。\n用人单位应当将直接涉及劳动者切身利益的规章制度和重大事项决定公示，或者告知劳 动者。","ex":"用人单位规章制度应当依法建立，保障劳动者权利、履行劳动义务。重点在于：涉及劳动报酬、工作时间、休息休假、劳动安全卫生、保险福利、职工培训、劳动纪律、劳动定额管理等直接涉及劳动者切身利益的规章制度或重大事项，应当经职工代表大会或全体职工讨论、提出方案和意见，并与工会或职工代表平等协商确定；实施中工会或职工认为不适当的可要求修改；相关制度和决定应当公示或告知劳动者。\n常见误区：未经民主程序制定且未向劳动者公示的规章制度，不能作为处罚、解雇劳动者的依据，即便内容本身合法。"},{"no":"第五条","t":"第五条  县级以上人民政府劳动行政部门会同工会和企业方面代表，建立健全协调劳动 关系三方机制，共同研究解决有关劳动关系的重大问题。","ex":"劳动关系三方协调机制。县级以上人民政府劳动行政部门会同工会和企业方面代表，建立健全协调劳动关系三方机制，共同研究解决有关劳动关系的重大问题。\n适用要点：本条属宏观层面的协调机制，普通劳动者了解即可，主要用于集体协商、劳动争议预防等制度建设，不直接创设个人权利义务。"},{"no":"第六条","t":"第六条  工会应当帮助、指导劳动者与用人单位依法订立和履行劳动合同，并与用人单 位建立集体协商机制，维护劳动者的合法权益。","ex":"工会的法定职责。工会应当帮助、指导劳动者与用人单位依法订立和履行劳动合同，并与用人单位建立集体协商机制，维护劳动者合法权益。\n实务提示：劳动者在签约、履约、维权过程中可主动寻求工会帮助；尚未建立工会的，上级工会也可提供指导。"}]},{"ch":"第二章  劳动合同的订立","items":[{"no":"第七条","t":"第七条 用人单位自用工之日起即与劳动者建立劳动关系。用人单位应当建立职工名册 备查。","ex":"劳动关系自用工之日起建立。用人单位自用工之日起即与劳动者建立劳动关系，并应当建立职工名册备查。\n常见误区：很多人以为「签了合同才算建立关系」。实际上只要开始实际提供劳动、接受管理，劳动关系就成立，未签书面合同不影响劳动关系认定，只是会触发二倍工资等责任（第八十二条）。"},{"no":"第八条","t":"第八条 用人单位招用劳动者时，应当如实告知劳动者工作内容、工作条件、工作地点、 职业危害、安全生产状况、劳动报酬，以及劳动者要求了解的其他情况；用人单位有权了解 劳动者与劳动合同直接相关的基本情况，劳动者应当如实说明。","ex":"双方如实告知与说明义务。招用时用人单位应如实告知工作内容、工作条件、工作地点、职业危害、安全生产状况、劳动报酬及劳动者要求了解的其他情况；用人单位有权了解与劳动合同直接相关的劳动者基本情况，劳动者应如实说明。\n常见误区：用人单位不得询问与岗位无关的隐私（如以婚育状况作歧视性考量）；劳动者也不得隐瞒学历、职业资格等直接影响录用的关键信息，否则可能构成欺诈导致合同无效（第二十六条）。"},{"no":"第九条","t":"第九条 用人单位招用劳动者，不得扣押劳动者的居民身份证和其他证件，不得要求劳 动者提供担保或者以其他名义向劳动者收取财物。","ex":"禁止扣押证件和收取财物。用人单位招用劳动者，不得扣押居民身份证和其他证件，不得要求劳动者提供担保或以其他名义收取财物。\n实务要点：收押金、押身份证、押毕业证、要求提供担保人均属违法。劳动者可要求立即退还，并向劳动行政部门举报，相关单位将被处罚（第八十四条）。"},{"no":"第十条","t":"第十条 建立劳动关系，应当订立书面劳动合同。\n已建立劳动关系，未同时订立书面劳动合同的，应当自用工之日起一个月内订立书面劳 动合同。\n用人单位与劳动者在用工前订立劳动合同的，劳动关系自用工之日起建立。","ex":"建立劳动关系应当订立书面劳动合同。已建立劳动关系未同时订立的，应自用工之日起一个月内订立；用工前订合同的，劳动关系自用工之日起建立。\n实务要点：一个月内补订不构成违法；超过一个月不满一年未订书面合同的，触发第八十二条的每月二倍工资。签约时间节点是HR合规的关键。","cases":["c1"],"rel":["r3","r4"]},{"no":"第十一条","t":"第十一条 用人单位未在用工的同时订立书面劳动合同，与劳动者约定的劳动报酬不明 确的，新招用的劳动者的劳动报酬按照集体合同规定的标准执行；没有集体合同或者集体合 同未规定的，实行同工同酬。","ex":"劳动报酬约定不明的处理。用人单位未在用工同时订立书面劳动合同且劳动报酬约定不明确的，新招用劳动者的报酬按集体合同标准执行；没有集体合同或未规定的，实行同工同酬。\n适用顺位：先协商→集体合同→同工同酬。本条与第十八条衔接，解决「没写清楚发多少」的争议。"},{"no":"第十二条","t":"第十二条 劳动合同分为固定期限劳动合同、无固定期限劳动合同和以完成一定工作任 务为期限的劳动合同。","ex":"劳动合同期限的三类划分。劳动合同分为固定期限劳动合同、无固定期限劳动合同和以完成一定工作任务为期限的劳动合同。\n实务概要：三类合同适用规则不同，尤其试用期、解除条件、终止时点存在差异，签约时应先确定期限类型。"},{"no":"第十三条","t":"第十三条 固定期限劳动合同，是指用人单位与劳动者约定合同终止时间的劳动合同。 用人单位与劳动者协商一致，可以订立固定期限劳动合同。","ex":"固定期限劳动合同的定义。指约定合同终止时间的劳动合同；用人单位与劳动者协商一致，可以订立固定期限劳动合同。\n实务要点：这是最常见的合同类型，期限届满即面临终止或续订问题，关系到第四十六条的经济补偿。"},{"no":"第十四条","t":"第十四条 无固定期限劳动合同，是指用人单位与劳动者约定无确定终止时间的劳动合 同 。\n用人单位与劳动者协商一致，可以订立无固定期限劳动合同。有下列情形之一，劳动者提出或者同意续订、订立劳动合同的，除劳动者提出订立固定期限劳动合同外，应当订立无 固定期限劳动合同：\n（一）劳动者在该用人单位连续工作满十年的；\n（二）用人单位初次实行劳动合同制度或者国有企业改制重新订立劳动合同时，劳动者 在该用人单位连续工作满十年且距法定退休年龄不足十年的；\n（三）连续订立二次固定期限劳动合同，且劳动者没有本法第三十九条和第四十条第一 项、第二项规定的情形，续订劳动合同的。\n用人单位自用工之日起满一年不与劳动者订立书面劳动合同的，视为用人单位与劳动者 已订立无固定期限劳动合同。","ex":"无固定期限劳动合同是用人单位与劳动者约定无确定终止时间的劳动合同。除协商一致可订外，有下列情形之一，劳动者提出或同意续订、订立的，除劳动者主动提出订固定期限外，应当订立无固定期限合同：（一）在该单位连续工作满十年；（二）初次实行合同制度或国企改制重订时连续满十年且距法定退休不足十年；（三）连续订立二次固定期限合同，且劳动者无本法第三十九条和第四十条第一、二项情形而续订的。此外，自用工之日起满一年不订书面合同的，视为已订无固定期限合同。\n常见误区：只要劳动者提出，单位就必须订（除非劳动者自己要固定期限）；「连续工作」不因换工号、关联公司轮换而轻易中断。无固定期限不等于「铁饭碗」，仍可依过失性解除等法定情形解除。","rel":["r9"]},{"no":"第十五条","t":"第十五条  以完成一定工作任务为期限的劳动合同，是指用人单位与劳动者约定以某项 工作的完成为合同期限的劳动合同。\n用人单位与劳动者协商一致，可以订立以完成一定工作任务为期限的劳动合同。","ex":"以完成一定工作任务为期限的劳动合同，指约定以某项工作的完成为合同期限的劳动合同；双方协商一致可订。\n实务要点：常见于项目制、季节性、临时性工作。注意：此类合同不得约定试用期（第十九条），且任务完成合同即终止。"},{"no":"第十六条","t":"第十六条 劳动合同由用人单位与劳动者协商一致，并经用人单位与劳动者在劳动合同 文本上签字或者盖章生效。\n劳动合同文本由用人单位和劳动者各执一份。","ex":"劳动合同生效与文本持有。合同由用人单位与劳动者协商一致，并经双方在文本上签字或盖章生效；劳动合同文本由用人单位和劳动者各执一份。\n常见误区：单位只盖章不让劳动者签字、或只留一份不给劳动者，都不规范。劳动者应坚持双方签字盖章并各执一份，作为维权凭证。"},{"no":"第十七条","t":"第十七条 劳动合同应当具备以下条款：\n（一）用人单位的名称、住所和法定代表人或者主要负责人；\n（二）劳动者的姓名、住址和居民身份证或者其他有效身份证件号码；\n（三）劳动合同期限；\n（四）工作内容和工作地点；\n（五）工作时间和休息休假；\n（六）劳动报酬；\n（七）社会保险；\n（八）劳动保护、劳动条件和职业危害防护；\n（九）法律、法规规定应当纳入劳动合同的其他事项。\n劳动合同除前款规定的必备条款外，用人单位与劳动者可以约定试用期、培训、保守秘 密、补充保险和福利待遇等其他事项。","ex":"劳动合同的必备条款。应当具备：（一）用人单位名称、住所、法定代表人或主要负责人；（二）劳动者姓名、住址、身份证或其他有效证件号码；（三）合同期限；（四）工作内容和工作地点；（五）工作时间和休息休假；（六）劳动报酬；（七）社会保险；（八）劳动保护、劳动条件和职业危害防护；（九）法律法规规定应纳入的其他事项。此外双方可约定试用期、培训、保守秘密、补充保险和福利待遇等。\n实务要点：缺必备条款可被责令改正（第八十一条），但一般不必然导致合同无效。HR应核对九项必备内容齐全。"},{"no":"第十八条","t":"第十八条  劳动合同对劳动报酬和劳动条件等标准约定不明确，引发争议的，用人单位 与劳动者可以重新协商；协商不成的，适用集体合同规定；没有集体合同或者集体合同未规 定劳动报酬的，实行同工同酬；没有集体合同或者集体合同未规定劳动条件等标准的，适用国 家有关规定。","ex":"约定不明确时的处理。劳动合同对劳动报酬和劳动条件等标准约定不明确引发争议的，双方可重新协商；协商不成，适用集体合同规定；没有集体合同或集体合同未规定劳动报酬的，实行同工同酬；未规定劳动条件等标准的，适用国家有关规定。\n与第十一条互补：第十一条针对「未同时订书面合同且报酬不明」，本条针对「已订合同但约定不明」，顺位均为协商→集体合同→（报酬）同工同酬/（条件）国家规定。"},{"no":"第十九条","t":"第十九条 劳动合同期限三个月以上不满一年的，试用期不得超过一个月；劳动合同期 限一年以上不满三年的，试用期不得超过二个月；三年以上固定期限和无固定期限的劳动合 同，试用期不得超过六个月。\n同一用人单位与同一劳动者只能约定一次试用期。\n以完成一定工作任务为期限的劳动合同或者劳动合同期限不满三个月的，不得约定试用 期。\n试用期包含在劳动合同期限内。劳动合同仅约定试用期的，试用期不成立，该期限为劳 动合同期限。","ex":"试用期限制规则。合同期限三个月以上不满一年的，试用期不超过一个月；一年以上不满三年的，不超过二个月；三年以上固定期限和无固定期限的，不超过六个月。同一用人单位与同一劳动者只能约定一次试用期；以完成任务为期限或合同期限不满三个月的，不得约定试用期；试用期包含在合同期限内；仅约定试用期的，试用期不成立，该期限为合同期限。\n常见误区：「合同到期重签再设试用期」「调岗后另设试用期」「续签再试用」均违法，因为同一单位同一劳动者只能约定一次试用期。"},{"no":"第二十条","t":"第二十条 劳动者在试用期的工资不得低于本单位相同岗位最低档工资或者劳动合同约 定工资的百分之八十，并不得低于用人单位所在地的最低工资标准。","ex":"试用期工资下限。劳动者在试用期的工资不得低于本单位相同岗位最低档工资或合同约定工资的百分之八十，并不得低于用人单位所在地的最低工资标准。\n实务要点：两个「不得低于」须同时满足，即取三者（同岗最低档、约定工资80%、当地最低工资）中的最高值作为底线。"},{"no":"第二十一条","t":"第二十一条  在试用期中，除劳动者有本法第三十九条和第四十条第一项、第二项规定 的情形外，用人单位不得解除劳动合同。用人单位在试用期解除劳动合同的，应当向劳动者 说明理由。","ex":"试用期解除劳动合同的限制。在试用期中，除劳动者有本法第三十九条（过失性解除）和第四十条第一项、第二项（医疗期满不胜任、培训调岗后仍不胜任）规定的情形外，用人单位不得解除劳动合同；单位在试用期解除的，应向劳动者说明理由。\n实务要点：单位以「不符合录用条件」解除，须事先明确录用条件并举证，否则属违法解除（第四十八条）。"},{"no":"第二十二条","t":"第二十二条 用人单位为劳动者提供专项培训费用，对其进行专业技术培训的，可以与 该劳动者订立协议，约定服务期。\n劳动者违反服务期约定的，应当按照约定向用人单位支付违约金。违约金的数额不得超 过用人单位提供的培训费用。用人单位要求劳动者支付的违约金不得超过服务期尚未履行部 分所应分摊的培训费用。\n用人单位与劳动者约定服务期的，不影响按照正常的工资调整机制提高劳动者在服务期 期间的劳动报酬。","ex":"服务期约定。用人单位为劳动者提供专项培训费用、进行专业技术培训的，可与该劳动者订立协议约定服务期；劳动者违反服务期约定的，按约定支付违约金，但数额不得超过单位提供的培训费用，且单位要求支付的违约金不得超过服务期尚未履行部分所应分摊的培训费用。约定服务期不影响正常工资调整机制提高报酬。\n常见误区：只有「专项培训费用」支出的专业技术培训才能约定服务期，一般入职培训、岗前培训不能约定。违约金按未履行期限分摊，并非全额。"},{"no":"第二十三条","t":"第二十三条 用人单位与劳动者可以在劳动合同中约定保守用人单位的商业秘密和与知 识产权相关的保密事项。\n对负有保密义务的劳动者，用人单位可以在劳动合同或者保密协议中与劳动者约定竞业 限制条款，并约定在解除或者终止劳动合同后，在竞业限制期限内按月给予劳动者经济补偿。 劳动者违反竞业限制约定的，应当按照约定向用人单位支付违约金。","ex":"保密义务与竞业限制。双方可在合同中约定保守用人单位的商业秘密和与知识产权相关的保密事项；对负有保密义务的劳动者，可在合同或保密协议中约定竞业限制条款，并约定在解除或终止合同后，在竞业限制期限内按月给予劳动者经济补偿；劳动者违反竞业限制约定的，按约定支付违约金。\n实务要点：竞业限制必须约定并实际支付经济补偿，否则该条款可能被认定无效，劳动者不受约束。","cases":["c3"]},{"no":"第二十四条","t":"第二十四条 竞业限制的人员限于用人单位的高级管理人员、高级技术人员和其他负有 保密义务的人员。竞业限制的范围、地域、期限由用人单位与劳动者约定，竞业限制的约定 不得违反法律、法规的规定。\n在解除或者终止劳动合同后，前款规定的人员到与本单位生产或者经营同类产品、从事 同类业务的有竞争关系的其他用人单位，或者自己开业生产或者经营同类产品、从事同类业 务的竞业限制期限，不得超过二年。","ex":"竞业限制的人员与期限限制。竞业限制人员限于用人单位的高级管理人员、高级技术人员和其他负有保密义务的人员；范围、地域、期限由双方约定，但不得违反法律法规；解除或终止合同后，前述人员到与本单位生产或经营同类产品、从事同类业务的有竞争关系的其他单位，或自己开业生产、经营同类产品、从事同类业务的竞业限制期限，不得超过二年。\n实务要点：对普通岗位员工随意设竞业限制且限制过宽、过长的，约定可能无效。"},{"no":"第二十五条","t":"第二十五条 除本法第二十二条和第二十三条规定的情形外，用人单位不得与劳动者约 定由劳动者承担违约金。","ex":"违约金约定的限制。除本法第二十二条（服务期）和第二十三条（竞业限制）规定的情形外，用人单位不得与劳动者约定由劳动者承担违约金。\n常见误区：除服务期和竞业限制两种法定情形外，约定「迟到罚款」「提前离职违约金」「培训费赔偿（非专项）」等由劳动者承担违约金的条款，原则上无效。"},{"no":"第二十六条","t":"第二十六条 下列劳动合同无效或者部分无效：\n（一）以欺诈、胁迫的手段或者乘人之危，使对方在违背真实意思的情况下订立或者变 更劳动合同的；\n（二）用人单位免除自己的法定责任、排除劳动者权利的；\n（三）违反法律、行政法规强制性规定的。\n对劳动合同的无效或者部分无效有争议的，由劳动争议仲裁机构或者人民法院确认。","ex":"劳动合同无效或部分无效的情形：（一）以欺诈、胁迫手段或乘人之危，使对方在违背真实意思情况下订立或变更的；（二）用人单位免除自己法定责任、排除劳动者权利的；（三）违反法律、行政法规强制性规定的。对无效或部分无效有争议的，由劳动争议仲裁机构或人民法院确认。\n实务要点：合同是否无效须由仲裁机构或法院认定，单位或个人不能自行宣布无效。"},{"no":"第二十七条","t":"第二十七条 劳动合同部分无效，不影响其他部分效力的，其他部分仍然有效。","ex":"部分无效的效力。劳动合同部分无效，不影响其他部分效力的，其他部分仍然有效。\n实务要点：如仅某条违约金约定违法，其余条款（工资、岗位、期限等）仍有效，劳动关系继续受保护。"},{"no":"第二十八条","t":"第二十八条 劳动合同被确认无效，劳动者已付出劳动的，用人单位应当向劳动者支付 劳动报酬。劳动报酬的数额，参照本单位相同或者相近岗位劳动者的劳动报酬确定。","ex":"无效合同下的劳动报酬。劳动合同被确认无效，劳动者已付出劳动的，用人单位应当向劳动者支付劳动报酬，数额参照本单位相同或相近岗位劳动者的劳动报酬确定。\n实务要点：合同无效不等于「白干」，只要实际提供了劳动，就有权获得相当于同岗水平的报酬。"}]},{"ch":"第三章  劳动合同的履行和变更","items":[{"no":"第二十九条","t":"第二十九条  用人单位与劳动者应当按照劳动合同的约定，全面履行各自的义务。","ex":"全面履行原则。用人单位与劳动者应当按照劳动合同的约定，全面履行各自的义务。\n实务要点：包括亲自履行、按约履行，单位不得随意调岗降薪，劳动者也不得擅自缺勤，双方互负诚信履约义务。"},{"no":"第三十条","t":"第三十条 用人单位应当按照劳动合同约定和国家规定，向劳动者及时足额支付劳动报 酬。\n用人单位拖欠或者未足额支付劳动报酬的，劳动者可以依法向当地人民法院申请支付令， 人民法院应当依法发出支付令。","ex":"及时足额支付劳动报酬。用人单位应按合同约定和国家规定，向劳动者及时足额支付劳动报酬；拖欠或未足额支付的，劳动者可依法向当地人民法院申请支付令，法院应依法发出支付令。\n实务要点：支付令程序快捷，适用于事实清楚、无实质争议的欠薪；若单位提出异议，支付令失效，需转入仲裁或诉讼。"},{"no":"第三十一条","t":"第三十一条 用人单位应当严格执行劳动定额标准，不得强迫或者变相强迫劳动者加班。 用人单位安排加班的，应当按照国家有关规定向劳动者支付加班费。","ex":"加班管理。用人单位应严格执行劳动定额标准，不得强迫或变相强迫劳动者加班；安排加班的，应国家有关规定支付加班费。\n常见误区：「自愿加班」一般无加班费，但单位安排、要求或变相迫使（如不完成不计报酬）的，应认定为加班并支付加班费。"},{"no":"第三十二条","t":"第三十二条 劳动者拒绝用人单位管理人员违章指挥、强令冒险作业的，不视为违反劳 动合同。\n劳动者对危害生命安全和身体健康的劳动条件，有权对用人单位提出批评、检举和控告。","ex":"拒绝违章指挥的权利。劳动者拒绝用人单位管理人员违章指挥、强令冒险作业的，不视为违反劳动合同；对危害生命安全和身体健康的劳动条件，有权提出批评、检举和控告。\n实务要点：遇危险作业，劳动者有权拒绝且不被认定为违纪，单位不得因此处罚或解雇。"},{"no":"第三十三条","t":"第三十三条 用人单位变更名称、法定代表人、主要负责人或者投资人等事项，不影响 劳动合同的履行。","ex":"用人单位信息变更不影响合同履行。单位变更名称、法定代表人、主要负责人或投资人等事项，不影响劳动合同的履行。\n常见误区：老板换人、公司改名、股权变更，都不影响原有劳动合同的效力，劳动者工龄、待遇连续计算。"},{"no":"第三十四条","t":"第三十四条 用人单位发生合并或者分立等情况，原劳动合同继续有效，劳动合同由承 继其权利和义务的用人单位继续履行。","ex":"合并分立下的合同承继。用人单位发生合并或分立等情况，原劳动合同继续有效，由承继其权利和义务的用人单位继续履行。\n实务要点：公司兼并、分立后，新主体必须接手原有劳动合同，不得借机清退员工或重算工龄。"},{"no":"第三十五条","t":"第三十五条 用人单位与劳动者协商一致，可以变更劳动合同约定的内容。变更劳动合 同，应当采用书面形式。\n变更后的劳动合同文本由用人单位和劳动者各执一份。","ex":"劳动合同的变更。双方协商一致，可以变更合同约定内容；变更应采用书面形式，变更后的文本双方各执一份。\n实务要点：调岗调薪等变更须双方协商一致并书面确认，单位单方强制变更可能构成违法。"}]},{"ch":"第四章  劳动合同的解除和终止","items":[{"no":"第三十六条","t":"第三十六条 用人单位与劳动者协商一致，可以解除劳动合同。","ex":"协商解除。用人单位与劳动者协商一致，可以解除劳动合同。\n实务要点：谁先提出协商解除，影响是否支付经济补偿——由单位提出并协商一致的解除需支付经济补偿（第四十六条第二项），由劳动者提出的一般无补偿。"},{"no":"第三十七条","t":"第三十七条 劳动者提前三十日以书面形式通知用人单位，可以解除劳动合同。劳动者 在试用期内提前三日通知用人单位，可以解除劳动合同。","ex":"劳动者预告解除权。劳动者提前三十日以书面形式通知用人单位，可以解除劳动合同；试用期内提前三日通知用人单位，可以解除。\n常见误区：转正后「说走就走」可能需承担给单位造成损失的赔偿责任；但单位不得因劳动者依法预告解除而克扣工资或不予办理离职手续。"},{"no":"第三十八条","t":"第三十八条 用人单位有下列情形之一的，劳动者可以解除劳动合同：\n（一）未按照劳动合同约定提供劳动保护或者劳动条件的；\n（二）未及时足额支付劳动报酬的；\n（三）未依法为劳动者缴纳社会保险费的；\n（四）用人单位的规章制度违反法律、法规的规定，损害劳动者权益的；\n（五）因本法第二十六条第一款规定的情形致使劳动合同无效的；\n（六）法律、行政法规规定劳动者可以解除劳动合同的其他情形。\n用人单位以暴力、威胁或者非法限制人身自由的手段强迫劳动者劳动的，或者用人单位 违章指挥、强令冒险作业危及劳动者人身安全的，劳动者可以立即解除劳动合同，不需事先 告知用人单位。","ex":"因用人单位过错，劳动者可解除合同的情形：（一）未按约提供劳动保护或劳动条件；（二）未及时足额支付报酬；（三）未依法缴纳社会保险费；（四）规章制度违法损害权益；（五）因本法第二十六条情形致合同无效；（六）其他法定情形。此外，单位以暴力、威胁或非法限制人身自由强迫劳动，或违章指挥、强令冒险作业危及人身安全的，劳动者可立即解除，不需事先告知。\n实务要点：依本条第1款解除可主张经济补偿（第四十六条第一项）；「未依法缴社保」是常见离职并索赔事由。"},{"no":"第三十九条","t":"第三十九条 劳动者有下列情形之一的，用人单位可以解除劳动合同：\n（一）在试用期间被证明不符合录用条件的；\n（二）严重违反用人单位的规章制度的；\n（三）严重失职，营私舞弊，给用人单位造成重大损害的；\n（四）劳动者同时与其他用人单位建立劳动关系，对完成本单位的工作任务造成严重影响，或者经用人单位提出，拒不改正的；\n（五）因本法第二十六条第一款第一项规定的情形致使劳动合同无效的；\n（六）被依法追究刑事责任的。","ex":"用人单位过失性解除（劳动者过错）：（一）试用期间被证明不符合录用条件；（二）严重违反规章制度；（三）严重失职、营私舞弊造成重大损害；（四）同时与其他单位建立劳动关系严重影响本单位工作，或经提出拒不改正；（五）因欺诈等致合同无效；（六）被依法追究刑事责任。\n实务要点：过失性解除无需支付经济补偿，但单位须承担举证责任（如录用条件、违纪事实、制度合法性）。制度未公示或处罚无依据易被认定违法解除。"},{"no":"第四十条","t":"第四十条 有下列情形之一的，用人单位提前三十日以书面形式通知劳动者本人或者额 外支付劳动者一个月工资后，可以解除劳动合同：\n（一）劳动者患病或者非因工负伤，在规定的医疗期满后不能从事原工作，也不能从事 由用人单位另行安排的工作的；\n（二）劳动者不能胜任工作，经过培训或者调整工作岗位，仍不能胜任工作的；\n（三）劳动合同订立时所依据的客观情况发生重大变化，致使劳动合同无法履行，经用 人单位与劳动者协商，未能就变更劳动合同内容达成协议的。","ex":"用人单位非过失性解除（提前三十日书面通知或额外支付一个月工资）：(一)劳动者患病或非因工负伤，医疗期满不能从事原工作也不能从事另行安排的工作；(二)不能胜任工作，经培训或调整岗位仍不能胜任；(三)订立时所依据的客观情况发生重大变化，致合同无法履行，协商变更不成。\n实务要点：须先履行「培训或调岗」「协商变更」等前置程序，并提前30日通知或支付代通知金；此类解除需支付经济补偿。"},{"no":"第四十一条","t":"第四十一条 有下列情形之一 ，需要裁减人员二十人以上或者裁减不足二十人但占企业 职工总数百分之十以上的，用人单位提前三十日向工会或者全体职工说明情况，听取工会或 者职工的意见后，裁减人员方案经向劳动行政部门报告，可以裁减人员：\n（一）依照企业破产法规定进行重整的；\n（二）生产经营发生严重困难的；\n（三）企业转产、重大技术革新或者经营方式调整，经变更劳动合同后，仍需裁减人员 的 ；\n（四）其他因劳动合同订立时所依据的客观经济情况发生重大变化，致使劳动合同无法 履行的。\n裁减人员时，应当优先留用下列人员：\n（一）与本单位订立较长期限的固定期限劳动合同的；\n（二）与本单位订立无固定期限劳动合同的；\n（三）家庭无其他就业人员，有需要扶养的老人或者未成年人的。\n用人单位依照本条第一款规定裁减人员，在六个月内重新招用人员的，应当通知被裁减 的人员，并在同等条件下优先招用被裁减的人员。","ex":"经济性裁员。需裁减二十人以上或不足二十人但占职工总数百分之十以上的，单位提前三十日向工会或全体职工说明情况、听取意见，裁减方案经向劳动行政部门报告，可以裁减。裁减时应优先留用：较长固定期限合同者、无固定期限合同者、家庭无其他就业且有需扶养老人或未成年人的。六个月内重新招用人员的，应通知被裁人员并在同等条件下优先招用。\n实务要点：裁员有严格程序（说明、听取意见、报告），并非单位单方决定；违规裁员可被认定为违法解除。"},{"no":"第四十二条","t":"第四十二条 劳动者有下列情形之一的，用人单位不得依照本法第四十条、第四十一条 的规定解除劳动合同：\n（一）从事接触职业病危害作业的劳动者未进行离岗前职业健康检查，或者疑似职业病 病人在诊断或者医学观察期间的；\n（二）在本单位患职业病或者因工负伤并被确认丧失或者部分丧失劳动能力的；\n（三）患病或者非因工负伤，在规定的医疗期内的；\n（四）女职工在孕期、产期、哺乳期的；\n（五）在本单位连续工作满十五年，且距法定退休年龄不足五年的；\n（六）法律、行政法规规定的其他情形。","ex":"不得依第四十条、第四十一条解除（即非过失解除和裁员）的情形：(一)接触职业病危害未做离岗体检，或疑似职业病诊断/观察期；(二)患职业病或因工负伤并确认丧失或部分丧失劳动能力；(三)患病或非因工负伤在医疗期内；(四)女职工在孕期、产期、哺乳期；(五)在本单位连续工作满十五年且距法定退休不足五年；(六)其他法定情形。\n实务要点：上述「弱势」情形单位不得「辞退」，但若存在第三十九条过失性情形，仍可解除。"},{"no":"第四十三条","t":"第四十三条 用人单位单方解除劳动合同，应当事先将理由通知工会。用人单位违反法 律、行政法规规定或者劳动合同约定的，工会有权要求用人单位纠正。用人单位应当研究工 会的意见，并将处理结果书面通知工会。","ex":"解除须通知工会。用人单位单方解除劳动合同，应事先将理由通知工会；违反法律法规或合同约定的，工会有权要求纠正，单位应研究工会意见并将处理结果书面通知工会。\n实务要点：未通知工会属程序违法，即便解除事由成立，也可能被认定违法解除（程序瑕疵可补正，但各地裁判尺度不一，单位应重视）。"},{"no":"第四十四条","t":"第四十四条  有下列情形之一的，劳动合同终止：\n（一）劳动合同期满的；\n（二）劳动者开始依法享受基本养老保险待遇的；\n（三）劳动者死亡，或者被人民法院宣告死亡或者宣告失踪的；\n（四）用人单位被依法宣告破产的；\n（五）用人单位被吊销营业执照、责令关闭、撤销或者用人单位决定提前解散的；\n（六）法律、行政法规规定的其他情形。","ex":"劳动合同终止的法定情形：(一)合同期满；(二)劳动者开始依法享受基本养老保险待遇；(三)劳动者死亡或被宣告死亡/失踪；(四)单位被依法宣告破产；(五)单位被吊销执照、责令关闭、撤销或决定提前解散；(六)其他法定情形。\n实务要点：终止与解除不同，终止多因客观事由；注意达到退休年龄但未享养老保险待遇的处理，各地口径略有差异，以当地规定为准。"},{"no":"第四十五条","t":"第四十五条 劳动合同期满，有本法第四十二条规定情形之一的，劳动合同应当续延至 相应的情形消失时终止。但是，本法第四十二条第二项规定丧失或者部分丧失劳动能力劳动 者的劳动合同的终止，按照国家有关工伤保险的规定执行。","ex":"终止的续延。合同期满，有本法第四十二条规定情形之一的，应续延至相应情形消失时终止；但第四十二条第二项（丧失或部分丧失劳动能力）劳动者的合同终止，按国家有关工伤保险规定执行。\n实务要点：俗称「合同到期也不能走」，属对弱势劳动者的保护，HR应在到期前核查是否存在第四十二条情形。"},{"no":"第四十六条","t":"第四十六条  有下列情形之一的，用人单位应当向劳动者支付经济补偿：\n（一）劳动者依照本法第三十八条规定解除劳动合同的；\n（二）用人单位依照本法第三十六条规定向劳动者提出解除劳动合同并与劳动者协商一 致解除劳动合同的；\n（三）用人单位依照本法第四十条规定解除劳动合同的；\n（四）用人单位依照本法第四十一条第一款规定解除劳动合同的；\n（五）除用人单位维持或者提高劳动合同约定条件续订劳动合同，劳动者不同意续订的 情形外，依照本法第四十四条第一项规定终止固定期限劳动合同的；\n（六）依照本法第四十四条第四项、第五项规定终止劳动合同的；\n（七）法律、行政法规规定的其他情形。","ex":"应支付经济补偿的情形：(一)劳动者依第三十八条（单位过错）解除；(二)单位依第三十六条提出并协商一致解除；(三)单位依第四十条解除；(四)单位依第四十一条第一款（裁员）解除；(五)除单位维持或提高条件续订而劳动者不同意外，依第四十四条第一项终止固定期限合同；(六)依第四十四条第四、五项（破产、吊销等）终止；(七)其他法定情形。\n实务要点：记住「哪些情形要给补偿」是HR核算离职成本的核心；劳动者据此判断自身是否有权主张补偿。"},{"no":"第四十七条","t":"第四十七条 经济补偿按劳动者在本单位工作的年限，每满一年支付一个月工资的标准 向劳动者支付。六个月以上不满一年的，按一年计算；不满六个月的，向劳动者支付半个月 工资的经济补偿。\n劳动者月工资高于用人单位所在直辖市、设区的市级人民政府公布的本地区上年度职工 月平均工资三倍的，向其支付经济补偿的标准按职工月平均工资三倍的数额支付，向其支付 经济补偿的年限最高不超过十二年。\n本条所称月工资是指劳动者在劳动合同解除或者终止前十二个月的平均工资。","ex":"经济补偿计算标准。按劳动者在本单位工作年限，每满一年支付一个月工资；六个月以上不满一年按一年算，不满六个月支付半个月工资。劳动者月工资高于当地上年度职工月平均工资三倍的，按三倍数额支付，支付年限最高不超过十二年。本条所称月工资指解除或终止前十二个月的平均工资。\n实务要点：月工资是税前应得（含奖金、津贴）的12个月平均，含加班费；高收入者受「三倍封顶+12年封顶」限制。","rel":["r5"]},{"no":"第四十八条","t":"第四十八条 用人单位违反本法规定解除或者终止劳动合同，劳动者要求继续履行劳动 合同的，用人单位应当继续履行；劳动者不要求继续履行劳动合同或者劳动合同已经不能继 续履行的，用人单位应当依照本法第八十七条规定支付赔偿金。","ex":"违法解除或终止的后果。用人单位违反本法规定解除或终止合同，劳动者要求继续履行的，单位应当继续履行；劳动者不要求继续履行或合同已不能继续履行的，单位应依本法第八十七条支付赔偿金（即经济补偿的二倍）。\n实务要点：劳动者可选择「恢复劳动关系」或「拿赔偿金」，选择权在劳动者；单位不能单方面以赔钱了事。","cases":["c2"],"rel":["r6"]},{"no":"第四十九条","t":"第四十九条  国家采取措施，建立健全劳动者社会保险关系跨地区转移接续制度。","ex":"社会保险关系跨地区转移接续。国家采取措施，建立健全劳动者社会保险关系跨地区转移接续制度。\n实务要点：本条为原则性规定，具体转移接续规则由《社会保险法》及配套规定落实，劳动者跨地区流动时据此办理社保转移。"},{"no":"第五十条","t":"第五十条 用人单位应当在解除或者终止劳动合同时出具解除或者终止劳动合同的证明， 并在十五日内为劳动者办理档案和社会保险关系转移手续。\n劳动者应当按照双方约定，办理工作交接。用人单位依照本法有关规定应当向劳动者支 付经济补偿的，在办结工作交接时支付。\n用人单位对已经解除或者终止的劳动合同的文本，至少保存二年备查。","ex":"解除或终止后的附随义务。单位应出具解除或终止劳动合同的证明，并在十五日内为劳动者办理档案和社会保险关系转移手续；劳动者应按约定办理工作交接，单位应支付经济补偿的，在办结交接时支付；单位对已解除或终止的合同文本至少保存二年备查。\n实务要点：单位不出具离职证明影响劳动者再就业的，可要求赔偿损失；交接与补偿支付可挂钩，但不得无限拖延。"}]},{"ch":"第五章  特别规定","items":[{"no":"","t":"第一节  集体合同\n第二节  劳务派遣\n第三节  非全日制用工","ex":"本章为「特别规定」，下设三节：第一节集体合同、第二节劳务派遣、第三节非全日制用工。以下条目分别就这三类特殊用工形态作出专门规范，是对前面一般规则的补充与细化。"},{"no":"","t":"第一节  集体合同","ex":"第五章第一节「集体合同」的节标题。自本条起围绕集体合同制度展开，规范集体合同的订立、生效、标准底线及争议处理。"},{"no":"第五十一条","t":"第五十一条 企业职工一方与用人单位通过平等协商，可以就劳动报酬、工作时间、休息 休假、劳动安全卫生、保险福利等事项订立集体合同。集体合同草案应当提交职工代表大会 或者全体职工讨论通过。\n集体合同由工会代表企业职工一方与用人单位订立；尚未建立工会的用人单位，由上级 工会指导劳动者推举的代表与用人单位订立。","ex":"集体合同的订立。企业职工一方与用人单位通过平等协商，可就劳动报酬、工作时间、休息休假、劳动安全卫生、保险福利等事项订立集体合同；草案应提交职工代表大会或全体职工讨论通过。集体合同由工会代表企业职工一方与单位订立；尚未建立工会的，由上级工会指导劳动者推举的代表与单位订立。\n实务要点：集体合同是「工会（或职工代表）对单位」的团体协议，效力高于单个劳动合同。"},{"no":"第五十二条","t":"第五十二条 企业职工一方与用人单位可以订立劳动安全卫生、女职工权益保护、工资 调整机制等专项集体合同。","ex":"专项集体合同。企业职工一方与用人单位可就劳动安全卫生、女职工权益保护、工资调整机制等订立专项集体合同。\n实务要点：针对特定议题可单独签订专项合同，便于聚焦解决某类权益问题。"},{"no":"第五十三条","t":"第五十三条 在县级以下区域内，建筑业、采矿业、餐饮服务业等行业可以由工会与企 业方面代表订立行业性集体合同，或者订立区域性集体合同。","ex":"行业性、区域性集体合同。在县级以下区域内，建筑业、采矿业、餐饮服务业等行业可由工会与企业方面代表订立行业性集体合同，或订立区域性集体合同。\n实务要点：适用于同行业、同区域多家中小企业的劳动者权益整体提升。"},{"no":"第五十四条","t":"第五十四条 集体合同订立后，应当报送劳动行政部门；劳动行政部门自收到集体合同 文本之日起十五日内未提出异议的，集体合同即行生效。\n依法订立的集体合同对用人单位和劳动者具有约束力。行业性、区域性集体合同对当地 本行业、本区域的用人单位和劳动者具有约束力。","ex":"集体合同的生效。集体合同订立后应报送劳动行政部门；劳动行政部门自收到文本之日起十五日内未提出异议的，集体合同即行生效。依法订立的集体合同对用人单位和劳动者具有约束力；行业性、区域性集体合同对当地本行业、本区域的用人单位和劳动者具有约束力。\n常见误区：集体合同不是「审批生效」而是「备案生效」——十五日内不反对即生效，无需行政许可。"},{"no":"第五十五条","t":"第五十五条 集体合同中劳动报酬和劳动条件等标准不得低于当地人民政府规定的最低 标准；用人单位与劳动者订立的劳动合同中劳动报酬和劳动条件等标准不得低于集体合同规 定的标准。","ex":"集体合同的标准底线。集体合同中劳动报酬和劳动条件等标准不得低于当地人民政府规定的最低标准；用人单位与劳动者订立的劳动合同中，劳动报酬和劳动条件等标准不得低于集体合同规定的标准。\n实务要点：标准关系为「当地最低标准 ≤ 集体合同标准 ≤ 单个劳动合同标准」，即「就高不就低」。"},{"no":"第五十六条","t":"第五十六条 用人单位违反集体合同，侵犯职工劳动权益的，工会可以依法要求用人单 位承担责任；因履行集体合同发生争议，经协商解决不成的，工会可以依法申请仲裁、提起 诉讼。\n第二节  劳务派遣","ex":"违反集体合同的救济。用人单位违反集体合同、侵犯职工劳动权益的，工会可依法要求单位承担责任；因履行集体合同发生争议，经协商不成的，工会可依法申请仲裁、提起诉讼。\n（本条末同时标记进入第二节「劳务派遣」。）\n实务要点：集体合同争议由工会出面，个人一般不直接就集体合同起诉；个体劳动合同争议则走个人仲裁。"},{"no":"第五十七条","t":"第五十七条 经营劳务派遣业务应当具备下列条件：\n（一）注册资本不得少于人民币二百万元；\n（二）有与开展业务相适应的固定的经营场所和设施；\n（三）有符合法律、行政法规规定的劳务派遣管理制度；\n（四）法律、行政法规规定的其他条件。\n经营劳务派遣业务，应当向劳动行政部门依法申请行政许可；经许可的，依法办理相应 的公司登记。未经许可，任何单位和个人不得经营劳务派遣业务。","ex":"经营劳务派遣业务的条件。须具备：(一)注册资本不得少于人民币二百万元；(二)有与业务相适应的固定经营场所和设施；(三)有符合法律法规的劳务派遣管理制度；(四)其他法定条件。经营派遣业务应向劳动行政部门申请行政许可，未经许可任何单位和个人不得经营。\n实务要点：派遣是许可经营，无资质经营将被重罚（第九十二条）。"},{"no":"第五十八条","t":"第五十八条 劳务派遣单位是本法所称用人单位，应当履行用人单位对劳动者的义务。\n劳务派遣单位与被派遣劳动者订立的劳动合同，除应当载明本法第十七条规定的事项外，还 应当载明被派遣劳动者的用工单位以及派遣期限、工作岗位等情况。\n劳务派遣单位应当与被派遣劳动者订立二年以上的固定期限劳动合同，按月支付劳动报 酬；被派遣劳动者在无工作期间，劳务派遣单位应当按照所在地人民政府规定的最低工资标 准，向其按月支付报酬。","ex":"劳务派遣单位的义务。派遣单位是本法所称用人单位，应履行用人单位对劳动者的义务；与派遣劳动者订立的劳动合同，除载明第十七条事项外，还应载明用工单位、派遣期限、工作岗位等；应订立二年以上的固定期限合同，按月支付报酬；被派遣劳动者在无工作期间，派遣单位应按所在地最低工资按月支付报酬。\n实务要点：派遣单位是「法律上的雇主」，对工资、社保、合同等负首要责任，不能把责任推给用工单位。"},{"no":"第五十九条","t":"第五十九条 劳务派遣单位派遣劳动者应当与接受以劳务派遣形式用工的单位（以下称 用工单位）订立劳务派遣协议。劳务派遣协议应当约定派遣岗位和人员数量、派遣期限、劳动报酬和社会保险费的数额与支付方式以及违反协议的责任。\n用工单位应当根据工作岗位的实际需要与劳务派遣单位确定派遣期限，不得将连续用工 期限分割订立数个短期劳务派遣协议。","ex":"劳务派遣协议。派遣单位与接受以劳务派遣形式用工的单位（用工单位）应订立劳务派遣协议，约定派遣岗位和人员数量、派遣期限、劳动报酬和社会保险费的数额与支付方式及违约责任；用工单位应根据岗位实际需要确定派遣期限，不得将连续用工期限分割订立数个短期协议。\n实务要点：「化整为零」签多个短期协议以规避义务的，属违法。"},{"no":"第六十条","t":"第六十条 劳务派遣单位应当将劳务派遣协议的内容告知被派遣劳动者。\n劳务派遣单位不得克扣用工单位按照劳务派遣协议支付给被派遣劳动者的劳动报酬。\n劳务派遣单位和用工单位不得向被派遣劳动者收取费用。","ex":"告知义务与禁止克扣、收费。派遣单位应将派遣协议内容告知被派遣劳动者；不得克扣用工单位按协议支付的劳动报酬；派遣单位和用工单位不得向被派遣劳动者收取费用。\n实务要点：实践中「被派遣劳动者实际到手工资明显低于协议约定」多属克扣，可向劳动监察举报。"},{"no":"第六十一条","t":"第六十一条 劳务派遣单位跨地区派遣劳动者的，被派遣劳动者享有的劳动报酬和劳动 条件，按照用工单位所在地的标准执行。","ex":"跨地区派遣的标准。劳务派遣单位跨地区派遣劳动者的，被派遣劳动者享有的劳动报酬和劳动条件，按照用工单位所在地的标准执行。\n实务要点：跨地区派遣「就高」于用工单位所在地标准，防止单位借异地低标准规避义务。"},{"no":"第六十二条","t":"第六十二条 用工单位应当履行下列义务：\n（一）执行国家劳动标准，提供相应的劳动条件和劳动保护；\n（二）告知被派遣劳动者的工作要求和劳动报酬；\n（三）支付加班费、绩效奖金，提供与工作岗位相关的福利待遇；\n（四）对在岗被派遣劳动者进行工作岗位所必需的培训；\n（五）连续用工的，实行正常的工资调整机制。\n用工单位不得将被派遣劳动者再派遣到其他用人单位。","ex":"用工单位的义务。用工单位应当：(一)执行国家劳动标准，提供相应劳动条件和保护；(二)告知工作要求和劳动报酬；(三)支付加班费、绩效奖金，提供与岗位相关的福利待遇；(四)对在岗被派遣劳动者进行必要培训；(五)连续用工实行正常工资调整机制。用工单位不得将被派遣劳动者再派遣到其他单位。\n实务要点：用工单位是「实际上的管理方」，对现场劳动条件、加班费、培训等负直接责任。"},{"no":"第六十三条","t":"第六十三条  被派遣劳动者享有与用工单位的劳动者同工同酬的权利。用工单位应当按 照同工同酬原则，对被派遣劳动者与本单位同类岗位的劳动者实行相同的劳动报酬分配办法。 用工单位无同类岗位劳动者的，参照用工单位所在地相同或者相近岗位劳动者的劳动报酬确 定。\n劳务派遣单位与被派遣劳动者订立的劳动合同和与用工单位订立的劳务派遣协议，载明 或者约定的向被派遣劳动者支付的劳动报酬应当符合前款规定。","ex":"同工同酬权。被派遣劳动者享有与用工单位劳动者同工同酬的权利；用工单位应按同工同酬原则，对被派遣劳动者与本单位同类岗位劳动者实行相同劳动报酬分配办法；无同类岗位的，参照所在地相同或相近岗位确定。派遣合同和派遣协议载明的报酬应符合前述规定。\n实务要点：这是治理「同工不同酬」的核心条款，但「同岗同酬」须结合岗位、绩效等综合判断，并非简单划一。","cases":["c4"]},{"no":"第六十四条","t":"第六十四条 被派遣劳动者有权在劳务派遣单位或者用工单位依法参加或者组织工会， 维护自身的合法权益。","ex":"被派遣劳动者参加工会。被派遣劳动者有权在派遣单位或用工单位依法参加或组织工会，维护自身权益。\n实务要点：可在任一方入会，避免「两不管」。"},{"no":"第六十五条","t":"第六十五条 被派遣劳动者可以依照本法第三十六条、第三十八条的规定与劳务派遣单 位解除劳动合同。\n被派遣劳动者有本法第三十九条和第四十条第一项、第二项规定情形的，用工单位可以 将劳动者退回劳务派遣单位，劳务派遣单位依照本法有关规定，可以与劳动者解除劳动合同。","ex":"被派遣劳动者的退回与解除。被派遣劳动者可依照本法第三十六条、第三十八条的规定与派遣单位解除劳动合同；有本法第三十九条和第四十条第一、二项情形的，用工单位可将劳动者退回派遣单位，派遣单位依法可与劳动者解除劳动合同。\n实务要点：用工单位一般不能「直接开除」派遣工，只能「退回」；是否解除由派遣单位依法决定。"},{"no":"第六十六条","t":"第六十六条 劳动合同用工是我国的企业基本用工形式。劳务派遣用工是补充形式，只 能在临时性、辅助性或者替代性的工作岗位上实施。\n前款规定的临时性工作岗位是指存续时间不超过六个月的岗位；辅助性工作岗位是指为 主营业务岗位提供服务的非主营业务岗位；替代性工作岗位是指用工单位的劳动者因脱产学 习、休假等原因无法工作的一定期间内，可以由其他劳动者替代工作的岗位。\n用工单位应当严格控制劳务派遣用工数量，不得超过其用工总量的一定比例，具体比例 由国务院劳动行政部门规定。","ex":"劳务派遣的定位与「三性」岗位。劳动合同用工是企业基本用工形式，劳务派遣是补充形式，只能在临时性、辅助性、替代性的工作岗位上实施。临时性指存续不超过六个月；辅助性指为主营业务岗位提供服务的非主营业务岗位；替代性指用工单位劳动者因脱产学习、休假等无法工作的一定期间内可由他人替代的岗位。用工单位应严格控制派遣用工数量比例（由国务院劳动行政部门规定）。\n实务要点：把核心岗位长期用派遣工「顶替」，违反「三性」要求，属违法使用派遣。"},{"no":"第六十七条","t":"第六十七条 用人单位不得设立劳务派遣单位向本单位或者所属单位派遣劳动者。\n第三节  非全日制用工","ex":"禁止自我派遣。用人单位不得设立劳务派遣单位向本单位或者所属单位派遣劳动者。\n（本条末同时标记进入第三节「非全日制用工」。）\n实务要点：集团内部「左手设派遣公司、右手派到自己单位」的规避做法被明令禁止。"},{"no":"第六十八条","t":"第六十八条 非全日制用工，是指以小时计酬为主，劳动者在同一用人单位一般平均每\n日工作时间不超过四小时，每周工作时间累计不超过二十四小时的用工形式。","ex":"非全日制用工的定义。指以小时计酬为主，劳动者在同一用人单位一般平均每日工作时间不超过四小时，每周工作时间累计不超过二十四小时的用工形式。\n实务要点：超过上述时长可能被认定为全日制用工，从而适用书面合同、社保等更严格规则。"},{"no":"第六十九条","t":"第六十九条 非全日制用工双方当事人可以订立口头协议。\n从事非全日制用工的劳动者可以与一个或者一个以上用人单位订立劳动合同；但是，后 订立的劳动合同不得影响先订立的劳动合同的履行。","ex":"非全日制可口头协议。双方可订立口头协议；从事非全日制用工的劳动者可与一个或一个以上用人单位订立劳动合同，但后订立的不得影响先订立的履行。\n实务要点：与全日制「不得建立双重劳动关系」不同，非全日制允许多重用工，但不得冲突。"},{"no":"第七十条","t":"第七十条 非全日制用工双方当事人不得约定试用期。","ex":"非全日制不得约定试用期。非全日制用工双方当事人不得约定试用期。\n实务要点：任何以「试用」名义扣减非全日制劳动者工资或随意辞退的，均违法。"},{"no":"第七十一条","t":"第七十一条 非全日制用工双方当事人任何一方都可以随时通知对方终止用工。终止用 工，用人单位不向劳动者支付经济补偿。","ex":"非全日制随时终止。双方任何一方都可以随时通知对方终止用工；终止用工，用人单位不向劳动者支付经济补偿。\n实务要点：非全日制用工高度灵活，但单位也不得借此规避解除程序的法定限制（如歧视、报复性终止仍可能另涉责任）。"},{"no":"第七十二条","t":"第七十二条  非全日制用工小时计酬标准不得低于用人单位所在地人民政府规定的最低 小时工资标准。\n非全日制用工劳动报酬结算支付周期最长不得超过十五日。","ex":"非全日制报酬标准与支付周期。小时计酬标准不得低于用人单位所在地人民政府规定的最低小时工资标准；劳动报酬结算支付周期最长不得超过十五日。\n实务要点：非全日制虽灵活，但「最低小时工资」和「15日内结算」是硬性底线。"}]},{"ch":"第六章  监督检查","items":[{"no":"第七十三条","t":"第七十三条 国务院劳动行政部门负责全国劳动合同制度实施的监督管理。\n县级以上地方人民政府劳动行政部门负责本行政区域内劳动合同制度实施的监督管理。\n县级以上各级人民政府劳动行政部门在劳动合同制度实施的监督管理工作中，应当听取 工会、企业方面代表以及有关行业主管部门的意见。","ex":"监督检查的主管部门。国务院劳动行政部门负责全国劳动合同制度实施的监督管理；县级以上地方劳动行政部门负责本行政区域内的监督管理；监管工作中应听取工会、企业方面代表及有关行业主管部门意见。\n实务要点：劳动者维权主要对接「县级以上劳动行政部门（人社局/劳动监察）」。"},{"no":"第七十四条","t":"第七十四条  县级以上地方人民政府劳动行政部门依法对下列实施劳动合同制度的情况 进行监督检查：\n（一）用人单位制定直接涉及劳动者切身利益的规章制度及其执行的情况；\n（二）用人单位与劳动者订立和解除劳动合同的情况；\n（三）劳务派遣单位和用工单位遵守劳务派遣有关规定的情况；\n（四）用人单位遵守国家关于劳动者工作时间和休息休假规定的情况；\n（五）用人单位支付劳动合同约定的劳动报酬和执行最低工资标准的情况；\n（六）用人单位参加各项社会保险和缴纳社会保险费的情况；\n（七）法律、法规规定的其他劳动监察事项。","ex":"劳动行政部门监督检查事项。县级以上地方劳动行政部门依法检查：(一)直接涉及劳动者切身利益的规章制度及其执行；(二)订立和解除劳动合同的情况；(三)劳务派遣单位和用工单位遵守派遣规定的情况；(四)遵守工时和休息休假规定；(五)支付约定报酬和执行最低工资；(六)参加各项社保和缴纳社保费；(七)其他法定监察事项。\n实务要点：劳动监察覆盖面广，欠薪、超时加班、不缴社保等均可投诉。"},{"no":"第七十五条","t":"第七十五条  县级以上地方人民政府劳动行政部门实施监督检查时，有权查阅与劳动合 同、集体合同有关的材料，有权对劳动场所进行实地检查，用人单位和劳动者都应当如实提 供有关情况和材料。\n劳动行政部门的工作人员进行监督检查，应当出示证件，依法行使职权，文明执法。","ex":"检查职权与文明执法。劳动行政部门实施监督检查时，有权查阅与劳动合同、集体合同有关的材料，有权对劳动场所实地检查，用人单位和劳动者都应如实提供情况和材料；工作人员应出示证件、依法行使职权、文明执法。\n实务要点：检查须出示证件；单位拒不配合检查的，可能承担相应法律责任。"},{"no":"第七十六条","t":"第七十六条 县级以上人民政府建设、卫生、安全生产监督管理等有关主管部门在各自 职责范围内，对用人单位执行劳动合同制度的情况进行监督管理。","ex":"其他主管部门的监管。县级以上人民政府建设、卫生、安全生产监督管理等有关主管部门在各自职责范围内，对用人单位执行劳动合同制度的情况进行监督管理。\n实务要点：建筑、卫健、安监等行业主管部门也有权在职责范围内监督，形成多部门监管。"},{"no":"第七十七条","t":"第七十七条 劳动者合法权益受到侵害的，有权要求有关部门依法处理，或者依法申请 仲裁、提起诉讼。","ex":"劳动者维权途径。劳动者合法权益受到侵害的，有权要求有关部门依法处理，或者依法申请仲裁、提起诉讼。\n实务要点：一般劳动争议须「先仲裁后诉讼」；个别情形（如欠薪支付令）可直接走司法程序。"},{"no":"第七十八条","t":"第七十八条 工会依法维护劳动者的合法权益，对用人单位履行劳动合同、集体合同的 情况进行监督。用人单位违反劳动法律、法规和劳动合同、集体合同的，工会有权提出意见 或者要求纠正；劳动者申请仲裁、提起诉讼的，工会依法给予支持和帮助。","ex":"工会的监督职责。工会依法维护劳动者合法权益，对用人单位履行劳动合同、集体合同的情况进行监督；单位违反劳动法律法规和合同、集体合同的，工会有权提出意见或要求纠正；劳动者申请仲裁、提起诉讼的，工会依法给予支持和帮助。\n实务要点：维权时可请工会出具支持，尤其集体合同履行争议由工会主导。"},{"no":"第七十九条","t":"第七十九条 任何组织或者个人对违反本法的行为都有权举报，县级以上人民政府劳动 行政部门应当及时核实、处理，并对举报有功人员给予奖励。","ex":"举报与奖励。任何组织或个人对违反本法的行为都有权举报，县级以上劳动行政部门应及时核实、处理，并对举报有功人员给予奖励。\n实务要点：举报是群众监督渠道，匿名或实名均可，查证属实可能获得奖励。"}]},{"ch":"第七章  法律责任","items":[{"no":"第八十条","t":"第八十条 用人单位直接涉及劳动者切身利益的规章制度违反法律、法规规定的，由劳 动行政部门责令改正，给予警告；给劳动者造成损害的，应当承担赔偿责任。","ex":"规章制度违法的责任。用人单位直接涉及劳动者切身利益的规章制度违反法律、法规规定的，由劳动行政部门责令改正，给予警告；给劳动者造成损害的，应承担赔偿责任。\n实务要点：制度内容与法律冲突（如「怀孕即辞退」「超时无偿加班」）不仅无效，还会招致处罚和赔偿。"},{"no":"第八十一条","t":"第八十一条 用人单位提供的劳动合同文本未载明本法规定的劳动合同必备条款或者用 人单位未将劳动合同文本交付劳动者的，由劳动行政部门责令改正；给劳动者造成损害的， 应当承担赔偿责任。","ex":"劳动合同文本瑕疵的责任。用人单位提供的劳动合同文本未载明本法规定的必备条款，或者未将劳动合同文本交付劳动者的，由劳动行政部门责令改正；给劳动者造成损害的，应承担赔偿责任。\n实务要点：不给劳动者合同文本是常见违规，劳动者可要求交付并投诉。"},{"no":"第八十二条","t":"第八十二条 用人单位自用工之日起超过一个月不满一年未与劳动者订立书面劳动合同 的，应当向劳动者每月支付二倍的工资。\n用人单位违反本法规定不与劳动者订立无固定期限劳动合同的，自应当订立无固定期限 劳动合同之日起向劳动者每月支付二倍的工资。","ex":"未订书面合同的二倍工资。用人单位自用工之日起超过一个月不满一年未与劳动者订立书面劳动合同的，应向劳动者每月支付二倍的工资；违反本法规定不与劳动者订立无固定期限劳动合同的，自应当订立之日起向劳动者每月支付二倍的工资。\n实务要点：二倍工资有时效限制，从应订而未订的次月起算仲裁时效，劳动者应及时主张。","cases":["c1"],"rel":["r3","r4"]},{"no":"第八十三条","t":"第八十三条 用人单位违反本法规定与劳动者约定试用期的，由劳动行政部门责令改 正；违法约定的试用期已经履行的，由用人单位以劳动者试用期满月工资为标准，按已经 履行的超过法定试用期的期间向劳动者支付赔偿金。","ex":"违法约定试用期的赔偿。用人单位违反本法规定与劳动者约定试用期的，由劳动行政部门责令改正；违法约定的试用期已经履行的，由用人单位以劳动者试用期满月工资为标准，按已经履行的超过法定试用期的期间向劳动者支付赔偿金。\n实务要点：如法定试用期1个月却约定3个月且已履行，超出的2个月按转正工资赔。"},{"no":"第八十四条","t":"第八十四条 用人单位违反本法规定，扣押劳动者居民身份证等证件的，由劳动行政部 门责令限期退还劳动者本人，并依照有关法律规定给予处罚。\n用人单位违反本法规定，以担保或者其他名义向劳动者收取财物的，由劳动行政部门责 令限期退还劳动者本人，并以每人五百元以上二千元以下的标准处以罚款；给劳动者造成损 害的，应当承担赔偿责任。\n劳动者依法解除或者终止劳动合同，用人单位扣押劳动者档案或者其他物品的，依照前 款规定处罚。","ex":"扣押证件、收取财物的责任。用人单位扣押劳动者身份证等证件的，责令限期退还并依有关法律规定处罚；以担保或其他名义向劳动者收取财物的，责令限期退还并以每人五百元以上二千元以下的标准罚款，造成损害赔偿；劳动者依法解除或终止合同，单位扣押档案或其他物品的，依照前款规定处罚。\n实务要点：押金、证件、档案「三不得扣」，违者既罚款又赔偿。"},{"no":"第八十五条","t":"第八十五条 用人单位有下列情形之一的，由劳动行政部门责令限期支付劳动报酬、加 班费或者经济补偿；劳动报酬低于当地最低工资标准的，应当支付其差额部分；逾期不支付 的，责令用人单位按应付金额百分之五十以上百分之一百以下的标准向劳动者加付赔偿金：\n（一）未按照劳动合同的约定或者国家规定及时足额支付劳动者劳动报酬的；\n（二）低于当地最低工资标准支付劳动者工资的；\n（三）安排加班不支付加班费的；\n（四）解除或者终止劳动合同，未依照本法规定向劳动者支付经济补偿的。","ex":"欠薪等加付赔偿金。用人单位有下列情形之一的，由劳动行政部门责令限期支付劳动报酬、加班费或经济补偿；劳动报酬低于当地最低工资标准的，应支付差额；逾期不支付的，责令按应付金额百分之五十以上百分之一百以下的标准向劳动者加付赔偿金：(一)未按约定或国家规定及时足额支付报酬；(二)低于当地最低工资支付工资；(三)安排加班不支付加班费；(四)解除或终止合同未依法支付经济补偿。\n实务要点：经劳动行政部门责令后仍逾期不付，才触发加付赔偿金，是「行政责令+惩罚性赔偿」双轨。"},{"no":"第八十六条","t":"第八十六条 劳动合同依照本法第二十六条规定被确认无效，给对方造成损害的，有过 错的一方应当承担赔偿责任。","ex":"无效合同的赔偿。劳动合同依照本法第二十六条被确认无效，给对方造成损害的，有过错的一方应承担赔偿责任。\n实务要点：无效合同若因一方欺诈、胁迫等导致，受损方可索赔，与第二十八条的报酬支付并行不悖。"},{"no":"第八十七条","t":"第八十七条 用人单位违反本法规定解除或者终止劳动合同的，应当依照本法第四十七 条规定的经济补偿标准的二倍向劳动者支付赔偿金。","ex":"违法解除或终止的赔偿金。用人单位违反本法规定解除或终止劳动合同的，应依照本法第四十七条规定的经济补偿标准的二倍向劳动者支付赔偿金。\n实务要点：赔偿金=经济补偿×2，且不再叠发经济补偿；与第四十八条的继续履行选择权衔接。","cases":["c2"]},{"no":"第八十八条","t":"第八十八条 用人单位有下列情形之一的，依法给予行政处罚；构成犯罪的，依法追究 刑事责任；给劳动者造成损害的，应当承担赔偿责任：\n（一）以暴力、威胁或者非法限制人身自由的手段强迫劳动的；\n（二）违章指挥或者强令冒险作业危及劳动者人身安全的；\n（三）侮辱、体罚、殴打、非法搜查或者拘禁劳动者的；\n（四）劳动条件恶劣、环境污染严重，给劳动者身心健康造成严重损害的。","ex":"严重侵权的责任。用人单位有下列行为，依法给予行政处罚，构成犯罪的追刑责，造成损害的赔偿：(一)以暴力、威胁或非法限制人身自由手段强迫劳动；(二)违章指挥或强令冒险作业危及人身安全；(三)侮辱、体罚、殴打、非法搜查或拘禁劳动者；(四)劳动条件恶劣、环境污染严重，给身心健康造成严重损害。\n实务要点：此类情形性质严重，可能涉刑事（如强迫劳动罪），劳动者应及时报警并保留证据。"},{"no":"第八十九条","t":"第八十九条 用人单位违反本法规定未向劳动者出具解除或者终止劳动合同的书面证 明，由劳动行政部门责令改正；给劳动者造成损害的，应当承担赔偿责任。","ex":"不出具离职证明的责任。用人单位违反本法规定未向劳动者出具解除或终止劳动合同的书面证明的，由劳动行政部门责令改正；给劳动者造成损害的，应承担赔偿责任。\n实务要点：离职证明是再就业、领失业金、办社保转移的必备材料，单位拖延或拒绝出具可被投诉并索赔。"},{"no":"第九十条","t":"第九十条 劳动者违反本法规定解除劳动合同，或者违反劳动合同中约定的保密义务 或者竞业限制，给用人单位造成损失的，应当承担赔偿责任。\n第九十 一 条 用人单位招用与其他用人单位尚未解除或者终止劳动合同的劳动者，给 其他用人单位造成损失的，应当承担连带赔偿责任。","ex":"劳动者的赔偿责任。劳动者违反本法规定解除劳动合同，或者违反劳动合同中约定的保密义务或竞业限制，给用人单位造成损失的，应承担赔偿责任。\n（本条原文末段同时含第九十一条：用人单位招用与其他用人单位尚未解除或终止劳动合同的劳动者，给其他用人单位造成损失的，应当承担连带赔偿责任。）\n实务要点：劳动者「跳糟」未依法交接或违反保密/竞业，可能赔钱；「挖角」明知未离职员工，招用单位须承担连带赔偿。"},{"no":"第九十二条","t":"第九十二条 违反本法规定，未经许可，擅自经营劳务派遣业务的，由劳动行政部门 责令停止违法行为，没收违法所得，并处违法所得一倍以上五倍以下的罚款；没有违法所 得的，可以处五万元以下的罚款。\n劳务派遣单位、用工单位违反本法有关劳务派遣规定的，由劳动行政部门责令限期改 正；逾期不改正的，以每人五千元以上一万元以下的标准处以罚款，对劳务派遣单位，吊 销其劳务派遣业务经营许可证。用工单位给被派遣劳动者造成损害的，劳务派遣单位与用 工单位承担连带赔偿责任。","ex":"劳务派遣违法责任。未经许可擅自经营派遣业务的，责令停止、没收违法所得，并处违法所得一倍以上五倍以下罚款；无违法所得的，处五万元以下罚款。劳务派遣单位、用工单位违反派遣规定的，责令限期改正；逾期不改的，以每人五千元以上一万元以下标准罚款，对派遣单位吊销其经营许可。用工单位给被派遣劳动者造成损害的，派遣单位与用工单位承担连带赔偿责任。\n实务要点：派遣违法实行「双罚」且「连带责任」，劳动者可向任一方索赔。"},{"no":"第九十三条","t":"第九十三条 对不具备合法经营资格的用人单位的违法犯罪行为，依法追究法律责任； 劳动者已经付出劳动的，该单位或者其出资人应当依照本法有关规定向劳动者支付劳动报  酬、经济补偿、赔偿金；给劳动者造成损害的，应当承担赔偿责任。","ex":"无合法经营资格单位的责任。对不具备合法经营资格的用人单位的违法犯罪行为，依法追究法律责任；劳动者已经付出劳动的，该单位或其出资人应依照本法有关规定向劳动者支付劳动报酬、经济补偿、赔偿金；造成损害的，承担赔偿责任。\n实务要点：即便单位「不合法」，只要实际用工，劳动者报酬等权益仍受保护，可向出资人追索。"},{"no":"第九十四条","t":"第九十四条 个人承包经营违反本法规定招用劳动者，给劳动者造成损害的，发包的组 织与个人承包经营者承担连带赔偿责任。","ex":"个人承包的连带责任。个人承包经营违反本法规定招用劳动者，给劳动者造成损害的，发包的组织与个人承包经营者承担连带赔偿责任。\n实务要点：建筑、工程等领域违法分包、个人承包侵权时，发包方「跑不掉」，劳动者可一并追责。"},{"no":"第九十五条","t":"第九十五条 劳动行政部门和其他有关主管部门及其工作人员玩忽职守、不履行法定职 责，或者违法行使职权，给劳动者或者用人单位造成损害的，应当承担赔偿责任；对直接负 责的主管人员和其他直接责任人员，依法给予行政处分；构成犯罪的，依法追究刑事责任。","ex":"监管部门渎职责任。劳动行政部门和其他有关主管部门及其工作人员玩忽职守、不履行法定职责，或者违法行使职权，给劳动者或用人单位造成损害的，应承担赔偿责任；对直接负责的主管人员和其他责任人员依法给予行政处分；构成犯罪的，依法追究刑事责任。\n实务要点：监管者失职也要担责，构成行政赔偿甚至刑事追责。"}]},{"ch":"第八章  附  则","items":[{"no":"第九十六条","t":"第九十六条 事业单位与实行聘用制的工作人员订立、履行、变更、解除或者终止劳动 合同，法律、行政法规或者国务院另有规定的，依照其规定；未作规定的，依照本法有关规 定执行。","ex":"事业单位聘用制的适用。事业单位与实行聘用制的工作人员订立、履行、变更、解除或终止劳动合同，法律、行政法规或国务院另有规定的，依其规定；未作规定的，依照本法有关规定执行。\n实务要点：事业单位「编外」聘用一般适用本法；「在编」人员多按人事管理特别规定，需区分身份。"},{"no":"第九十七条","t":"第九十七条 本法施行前已依法订立且在本法施行之日存续的劳动合同，继续履行；本法 第十四条第二款第三项规定连续订立固定期限劳动合同的次数，自本法施行后续订固定期限 劳动合同时开始计算。\n本法施行前已建立劳动关系，尚未订立书面劳动合同的，应当自本法施行之日起一个月 内订立。\n本法施行之日存续的劳动合同在本法施行后解除或者终止，依照本法第四十六条规定应 当支付经济补偿的，经济补偿年限自本法施行之日起计算；本法施行前按照当时有关规定， 用人单位应当向劳动者支付经济补偿的，按照当时有关规定执行。","ex":"过渡条款（新旧法衔接）。本法施行前已依法订立且施行之日存续的合同，继续履行；第十四条第二款第三项「连续订固定期限次数」自本法施行后续订时起算。施行前已建立劳动关系尚未订书面合同的，应自施行之日起一个月内订立。施行日存续的合同在施行后解除或终止，依第四十六条应支付经济补偿的，补偿年限自施行日起算；施行前按规定应支付的，按当时规定执行。\n实务要点：本法2008年施行，工龄、次数、补偿的「起算点」多锚定在2008年，是历史争议的关键。"},{"no":"第九十八条","t":"第九十八条 本法自2008年1月1日起施行。","ex":"施行日期。本法自2008年1月1日起施行。\n实务要点：2008年1月1日之后发生的劳动关系适用本法；此前事项原则上溯及力从旧，具体以第九十七条过渡规则为准。"}]}]
;

/* ===== 存储（自动保存 + 导出烘焙）===== */
const KEY = 'statute_note_' + LAW_KEY;
let store = (function(){
  try{ const s = localStorage.getItem(KEY); if(s) return JSON.parse(s); }catch(e){}
  try{ if(typeof INITIAL_STORE !== 'undefined' && INITIAL_STORE) return JSON.parse(JSON.stringify(INITIAL_STORE)); }catch(e){}
  return {notes:{}, marks:{}, explain:{}};
})();
store.notes = store.notes || {};
store.marks = store.marks || {};
store.explain = store.explain || {};
// 迁移旧版字符串笔记 -> 分层结构 {summary}
Object.keys(store.notes).forEach(function(k){
  if(typeof store.notes[k] === 'string'){
    const s = store.notes[k];
    store.notes[k] = s ? {s:s} : {};
  }
});

let saveTimer = null;
function save(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(function(){
    try{ localStorage.setItem(KEY, JSON.stringify(store)); }catch(e){}
    const n = Object.keys(store.notes).reduce(function(acc,k){
      const v = store.notes[k];
      if(typeof v === 'string') return acc + (v ? 1 : 0);
      if(v) return acc + Object.keys(v).filter(function(c){return v[c];}).length;
      return acc;
    }, 0);
    const m = Object.keys(store.marks).filter(function(k){return store.marks[k];}).length;
    const x = Object.keys(store.explain).filter(function(k){return store.explain[k];}).length;
    showStatus('已保存 ' + new Date().toLocaleTimeString() + ' · 笔记'+n+' 标记'+m+' 解读'+x);
  }, 400);
}
function showStatus(s){ document.getElementById('status').textContent = s; }

/* ===== 条文索引（用于互链）===== */
let lawMap = {};
function buildLawMap(){
  lawMap = {}; let g = 0;
  DATA.forEach(function(chap, ci){
    chap.items.forEach(function(art, ai){ g++; lawMap[g] = 'a'+ci+'_'+ai; });
  });
}
function linkLaws(text){
  return text.replace(/第(\d+)条/g, function(m, num){
    const id = lawMap[parseInt(num,10)];
    return id ? '<a href="#'+id+'" class="lawlink">'+m+'</a>' : m;
  });
}
function escapeHtml(s){
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
/* 分层批注区块：疑问/我的案例/要点总结/待办 */
function noteBlock(id, cat, tag, label, ph){
  let val = '';
  if(store.notes[id] && typeof store.notes[id] === 'object') val = store.notes[id][cat] || '';
  return '<div class="note-block"><span class="note-tag '+tag+'">'+label+'</span>' +
    '<div class="note sub" contenteditable="true" data-id="'+id+'" data-cat="'+cat+'" ' +
    'data-ph="'+ph+'">'+escapeHtml(val)+'</div></div>';
}

/* ===== 速查卡（由 QUICK 生成）===== */
function quickHtml(){
  let q = '<div class="quick" id="quick">' +
    '<div class="quick-head" onclick="toggleQuick()">📌 重点速查（点击展开/收起）</div>' +
    '<div class="quick-body" id="quickBody">';
  if (typeof QUICK !== 'undefined' && Array.isArray(QUICK)) {
    QUICK.forEach(function(item){
      q += '<div class="qg"><b>'+escapeHtml(item.b)+'</b>：'+escapeHtml(item.t)+'</div>';
    });
  }
  q += '</div></div>';
  return linkLaws(q);
}
function toggleQuick(){
  const b = document.getElementById('quickBody');
  if(b) b.style.display = (b.style.display === 'none') ? '' : 'none';
}

/* ===== 法规简介（发布信息）===== */
function metaHtml(){
  const m = (typeof LAW_META !== 'undefined' && LAW_META) ? LAW_META : null;
  if(!m) return '';
  const intro = (typeof LAW_INTRO !== 'undefined' && LAW_INTRO) ? '<div class="law-intro-desc">'+escapeHtml(LAW_INTRO)+'</div>' : '';
  let validTxt = m.valid; let validCls = 'mv';
  if(m.valid === true){ validTxt = '有效'; validCls = 'mv ok'; }
  else if(m.valid === false){ validTxt = '失效'; validCls = 'mv no'; }
  else if(typeof m.valid === 'string'){ validCls = (m.valid.indexOf('有效') !== -1) ? 'mv ok' : 'mv no'; }
  return '<div class="law-intro" id="lawIntro">' +
    '<div class="law-intro-head">📖 法规简介</div>' +
    '<div class="law-intro-body">' + intro +
      '<div class="meta-grid">' +
        '<span class="mk">发布主体</span><span class="mv">'+escapeHtml(m.issuer||'—')+'</span>' +
        '<span class="mk">发布时间</span><span class="mv">'+escapeHtml(m.published||'—')+'</span>' +
        '<span class="mk">生效时间</span><span class="mv">'+escapeHtml(m.effective||'—')+'</span>' +
        (m.revised ? '<span class="mk">修正时间</span><span class="mv">'+escapeHtml(m.revised)+'</span>' : '') +
        '<span class="mk">是否有效</span><span class="'+validCls+'">'+escapeHtml(validTxt||'—')+'</span>' +
        '<span class="mk">效力等级</span><span class="mv">'+escapeHtml(m.level||'—')+'</span>' +
      '</div>' +
    '</div>' +
  '</div>';
}

/* ===== 渲染 ===== */
function render(){
  buildLawMap();
  const main = document.getElementById('content');
  const toc = document.getElementById('toc');
  let html = metaHtml() + quickHtml();
  let tocHtml = '';
  DATA.forEach(function(chap, ci){
    const cid = 'chap' + ci;
    tocHtml += '<a href="#' + cid + '" data-target="' + cid + '">' + chap.ch +
               '<span class="cnt">' + chap.items.length + '条</span></a>';
    html += '<section class="chapter" id="' + cid + '"><h2>' + chap.ch + '</h2>';
    chap.items.forEach(function(art, ai){
      const id = 'a' + ci + '_' + ai;
      const mk = store.marks[id];
      const exBase = store.explain[id] || art.ex || '';
      const exHtml = linkLaws(escapeHtml(exBase));
      // 关联案例
      let casesHtml = '';
      if(art.cases){
        casesHtml += '<div class="case-label">⚖️ 关联案例</div>';
        art.cases.forEach(function(cidKey){
          const c = (typeof CASES !== 'undefined') ? CASES[cidKey] : null; if(!c) return;
          casesHtml += '<div class="case">' +
            '<div class="case-title">'+escapeHtml(c.t)+'</div>' +
            '<div class="case-desc">'+escapeHtml(c.d)+'</div>' +
            '<div class="case-src">来源：'+escapeHtml(c.s)+'</div>' +
          '</div>';
        });
      }
      // 关联法条
      let relHtml = '';
      if(art.rel){
        relHtml += '<div class="rel-label">🔗 关联法条</div>';
        art.rel.forEach(function(rkey){
          const r = (typeof REL !== 'undefined') ? REL[rkey] : null; if(!r) return;
          relHtml += '<div class="rel">' +
            '<div class="rel-src">'+escapeHtml(r.src)+' '+escapeHtml(r.art)+'</div>' +
            '<div class="rel-text">'+escapeHtml(r.t)+'</div>' +
          '</div>';
        });
      }
      html += '<article class="article' + (mk ? ' marked' : '') + '" id="' + id + '">' +
                '<div class="art-head">' +
                  '<span class="art-no">' + art.no + '</span>' +
                  '<button class="mark-btn" data-id="' + id + '" title="标记重点">' + (mk ? '★' : '☆') + '</button>' +
                '</div>' +
  // 法条原文（可编辑）
  barHTML(id) + '<div class="art-text editable" contenteditable="true" data-art="' + id + '">' + escapeHtml(art.t) + '</div>' +
                '<div class="explain-label">💡 条文解读（可补充）</div>' +
                '<div class="explain" contenteditable="true" data-ex="' + id + '">' + exHtml + '</div>' +
                casesHtml +
                relHtml +
                '<div class="tool-row"><button class="search-btn" data-kw="'+escapeHtml(LAW_TITLE+' '+art.no)+'">🔍 在北大法宝检索本条相关案例</button></div>' +
                '<div class="note-label">📝 学习笔记（可分层批注）</div>' +
                '<div class="notes-wrap">' +
                  noteBlock(id,'q','tag-q','疑问','想不通／存疑之处…') +
                  noteBlock(id,'c','tag-c','我的案例','自己办过的或想到的类案…') +
                  noteBlock(id,'s','tag-s','要点总结','提炼核心规则、记忆口诀…') +
                  noteBlock(id,'t','tag-t','待办','待查 / 待办事项…') +
                '</div>' +
                '<button class="reveal-btn" data-rev="' + id + '">显示解读</button>' +
              '</article>';
    });
    html += '</section>';
  });
  main.innerHTML = html;
  toc.insertAdjacentHTML('beforeend', tocHtml);  restoreArtEdits();
}

/* ===== 事件 ===== */
document.addEventListener('input', function(e){
  if(e.target.classList.contains('note')){
    const id = e.target.dataset.id;
    const cat = e.target.dataset.cat;
    store.notes[id] = (store.notes[id] && typeof store.notes[id] === 'object') ? store.notes[id] : {};
    store.notes[id][cat] = e.target.innerText;
    save();
  } else if(e.target.classList.contains('explain')){
    const id = e.target.dataset.ex;
    store.explain[id] = e.target.innerText;
    save();
  }
});
document.addEventListener('click', function(e){
  if(e.target.classList.contains('reveal-btn')){
    const art = e.target.closest('.article');
    const rev = art.classList.toggle('revealed');
    e.target.textContent = rev ? '隐藏解读' : '显示解读';
    return;
  }
  if(e.target.classList.contains('mark-btn')){
    const id = e.target.dataset.id;
    const on = !store.marks[id];
    store.marks[id] = on;
    e.target.closest('.article').classList.toggle('marked', on);
    e.target.textContent = on ? '★' : '☆';
    save();
  } else if(e.target.classList.contains('search-btn')){
    const kw = e.target.dataset.kw;
    window.open('https://www.pkulaw.com/search?keyword=' + encodeURIComponent(kw), '_blank');
  }
});

/* 自测记忆模式：隐藏解读/笔记/案例，点“显示解读”对照 */
let selfTest = false;
document.getElementById('btnTest').addEventListener('click', function(){
  selfTest = !selfTest;
  document.body.classList.toggle('self-test', selfTest);
  this.classList.toggle('active', selfTest);
  this.textContent = selfTest ? '退出自测' : '自测模式';
  showStatus(selfTest ? '自测模式：点条文下方“显示解读”对照记忆' : '已退出自测');
});

/* 目录滚动高亮 */
const tocLinks = function(){ return document.querySelectorAll('nav.toc a'); };
const observer = new IntersectionObserver(function(entries){
  entries.forEach(function(en){
    if(en.isIntersecting){
      tocLinks().forEach(function(a){
        a.classList.toggle('active', a.dataset.target === en.target.id);
      });
    }
  });
}, {rootMargin:'-20% 0px -70% 0px'});

/* 搜索过滤 */
document.getElementById('search').addEventListener('input', function(){
  const q = this.value.trim();
  document.querySelectorAll('.article').forEach(function(a){
    a.style.display = (!q || a.textContent.indexOf(q) !== -1) ? '' : 'none';
  });
});

/* 导出：序列化当前页面并把笔记与解读烘焙进 INITIAL_STORE */
document.getElementById('btnExport').addEventListener('click', function(){
  let html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
  html = html.replace(/const INITIAL_STORE = [^;]*;/,
                      'const INITIAL_STORE = ' + JSON.stringify(store) + ';');
  const d = new Date();
  const pad = function(n){return (n<10?'0':'')+n;};
  const fname = LAW_TITLE + '学习笔记_' + d.getFullYear() + pad(d.getMonth()+1) + pad(d.getDate()) + '.html';
  const blob = new Blob([html], {type:'text/html;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = fname; a.click();
  URL.revokeObjectURL(url);
  showStatus('已导出 ' + fname + '（在下载文件夹；想同步到网站，告诉我“发布批注”即可）');
});

document.getElementById('btnPrint').addEventListener('click', function(){ window.print(); });

document.getElementById('btnClear').addEventListener('click', function(){
  if(confirm('确定清空本浏览器内全部学习笔记和标记吗？\n（解读为预置内容、案例为内置数据，不会清空；此操作不可撤销，建议先点“导出”备份）')){
    store = {notes:{}, marks:{}, explain:{}};
    try{ localStorage.removeItem(KEY); }catch(e){}
    render();
    showStatus('已清空');
  }
});


/* ===== 编辑模式切换（浮动工具条） ===== */
let editMode = false;
const btnEdit = document.getElementById('btnEdit');
btnEdit.addEventListener('click', function(){
  editMode = !editMode;
  document.body.classList.toggle('edit-mode', editMode);
  this.classList.toggle('active', editMode);
  this.textContent = editMode ? '✓ 退出编辑' : '✎ 编辑条文';
  if(editMode){ this.style.background='#27ae60'; this.style.boxShadow='0 2px 6px rgba(39,174,96,.4)'; }
  else { this.style.background=''; this.style.boxShadow=''; }
  showStatus(editMode ? '编辑模式：每条法条上方有颜色工具条，选中改局部或整条改色' : '已退出编辑');
});

/* 常驻工具条：每条法条上方由 render 注入 .art-editbar，点击即改色 */
const FONT = ['#1f2329','#c0392b','#2980b9','#27ae60','#8e44ad'];
const BG = ['#fff3cd','#d4edda','#cce5ff','#f8d7da','#e2d5f1'];
function barHTML(id){
  let h = '<span class="elbl">字体</span>';
  FONT.forEach(function(c){ h += '<button class="fcolor" style="background:'+c+'" data-c="'+c+'" data-hl="0" title="字体色"></button>'; });
  h += '<span class="fsep"></span><span class="elbl">高亮</span>';
  BG.forEach(function(c){ h += '<button class="fcolor" style="background:'+c+'" data-c="'+c+'" data-hl="1" title="高亮"></button>'; });
  h += '<span class="fsep"></span><button class="fclear" data-clear="1">清除</button>';
  h += '<span class="ehint">选中文字改局部 · 直接点改整条</span>';
  return '<div class="art-editbar" data-bar="'+id+'">' + h + '</div>';
}

// 防止点击工具条导致法条失焦、选区丢失
document.addEventListener('mousedown', function(e){ if(e.target.closest('.art-editbar')) e.preventDefault(); });

function applyColor(artId, c, hl){
  const el = document.querySelector('.art-text[data-art="'+artId+'"]');
  if(!el) return;
  const sel = window.getSelection();
  const inThis = sel && sel.anchorNode && (sel.anchorNode.nodeType===3 ? sel.anchorNode.parentElement : sel.anchorNode).closest('.art-text[data-art="'+artId+'"]');
  if(sel && !sel.isCollapsed && inThis){
    document.execCommand(hl ? 'hiliteColor' : 'foreColor', false, c);
  } else {
    el.focus();
    const range = document.createRange();
    range.selectNodeContents(el);
    sel.removeAllRanges(); sel.addRange(range);
    document.execCommand(hl ? 'hiliteColor' : 'foreColor', false, c);
    sel.removeAllRanges();
  }
  saveArtText(artId, el.innerHTML);
}
function clearColor(artId){
  const el = document.querySelector('.art-text[data-art="'+artId+'"]');
  if(!el) return;
  const sel = window.getSelection();
  const inThis = sel && sel.anchorNode && (sel.anchorNode.nodeType===3 ? sel.anchorNode.parentElement : sel.anchorNode).closest('.art-text[data-art="'+artId+'"]');
  if(sel && !sel.isCollapsed && inThis){
    document.execCommand('removeFormat', false, null);
  } else {
    const artData = getArtData(artId);
    el.innerHTML = artData ? escapeHtml(artData.t) : el.textContent;
  }
  saveArtText(artId, el.innerHTML);
}

document.addEventListener('click', function(e){
  if(!editMode) return;
  const bar = e.target.closest('.art-editbar');
  if(!bar) return;
  const artId = bar.getAttribute('data-bar') || '';
  const clearBtn = e.target.closest('[data-clear]');
  if(clearBtn){ clearColor(artId); showStatus('已清除格式'); return; }
  const btn = e.target.closest('[data-c]');
  if(!btn) return;
  applyColor(artId, btn.dataset.c, btn.dataset.hl === '1');
  showStatus(btn.dataset.hl === '1' ? '已高亮标注' : '已改字体色');
});

/* 保存法条编辑后的HTML */
function saveArtText(id, html){
  if(!store.artEdit) store.artEdit = {};
  store.artEdit[id] = html;
  save();
}

/* 恢复已保存的法条编辑 */
function restoreArtEdits(){
  if(!store.artEdit) return;
  Object.keys(store.artEdit).forEach(function(id){
    const el = document.querySelector('.art-text[data-art="'+id+'"]');
    if(el && store.artEdit[id]){
      el.innerHTML = store.artEdit[id];
    }
  });
}

/* 获取法条原始数据（用于重置） */
function getArtData(id){
  for(let ci=0;ci<DATA.length;ci++){
    for(let ai=0;ai<DATA[ci].items.length;ai++){
      if('a'+ci+'_'+ai === id) return DATA[ci].items[ai];
    }
  }
  return null;
}


/* ===== 启动 ===== */
document.title = '《' + LAW_TITLE + '》学习笔记（可编辑）';
document.getElementById('lawTitle').textContent = '《' + LAW_TITLE + '》学习笔记';
document.getElementById('lawSub').textContent = LAW_SUB;
document.getElementById('lawField').textContent = LAW_FIELD || '';
render();
DATA.forEach(function(_, ci){ observer.observe(document.getElementById('chap'+ci)); });
showStatus('已就绪');
</script>
