<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>法规学习笔记（可编辑）</title>
<style>
:root{
  --bg:#eef1f5; --card:#ffffff; --ink:#1f2329; --muted:#7a8290;
  --primary:#1f4e79; --primary-soft:#e8f0f7; --accent:#c0392b;
  --mark:#e6a23c; --note-bg:#fffdf3; --note-bd:#e8d9a8;
  --border:#e1e5ea; --line:#d8dde4; --shadow:0 1px 3px rgba(0,0,0,.06);
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  margin:0; background:var(--bg); color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Segoe UI",sans-serif;
  line-height:1.8; font-size:15px;
}
/* ===== 顶部栏 ===== */
header{
  position:sticky; top:0; z-index:50; background:var(--primary); color:#fff;
  box-shadow:0 2px 8px rgba(0,0,0,.15);
}
.head-inner{max-width:1180px; margin:0 auto; padding:10px 18px; display:flex; align-items:center; gap:14px; flex-wrap:wrap;}
.field-badge{display:inline-block; margin-left:4px; padding:2px 11px; font-size:12px; font-weight:600; color:#fff; background:var(--primary); border-radius:20px; vertical-align:middle; letter-spacing:.5px;}
.head-inner h1{font-size:16px; margin:0; font-weight:600; letter-spacing:.5px; flex:1 1 260px;}
.head-inner h1 small{display:block; font-size:11.5px; font-weight:400; opacity:.8; margin-top:2px;}
.toolbar{display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
.toolbar input[type=search]{
  padding:6px 10px; border:1px solid rgba(255,255,255,.35); border-radius:6px;
  background:rgba(255,255,255,.12); color:#fff; font-size:13px; width:160px; outline:none;
}
.toolbar input[type=search]::placeholder{color:rgba(255,255,255,.7);}
.toolbar button{
  padding:6px 12px; border:1px solid rgba(255,255,255,.4); border-radius:6px;
  background:rgba(255,255,255,.12); color:#fff; font-size:13px; cursor:pointer; white-space:nowrap;
}
.toolbar button:hover{background:rgba(255,255,255,.25);}
.toolbar button.active{background:var(--mark); border-color:var(--mark); color:#fff;}
.status{font-size:12px; opacity:.85; min-width:80px;}

/* ===== 布局 ===== */
.layout{max-width:1180px; margin:18px auto; padding:0 18px; display:flex; gap:20px; align-items:flex-start;}
nav.toc{
  position:sticky; top:78px; width:200px; flex:0 0 200px;
  background:var(--card); border:1px solid var(--border); border-radius:10px;
  padding:12px 10px; box-shadow:var(--shadow); max-height:calc(100vh - 100px); overflow:auto;
}
nav.toc .toc-title{font-size:12px; color:var(--muted); padding:0 8px 8px; border-bottom:1px solid var(--line); margin-bottom:6px;}
nav.toc a{
  display:block; padding:7px 8px; border-radius:6px; color:var(--ink); text-decoration:none;
  font-size:13.5px; cursor:pointer;
}
nav.toc a:hover{background:var(--primary-soft);}
nav.toc a.active{background:var(--primary); color:#fff; font-weight:500;}
nav.toc a .cnt{float:right; color:var(--muted); font-size:11px;}
nav.toc a.active .cnt{color:rgba(255,255,255,.85);}

main{flex:1; min-width:0;}
.chapter{margin-bottom:26px;}
.chapter > h2{
  font-size:18px; color:var(--primary); border-left:4px solid var(--primary);
  padding-left:12px; margin:0 0 14px; font-weight:700;
}
.article{
  background:var(--card); border:1px solid var(--border); border-radius:10px;
  padding:14px 16px; margin-bottom:12px; box-shadow:var(--shadow); position:relative;
  border-left:3px solid var(--line);
}
.article.marked{border-left-color:var(--mark); background:#fffdf6;}
.art-head{display:flex; align-items:center; gap:10px; margin-bottom:6px;}
.art-no{
  font-weight:700; color:var(--primary); font-size:14.5px; background:var(--primary-soft);
  padding:2px 10px; border-radius:5px;
}
.mark-btn{
  margin-left:auto; border:none; background:none; cursor:pointer; font-size:18px; line-height:1;
  color:var(--mark); padding:0 4px;
}
.mark-btn:hover{transform:scale(1.15);}
.art-text{font-size:15px; color:#2b2f36; text-align:justify; white-space:pre-wrap;}

/* 解读区 */
.explain-label{font-size:12px; color:var(--primary); font-weight:600; margin:11px 0 4px; display:flex; align-items:center; gap:5px;}
.explain{
  font-size:13.5px; color:#3a4250; background:#f6f9fc; border-left:3px solid var(--primary);
  border-radius:0 6px 6px 0; padding:8px 11px; white-space:pre-wrap; outline:none;
}
.explain:focus{background:#eef3fa; box-shadow:0 0 0 3px rgba(31,78,121,.12);}

/* 关联案例 */
.case-label{font-size:12px; color:#9a5b1e; font-weight:600; margin:12px 0 5px; display:flex; align-items:center; gap:5px;}
.case{background:#fbf6ee; border:1px solid #ecdcc0; border-radius:8px; padding:9px 11px; margin-bottom:8px;}
.case-title{font-weight:600; font-size:13.5px; color:#6b4423;}
.case-desc{font-size:13px; color:#5a4a3a; margin-top:3px; white-space:pre-wrap;}
.case-src{font-size:11.5px; color:#a98b5e; margin-top:4px;}

/* 关联法条 */
.rel-label{font-size:12px; color:#1f6fb2; font-weight:600; margin:12px 0 5px; display:flex; align-items:center; gap:5px;}
.rel{background:#eef4fb; border:1px solid #cfe0ef; border-radius:8px; padding:9px 11px; margin-bottom:8px;}
.rel-src{font-weight:600; font-size:13.5px; color:#14507e;}
.rel-text{font-size:13px; color:#34404d; margin-top:4px; white-space:pre-wrap;}

/* 检索按钮 */
.tool-row{margin:10px 0 2px;}
.search-btn{border:1px solid var(--border); background:#f3f7fb; color:var(--primary); border-radius:6px; padding:5px 10px; font-size:12.5px; cursor:pointer;}
.search-btn:hover{background:#e3edf6;}

/* 笔记区 */
.note-label{font-size:12px; color:var(--muted); margin:11px 0 4px; display:flex; align-items:center; gap:5px;}

/* 速查卡 */
.quick{background:linear-gradient(135deg,#f0f6fc,#e8f0f7); border:1px solid #cfe0ef; border-radius:10px; margin-bottom:18px; box-shadow:var(--shadow); overflow:hidden;}
.quick-head{font-weight:700; color:var(--primary); padding:11px 14px; cursor:pointer; user-select:none; font-size:14.5px;}
.quick-body{padding:2px 14px 12px;}
.qg{font-size:13px; color:#34404d; padding:7px 0; border-top:1px dashed #d4e2ee; white-space:pre-wrap;}
.qg:first-child{border-top:none;}
.qg b{color:var(--primary);}

/* 法规简介（发布信息） */
.law-intro{background:linear-gradient(135deg,#f0f6fc,#eef4fb); border:1px solid #cfe0ef; border-radius:10px; margin-bottom:18px; box-shadow:var(--shadow); overflow:hidden;}
.law-intro-head{font-weight:700; color:var(--primary); padding:11px 14px; font-size:14.5px;}
.law-intro-body{padding:2px 14px 12px;}
.law-intro-desc{font-size:13.5px; color:#34404d; line-height:1.8; margin:2px 0 10px;}
.meta-grid{display:grid; grid-template-columns:auto 1fr; gap:6px 14px; align-items:baseline;}
.meta-grid .mk{font-size:13px; color:var(--muted); white-space:nowrap;}
.meta-grid .mv{font-size:13px; color:#2b2f36;}
.meta-grid .mv.ok{color:#1a9e57; font-weight:600;}
.meta-grid .mv.no{color:#c0392b; font-weight:600;}

/* 条文互链 */
.lawlink{color:#1f6fb2; text-decoration:underline; cursor:pointer;}
.lawlink:hover{color:#0d4f86;}

/* 批注分层 */
.notes-wrap{margin-top:2px;}
.note-block{margin-bottom:8px;}
.note-tag{display:inline-block; font-size:11px; font-weight:600; padding:1px 8px; border-radius:4px; margin-bottom:3px;}
.tag-q{background:#fde8e8; color:#c0392b;}      /* 疑问 */
.tag-c{background:#e6f4ea; color:#1e7a46;}      /* 我的案例 */
.tag-s{background:#fef3e0; color:#b9770e;}      /* 要点总结 */
.tag-t{background:#efe7fb; color:#6b3fa0;}      /* 待办 */
.note.sub{background:var(--note-bg); border:1px dashed var(--note-bd); border-radius:7px; padding:7px 10px; min-height:32px; font-size:13.5px; color:#5a4a1a; white-space:pre-wrap; outline:none;}
.note.sub:focus{border-style:solid; border-color:var(--mark); background:#fffce8; box-shadow:0 0 0 3px rgba(230,162,60,.15);}
.note.sub:empty:before{content:attr(data-ph); color:#b9a86a;}

/* 自测模式 */
.reveal-btn{display:none; margin:10px 0 2px; border:1px solid var(--primary); background:var(--primary-soft); color:var(--primary); border-radius:6px; padding:5px 12px; font-size:12.5px; cursor:pointer;}
.reveal-btn:hover{background:#d8e6f5;}
body.self-test .reveal-btn{display:inline-block;}
body.self-test .explain-label,
body.self-test .explain,
body.self-test .case-label,
body.self-test .case,
body.self-test .rel-label,
body.self-test .rel,
body.self-test .tool-row,
body.self-test .note-label,
body.self-test .notes-wrap{display:none;}
.article.revealed .explain-label,
.article.revealed .explain,
.article.revealed .case-label,
.article.revealed .case,
.article.revealed .rel-label,
.article.revealed .rel,
.article.revealed .tool-row,
.article.revealed .note-label,
.article.revealed .notes-wrap{display:block;}
body.self-test .article{opacity:.97;}
body.self-test .article.revealed{border-left-color:var(--primary); background:#fff;}

footer{max-width:1180px; margin:0 auto 30px; padding:14px 18px; color:var(--muted); font-size:12.5px; text-align:center;}

@media (max-width:860px){
  .layout{flex-direction:column;}
  nav.toc{position:static; width:100%; flex:none; max-height:none;}
  .toolbar input[type=search]{width:120px;}
}
@media print{
  header, nav.toc, footer, .tool-row, .quick-head{display:none !important;}
  body{background:#fff;}
  .layout{display:block; margin:0; padding:0;}
  .article{break-inside:avoid; box-shadow:none; border:1px solid #ccc;}
  .explain{background:#f4f6f9;}
  .case{background:#fbf6ee;}
  .mark-btn{display:none;}
  .quick{box-shadow:none; border:1px solid #ccc;}
  body.self-test .reveal-btn{display:none !important;}
  body.self-test .explain, body.self-test .explain-label,
  body.self-test .case, body.self-test .case-label,
  body.self-test .rel, body.self-test .rel-label,
  body.self-test .tool-row, body.self-test .note-label, body.self-test .notes-wrap{display:block !important;}
}
</style>
</head>
<body>
<header>
  <div class="head-inner">
    <h1><span id="lawTitle"></span><small id="lawSub"></small> <span id="lawField" class="field-badge"></span></h1>
    <div class="toolbar">
      <input type="search" id="search" placeholder="搜索条文…" aria-label="搜索">
      <span class="status" id="status">已就绪</span>

      <button id="btnPrint" title="打印 / 存为PDF">打印</button>
      <button id="btnClear" title="清空本浏览器内全部笔记与标记">清空</button>
    </div>
  </div>
</header>

<div class="layout">
  <nav class="toc" id="toc">
    <div class="toc-title">目录</div>
  </nav>
  <main id="content"></main>
</div>

<footer>

</footer>

理的其他争议案件。", "ex": ""}, {"no": "第八条", "t": "第八条  各设区市人力资源和社会保障行政部门负责划分本行政区域内各仲裁委员会 管辖范围。", "ex": ""}, {"no": "第九条", "t": "第九条  仲裁委员会发现已受理的案件不属于其管辖范围的，应当移送至有管辖权的 仲裁委员会，并书面通知当事人，受移送的仲裁委员会应当受理。受移送的仲裁委员会认 为受移送的案件依照规定不属于本委管辖的，或者仲裁委员会之间因管辖争议协商不成\n的，应当报请共同的上一级人力资源和社会保障行政部门指定管辖，不得再自行移送。", "ex": ""}, {"no": "第十条", "t": "第十条  仲裁委员会受理案件后，当事人对管辖权有异议的， 应当在答辩期满前书面 提出。对当事人提出的管辖异议，仲裁委员会应当在五日内进行审查决定，异议成立的，应将案件移送至有管辖权的仲裁委员会并书面通知当事人；异议不成立的， 应当书面决 定驳回。当事人逾期提出的，不影响仲裁程序的进行。", "ex": ""}]}, {"ch": "第三章 劳动人事争议仲裁参加人和仲裁参与人", "items": [{"no": "", "t": "第一节  仲裁当事人", "ex": ""}, {"no": "第十一条", "t": "第十一条  发生劳动人事争议的劳动者和用人单位为劳动人事争议仲裁案件的双方当 事人。", "ex": ""}, {"no": "第十二条", "t": "第十二条  劳动者一方的当事人死亡的，由其继承人决定是否作为当事人参加仲裁。 继承人按照《中华人民共和国继承法》相关规定确定。", "ex": ""}, {"no": "第十三条", "t": "第十三条  用人单位包括：\n（一）国家机关、事业单位、社会团体；\n（二）中国境内的企业，包括合法注册的分支机构及非法人单位；\n（三）中国境内的个体经济组织、民办非企业单位；\n（四）依法成立的会计师事务所、律师事务所等合伙组织和基金会等；\n（五）军队文职人员聘用单位。", "ex": ""}, {"no": "第十四条", "t": "第十四条  发生争议的用人单位未办理营业执照、被吊销营业执照、营业执照到期、 被责令关闭、被撤销以及用人单位解散、歇业，不能承担相关责任的，应当将用人单位和 其出资人、开办单位或者主管部门作为共同当事人。", "ex": ""}, {"no": "第十五条", "t": "第十五条  用人单位合并、分立的，以承受其权利义务的单位为当事人。", "ex": ""}, {"no": "第十六条", "t": "第十六条  劳动者与个人承包经营者发生争议，依法向仲裁委员会申请仲裁的，应当 将发包的组织和个人承包经营者作为共同当事人。", "ex": ""}, {"no": "第十七条", "t": "第十七条  劳动者与起有字号的个体工商户产生的劳动争议，应当以营业执照上登记 的字号为当事人，但应同时注明该字号业主的自然情况。按上述原则，业主与实际经营者 不一致时，列字号和实际经营者为共同当事人。", "ex": ""}, {"no": "第十八条", "t": "第十八条  劳务派遣单位或者用工单位与劳动者发生争议的劳务派遣单位和用工单位 作为共同当事人。\n第二节  仲裁代表人", "ex": ""}, {"no": "第十九条", "t": "第十九条  用人单位的代表人（主要负责人）应以登记管理机关登记在册的人员名单 为准。用人单位的法定代表人在国家法律、法规以及单位章程规定的职权范围内行使职\n权、履行义务，代表单位法人参加仲裁活动，单位法人对法定代表人（主要负责人）的正 常活动承担民事责任。\n法定代表人（主要负责人）可与用人单位授权委托的代理人共同出庭；在用人单位未 依法授权委托代理人时，其法定代表人应出庭应诉。", "ex": ""}, {"no": "第二十条", "t": "第二十条  发生劳动者一方在十人以上并有共同请求的争议的，劳动者可以推举三至 五名代表参加仲裁活动。\n代表人参加仲裁的行为对其代表的当事人发生效力，但代表人变更、放弃仲裁请求或 者承认对方当事人的仲裁请求，进行和解，必须经被代表的当事人同意。\n第三节  仲裁第三人", "ex": ""}, {"no": "第二十一条", "t": "第二十一条  劳动人事争议仲裁第三人是指与劳动人事争议案件的处理结果有利害 关系，经本人申请或劳动人事争议仲裁委员会通知而参加到他人已经进行的仲裁活动中 的人。", "ex": ""}, {"no": "第二十二条", "t": "第二十二条  劳动人事争议仲裁第三人分为有独立请求权的第三人和无独立请求权 的第三人。", "ex": ""}, {"no": "第二十三条", "t": "第二十三条  有独立请求权的第三人对当事人的仲裁标的有权主张独立的请求，依 法享有申请人在仲裁中的权利。", "ex": ""}, {"no": "第二十四条", "t": "第二十四条  无独立请求权的第三人对当事人之间的争议的仲裁标的没有主张独立 请求的权利，仅享有为维护自身权益所必需的仲裁权利，不享有包括放弃、变更仲裁请 求、管辖权异议等处分实体权利有关的仲裁权利。但对仲裁裁决无独立请求权的第三人 承担责任的，无独立请求权的第三人享有起诉权。\n第四节  仲裁代理人", "ex": ""}, {"no": "第二十五条", "t": "第二十五条  劳动人事争议仲裁代理人是指在劳动人事争议仲裁活动中，在法律规 定或当事人授权范围内，为维护被代理人的利益，代理当事人一方参加劳动人事争议仲 裁活动的人。", "ex": ""}, {"no": "第二十六条", "t": "第二十六条  按照代理权的取得方式，劳动人事争议仲裁代理人分为法定代理人、 委托代理人、指定代理人。\n劳动者一方当事人丧失或部分丧失民事能力的可由其法定代理人代为参加仲裁活动； 无法定代理人的，由仲裁委为其指定代理人。法定代理人的范围参照民法的相关规定确 定。", "ex": ""}, {"no": "第二十七条", "t": "第二十七条  当事人委托代理人参加仲裁活动的，由仲裁委员会对代理人资格进行 审查。\n第五节  仲裁参与人", "ex": ""}, {"no": "第二十八条", "t": "第二十八条  仲裁参与人与仲裁结果没有直接或间接的利害关系，不享有相应的提 出主张、申请回避、请求调解等仲裁权利及义务，也不受仲裁裁决的约束。", "ex": ""}]}, {"ch": "第四章  仲裁申请", "items": [{"no": "", "t": "第一节  申请仲裁提交的证据材料", "ex": ""}, {"no": "第二十九条", "t": "第二十九条  劳动者提出仲裁申请应当向仲裁委员会提交下列材料：\n（一）仲裁申请书（按被申请人人数提供副本）;\n（二）申请人身份证明复印件（核对原件）;\n（三）与被申请人存在劳动（人事）关系的证据材料复印件（核对原件）;\n（四）与请求事项有关的证据材料复印件。\n10人以上并有共同请求的可以推荐代表并提供《员工推举代表书》、《申请人仲裁请 求明细表》。\n当事人委托代理人的，应提交《授权委托书》，注明委托事项和代理权限，并根据不 同的授权委托情况提交受委托人身份证明或资格证明、委托人与受托人关系证明、律师事\n务所函或法律援助公函等。", "ex": ""}, {"no": "第三十条", "t": "第三十条  用人单位提出仲裁申请的，应当向仲裁委提交下列材料：\n（一）仲裁申请书（加盖单位公章，按被申请人人数提供副本份数）;\n（二）申请人身份证明复印件（加盖单位公章）;\n（三）法定代表人（或主要负责人）身份证明书（加盖单位公章）;\n（四）委托代理人的，需提交《授权委托书》（注明委托事项和代理权限、法定代表 人签名并加盖单位公章）、受委托人的身份证明书复印件；\n（五）与被申请人存在劳动（人事）关系的证明材料（核对原件）;\n（六）与请求事项有关的证据材料复印件。", "ex": ""}, {"no": "第三十一条", "t": "第三十一条  当事人申请仲裁时，受理人员应向其送达《送达地址确认告知书》， 并督促、指导当事人填写《送达地址确认书》。\n第二节  仲裁申请受理", "ex": ""}, {"no": "第三十二条", "t": "第三十二条  受理人员接收申请人的仲裁申请，审核申请人提交的材料是否符合规 范、接收申请人提交的与案情有关的证据材料。", "ex": ""}, {"no": "第三十三条", "t": "第三十三条  受理人员初步审查申请是否符合受理条件（包括：受案范围、管辖范 围、书面仲裁申请材料是否齐备等）。", "ex": ""}, {"no": "第三十四条", "t": "第三十四条  对申请材料不齐备或仲裁申请书不规范的，受理人员应当场或在五个 工作日内一并告知申请人需要补正的全部材料，并指导申请人予以补充、修改。", "ex": ""}, {"no": "第三十五条", "t": "第三十五条  对申请材料齐备的，出具收件回执。\n第三节  审核", "ex": ""}, {"no": "第三十六条", "t": "第三十六条  受理人员对申请人提交的书面仲裁申请材料进行严格审核，提出受理 或不受理意见。", "ex": ""}, {"no": "第三十七条", "t": "第三十七条  受理人员对符合下列条件的仲裁申请应当提出受理意见：\n（一）属于本规则第二条、第三条规定的争议范围；\n（二）有明确的仲裁请求和事实理由；\n（三）申请人是与本案有直接利害关系的自然人、法人或者其他组织，有明确的被申 请人；\n（四）属于本仲裁委员会管辖范围。\n第四节  立案审批", "ex": ""}, {"no": "第三十八条", "t": "第三十八条  受理人员经审核，认为符合受理条件的，应于收到申请之日起二个工 作日内报负责人审批立案。负责人在收到报批案件一个工作日内作出是否立案的决定。\n经审批同意立案的，受理人员于审批完毕二个工作日内向申请人出具《受理案件通知 书》。", "ex": ""}, {"no": "第三十九条", "t": "第三十九条  对不属于本仲裁委员会管辖范围的案件，受理人员应向申请人作出书 面说明并告知申请人向有管辖权的仲裁委员会申请仲裁。不符合其他受理条件的，受理人 员应提出不予受理意见，自申请仲裁申请之日起两个工作日内报送负责人审批。负责人在 收到报批案件一个工作日内作出是否立案的决定。经审批不予立案的，受理人员自审批完\n毕之日起二个工作日内向申请人出具《不予受理通知书》。\n第五节  案件移送", "ex": ""}, {"no": "第四十条", "t": "第四十条  在仲裁申请受理后，受理人员发现案件不属于本仲裁委员会管辖范围的， 应当移送至有管辖权的仲裁委员会，并告知申请人。已报批立案的，结案归档。\n受理人员移送案件应填写《关于移送案件管辖的函》，附移送案件清单和《案件移送 接收回执》。《案件移动接收回执》上注明由接收案件的仲裁委员会填写，并寄回本委。\n对由其他仲裁委员会移送至本委且属本委管辖的案件，按立案的程序办理。\n第六节  其他", "ex": ""}, {"no": "第四十一条", "t": "第四十一条  已受理除管辖范围外的不应该受理的案件，受理人员应提出撤销案件 的意见，报负责人审批。经审批同意撤案的，受理人员自撤销决定作出之日起五个工作日 内以决定书的形式通知当事人。《撤销案件决定书》同时应当注明撤销的理由、法律依 据。已报批立案的，结案归档。\n江西省劳动人事争议仲裁立案工作规则", "ex": ""}, {"no": "第一条", "t": "第一条  为规范劳动人事争议仲裁庭审程序，提高庭审质量和效率，保障当事人依法 行使权利，及时公正处理劳动人事争议， 根据《中华人民共和国劳动争议调解仲裁法》\n《事业单位人事管理条例》《劳动人事争议仲裁办案规则》等规定，制定本规则。", "ex": ""}, {"no": "第二条", "t": "第二条  仲裁庭处理争议案件，应当遵循合法、公正、及时、 着重调解的原则，以事 实为依据，以法律为准绳，依法保护当事人的权益。", "ex": ""}, {"no": "第三条", "t": "第三条  劳动人事争议仲裁庭审应公开进行。在仲裁活动中涉及国家秘密或者军事秘 密的，按照国家或者军队有关保密规定执行。当事人协议不公开或者涉及商业秘密和个人 隐私的，经相关当事人书面申请，劳动人事争议仲裁委员会（以下简称仲裁委员会）应当 不公开审理。", "ex": ""}, {"no": "第四条", "t": "第四条  仲裁庭处理争议案件应当先行调解，双方当事人同意的，可在开庭前采取电 话或约谈等方式进行调解。调解成功的，应根据调解达成的协议制作调解书，由仲裁员、 书记员签名，之后应填写仲裁结案审批表，由仲裁员签名，并附调解书等文书，报请仲裁 委员会主任或其委托的仲裁院负责人审批结案。调解书加盖仲裁委员会印章，送达当事人 即发生法律效力。调解不成或者调解书送达前当事人反悔的，仲裁庭应当按照规定程序开 庭审理。", "ex": ""}, {"no": "第五条", "t": "第五条  开庭审理前，书记员应当查明当事人和其他仲裁参与人是否到庭，宣布仲裁 庭纪律。", "ex": ""}, {"no": "第六条", "t": "第六条  申请人经依法通知，无 正当理由拒不到庭或者未经仲裁庭同意中途退庭的， 可以按撤回仲裁申请处理，并向当事人下达视为撤回仲裁申请决定书；申请人以同一事项 重新申请仲裁的，仲裁委员会不予受理。被申请人经依法通知，无正当理由拒不到庭或者 未经仲裁庭同意中途退庭的，可以缺席裁决。第三人无正当理由拒不到庭或未经仲裁庭同 意中途退庭的，不影响案件审理。", "ex": ""}, {"no": "第七条", "t": "第七条  开庭审理时，由（首席）仲裁员宣布开庭案由、仲裁庭组成人员和书记员名 单，核对当事人及其代理人身份，告知当事人有关的仲裁权利义务，询问当事人是否提出 回避申请。", "ex": ""}, {"no": "第八条", "t": "第八条  对当事人申请回避并准予回避的，应重新调整仲裁庭组成人员并决定延期审 理的日期；不准予回避的，继续开庭审理，并向当事人说明理由。", "ex": ""}, {"no": "第九条", "t": "第九条  庭审按照下列程序进行：\n（一）陈述与答辩。由申请人或其代理人陈述仲裁请求和事实理由，被申请人和第三 人对申请人的申请进行答辩；\n（二）举证与质证；\n（三）仲裁员向当事人发问；\n（四）庭审辩论；\n（五）征询当事人最后意见；\n（六）调解；\n（七）裁决。", "ex": ""}, {"no": "第十条", "t": "第十条  举证与质证按下列程序进行：\n（一）明确当事人提供的证据目录；\n（二）申请人出示证据，并由被申请人、第三人进行质证；\n（三）被申请人出示证据，并由申请人、第三人进行质证；\n（四）第三人出示证据，并由申请人、被申请人进行质证；\n（五）证人出庭作证。", "ex": ""}, {"no": "第十一条", "t": "第十一条  质证一般采取一证一质，逐个进行的方法，也可以在对方同意的情况下， 对一组有关联的证据一并予以质证。", "ex": ""}, {"no": "第十二条", "t": "第十二条  庭审辩论按照下列顺序进行：\n（一）申请人及其代理人发言；\n（二）被申请人及其代理人发言；\n（三）第三人及其代理人发言；\n（四）互相辩论。\n辩论中，仲裁员对当事人及其代理人与本案无关的发言，或涉及人身攻击等不当语言 行为，应及时制止。", "ex": ""}, {"no": "第十三条", "t": "第十三条  在庭审辩论中出现重大分歧，仲裁庭认为事实尚未调查清楚，需要当事 人补充证据或者重新鉴定等情形的，应当宣布休庭，并告知当事人下次开庭时间及当事人 补充证据的期限。", "ex": ""}, {"no": "第十四条", "t": "第十四条  庭审辩论终结后，由（首席）仲裁员按照申请人、被申请人、第三人的 先后顺序征询各方当事人的最后意见。", "ex": ""}, {"no": "第十五条", "t": "第十五条  仲裁庭在征询当事人最后意见后，应当组织双方进行调解。调解必须经 双方当事人同意，仲裁庭不得强行调解或者迫使当事人接受调解结果。", "ex": ""}, {"no": "第十六条", "t": "第十六条  调解可以当庭进行，也可以休庭后进行。调解时，可先由当事人提出调 解方案。当事人意见不一致的，仲裁庭宣讲法律法规政策规定，引导当事人自愿达成协 议；必要时，仲裁庭可以根据当事人的请求，分别征询意见，提出调解方案，进行调解。 调解成功的，应根据调解达成的协议制作调解书，由仲裁员、书记员签名，之后应填写仲 裁结案审批表，由仲裁员签名，并附调解书等文书，报请仲裁委员会主任或其委托的仲裁 院负责人审批结案。调解书加盖仲裁委员会印章，送达当事人即发生法律效力。", "ex": ""}, {"no": "第十七条", "t": "第十七条  当事人不愿调解或调解不成的，应当及时裁决。需要裁决的案件，仲裁 庭合议后，可以当庭裁决，也可以休庭后作出裁决。", "ex": ""}, {"no": "第十八条", "t": "第十八条  仲裁庭应当将开庭情况记入庭审笔录。 庭审笔录要完整、准确、清楚。 庭审笔录由当事人和其他仲裁参加人当庭阅读。当事人或者其他仲裁参加人认为对自己陈 述的记录有遗漏或者差错，有权当庭申请补正。仲裁庭认为申请无理由或者无必要的，可 以不予补正，但是应当记录该申请。仲裁员、书记员、当事人和其他仲裁参加人应当在庭 审笔录上签名或者盖章，之后不得再做任何涂改。当事人或者其他仲裁参加人拒绝在庭审 笔录上签名或者盖章的，仲裁庭应当记明情况附卷。", "ex": ""}, {"no": "第十九条", "t": "第十九条  仲裁庭向仲裁委员会汇报重大或疑难争议案件，应事先提交案件审理情 况报告。审理情况报告应写明下列内容：\n（一）当事人和其他仲裁参加人的情况；\n（二）当事人的仲裁请求；\n（三）案件查明的事实和证据；\n（四）需要研究讨论的情况或者问题；\n（五）处理意见。承办案件的仲裁员在汇报时，应当全面、客观汇报案件事实、证据 及拟适用法律法规政策、处理意见等情况。", "ex": ""}, {"no": "第二十条", "t": "第二十条  仲裁庭审理案件，应当自仲裁委员会受理仲裁申请之日起四十五日内结 案。案件复杂需要延期的，经仲裁委员会主任或者其委托的仲裁院负责人书面批准，可以 延期并书面通知当事人，但延长期限不得超过十五日。结案时，由仲裁庭填写仲裁结案审 批表，写明裁决结果、同意撤回或视为撤回仲裁请求等处理意见，由仲裁员签名，并另附 涉及处理结果的裁决书、同意撤回仲裁申请通知书等仲裁文书，报请仲裁委员会主任或其 委托的仲裁院负责人审批结案。", "ex": ""}, {"no": "第二十一条", "t": "第二十一条  有下列情形之一的，可以延期开庭审理：\n（一）必须到庭的当事人和其他仲裁参加人有正当理由没有到庭的；\n（二）当事人临时提出回避申请的；\n（三）需要通知新的证人到庭，调取新的证据，鉴定、勘验或者需要补充调查的；\n（四）其他应当延期的情形。需要延期开庭审理的案件，应填写案件延期审理审批 表，报经仲裁委员会主任或其委托的仲裁院负责人批准，可以延期并书面通知当事人，但 是延长期限不得超过十五日。", "ex": ""}, {"no": "第二十二条", "t": "第二十二条  有下列情形的，仲裁期限按照下列规定计算：\n（一）仲裁庭追加当事人或者第三人的，仲裁期限从决定追加之日重新计算；\n（二）申请人需要补正材料的，仲裁委员会收到仲裁申请的时间从材料补正之日起重 新计算；\n（三）增加、变更仲裁申请的，仲裁期限从受理增加、变更仲裁请求之日起重新计 算；\n（四）仲裁申请和反申请合并处理的，仲裁期限从受理反申请之日起重新计算；\n（五）案件移送管辖的，仲裁期限从接受移送之日起重新计算；\n（六）中止审理期间、公告送达期间不计入仲裁期限内；\n（七）法律、法规规定应当另行计算的其他情形。", "ex": ""}, {"no": "第二十三条", "t": "第二十三条  有下列情形之一的，经仲裁委员会主任或者其委托的仲裁院负责人批 准，可以中止案件审理，填写案件中止审理审批表并书面通知当事人：\n（一）劳动者一方当事人死亡，需要等待继承人表明是否参加仲裁的；\n（二）劳动者一方当事人丧失民事行为能力，尚未确定法定代理人参加仲裁的；\n（三）用人单位终止，尚未确定权利义务承继者的；\n（四）一方当事人因不可抗拒的事由，不能参加仲裁的；\n（五）案件审理需要以其他案件的审理结果为依据，且其他案件尚未审结的；\n（六）案件处理需要等待工伤认定、伤残等级鉴定以及其他鉴定结论的；\n（七）其他应当中止仲裁审理的情形。中止审理的情形消除后，仲裁庭应当恢复审 理。", "ex": ""}, {"no": "第二十四条", "t": "第二十四条  申 请 人 死 亡 ，没有继承人或者继承人放弃仲裁权利的，终结仲裁程 序。", "ex": ""}, {"no": "第二十五条", "t": "第二十五条  当事人因仲裁庭逾期未作出仲裁裁决而向人民法院提起诉讼并立案受 理的，仲裁委员会应当决定该案件终止审理，由仲裁员填写仲裁结案审批表，报请仲裁委 员会主任或其委托的仲裁院负责人审批结案；当事人未就该争议事项向人民法院提起诉讼 的，仲裁委员会应当继续审理。", "ex": ""}, {"no": "第二十六条", "t": "第二十六条  仲裁委员会审理涉外案件，应当使用中华人民共和国通用的语言、文 字，当事人要求提供翻译的，可以提供，费用由当事人承担。\n江西省劳动人事争议仲裁庭审旁听规则", "ex": ""}, {"no": "第一条", "t": "第一条  为维护仲裁庭审秩序，保障庭审活动正常进行，根据《劳动人事争议仲裁办 案规则》等规定，特制定本规则。", "ex": ""}, {"no": "第二条", "t": "第二条  劳动人事争议仲裁案件应当公开审理，但当事人协议不公开进行或者涉及国 家秘密、军事秘密、商业秘密和个人隐私的除外。依法公开的仲裁案件，公民可以进行旁 听；依法不公开的仲裁案件，除法律另有规定外，任何人不得旁听。", "ex": ""}, {"no": "第三条", "t": "第三条 仲裁庭应根据开庭场所的大小确定参加旁听的人数。", "ex": ""}, {"no": "第四条", "t": "第四条  中国公民凭有效身份证明可以进行旁听，并接受人身及携带物品的安全检 查。外国人和无国籍人持有效证件要求旁听的，参照中国公民旁听的规定处理。\n新闻媒体要求采访，经审批同意，可以记录、录音、录像，并应当在指定的时间和区 域进行，不得影响和干扰庭审活动。境外新闻媒体要求旁听、采访的，按《中华人民共和 国外国常驻新闻机构和外国记者采访条例》等相关外事管理规定办理。", "ex": ""}, {"no": "第五条", "t": "第五条  属于下列对象之一的公民，不得参加旁听：\n（一）证人、鉴定人以及准备出庭提出意见的有专门知识的人；\n（二）酒醉、服用迷幻药物或精神状态异常的人；\n（三）携带武器、凶器或其他危险物品的人；\n（四）未经允许携带摄影、摄像、录音设备，且经劝阻不听的人；\n（五）拒绝出示身份证件或拒绝安全检查的人；\n（六）其他可能妨害仲裁秩序的人。", "ex": ""}, {"no": "第六条", "t": "第六条  旁听人员进入仲裁庭后应遵守以下仲裁庭纪律：\n（一）庭审活动中，应当服从仲裁员的指挥；\n（二）需着装整洁，不得随意走动；\n（三）需保持安静，开庭时不得鼓掌、喧哗和吵闹，不得使用任何通讯工具；\n（四）未经仲裁庭许可，不得随意发言或提问；\n（五）未经仲裁庭许可不准录音、录像、拍照或使用移动通讯工具等传播庭审活动；\n（六）不得吸烟或进食；\n（七）其他妨害仲裁庭审安全或秩序的行为。", "ex": ""}, {"no": "第七条", "t": "第七条  旁听人员违反仲裁庭纪律和干扰仲裁活动的，由仲裁员给予劝告和制止；不 听劝告的，仲裁员有权警告、训诫或责令退出仲裁庭；情节严重的，按照《中华人民共和 国治安管理处罚法》的有关规定，移送公安机关处理；构成犯罪的，移送司法机关处理。\n江西省劳动人事争议仲裁案件简易处理规则", "ex": ""}, {"no": "第一条", "t": "第一条  为提高劳动人事争议仲裁案件处理效率，及时化解劳动人事争议，保护当事 人的合法权益，根据《中华人民共和国劳动争议调解仲裁法》《劳动人事争议仲裁办案规 则》等规定，制定本规则。", "ex": ""}, {"no": "第二条", "t": "第二条  本规则所指案件简易处理是指劳动人事争议仲裁委员会（以下简称仲裁委员 会）在处理简单案件过程中，在庭审程序、仲裁文书送达等方面实行简单快捷的处理程 序。", "ex": ""}, {"no": "第三条", "t": "第三条  实行案件简易处理应遵循合法、公正、高效、便捷的原则。", "ex": ""}, {"no": "第四条", "t": "第四条  简易处理适用于符合下列情形之一的案件：\n（一）当事人关系明晰、权利义务明确、争议事实清楚的；\n（二）标的额不超过本地区上年度职工年平均工资的；\n（三）当事人同意适用简易处理的。", "ex": ""}, {"no": "第五条", "t": "第五条  具有下列情形之一的案件，不适用简易处理：\n（一）履行集体合同发生的劳动争议案件；\n（二）被申请人下落不明的；\n（三）涉及国家利益、社会公共利益的；\n（四）有重大社会影响的；\n（五）仲裁委员会认为不宜适用简易处理的。", "ex": ""}, {"no": "第六条", "t": "第六条  适用简易处理的案件，除本规定第四条第（三）项规定的情形外，可以在申 请人提出仲裁申请的当日或者次日受理，并及时告知当事人。", "ex": ""}, {"no": "第七条", "t": "第七条  适用简易处理的案件，仲裁委员会应在受理后及时征求被申请人对答辩期的 意见。经被申请人同意，仲裁庭可以缩短或者取消答辩期。", "ex": ""}, {"no": "第八条", "t": "第八条  适用简易处理的案件，可以根据案件情况灵活确定举证期限。", "ex": ""}, {"no": "第九条", "t": "第九条  适用简易处理的案件，经当事人同意，可以用电话、短信、微信、电子邮件 等简便方式送达仲裁文书，但送达调解书、裁决书除外。仲裁委员会已经在开庭前告知当 事人仲裁权利义务的，可以在开庭时仅告知当事人申请回避的权利。\n以简便方式送达的开庭通知，未经当事人确认或者没有其他证据证明当事人已经收到 的，仲裁庭不得按撤回仲裁申请处理或者缺席裁决。", "ex": ""}, {"no": "第十条", "t": "第十条  仲裁委员会可以设立简易处理案件审理庭或指定专人承办简易处理案件。", "ex": ""}, {"no": "第十一条", "t": "第十一条  仲裁委员会决定简易处理的，可以指定一名仲裁员独任仲裁。处理十人以 上并有共同请求的争议案件，应当由三名仲裁员组成仲裁庭。", "ex": ""}, {"no": "第十二条", "t": "第十二条  适用简易处理的案件，仲裁委员会应当优先安排调解。调解成功的，及时 制作仲裁调解书。", "ex": ""}, {"no": "第十三条", "t": "第十三条  适用简易处理的案件，庭审中对于双方当事人认可或者无争议的证据和事 实，可不再逐份核实证据，直接予以确认。\n确认的事实或证据，除有相反证据可以推翻外，一般不得更改。", "ex": ""}, {"no": "第十四条", "t": "第十四条  适用简易处理的案件 .庭审记录应重点记录当事人有争议的事实及当事人 承认、放弃仲裁请求和相关事实的意思表示。", "ex": ""}, {"no": "第十五条", "t": "第十五条  适用简易处理案件，当事人放弃答辩权的，应在三十日内结案。当事人未 放弃答辩权的，应在四十五日内结案。", "ex": ""}, {"no": "第十六条", "t": "第十六条  在审理过程中，发现案件不应适用简易处理的，仲裁委员会应当在仲裁期 限届满前决定转为一般程序处理，并告知当事人。", "ex": ""}, {"no": "第十七条", "t": "第十七条  转入一般程序处理的案件审理期限，应自仲裁委员会受理仲裁申请之日起 计算。已经确认的证据和事实，可以不再进行举证、质证。\n江西省劳动人事争议仲裁法律文书送达规则", "ex": ""}]}, {"ch": "第一章  总  则", "items": [{"no": "第一条", "t": "第一条  为规范劳动人事争议仲裁委员会（以下简称仲裁委员会）仲裁文书的送达工 作，保障仲裁活动的顺利进行，维护当事人的合法权益，根据《劳动人事争议仲裁办案规 则》（以下简称《办案规则》），并参照《中华人民共和国民事诉讼法》《中华人民共和 国邮政法》等规定，制定本规则。", "ex": ""}, {"no": "第二条", "t": "第二条  本规则所称送达是指仲裁委员会依据法定的程序和方式，将仲裁文书送交受 送达人的行为。", "ex": ""}, {"no": "第三条", "t": "第三条  本规则所称送达人员是指受仲裁委员会指派依法从事仲裁文书送达工作的人 员。", "ex": ""}, {"no": "第四条", "t": "第四条  本规则所称受送达人是指仲裁案件中的申请人、被申请人、第三人及其他与 仲裁案件有利害关系或参加仲裁活动的自然人、法人及其他组织。", "ex": ""}, {"no": "第五条", "t": "第五条  仲裁委员会送达仲裁文书可以采取以下送达方式：\n（一）直接送达；\n（二）留置、张贴送达；\n（三）委托送达；\n（四）邮寄送达；\n（五）电子送达；\n（六）公告送达。", "ex": ""}, {"no": "第六条", "t": "第六条  仲裁委员会送达仲裁文书必须有送达回证，送达回证应当载明案件编号、送 达人名称、受送达人名称、送达文书名称、送达方式、送达时间、受送达人或代收人签名 等内容。", "ex": ""}, {"no": "第一条", "t": "第一条   为进一步提高劳动人事争议仲裁案卷管理水平，充分发挥案卷作用，根据《中 华人民共和国档案法》《中华人民共和国劳动争议调解仲裁法》《劳动人事争议仲裁办案规 则》等规定，制定本规则。", "ex": ""}, {"no": "第二条", "t": "第二条 各劳动人事争议仲裁委员会（以下简称仲裁委员会）负责本仲裁委员会案卷的 立卷、归档、使用、保管和销毁。仲裁委员会主管部门负责对劳动人事争议仲裁案卷管理工 作实施监督、检查、指导。", "ex": ""}, {"no": "第三条", "t": "第三条  仲裁委员会应设置专职或兼职档案管理员从事案卷档案管理工作。", "ex": ""}]}, {"ch": "第二章  送达地址", "items": [{"no": "第七条", "t": "第七条  受送达人申请仲裁、 答辩或参加仲裁活动时，应当按照《送达地址确认告知 书》（附件1）的要求如实提供准确的送达地址并填写《送达地址确认书》（附件2）。", "ex": ""}, {"no": "第八条", "t": "第八条  当事人提供的送达地址应当包括邮政编码、详细地址以及受送达人的联系电 话等。同意电子送达的，应当提供并确认接收仲裁文书的传真号、电子邮箱、微信号等电 子送达地址。当事人委托仲裁代理人的，代理人确认的送达地址视为当事人的送达地址。 受送达人在仲裁案件审理期间变更送达地址的，应及时以书面方式告知仲裁委员会。", "ex": ""}, {"no": "第九条", "t": "第九条  因当事人拒绝确认送达地址或者以拒接电话、避而不见送达人员、搬离原住 所地等方式躲避、规避送达，仲裁委员会无法确认送达地址的，可以分别按下列情形处 理：\n（一）当事人在本次仲裁中所涉及的劳动合同、往来函件中对送达地址有明确约定 的，以约定的地址为送达地址；\n（二）没有约定的，以当事人在本次仲裁中提交的书面材料中载明的自己的地址为送 达地址；\n（三）没有约定、当事人也未提交书面材料或者书面材料中未载明地址的，以一年内 在本仲裁委员会进行的其他仲裁案件中提供的地址为送达地址。", "ex": ""}, {"no": "第十条", "t": "第十条  依照本规则第九条仍不能确认送达地址的，自然人以其户籍登记的住所地或 者经常居住地登记的住址为送达地址；法人或者其他组织以其工商登记或者其他依法登 记、备案的住所地为送达地址。", "ex": ""}]}, {"ch": "第三章 直接送达", "items": [{"no": "第十一条", "t": "第十一条  仲裁委员会采取直接送达方式送达仲裁文书的，应当将仲裁文书直接交给 受送达人。", "ex": ""}, {"no": "第十二条", "t": "第十二条  仲裁委员会直接送达仲裁文书的，可以通知当事人或其指定的代收人到本 仲裁委员会领取。当事人或者其指定的代收人到达仲裁委员会，拒绝签署送达回证的，视 为送达。送达人员应当在送达回证上注明送达情况并签名。\n仲裁委员会可以在当事人住所地以外向当事人直接送达仲裁文书。当事人拒绝签署送 达回证的，送达人员采取拍照、录像等方式记录送达过程，即视为送达。送达人员应当在 送达回证上注明送达情况并签名。", "ex": ""}, {"no": "第十三条", "t": "第十三条  除将仲裁文书直接交给受送达人外，直接送达还包括以下几种情形：\n（一）受送达人是自然人的，本人不在时，可交由其同住成年家属签收；\n（二）受送达人是法人或者其他组织的，应当由法人的法定代表人、其他组织的主要 负责人或者该法人、组织负责收件的人签收；\n（三）受送达人有代理人的，可以送交其代理人签收； 受送达人已向仲裁委员会指定 代收人的，送交代收人签收。", "ex": ""}]}, {"ch": "第四章  留置、张贴送达", "items": [{"no": "第十四条", "t": "第十四条  仲裁委员会在受送达人住所采取留置、张贴方式送达仲裁文书的，需符合 下列情形之一：\n（一）因企业停业等原因导致无法送达且劳动者一方在十人以上的；\n（二）受送达人拒绝签收仲裁文书的。", "ex": ""}, {"no": "第十五条", "t": "第十五条  仲裁委员会采取留置、张贴方式送达仲裁文书的，须采用拍照、录像等方 式记录送达的地点（如门牌号、字号、招牌等）、张贴位置及送达的时间、送达人员等相 关信息。", "ex": ""}, {"no": "第十六条", "t": "第十六条  仲裁委员会采用留置、 张贴方式送达仲裁文书的可邀请受送达人住所地的 村民委员会、街道办事处、居民委员会、司法所、派出所等第三方组织代表到场见证。\n仲裁委员会邀请见证人的，送达回证上需载有见证人签名或者盖章。", "ex": ""}, {"no": "第十七条", "t": "第十七条  仲裁委员会因受送达人拒绝签收仲裁文书而采用留置、张贴方式送达仲裁 文书的，送达回证上应当载明拒收事由。", "ex": ""}, {"no": "第十八条", "t": "第十八条  仲裁委员会以留置、张贴方式送达仲裁文书自留置、张贴之日起三日后即 视为送达。", "ex": ""}, {"no": "第十九条", "t": "第十九条  调解书不得采用留置、张贴方式送达。", "ex": ""}]}, {"ch": "第五章  委托送达", "items": [{"no": "第二十条", "t": "第二十条  直接送达仲裁文书有困难的，可以委托其他仲裁委员会代为送达。", "ex": ""}, {"no": "第二十一条", "t": "第二十一条  委托其他仲裁委员会送达仲裁文书的，委托方应当出具盖有其印章的委 托送达函（附件3）并附需要送达的仲裁文书和送达回证。", "ex": ""}, {"no": "第二十二条", "t": "第二十二条  委托送达函须载明委托机关的名称、 受送达人的名称、受送达人的地址 及案件编号等信息。", "ex": ""}, {"no": "第二十三条", "t": "第二十三条  受委托的仲裁委员会应在收到委托函之日起五个工作日内进行送达。", "ex": ""}, {"no": "第二十四条", "t": "第二十四条  仲裁文书无法送达的，受委托仲裁委员会应当在送达回证上注明无法送 达的原因和日期，并及时退回委托送达函中所附的全部文书。", "ex": ""}]}, {"ch": "第六章  邮寄送达", "items": [{"no": "第二十五条", "t": "第二十五条  直接送达仲裁文书确有困难且当事人送达地址明确的，可采用邮寄送达 方式送达仲裁文书。", "ex": ""}, {"no": "第二十六条", "t": "第二十六条  仲裁委员会邮寄送达的仲裁文书，有下列情形之一的，即为送达：\n（一）受送达人在邮件回执上签名、盖章或者捺印的；\n（二）受送达人是无民事行为能力人或者限制行为能力的    诉                       劳动人事争议案件（案号；）\n依据《劳动人事争议仲裁办案规则》《江西省劳动人事争议仲裁法律文书送达规则》的 相关规定，将有关事项通知如下：\n一、当事人应向本委提供或确认自己准确的送达地址，并填写送达地址确认书，送达地 址确认书的内容应当包括送达地址的邮政编码、详细地址及受送达人的联系电话或指定代收 人及其联系电话。变更送达地址、联系电话、指定代收人、电子邮箱、微信账号的，应及时 书面告知本委。\n二、因当事人拒绝提供、确认送达地址或者以拒接电话、避而不见送达人员、搬离原住 所地等方式躲避、规避送达，仲裁委员会无法确认送达地址的，如当事人在本次仲裁中所涉 及的劳动合同、往来函件中对送达地址有明确约定的，以约定的地址为送达地址；没有约定 的，以当事人在本次仲裁中提交的书面材料中载明的自己的地址为送达地址；没有约定、当 事人也未提交书面材料或者书面材料中未载明地址的，以一年内在本仲裁委员会进行的其他 仲裁案件中提供的地址为送达地址。依照上述方式仍无法确定的，自然人以其户籍登记的住 所地或者经常居住地登记的住址为送达地址；法人或者其他组织以其工商登记或者其他依法 登记、备案的住所地为送达地址。\n三、受送达人是自然人的，其法定代理人、委托代理人、指定的代收人、同住的成年家 属签收的，即为送达。\n四、受送达人是法人或者其他组织的，其法人的法定代表人、组织的主要负责人或者办 公室、收发室、值班室的工作人员签收的，或者其委托代理人、指定的代收人签收的，即为 送达。\n五、因受送达人提供或确认的送达地址不准确、拒不提供送达地址、送达地址变更未及 时告知本委、受送达人本人或指定代收人、委托代理人拒绝签收，导致仲裁文书未能被受送 达人实际接收的，邮寄的仲裁文书退回之日视为送达之日。\n六、受送达人拒绝签收仲裁文书的，本委以留置、张贴方式送达的仲裁文书自留置、张 贴之日起经过三日即视为送达。\n特此告知。\n劳动人事争议仲裁委员会\n附件2\n送达地址确认书\n1.送达地址：\n2.邮政编码：\n3.联系电话：\n4.电子邮箱：\n5.微信：\n6.指定代收人：\n7.代收人联系电话：\n（第1-3项为必填项、第4-7项为选填项）\n我     采用电子方式送达（空格处填写同意或者不同意），且阅读了《劳动人事争议 仲裁委员会送达地址确认告知书》，并保证上述内容准确有效。\n确认人签名/公章：\n年    月    日\n附件3\n劳动人事争议仲裁委员会委托送达函\nXX 劳人仲函〔〕第 XX 号\n劳动人事争议仲裁委员会：\n我委受理                                               诉案件（案号），现 委托贵委送达有关文书。随函寄去 XX 书 X 份、送达回证 X 份，请在收到本函后五个工作 日内代为向                                                      送 达，送达地址 及受送达人联系方式为：\n将送达回证尽快寄回我委。如无法送达，请及时回函告知我委。\n联系人：（写明委托方联系人的姓名、部门、职务）联系电话：\n联系地址：\n劳动人事争议仲裁委员会\n年   月    日\n江西省劳动人事争议仲裁终局裁决规则", "ex": ""}, {"no": "第一条", "t": "第一条  终局裁决是指劳动人事争议仲裁委员会（以下简称仲裁委员会）在案件审理 终结时对当事人提交的全部实体争议所作的、裁决书自作出之日起发生法律效力的裁决。", "ex": ""}, {"no": "第二条", "t": "第二条  终局裁决案件的适用范围：\n（一）追索劳动报酬、工伤医疗费、经济补偿或者赔偿金， 不超过当地月最低工资标 准十二个月金额的争议。\n1.劳动报酬包括：计时工资、计件工资、奖金、津贴和补贴、延长工作时间的工资报 酬、特殊情况下支付的工资。\n2.工伤医疗费包括：挂号费、检查费、治疗费、化验费、手术费、药费、住院费等与 工伤或者职业病治疗有关的费用。\n3.经济补偿包括：解除或者终止劳动合同的经济补偿等用人单位未提前三十天书面通 知解除劳动合同的一个月工资、竞业限制期限内给予的经济补偿等。\n4.赔偿金包括：未签订书面劳动合同二倍工资、违法约定试用期的赔偿金、违法解除 或者终止劳动合同的赔偿金等。\n（二）因执行国家的劳动标准在工作时间、休息休假、社会保险等方面发生的争议。", "ex": ""}, {"no": "第三条", "t": "第三条  终局裁决案件的适用原则：\n（一）根据《中华人民共和国劳动争议调解仲裁法》第四十七条第（一）项规定，劳 动者追索劳动报酬、工伤医疗费、经济补偿或者赔 ems": [{"no": "第十七条", "t": "第十七条  仲裁委员会应当建立案卷查阅制度。对案卷正卷材料，应当允许当事人及其 代理人依法查阅、复制。", "ex": ""}, {"no": "第十八条", "t": "第十八条  查阅、复制案卷必须严格履行登记手续。\n当事人及其代理人查阅、复制正卷材料需持有效的身份证明，填写查阅、复制案卷登记 表，并写明查阅、复制用途，经案件承办人初审后，由仲裁委员会主任或者其委托的仲裁院 负责人批准。", "ex": ""}]}, {"ch": "第五章  案卷的销毁", "items": [{"no": "第十九条", "t": "第十九条 案卷销毁前应进行鉴定。鉴定应由仲裁委员会主任或者其委托的仲裁院负责 人组织实施。", "ex": ""}, {"no": "第二十条", "t": "第二十条  对经鉴定已过保管期限且确无保存价值的案卷要进行销毁。 销毁前要编制好 销毁清册，逐册登记。", "ex": ""}, {"no": "第二十一条", "t": "第二十一条  案卷销毁应由两人以上监销。案卷销毁后，监销人要在销毁清册上签名。", "ex": ""}]}];

/* ===== 存储（自动保存 + 导出烘焙）===== */
const KEY = 'statute_note_' + LAW_KEY;
let store = (function(){
  try{ const s = localStorage.getItem(KEY); if(s) return JSON.parse(s); }catch(e){}
  try{ if(typeof INITIAL_STORE !== 'undefined' && INITIAL_STORE) return JSON.parse(JSON.stringify(INITIAL_STORE)); }catch(e){}
  return {notes:{}, marks:{}, explain:{}};
})();
store.notes = store.notes || {};
store.marks = store.marks || {};
store.explain = store.explain || {};
// 迁移旧版字符串笔记 -> 分层结构 {summary}
Object.keys(store.notes).forEach(function(k){
  if(typeof store.notes[k] === 'string'){
    const s = store.notes[k];
    store.notes[k] = s ? {s:s} : {};
  }
});

let saveTimer = null;
function save(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(function(){
    try{ localStorage.setItem(KEY, JSON.stringify(store)); }catch(e){}
    const n = Object.keys(store.notes).reduce(function(acc,k){
      const v = store.notes[k];
      if(typeof v === 'string') return acc + (v ? 1 : 0);
      if(v) return acc + Object.keys(v).filter(function(c){return v[c];}).length;
      return acc;
    }, 0);
    const m = Object.keys(store.marks).filter(function(k){return store.marks[k];}).length;
    const x = Object.keys(store.explain).filter(function(k){return store.explain[k];}).length;
    showStatus('已保存 ' + new Date().toLocaleTimeString() + ' · 笔记'+n+' 标记'+m+' 解读'+x);
  }, 400);
}
function showStatus(s){ document.getElementById('status').textContent = s; }

/* ===== 条文索引（用于互链）===== */
let lawMap = {};
function buildLawMap(){
  lawMap = {}; let g = 0;
  DATA.forEach(function(chap, ci){
    chap.items.forEach(function(art, ai){ g++; lawMap[g] = 'a'+ci+'_'+ai; });
  });
}
function linkLaws(text){
  return text.replace(/第(\d+)条/g, function(m, num){
    const id = lawMap[parseInt(num,10)];
    return id ? '<a href="#'+id+'" class="lawlink">'+m+'</a>' : m;
  });
}
function escapeHtml(s){
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
/* 分层批注区块：疑问/我的案例/要点总结/待办 */
function noteBlock(id, cat, tag, label, ph){
  let val = '';
  if(store.notes[id] && typeof store.notes[id] === 'object') val = store.notes[id][cat] || '';
  return '<div class="note-block"><span class="note-tag '+tag+'">'+label+'</span>' +
    '<div class="note sub" contenteditable="true" data-id="'+id+'" data-cat="'+cat+'" ' +
    'data-ph="'+ph+'">'+escapeHtml(val)+'</div></div>';
}

/* ===== 速查卡（由 QUICK 生成）===== */
function quickHtml(){
  let q = '<div class="quick" id="quick">' +
    '<div class="quick-head" onclick="toggleQuick()">📌 重点速查（点击展开/收起）</div>' +
    '<div class="quick-body" id="quickBody">';
  QUICK.forEach(function(item){
    q += '<div class="qg"><b>'+escapeHtml(item.b)+'</b>：'+escapeHtml(item.t)+'</div>';
  });
  q += '</div></div>';
  return linkLaws(q);
}
function toggleQuick(){
  const b = document.getElementById('quickBody');
  if(b) b.style.display = (b.style.display === 'none') ? '' : 'none';
}

/* ===== 法规简介（发布信息）===== */
function metaHtml(){
  const m = (typeof LAW_META !== 'undefined' && LAW_META) ? LAW_META : null;
  if(!m) return '';
  const intro = (typeof LAW_INTRO !== 'undefined' && LAW_INTRO) ? '<div class="law-intro-desc">'+escapeHtml(LAW_INTRO)+'</div>' : '';
  let validTxt = m.valid; let validCls = 'mv';
  if(m.valid === true){ validTxt = '有效'; validCls = 'mv ok'; }
  else if(m.valid === false){ validTxt = '失效'; validCls = 'mv no'; }
  else if(typeof m.valid === 'string'){ validCls = (m.valid.indexOf('有效') !== -1) ? 'mv ok' : 'mv no'; }
  return '<div class="law-intro" id="lawIntro">' +
    '<div class="law-intro-head">📖 法规简介</div>' +
    '<div class="law-intro-body">' + intro +
      '<div class="meta-grid">' +
        '<span class="mk">发布主体</span><span class="mv">'+escapeHtml(m.issuer||'—')+'</span>' +
        '<span class="mk">发布时间</span><span class="mv">'+escapeHtml(m.published||'—')+'</span>' +
        '<span class="mk">生效时间</span><span class="mv">'+escapeHtml(m.effective||'—')+'</span>' +
        '<span class="mk">是否有效</span><span class="'+validCls+'">'+escapeHtml(validTxt||'—')+'</span>' +
        '<span class="mk">效力等级</span><span class="mv">'+escapeHtml(m.level||'—')+'</span>' +
      '</div>' +
    '</div>' +
  '</div>';
}

/* ===== 渲染 ===== */
function render(){
  buildLawMap();
  const main = document.getElementById('content');
  const toc = document.getElementById('toc');
  let html = metaHtml() + quickHtml();
  let tocHtml = '';
  DATA.forEach(function(chap, ci){
    const cid = 'chap' + ci;
    tocHtml += '<a href="#' + cid + '" data-target="' + cid + '">' + chap.ch +
               '<span class="cnt">' + chap.items.length + '条</span></a>';
    html += '<section class="chapter" id="' + cid + '"><h2>' + chap.ch + '</h2>';
    chap.items.forEach(function(art, ai){
      const id = 'a' + ci + '_' + ai;
      const mk = store.marks[id];
      const exBase = store.explain[id] || art.ex || '';
      const exHtml = linkLaws(escapeHtml(exBase));
      // 关联案例
      let casesHtml = '';
      if(art.cases){
        casesHtml += '<div class="case-label">⚖️ 关联案例</div>';
        art.cases.forEach(function(cidKey){
          const c = CASES[cidKey]; if(!c) return;
          casesHtml += '<div class="case">' +
            '<div class="case-title">'+escapeHtml(c.t)+'</div>' +
            '<div class="case-desc">'+escapeHtml(c.d)+'</div>' +
            '<div class="case-src">来源：'+escapeHtml(c.s)+'</div>' +
          '</div>';
        });
      }
      // 关联法条
      let relHtml = '';
      if(art.rel){
        relHtml += '<div class="rel-label">🔗 关联法条</div>';
        art.rel.forEach(function(rkey){
          const r = (typeof REL !== 'undefined') ? REL[rkey] : null; if(!r) return;
          relHtml += '<div class="rel">' +
            '<div class="rel-src">'+escapeHtml(r.src)+' '+escapeHtml(r.art)+'</div>' +
            '<div class="rel-text">'+escapeHtml(r.t)+'</div>' +
          '</div>';
        });
      }
      html += '<article class="article' + (mk ? ' marked' : '') + '" id="' + id + '">' +
                '<div class="art-head">' +
                  '<span class="art-no">' + art.no + '</span>' +
                  '<button class="mark-btn" data-id="' + id + '" title="标记重点">' + (mk ? '★' : '☆') + '</button>' +
                '</div>' +
                '<div class="art-text">' + escapeHtml(art.t) + '</div>' +
                '<div class="explain-label">💡 条文解读（可补充）</div>' +
                '<div class="explain" contenteditable="true" data-ex="' + id + '">' + exHtml + '</div>' +
                casesHtml +
                relHtml +
                '<div class="tool-row"><button class="search-btn" data-kw="'+escapeHtml(LAW_TITLE+' '+art.no)+'">🔍 在北大法宝检索本条相关案例</button></div>' +
                '<div class="note-label">📝 学习笔记（可分层批注）</div>' +
                '<div class="notes-wrap">' +
                  noteBlock(id,'q','tag-q','疑问','想不通／存疑之处…') +
                  noteBlock(id,'c','tag-c','我的案例','自己办过的或想到的类案…') +
                  noteBlock(id,'s','tag-s','要点总结','提炼核心规则、记忆口诀…') +
                  noteBlock(id,'t','tag-t','待办','待查 / 待办事项…') +
                '</div>' +
                '<button class="reveal-btn" data-rev="' + id + '">显示解读</button>' +
              '</article>';
    });
    html += '</section>';
  });
  main.innerHTML = html;
  toc.insertAdjacentHTML('beforeend', tocHtml);
}

/* ===== 事件 ===== */
document.addEventListener('input', function(e){
  if(e.target.classList.contains('note')){
    const id = e.target.dataset.id;
    const cat = e.target.dataset.cat;
    store.notes[id] = (store.notes[id] && typeof store.notes[id] === 'object') ? store.notes[id] : {};
    store.notes[id][cat] = e.target.innerText;
    save();
  } else if(e.target.classList.contains('explain')){
    const id = e.target.dataset.ex;
    store.explain[id] = e.target.innerText;
    save();
  }
});
document.addEventListener('click', function(e){
  if(e.target.classList.contains('reveal-btn')){
    const art = e.target.closest('.article');
    const rev = art.classList.toggle('revealed');
    e.target.textContent = rev ? '隐藏解读' : '显示解读';
    return;
  }
  if(e.target.classList.contains('mark-btn')){
    const id = e.target.dataset.id;
    const on = !store.marks[id];
    store.marks[id] = on;
    e.target.closest('.article').classList.toggle('marked', on);
    e.target.textContent = on ? '★' : '☆';
    save();
  } else if(e.target.classList.contains('search-btn')){
    const kw = e.target.dataset.kw;
    window.open('https://www.pkulaw.com/search?keyword=' + encodeURIComponent(kw), '_blank');
  }
});

/* 自测记忆模式：隐藏解读/笔记/案例，点“显示解读”对照 */
let selfTest = false;
document.getElementById('btnTest').addEventListener('click', function(){
  selfTest = !selfTest;
  document.body.classList.toggle('self-test', selfTest);
  this.classList.toggle('active', selfTest);
  this.textContent = selfTest ? '退出自测' : '自测模式';
  showStatus(selfTest ? '自测模式：点条文下方“显示解读”对照记忆' : '已退出自测');
});

/* 目录滚动高亮 */
const tocLinks = function(){ return document.querySelectorAll('nav.toc a'); };
const observer = new IntersectionObserver(function(entries){
  entries.forEach(function(en){
    if(en.isIntersecting){
      tocLinks().forEach(function(a){
        a.classList.toggle('active', a.dataset.target === en.target.id);
      });
    }
  });
}, {rootMargin:'-20% 0px -70% 0px'});

/* 搜索过滤 */
document.getElementById('search').addEventListener('input', function(){
  const q = this.value.trim();
  document.querySelectorAll('.article').forEach(function(a){
    a.style.display = (!q || a.textContent.indexOf(q) !== -1) ? '' : 'none';
  });
});

/* 导出：序列化当前页面并把笔记与解读烘焙进 INITIAL_STORE */
document.getElementById('btnExport').addEventListener('click', function(){
  let html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
  html = html.replace(/const INITIAL_STORE = [^;]*;/,
                      'const INITIAL_STORE = ' + JSON.stringify(store) + ';');
  const d = new Date();
  const pad = function(n){return (n<10?'0':'')+n;};
  const fname = LAW_TITLE + '学习笔记_' + d.getFullYear() + pad(d.getMonth()+1) + pad(d.getDate()) + '.html';
  const blob = new Blob([html], {type:'text/html;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = fname; a.click();
  URL.revokeObjectURL(url);
  showStatus('已导出 ' + fname + '（在下载文件夹；想同步到网站，告诉我“发布批注”即可）');
});

document.getElementById('btnPrint').addEventListener('click', function(){ window.print(); });

document.getElementById('btnClear').addEventListener('click', function(){
  if(confirm('确定清空本浏览器内全部学习笔记和标记吗？\n（解读为预置内容、案例为内置数据，不会清空；此操作不可撤销，建议先点“导出”备份）')){
    store = {notes:{}, marks:{}, explain:{}};
    try{ localStorage.removeItem(KEY); }catch(e){}
    render();
    showStatus('已清空');
  }
});

/* ===== 启动 ===== */
document.title = '《' + LAW_TITLE + '》学习笔记（可编辑）';
document.getElementById('lawTitle').textContent = '《' + LAW_TITLE + '》学习笔记';
document.getElementById('lawSub').textContent = LAW_SUB;
document.getElementById('lawField').textContent = LAW_FIELD || '';
render();
DATA.forEach(function(_, ci){ observer.observe(document.getElementById('chap'+ci)); });
showStatus('已就绪');
</script>
